<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/"> <!-- Fix file:// URL security errors -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #2C3E50;
            overflow: hidden;
            color: white;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(44, 62, 80, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .energy-ring-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 120px;
        }
        .energy-ring {
            width: 100%; height: 100%;
            position: relative;
        }
        .energy-ring svg {
            transform: rotate(-90deg);
        }
        .energy-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 8;
        }
        .energy-ring-fill {
            fill: none;
            stroke: #ff6b6b;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
            filter: drop-shadow(0 0 6px #ff6b6b);
        }
        .energy-ring-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .energy-ring-text .value {
            font-size: 24px; font-weight: 800; color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .energy-ring-text .label {
            font-size: 10px; color: rgba(255,255,255,0.7); text-transform: uppercase;
        }
        .lives-container {
            display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
        }
        .heart {
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .heart.pulse {
            animation: heartPulse 0.5s ease-out;
        }
        .wave-timer {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: inline-block;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); filter: brightness(1.5); }
            100% { transform: scale(1); }
        }
        .wave-progress {
            margin-top: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }
        .wave-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #69db7c, #40c057);
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        .tower-selection {
            display: flex; gap: 12px;
        }
        .tower-btn {
            width: 65px; height: 75px;
            background: linear-gradient(180deg, rgba(45, 55, 72, 0.95) 0%, rgba(30, 39, 46, 0.95) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(75, 101, 132, 0.6);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 6px 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .tower-btn .tower-icon { font-size: 22px; margin-bottom: 2px; }
        .tower-btn .tower-name { font-size: 8px; }
        .tower-btn .tower-cost { font-size: 10px; }
        .tower-btn .tower-stats { display: none; }
        .tower-btn:hover { 
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(105, 219, 124, 0.8);
            box-shadow: 0 12px 25px rgba(105, 219, 124, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .tower-btn.selected { 
            border-color: #69db7c; 
            box-shadow: 0 0 30px rgba(105, 219, 124, 0.5), 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(180deg, rgba(55, 85, 65, 0.95) 0%, rgba(40, 60, 50, 0.95) 100%);
            animation: selectedPulse 1.5s ease-in-out infinite;
        }
        .tower-btn.disabled { 
            opacity: 0.4; 
            cursor: not-allowed;
            transform: none;
        }
        .tower-btn.disabled:hover {
            transform: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-color: rgba(75, 101, 132, 0.6);
        }
        @keyframes selectedPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(105, 219, 124, 0.4), 0 8px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 35px rgba(105, 219, 124, 0.7), 0 8px 20px rgba(0,0,0,0.4); }
        }
        .tower-icon {
            font-size: 36px;
            margin-bottom: 6px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
            position: relative;
            z-index: 1;
        }
        .tower-name {
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .tower-cost {
            color: #feca57;
            font-size: 14px;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .tower-stats {
            font-size: 9px;
            color: #a0aec0;
            margin-top: 6px;
            text-align: center;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        }
        #chaos-fill {
            height: 8px; background: #37474f; border-radius: 4px; margin: 8px 0;
            overflow: hidden;
        }
        #chaos-fill::after {
            content: ''; display: block; height: 100%;
            width: 0%; background: linear-gradient(90deg, #ff6b6b, #feca57);
            transition: width 0.3s ease;
        }
        .tower-selection {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
        }
        .energy-popup {
            position: absolute;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-30px); }
        }
        #event-popup {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.95);
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #event-popup.show { 
            opacity: 1; 
            display: block;
            animation: popupPop 0.3s ease-out;
        }
        @keyframes popupPop {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .start-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 45px;
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #69db7c 0%, #40c057 100%);
            color: #1e272e;
            border: none; border-radius: 50px;
            cursor: pointer; 
            box-shadow: 0 6px 25px rgba(105,219,124,0.4), 0 3px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 10px 35px rgba(105,219,124,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }
        .start-btn:active {
            transform: translate(-50%, -50%) scale(0.98);
        }
        .game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .hidden { display: none !important; }
        .game-over.hidden { display: none; }
        #login-screen, #main-menu, #game-over-screen { pointer-events: auto; }
        #wave-controls { display: none; }
        button.restart {
            padding: 15px 40px; font-size: 20px;
            background: #ff6b6b; color: white;
            border: none; border-radius: 30px;
            cursor: pointer; margin-top: 20px;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -150%); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(105, 219, 124, 0.6); }
            50% { box-shadow: 0 0 40px rgba(105, 219, 124, 0.9); }
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Login Screen -->
        <div id="login-screen" style="position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
            <h1 style="font-size:48px; color:#fff; margin-bottom:10px; text-shadow:0 0 20px #00d4ff;">FINAL TOWER</h1>
            <p style="color:#aaa; margin-bottom:30px;">Endless Tower Defense</p>
            <input type="text" id="username-input" placeholder="Enter your name" style="padding:15px 25px; font-size:18px; border-radius:25px; border:2px solid #00d4ff; background:rgba(0,0,0,0.5); color:#fff; width:250px; text-align:center; margin-bottom:20px;">
            <button id="login-btn" style="padding:15px 50px; font-size:20px; font-weight:bold; background:linear-gradient(135deg, #00d4ff, #0099cc); color:#fff; border:none; border-radius:25px; cursor:pointer; box-shadow:0 5px 20px rgba(0,212,255,0.4);">START GAME</button>
        </div>
        
        <!-- Main Menu (hidden initially) -->
        <div id="main-menu" class="hidden" style="position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1500;">
            <h1 style="font-size:56px; color:#00d4ff; margin-bottom:10px;">FINAL TOWER</h1>
            <p id="welcome-text" style="color:#aaa; font-size:20px; margin-bottom:40px;"></p>
            <button id="play-btn" style="padding:18px 60px; font-size:22px; font-weight:bold; background:linear-gradient(135deg, #51cf66, #40c057); color:#fff; border:none; border-radius:30px; cursor:pointer; margin-bottom:15px; box-shadow:0 5px 20px rgba(81,207,102,0.4);">PLAY</button>
            <button id="leaderboard-btn" style="padding:12px 40px; font-size:16px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:20px; cursor:pointer; margin-bottom:10px;">LEADERBOARD</button>
            <button id="achievements-btn" style="padding:12px 40px; font-size:16px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:20px; cursor:pointer;">ACHIEVEMENTS</button>
        </div>
        
        <!-- Game UI Layer (hidden initially) -->
        <div id="game-ui" class="hidden">
            <!-- Energy Ring - Top Center -->
            <div class="energy-ring-container" style="position:absolute; top:10px; left:50%; transform:translateX(-50%);">
                <div class="energy-ring">
                    <svg width="80" height="80" viewBox="0 0 120 120">
                        <circle class="energy-ring-bg" cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"></circle>
                        <circle class="energy-ring-fill" cx="60" cy="60" r="52" fill="none" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327" id="energy-ring-progress"></circle>
                    </svg>
                    <div class="energy-ring-text" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                        <div class="value" id="energy-val" style="font-size:16px; font-weight:800; color:#fff;">100</div>
                        <div class="label" style="font-size:8px; color:rgba(255,255,255,0.7);">ENERGY</div>
                    </div>
                </div>
            </div>
            
            <!-- Top Right - Lives & Wave -->
            <div class="hud-panel" style="position:absolute; top:10px; right:10px; min-width:100px; padding:8px;">
                <div class="lives-container" id="lives-display" style="display:flex; gap:2px; flex-wrap:wrap; margin-bottom:4px;"></div>
                <div class="wave-progress" style="background:rgba(255,255,255,0.1); border-radius:2px; height:4px; margin-bottom:4px;">
                    <div class="wave-progress-fill" id="wave-progress-fill" style="height:100%; background:linear-gradient(90deg,#51cf66,#40c057); width:0%; border-radius:2px;"></div>
                </div>
                <div id="wave-info" style="font-size:12px; font-weight:bold; color:#fff;">Wave 1</div>
                <div id="wave-timer" style="color:#ffd43b; font-size:12px; font-weight:bold; margin-top:2px;">Time: <span id="wave-timer-val">--</span></div>
            </div>
            
            <!-- Event Popup -->
            <div id="event-popup" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,rgba(255,215,0,0.95),rgba(255,165,0,0.95)); color:#1a1a2e; padding:20px 40px; border-radius:16px; font-size:18px; font-weight:bold; text-align:center; display:none; z-index:100; box-shadow:0 0 30px rgba(255,215,0,0.6); border:3px solid #fff;"></div>
            
            <!-- Top Left - Start Wave Button -->
            <div id="wave-controls" style="position:absolute; top:15px; left:15px; z-index:50;">
                <button id="start-wave-btn" style="padding:10px 20px; font-size:14px; font-weight:bold; background:linear-gradient(135deg,#51cf66,#40c057); color:#fff; border:none; border-radius:15px; cursor:pointer; box-shadow:0 3px 10px rgba(81,207,102,0.4);">START WAVE</button>
            </div>
            
            <!-- Bottom - Tower Selection -->
            <div class="hud-panel tower-selection" id="tower-buttons" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:8px; background:rgba(30,30,50,0.9); padding:8px 15px; border-radius:12px;"></div>
        </div>
        
        <!-- Game Over Screen -->
        <div class="game-over hidden" id="game-over-screen" style="position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
            <h1 id="end-title" style="font-size:56px; color:#ff6b6b; margin-bottom:10px;">GAME OVER</h1>
            <p id="end-reason" style="color:#aaa; font-size:20px; margin-bottom:30px;"></p>
            <button class="restart" onclick="location.reload()" style="padding:15px 40px; font-size:20px; background:#51cf66; color:#fff; border:none; border-radius:25px; cursor:pointer;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            MAP_WIDTH: 20,
            MAP_HEIGHT: 20,
            TILE_SIZE: 36,
            PATH_COLOR: '#556B2F',
            TERRAIN_COLOR: '#8B4513',
            BASE_ENERGY: 100,
            BASE_LIVES: 20,
            ENERGY_REGEN: 1,
            MAX_ENERGY: 100,
            PREPARATION_TIME: 60
        };

        // Wave scaling formula
        function calculateWaveDifficulty(waveNumber) {
            const baseDifficulty = 10;
            const waveFactor = Math.pow(1.15, waveNumber);
            const bossFactor = waveNumber % 5 === 0 ? 2.5 : 1;
            return Math.floor(baseDifficulty * waveFactor * bossFactor);
        }

        function calculateEnemyCount(waveNumber) {
            return Math.min(40, 10 + Math.floor(waveNumber * 1.5));
        }

        function calculatePathLength(wave) {
            return Math.min(30, 10 + Math.floor(wave * 1.2));
        }

        const TOWER_TYPES = {
            BASIC: { name: 'Basic Tower', cost: 20, damage: 5, range: 7, color: '#ff6b6b', icon: '🔵', fireRate: 800 },
            SNIPER: { name: 'Sniper', cost: 40, damage: 15, range: 18, color: '#4ecdc4', icon: '🎯', fireRate: 2000 },
            CANNON: { name: 'Cannon', cost: 60, damage: 8, range: 6, area: 4, color: '#ffe66d', icon: '💥', fireRate: 1500 },
            TRAP: { name: 'Trap', cost: 35, damage: 30, range: 3, oneTime: true, color: '#ff8787', icon: '💣', fireRate: 999999 },
            SLOW: { name: 'Slow', cost: 45, damage: 2, range: 8, slowFactor: 0.5, color: '#74c0fc', icon: '❄️', fireRate: 500 }
        };

        // ==================== GAME STATE ====================
        let gameState = {
            energy: CONFIG.BASE_ENERGY,
            lives: CONFIG.BASE_LIVES,
            wave: 1,
            gamePhase: 'PREPARATION', // 'PREPARATION' | 'WAVE_ACTIVE' | 'GAME_OVER'
            preparationTimer: CONFIG.PREPARATION_TIME,
            towers: [],
            enemies: [],
            projectiles: [],
            particles: [],
            gameOver: false,
            gameStarted: false,
            selectedTower: null,
            waveActive: false,
            pathGrid: [],
            maxWaveReached: 0,
            totalKills: 0,
            pathChanges: 0,
            bossesDefeated: 0
        };

	let camera, scene, renderer;

	// ==================== PATH GENERATOR ====================
	class PathGenerator {
		static createPath(waveNumber) {
			const pathTypes = ['STRAIGHT', 'WINDING', 'BRANCHING', 'MAZE'];
			const pathType = pathTypes[waveNumber % 4];
			const pathLength = calculatePathLength(waveNumber);
			
			switch(pathType) {
				case 'STRAIGHT':
					return this.generateStraightPath(pathLength);
				case 'WINDING':
					return this.generateWindingPath(pathLength);
				case 'BRANCHING':
					return this.generateBranchingPath(pathLength);
				case 'MAZE':
					return this.generateMazePath(pathLength);
				default:
					return this.generateWindingPath(pathLength);
			}
		}
		
		static generateStraightPath(length) {
			const path = [];
			const y = 5 + Math.floor(Math.random() * 10);
			for (let x = 0; x < Math.min(length, CONFIG.MAP_WIDTH); x++) {
				path.push({ x: x, y: y });
			}
			return path;
		}
		
		static generateWindingPath(length) {
			const path = [];
			let x = 0;
			let y = 5 + Math.floor(Math.random() * 10);
			const direction = Math.random() > 0.5 ? 1 : -1;
			
			while (x < Math.min(length, CONFIG.MAP_WIDTH)) {
				path.push({ x: x, y: y });
				x++;
				
				if (Math.random() < 0.3 && y + direction > 4 && y + direction < 15) {
					y += direction;
				}
			}
			return path;
		}
		
		static generateBranchingPath(length) {
			const path = [];
			let x = 0;
			let y = 10;
			
			while (x < Math.min(length, CONFIG.MAP_WIDTH)) {
				path.push({ x: x, y: y });
				x++;
				
				if (Math.random() < 0.2) {
					y = Math.max(5, Math.min(14, y + (Math.random() > 0.5 ? 2 : -2)));
				}
			}
			return path;
		}
		
		static generateMazePath(length) {
			const path = [];
			let x = 0;
			let y = 10;
			let lastDir = 0;
			
			while (x < Math.min(length, CONFIG.MAP_WIDTH)) {
				path.push({ x: x, y: y });
				
				const rand = Math.random();
				if (rand < 0.4) {
					x++;
				} else if (rand < 0.6 && y > 5) {
					y--;
				} else if (rand < 0.8 && y < 14) {
					y++;
				} else {
					x++;
				}
				
				if (x >= CONFIG.MAP_WIDTH) break;
			}
			return path;
		}
		
		static validatePath(path) {
			if (!path || path.length < 5) return false;
			if (path[0].x !== 0) return false;
			if (path[path.length - 1].x < CONFIG.MAP_WIDTH - 1) return false;
			
			for (let i = 1; i < path.length; i++) {
				const dx = Math.abs(path[i].x - path[i-1].x);
				const dy = Math.abs(path[i].y - path[i-1].y);
				if (dx + dy > 2) return false;
			}
			return true;
		}
	}

	// ==================== WAVE GENERATOR ====================
	function generateWaveEnemies(waveNum) {
		const enemies = [];
		const count = calculateEnemyCount(waveNum);
		const difficulty = calculateWaveDifficulty(waveNum);
		
		const enemyTypes = ['basic', 'fast', 'tank', 'sniper'];
		const spawnRate = Math.max(400, 1200 - waveNum * 30);
		
		for (let i = 0; i < count; i++) {
			let type = enemyTypes[Math.floor(Math.random() * Math.min(4, Math.floor(waveNum / 3) + 1))];
			let variant = 'normal';
			
			if (waveNum >= 5 && Math.random() < 0.1) type = 'burrowing';
			if (waveNum >= 10 && Math.random() < 0.05) type = 'spawner';
			
			if (waveNum % 5 === 0 && i === 0) {
				type = 'boss';
				variant = 'elite';
			}
			
			enemies.push({ type: type, variant: variant, spawnDelay: spawnRate });
		}
		
		return { enemies, spawnDelay: spawnRate };
	}

	// Dynamic path - generated each wave
	let currentPath = [];
	
	// Legacy path reference for compatibility
	const pathOptions = {
		mainPath: currentPath
	};

	// ==================== WAVE GENERATION ====================
	function selectPathForWave(waveNum) {
		// Generate new path for each wave
		let attempts = 0;
		while (attempts < 10) {
			const path = PathGenerator.createPath(waveNum + attempts);
			if (PathGenerator.validatePath(path)) {
				currentPath = path;
				pathOptions.mainPath = path;
				return path;
			}
			attempts++;
		}
		// Fallback to default winding path
		currentPath = PathGenerator.generateWindingPath(15);
		pathOptions.mainPath = currentPath;
		return currentPath;
	}

	// Get waypoint at index from a path
	function getWaypointAt(index, pathName) {
		const path = pathOptions[pathName];
		if (!path || !Array.isArray(path[index])) return null;
		return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
		         y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
	}

	// Get total waypoints in a path
	function getPathLength(pathName) {
		const path = pathOptions[pathName];
		return path ? path.length : 0;
	}

                    bottomColor: { value: new THREE.Color(0xffeedd) },
                    offset: { value: 400 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);

        function drawPath(path) {
            if (!path || !Array.isArray(path)) return;
            
            const pathColors = [0x3d2817, 0x4a3520, 0x2d1f12]; // Dark dirt colors
            
            for (let i = 0; i < path.length; i++) {
                const p = path[i];
                if (!p || p.x === undefined) continue;

                const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const z = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                
                // Create glowing "mole hole" entrance - visible opening in grass
                const holeGeo = new THREE.CylinderGeometry(12, 14, 3, 16);
                const holeMat = new THREE.MeshLambertMaterial({ 
                    color: 0x1a1008,
                    emissive: 0xff6b6b,
                    emissiveIntensity: 0.4
                });
                const hole = new THREE.Mesh(holeGeo, holeMat);
                hole.position.set(x, 1.5, z); // Just below grass surface
                scene.add(hole);
                pathSegments.push({ mesh: hole });
                
                // Glowing ring around hole entrance
                const ringGeo = new THREE.TorusGeometry(14, 2, 8, 24);
                const ringMat = new THREE.MeshLambertMaterial({ 
                    color: 0xffd43b,
                    emissive: 0xffd43b,
                    emissiveIntensity: 0.5
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.position.set(x, 3, z); // At grass level
                scene.add(ring);
                pathSegments.push({ mesh: ring });
                
                // Glass-like tunnel walls - see-through burrow effect
                const tunnelGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 10, CONFIG.TILE_SIZE - 2);
                const tunnelMat = new THREE.MeshLambertMaterial({ 
                    color: 0x2d1f12,
                    transparent: true,
                    opacity: 0.4,
                    emissive: 0x1a1008,
                    emissiveIntensity: 0.2
                });
                const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
                tunnel.position.set(x, -2, z); // Below surface
                scene.add(tunnel);
                pathSegments.push({ mesh: tunnel });
                
                // Glowing tunnel floor - where enemies walk
                const floorGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 3, 1, CONFIG.TILE_SIZE - 3);
                const floorMat = new THREE.MeshLambertMaterial({ 
                    color: 0x1a1008,
                    emissive: 0x3d2817,
                    emissiveIntensity: 0.3
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.position.set(x, -6, z); // Deep in the burrow
                scene.add(floor);
                pathSegments.push({ mesh: floor });
                
                // Side walls of tunnel - darker dirt
                const wallGeo = new THREE.BoxGeometry(2, 10, CONFIG.TILE_SIZE);
                const wallMat = new THREE.MeshLambertMaterial({ color: 0x3d2817 });
                
                // Left wall
                const wallL = new THREE.Mesh(wallGeo, wallMat);
                wallL.position.set(x - CONFIG.TILE_SIZE/2 + 1, -2, z);
                scene.add(wallL);
                
                // Right wall  
                const wallR = new THREE.Mesh(wallGeo, wallMat);
                wallR.position.set(x + CONFIG.TILE_SIZE/2 - 1, -2, z);
                scene.add(wallR);
                
                // Directional marker on tunnel ceiling (visible from above)
                if (i % 3 === 0 && i < path.length - 1) {
                    const nextP = path[i + 1];
                    const markerGeo = new THREE.ConeGeometry(2, 5, 4);
                    markerGeo.rotateX(Math.PI / 2);
                    const markerMat = new THREE.MeshLambertMaterial({ 
                        color: 0xffd43b, 
                        emissive: 0xffd43b, 
                        emissiveIntensity: 0.6,
                        transparent: true,
                        opacity: 0.7
                    });
                    const marker = new THREE.Mesh(markerGeo, markerMat);
                    marker.position.set(x, 3, z); // Just below surface
                    marker.lookAt(
                        nextP.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 
                        3, 
                        nextP.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2
                    );
                    scene.add(marker);
                }
            }
        }
