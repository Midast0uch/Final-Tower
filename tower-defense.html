<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/"> <!-- Fix file:// URL security errors -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #2C3E50;
            overflow: hidden;
            color: white;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(44, 62, 80, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .energy-ring-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 120px;
        }
        .energy-ring {
            width: 100%; height: 100%;
            position: relative;
        }
        .energy-ring svg {
            transform: rotate(-90deg);
        }
        .energy-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 8;
        }
        .energy-ring-fill {
            fill: none;
            stroke: #ff6b6b;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
            filter: drop-shadow(0 0 6px #ff6b6b);
        }
        .energy-ring-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .energy-ring-text .value {
            font-size: 24px; font-weight: 800; color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .energy-ring-text .label {
            font-size: 10px; color: rgba(255,255,255,0.7); text-transform: uppercase;
        }
        .lives-container {
            display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
        }
        .heart {
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .heart.pulse {
            animation: heartPulse 0.5s ease-out;
        }
        .wave-timer {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: inline-block;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); filter: brightness(1.5); }
            100% { transform: scale(1); }
        }
        .wave-progress {
            margin-top: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }
        .wave-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #69db7c, #40c057);
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        .tower-btn.selected { 
            border-color: #69db7c; 
            box-shadow: 0 0 30px rgba(105, 219, 124, 0.5), 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(180deg, rgba(55, 85, 65, 0.95) 0%, rgba(40, 60, 50, 0.95) 100%);
            animation: selectedPulse 1.5s ease-in-out infinite;
        }
        .tower-selection {
            display: flex; gap: 12px;
        }
        .tower-btn {
            width: 100px; height: 130px;
            background: linear-gradient(180deg, rgba(45, 55, 72, 0.95) 0%, rgba(30, 39, 46, 0.95) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(75, 101, 132, 0.6);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .tower-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            border-radius: 14px 14px 50% 50%;
            pointer-events: none;
        }
        .tower-btn:hover { 
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(105, 219, 124, 0.8);
            box-shadow: 0 12px 25px rgba(105, 219, 124, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .tower-btn.selected { 
            border-color: #69db7c; 
            box-shadow: 0 0 30px rgba(105, 219, 124, 0.5), 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(180deg, rgba(55, 85, 65, 0.95) 0%, rgba(40, 60, 50, 0.95) 100%);
            animation: selectedPulse 1.5s ease-in-out infinite;
        }
        .tower-btn.disabled { 
            opacity: 0.4; 
            cursor: not-allowed;
            transform: none;
        }
        .tower-btn.disabled:hover {
            transform: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-color: rgba(75, 101, 132, 0.6);
        }
        @keyframes selectedPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(105, 219, 124, 0.4), 0 8px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 35px rgba(105, 219, 124, 0.7), 0 8px 20px rgba(0,0,0,0.4); }
        }
        .tower-icon {
            font-size: 36px;
            margin-bottom: 6px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
            position: relative;
            z-index: 1;
        }
        .tower-name {
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .tower-cost {
            color: #feca57;
            font-size: 14px;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        .tower-stats {
            font-size: 9px;
            color: #a0aec0;
            margin-top: 6px;
            text-align: center;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        }
        #chaos-fill {
            height: 8px; background: #37474f; border-radius: 4px; margin: 8px 0;
            overflow: hidden;
        }
        #chaos-fill::after {
            content: ''; display: block; height: 100%;
            width: 0%; background: linear-gradient(90deg, #ff6b6b, #feca57);
            transition: width 0.3s ease;
        }
        .tower-selection {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px;
        }
        .energy-popup {
            position: absolute;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-30px); }
        }
        #event-popup {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.95);
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #event-popup.show { opacity: 1; }
        .start-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 45px;
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #69db7c 0%, #40c057 100%);
            color: #1e272e;
            border: none; border-radius: 50px;
            cursor: pointer; 
            box-shadow: 0 6px 25px rgba(105,219,124,0.4), 0 3px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 10px 35px rgba(105,219,124,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }
        .start-btn:active {
            transform: translate(-50%, -50%) scale(0.98);
        }
        .game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .game-over.hidden { display: none; }
        button.restart {
            padding: 15px 40px; font-size: 20px;
            background: #ff6b6b; color: white;
            border: none; border-radius: 30px;
            cursor: pointer; margin-top: 20px;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -150%); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(105, 219, 124, 0.6); }
            50% { box-shadow: 0 0 40px rgba(105, 219, 124, 0.9); }
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="ui-layer">

            <div class="hud-panel" style="position:absolute; top:20px; right:30px">

        <!-- Game Over Screen -->

        <!-- Start Button -->
        <button class="start-btn" id="start-wave-btn">START GAME</button>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            MAP_WIDTH: 20,
            MAP_HEIGHT: 20,
            TILE_SIZE: 36,
            PATH_COLOR: '#4b5d6a',
            GRASS_COLOR: '#1e8449',
            BASE_ENERGY: 100,
            BASE_LIVES: 8,
            TOTAL_WAVES: 20
        };

        const TOWER_TYPES = {
            BASIC: { name: 'Basic Tower', cost: 20, damage: 5, range: 7, color: '#ff6b6b', icon: '🔵' },
            SNIPER: { name: 'Sniper', cost: 40, damage: 15, range: 18, color: '#4ecdc4', icon: '🎯' },
            CANNON: { name: 'Cannon', cost: 60, damage: 2, area: 4, fireRate: 30, color: '#ffe66d', icon: '💥' }
        };

        // ==================== GAME STATE ====================
        let gameState = {
            energy: CONFIG.BASE_ENERGY,
            lives: CONFIG.BASE_LIVES,
            wave: 1,
            towers: [],
            enemies: [],
            projectiles: [],
            particles: [],
            gameOver: false,
            gameStarted: false,
            placedTowers: false,
            selectedTower: null,
            waveActive: false
        };

	let camera, scene, renderer;

	const WAVES = [
		{ spawnDelay: 1000, enemies: [
			{ type: 'basic', variant: 'fast' },
			{ type: 'cannon', variant: 'normal' }
		]},
		{ spawnDelay: 800, enemies: [
			{ type: 'sniper', variant: 'slow' },
			{ type: 'basic', variant: 'tanky' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 1200, enemies: [
			{ type: 'cannon', variant: 'heavy' },
			{ type: 'sniper', variant: 'normal' },
			{ type: 'basic', variant: 'tanky' }
		]},
		{ spawnDelay: 900, enemies: [
			{ type: 'basic', variant: 'fast' },
			{ type: 'basic', variant: 'tanky' },
			{ type: 'sniper', variant: 'slow' },
			{ type: 'cannon', variant: 'normal' }
		]},
		{ spawnDelay: 2000, enemies: [
			{ type: 'boss', variant: 'elite1' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 1000, enemies: [
			{ type: 'sniper', variant: 'normal' },
			{ type: 'cannon', variant: 'heavy' }
		]},
		{ spawnDelay: 800, enemies: [
			{ type: 'basic', variant: 'tanky' },
			{ type: 'basic', variant: 'fast' },
			{ type: 'sniper', variant: 'slow' }
		]},
		{ spawnDelay: 900, enemies: [
			{ type: 'cannon', variant: 'normal' },
			{ type: 'cannon', variant: 'heavy' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 700, enemies: [
			{ type: 'sniper', variant: 'slow' },
			{ type: 'sniper', variant: 'normal' },
			{ type: 'basic', variant: 'tanky' }
		]},
		{ spawnDelay: 1500, enemies: [
			{ type: 'boss', variant: 'elite2' },
			{ type: 'sniper', variant: 'normal' },
			{ type: 'cannon', variant: 'heavy' }
		]},
		{ spawnDelay: 800, enemies: [
			{ type: 'basic', variant: 'fast' },
			{ type: 'basic', variant: 'tanky' },
			{ type: 'cannon', variant: 'normal' }
		]},
		{ spawnDelay: 600, enemies: [
			{ type: 'sniper', variant: 'slow' },
			{ type: 'sniper', variant: 'normal' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 1000, enemies: [
			{ type: 'cannon', variant: 'heavy' },
			{ type: 'cannon', variant: 'normal' },
			{ type: 'sniper', variant: 'slow' }
		]},
		{ spawnDelay: 700, enemies: [
			{ type: 'basic', variant: 'tanky' },
			{ type: 'basic', variant: 'fast' },
			{ type: 'sniper', variant: 'normal' }
		]},
		{ spawnDelay: 2500, enemies: [
			{ type: 'boss', variant: 'elite3' },
			{ type: 'basic', variant: 'fast' },
			{ type: 'basic', variant: 'tanky' }
		]},
		{ spawnDelay: 600, enemies: [
			{ type: 'sniper', variant: 'normal' },
			{ type: 'cannon', variant: 'normal' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 800, enemies: [
			{ type: 'basic', variant: 'tanky' },
			{ type: 'cannon', variant: 'heavy' },
			{ type: 'sniper', variant: 'slow' }
		]},
		{ spawnDelay: 500, enemies: [
			{ type: 'sniper', variant: 'slow' },
			{ type: 'basic', variant: 'fast' },
			{ type: 'basic', variant: 'tanky' }
		]},
		{ spawnDelay: 1200, enemies: [
			{ type: 'cannon', variant: 'heavy' },
			{ type: 'sniper', variant: 'normal' },
			{ type: 'basic', variant: 'fast' }
		]},
		{ spawnDelay: 3000, enemies: [
			{ type: 'boss', variant: 'final' },
			{ type: 'sniper', variant: 'slow' },
			{ type: 'cannon', variant: 'heavy' }
		]}
	];

	// Single continuous path from left to right - simple S-curve
	const mainPath = [
		// Enter from left side
		{ x: 0, y: 10 }, { x: 1, y: 10 }, { x: 2, y: 10 }, { x: 3, y: 10 }, { x: 4, y: 10 },
		// Go down
		{ x: 4, y: 9 }, { x: 4, y: 8 }, { x: 4, y: 7 }, { x: 4, y: 6 },
		// Go right
		{ x: 5, y: 6 }, { x: 6, y: 6 }, { x: 7, y: 6 }, { x: 8, y: 6 }, { x: 9, y: 6 }, { x: 10, y: 6 },
		// Go up
		{ x: 10, y: 7 }, { x: 10, y: 8 }, { x: 10, y: 9 }, { x: 10, y: 10 },
		// Go right to end
		{ x: 11, y: 10 }, { x: 12, y: 10 }, { x: 13, y: 10 }, { x: 14, y: 10 }, { x: 15, y: 10 },
		{ x: 16, y: 10 }, { x: 17, y: 10 }, { x: 18, y: 10 }, { x: 19, y: 10 }
	];

	const pathOptions = {
		mainPath: mainPath
	};

	// ==================== WAVE GENERATION ====================
	function selectPathForWave(waveNum) {
		return 'mainPath';
	}

	// Get waypoint at index from a path
	function getWaypointAt(index, pathName) {
		const path = pathOptions[pathName];
		if (!path || !Array.isArray(path[index])) return null;
		return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
		         y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
	}

	// Get total waypoints in a path
	function getPathLength(pathName) {
		const path = pathOptions[pathName];
		return path ? path.length : 0;
	}

	function generateWaveEnemies(waveEnemiesData, waveNum) {
		if (!waveEnemiesData || !Array.isArray(waveEnemiesData)) return [];
		
		return waveEnemiesData.map((enemyDef, idx) => ({
			...enemyDef,
			id: `wave${waveNum}-e${idx}`
		}));
	}

	// End of initialization code
	function init() {
            console.log('Initializing game...');
            
            // Setup Three.js scene first
            scene = new THREE.Scene();
            
            // Sky gradient using a large sphere
            const skyGeo = new THREE.SphereGeometry(900, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0077ff) },
                    bottomColor: { value: new THREE.Color(0xffeedd) },
                    offset: { value: 400 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);
            console.log('Sky gradient created');

            // Top-down isometric camera
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
            const centerX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            const centerZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2;
            // Position for 20x20 grid at 36px tiles = 720x720 world
            camera.position.set(centerX, 500, centerZ + 250);
            camera.lookAt(centerX, 0, centerZ);
            console.log('Camera positioned at', camera.position.x, camera.position.y, camera.position.z);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(100, 200, 50);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x87CEEB, 1);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);
            console.log('Renderer added, scene children:', scene.children.length);

            // Build map
            buildMap();
            createAmbientParticles();

            // Create UI elements
            createUI();

            // Setup event listeners
            setupEventListeners();

            // Start game loop
            animate();
        }

        function buildMap() {
            // Base grass layer with organic shape
            const terrainGeo = new THREE.PlaneGeometry(CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE, CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE, 40, 20);
            terrainGeo.rotateX(-Math.PI / 2);
            
            // Add organic height variation
            const positions = terrainGeo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const z = positions.getZ(i);
                // Gentle rolling hills effect
                positions.setY(i, Math.sin(x * 0.05) * Math.cos(z * 0.05) * 0.8 + Math.random() * 0.3);
            }
            terrainGeo.computeVertexNormals();
            
            // Rich grass material with slight variation
            const grassMat = new THREE.MeshLambertMaterial({ 
                color: 0x2d5a27,
                side: THREE.DoubleSide
            });
            const terrain = new THREE.Mesh(terrainGeo, grassMat);
            terrain.position.set(CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2, 0, CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2);
            scene.add(terrain);

            // Add layered grass details for depth
            const grassColors = [0x3d7a37, 0x4a8f47, 0x2d5a27, 0x358040];
            const grassBladeGeo = new THREE.ConeGeometry(0.4, 2, 4);
            grassBladeGeo.translate(0, 1, 0);
            
            // Create multiple grass layers for depth
            for (let layer = 0; layer < 3; layer++) {
                const layerScale = 0.6 + layer * 0.2;
                const grassBladeMat = new THREE.MeshLambertMaterial({ 
                    color: grassColors[layer % grassColors.length],
                    transparent: layer > 0,
                    opacity: layer === 0 ? 1 : 0.7
                });
                
                for (let x = 0; x < CONFIG.MAP_WIDTH * (4 - layer); x++) {
                    for (let z = 0; z < CONFIG.MAP_HEIGHT * (4 - layer); z++) {
                        const worldX = x * (CONFIG.TILE_SIZE / (4 - layer)) + CONFIG.TILE_SIZE / (4 - layer) / 2;
                        const worldZ = z * (CONFIG.TILE_SIZE / (4 - layer)) + CONFIG.TILE_SIZE / (4 - layer) / 2;
                        
                        // Skip path and dense areas
                        const isPath = Object.values(pathOptions).some(route =>
                            route.some(p => Math.abs(p.x * CONFIG.TILE_SIZE - worldX) < CONFIG.TILE_SIZE && 
                                            Math.abs(p.y * CONFIG.TILE_SIZE - worldZ) < CONFIG.TILE_SIZE)
                        );
                        if (isPath || Math.random() > 0.7) continue;
                        
                        const blade = new THREE.Mesh(grassBladeGeo, grassBladeMat);
                        blade.position.set(worldX, 0, worldZ);
                        blade.rotation.y = Math.random() * Math.PI;
                        blade.scale.setScalar(layerScale * (0.5 + Math.random() * 0.5));
                        scene.add(blade);
                    }
                }
            }

            // Add small decorative elements - flowers and rocks
            const flowerGeo = new THREE.SphereGeometry(0.5, 6, 6);
            const flowerColors = [0xffffff, 0xfeca57, 0xff6b6b, 0xa29bfe];
            const rockGeo = new THREE.DodecahedronGeometry(0.6);
            const rockMat = new THREE.MeshLambertMaterial({ color: 0x7f8c9a });
            
            for (let x = 0; x < CONFIG.MAP_WIDTH * 2; x++) {
                for (let z = 0; z < CONFIG.MAP_HEIGHT * 2; z++) {
                    const worldX = x * (CONFIG.TILE_SIZE / 2) + CONFIG.TILE_SIZE / 4;
                    const worldZ = z * (CONFIG.TILE_SIZE / 2) + CONFIG.TILE_SIZE / 4;
                    
                    // Check path
                    const isPath = Object.values(pathOptions).some(route =>
                        route.some(p => Math.abs(p.x * CONFIG.TILE_SIZE - worldX) < CONFIG.TILE_SIZE && 
                                        Math.abs(p.y * CONFIG.TILE_SIZE - worldZ) < CONFIG.TILE_SIZE)
                    );
                    if (isPath) continue;
                    
                    // Random chance for flowers or rocks
                    if (Math.random() < 0.03) {
                        // Flower
                        const flowerMat = new THREE.MeshLambertMaterial({ 
                            color: flowerColors[Math.floor(Math.random() * flowerColors.length)]
                        });
                        const flower = new THREE.Mesh(flowerGeo, flowerMat);
                        flower.position.set(worldX, 1.5, worldZ);
                        scene.add(flower);
                    } else if (Math.random() < 0.02) {
                        // Small rock
                        const rock = new THREE.Mesh(rockGeo, rockMat);
                        rock.position.set(worldX, 0.3, worldZ);
                        rock.rotation.set(Math.random(), Math.random(), Math.random());
                        rock.scale.setScalar(0.5 + Math.random() * 0.5);
                        scene.add(rock);
                    }
                }
            }
            console.log('Terrain added at', terrain.position.x, terrain.position.z);

            // Draw path tiles with arrows and grid lines
            for (const route of Object.values(pathOptions)) {
                if (!route || !Array.isArray(route)) continue;
                for (let i = 0; i < route.length; i++) {
                    const p = route[i];
                    if (!p || p.x === undefined) continue;

                    const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    const y = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    
                    const pathGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 8, CONFIG.TILE_SIZE - 2);
                    const pathMat = new THREE.MeshLambertMaterial({ color: 0x8b7355 });
                    const pathTile = new THREE.Mesh(pathGeo, pathMat);
                    pathTile.position.set(x, 4, y);
                    scene.add(pathTile);
                    pathSegments.push({ mesh: pathTile });
                    
                    // Grid lines between tiles
                    if (i < route.length - 1) {
                        const nextP = route[i + 1];
                        const midX = (x + (nextP.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2)) / 2;
                        const midY = (y + (nextP.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2)) / 2;
                        
                        const lineGeo = new THREE.BoxGeometry(2, 1, CONFIG.TILE_SIZE * 0.6);
                        const lineMat = new THREE.MeshBasicMaterial({ color: 0x6b5344 });
                        const line = new THREE.Mesh(lineGeo, lineMat);
                        line.position.set(midX, 9, midY);
                        line.lookAt(nextP.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 9, nextP.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        scene.add(line);
                    }
                    
                    // Directional arrow on every 3rd tile
                    if (i % 3 === 0 && i < route.length - 1) {
                        const arrowGeo = new THREE.ConeGeometry(3, 8, 4);
                        arrowGeo.rotateX(Math.PI / 2);
                        const arrowMat = new THREE.MeshLambertMaterial({ color: 0xffd43b, emissive: 0xffd43b, emissiveIntensity: 0.3 });
                        const arrow = new THREE.Mesh(arrowGeo, arrowMat);
                        
                        const nextP = route[i + 1];
                        arrow.position.set(x, 10, y);
                        arrow.lookAt(nextP.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 10, nextP.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        arrow.rotateX(Math.PI / 2);
                        scene.add(arrow);
                    }
                }
            }
        }

        }

        function startWave() {
            if (gameState.wave > CONFIG.TOTAL_WAVES) {
                endGame(true);
                return;
            }

            const waveIndex = gameState.wave - 1;
            if (waveIndex >= WAVES.length) {
                console.log("No more waves defined!");
                gameState.waveActive = false;
                return;
            }

            const selectedPath = selectPathForWave(gameState.wave);
            console.log(`Wave ${gameState.wave} using path:`, selectedPath);

            currentWaveNum = gameState.wave;
            currentWave = WAVES[waveIndex];
            waveEnemies = generateWaveEnemies(currentWave.enemies, currentWaveNum);
            lastSpawnTime = Date.now();
            gameState.waveActive = true;

            const path = pathOptions[selectedPath] || [];
            const pathLength = path.length * CONFIG.TILE_SIZE;
            const baseSpeed = 0.5 + (gameState.wave * 0.05);
            const travelTime = (pathLength / baseSpeed) / 60;
            const spawnTime = (currentWave.enemies.length * currentWave.spawnDelay) / 1000;
            waveDuration = Math.ceil(spawnTime + travelTime + 10);
            waveStartTime = Date.now();
            
            console.log('Wave duration:', waveDuration, 'seconds (spawn:', spawnTime, 'travel:', travelTime, ')');
            updateUI();

            document.getElementById('start-wave-btn').classList.add('hidden');
            showWaveAnnouncement(gameState.wave);
        }

        function createUI() {
            // Tower cards
            const container = document.getElementById('tower-buttons');
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.createElement('div');
                btn.className = 'tower-btn';
                const dmg = type.damage || 1;
                const rate = type.fireRate ? Math.round(60/type.fireRate) : 1;
                btn.innerHTML = `
                    <div class="tower-icon">${type.icon}</div>
                    <div class="tower-name">${type.name}</div>
                    <div class="tower-cost">⚡ ${type.cost}</div>
                    <div class="tower-stats">DMG: ${dmg} | ${rate}/sec</div>
                `;
                if (gameState.energy < type.cost) btn.classList.add('disabled');
                
                btn.addEventListener('click', () => {
                    if (gameState.selectedTower === key) {
                        // Deselect if clicking already selected tower
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        gameState.selectedTower = null;
                    } else {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        gameState.selectedTower = key;
                    }
                });
                // Add data attribute for easy targeting
                btn.setAttribute('data-tower', key);
                container.appendChild(btn);
            });

            // Start wave button - game flow: START GAME -> place towers -> START WAVE -> enemies
            const startBtn = document.getElementById('start-wave-btn');
            startBtn.textContent = 'START GAME';
            startBtn.style.background = '#69db7c';
            
            startBtn.addEventListener('click', () => {
                if (!gameState.gameStarted) {
                    gameState.gameStarted = true;
                    startBtn.textContent = 'START WAVE 1';
                    startBtn.style.background = '#69db7c';
                    updateUI();
                } else if (!gameState.waveActive) {
                    if (gameState.wave > CONFIG.TOTAL_WAVES) {
                        endGame(true);
                        return;
                    }
                    startWave();
                    startBtn.classList.add('hidden');
                }
            });
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Tower placement preview tile
            let previewTile = null;
            let rangeCircle = null;
            
            document.getElementById('game-container').addEventListener('mousemove', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) {
                    if (previewTile) {
                        scene.remove(previewTile);
                        previewTile = null;
                    }
                    if (rangeCircle) {
                        scene.remove(rangeCircle);
                        rangeCircle = null;
                    }
                    return;
                }

                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const worldX = (x / rect.width) * CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
                const worldZ = (y / rect.height) * CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;

                const gridX = Math.floor(worldX / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(worldZ / CONFIG.TILE_SIZE);

                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || 
                    gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) {
                    if (previewTile) {
                        scene.remove(previewTile);
                        previewTile = null;
                    }
                    if (rangeCircle) {
                        scene.remove(rangeCircle);
                        rangeCircle = null;
                    }
                    return;
                }

                const isPath = Object.values(pathOptions).some(route =>
                    route.some(p => p.x === gridX && p.y === gridZ)
                );
                const isOccupied = gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ);
                const canPlace = !isPath && !isOccupied && gameState.energy >= TOWER_TYPES[gameState.selectedTower].cost;

                if (!previewTile) {
                    const previewGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 12, CONFIG.TILE_SIZE - 2);
                    const previewMat = new THREE.MeshLambertMaterial({ 
                        color: canPlace ? 0x69db7c : 0xff6b6b,
                        transparent: true,
                        opacity: 0.6
                    });
                    previewTile = new THREE.Mesh(previewGeo, previewMat);
                    scene.add(previewTile);
                } else {
                    previewTile.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }

                previewTile.position.set(
                    gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    6,
                    gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2
                );

                const towerDef = TOWER_TYPES[gameState.selectedTower];
                const range = towerDef.range * CONFIG.TILE_SIZE;
                
                if (!rangeCircle) {
                    const ringGeo = new THREE.RingGeometry(range - 1, range, 64);
                    ringGeo.rotateX(-Math.PI / 2);
                    const ringMat = new THREE.MeshBasicMaterial({ 
                        color: canPlace ? 0x69db7c : 0xff6b6b,
                        transparent: true,
                        opacity: 0.25,
                        side: THREE.DoubleSide
                    });
                    rangeCircle = new THREE.Mesh(ringGeo, ringMat);
                    scene.add(rangeCircle);
                } else {
                    rangeCircle.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                
                rangeCircle.position.set(
                    gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                    1,
                    gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2
                );
            });

            document.getElementById('game-container').addEventListener('mouseleave', () => {
                if (previewTile) {
                    scene.remove(previewTile);
                    previewTile = null;
                }
                if (rangeCircle) {
                    scene.remove(rangeCircle);
                    rangeCircle = null;
                }
            });

            // Tower placement click handler
            document.getElementById('game-container').addEventListener('click', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) return;

                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Convert screen coordinates to grid coordinates
                const worldX = (x / rect.width) * CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
                const worldZ = (y / rect.height) * CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;

                const gridX = Math.floor(worldX / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(worldZ / CONFIG.TILE_SIZE);

                // Check if valid placement
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || 
                    gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) return;

                const isPath = Object.values(pathOptions).some(route =>
                    route.some(p => p.x === gridX && p.y === gridZ)
                );
                if (isPath) return; // Can't place on path

                if (gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ)) return;

                const towerDef = TOWER_TYPES[gameState.selectedTower];
                if (gameState.energy < towerDef.cost) {
                    showEnergyPopup(e.clientX, e.clientY, -50);
                    return;
                }

                // Place tower
                gameState.energy -= towerDef.cost;
                createTower(gridX, gridZ, gameState.selectedTower);
                updateUI();
            });
        }

        function createTower(gridX, gridZ, typeKey) {
            const towerDef = TOWER_TYPES[typeKey];
            const meshGroup = new THREE.Group();
            
            if (typeKey === 'BASIC') {
                // Basic turret - box base with rotating top
                const baseGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE * 0.7, 8, CONFIG.TILE_SIZE * 0.7);
                const baseMat = new THREE.MeshLambertMaterial({ color: 0x4a5568 }); // Dark gray base
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 4;
                base.castShadow = true;
                meshGroup.add(base);

                // Rotating turret head
                const headGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE * 0.5, 6, CONFIG.TILE_SIZE * 0.5);
                const headMat = new THREE.MeshLambertMaterial({ color: 0x718096 }); // Lighter gray
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 11;
                head.castShadow = true;
                meshGroup.add(head);

                // Barrel
                const barrelGeo = new THREE.CylinderGeometry(2, 2, 10);
                barrelGeo.rotateZ(Math.PI / 2);
                const barrelMat = new THREE.MeshLambertMaterial({ color: 0x2d3748 });
                const barrel = new THREE.Mesh(barrelGeo, barrelMat);
                barrel.position.set(8, 11, 0);
                barrel.castShadow = true;
                meshGroup.add(barrel);

                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 3;
                base.castShadow = true;
                meshGroup.add(base);

                // Tall body
                const bodyGeo = new THREE.CylinderGeometry(5, 6, 12, 6);
                const bodyMat = new THREE.MeshLambertMaterial({ color: 0x6b46c1 }); // Purple
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 12;
                body.castShadow = true;
                meshGroup.add(body);

                scope.position.set(22, 14, 0);
                meshGroup.add(scope);
                
            } else if (typeKey === 'CANNON') {
                // Cannon tower - heavy, round, with thick barrel
                const baseGeo = new THREE.CylinderGeometry(12, 14, 6, 12);
                const baseMat = new THREE.MeshLambertMaterial({ color: 0xc53030 }); // Red base
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 3;
                base.castShadow = true;
                meshGroup.add(base);

                // Dome top
                const domeGeo = new THREE.SphereGeometry(10, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
                const domeMat = new THREE.MeshLambertMaterial({ color: 0x9b2c2c }); // Dark red
                const dome = new THREE.Mesh(domeGeo, domeMat);
                dome.position.y = 6;
                dome.castShadow = true;
                meshGroup.add(dome);

                // Thick cannon barrel
                const barrelGeo = new THREE.CylinderGeometry(4, 5, 14);
                barrelGeo.rotateZ(Math.PI / 2);
                const barrelMat = new THREE.MeshLambertMaterial({ color: 0x1a202c });
                const barrel = new THREE.Mesh(barrelGeo, barrelMat);
                barrel.position.set(10, 8, 0);
                barrel.castShadow = true;

                // Second barrel
                const barrel2Geo = new THREE.CylinderGeometry(4, 5, 14);
                barrel2Geo.rotateZ(Math.PI / 2);

        function updateStartButton() {
            const startBtn = document.getElementById('start-wave-btn');
            if (gameState.placedTowers && !gameState.waveActive) {
                startBtn.textContent = `START WAVE ${gameState.wave}`;
                startBtn.style.background = '#69db7c';
            }
        }

        function spawnEnemy(type, variant, waveNum) {
			let speed = 2 + (waveNum * 0.2);
			let health; let damage; let geo; let color;

			switch(type) {
				case 'basic':
					health = 30 + (waveNum * 5);
					damage = 2 + Math.floor(waveNum / 3);
					geo = new THREE.SphereGeometry(8, 16, 16);
					color = '#51cf66';
					if (variant === 'fast') { speed *= 1.8; geo.scale.set(0.7, 0.7, 0.7); }
					if (variant === 'tanky') { speed *= 0.5; health *= 2.5; geo = new THREE.BoxGeometry(14, 14, 14); color = '#339af0'; }
					break;
				case 'sniper':
					health = 18 + waveNum;
					damage = 5 + Math.floor(waveNum / 2);
					speed *= 0.6;
					geo = new THREE.OctahedronGeometry(9);
					color = '#845ef7';
					break;
				case 'cannon':
					health = 12 + waveNum * 2;
					damage = 6 + Math.floor(waveNum / 3);
					speed *= 0.7;
					geo = new THREE.CylinderGeometry(10, 10, 10, 8);
					color = '#ffc078';
					break;
				case 'boss':
					health = (waveNum % 5 === 0) ? (100 + waveNum * 20) : 80;
					damage = (waveNum % 5 === 0) ? (20 + Math.floor(waveNum / 3)) : 8;
					speed *= 0.4;
					geo = new THREE.IcosahedronGeometry(18);
					color = '#ff6b6b';
					break;
				default:
					return null;
			}

            const mat = new THREE.MeshLambertMaterial({ 
                color: color,
                emissive: color,
                emissiveIntensity: 0.15
            });

            const selectedPathKey = selectPathForWave(waveNum);
            const path = pathOptions[selectedPathKey] || pathOptions.mainPath || [];
            
            if (path.length === 0) {
                console.error('No path defined!');
                return null;
            }
            
            const startPos = path[0];
            const firstWaypoint = path[1] || path[path.length - 1];

            // Convert grid coords to world coords: grid.x -> world.x, grid.y -> world.z
            const startX = startPos.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const startZ = startPos.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetX = firstWaypoint.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetZ = firstWaypoint.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;

            const enemy = {
                mesh: new THREE.Mesh(geo, mat),
                position: new THREE.Vector3(startX, 12, startZ),
                target: new THREE.Vector3(targetX, 12, targetZ),
                path: path,
                pathIndex: 0,
                speed: speed,
                health: health,
                maxHealth: health,
                damage: damage,
                variant: variant,
                id: Math.random(),
                type: type
            };

            enemy.mesh.position.copy(enemy.position);
            enemy.mesh.castShadow = true;
            scene.add(enemy.mesh);
            
            // Health bar
            const healthBarGeo = new THREE.PlaneGeometry(16, 3);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(healthBarGeo, healthBarMat);
            healthBar.position.set(0, 20, 0);
            enemy.mesh.add(healthBar);
            enemy.healthBar = healthBar;
            
            return enemy;
        }
        
        function updateEnemyHealthBars() {
            gameState.enemies.forEach(enemy => {
                if (!enemy.mesh.parent || !enemy.healthBar) return;
                
                const healthPercent = enemy.health / enemy.maxHealth;
                enemy.healthBar.material.color.setHex(healthPercent > 0.5 ? 0x51cf66 : (healthPercent > 0.25 ? 0xffd43b : 0xff6b6b));
                enemy.healthBar.scale.x = healthPercent;
                enemy.healthBar.position.y = 20 + Math.sin(Date.now() * 0.005) * 1;
            });
        }

        function updateEnemies(delta) {
            gameState.enemies.forEach((enemy, index) => {
                if (!enemy.mesh.parent || gameState.gameOver) return;

                const dir = enemy.target.clone().sub(enemy.position);
                const dist = dir.length();
                
                if (dist < 15) {
                    enemy.pathIndex = (enemy.pathIndex || 0) + 1;
                    
                    if (enemy.pathIndex >= enemy.path.length) {
                        removeEnemy(index, true);
                        gameState.lives--;
                        pulseHeart();
                        updateUI();
                        if (gameState.lives <= 0) {
                            endGame(false);
                        }
                        return;
                    }
                    
                    const nextWaypoint = enemy.path[enemy.pathIndex];
                    enemy.target.set(
                        nextWaypoint.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                        12,
                        nextWaypoint.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2
                    );
                }

                if (dist > 1) {
                    dir.normalize();
                    enemy.position.add(dir.multiplyScalar(enemy.speed));
                    enemy.mesh.position.copy(enemy.position);
                    enemy.mesh.lookAt(enemy.target);
                }
            });

            gameState.enemies = gameState.enemies.filter(e => e.mesh.parent && e.health > 0);
        }

        function removeEnemy(index, reachedEnd = false) {
            const enemy = gameState.enemies[index];
            if (!enemy || !enemy.mesh) return;

            scene.remove(enemy.mesh);
            
            // Create explosion effect
            createExplosion(
                enemy.position.x,
                enemy.position.y - 15,
                enemy.position.z,
                reachedEnd ? 3 : 1 // Larger if boss or reached end
            );

            // Award energy for defeating enemy (only if killed by tower, not reached end)
            if (!reachedEnd) {
                const energyReward = enemy.type === 'boss' ? 30 : (enemy.type === 'cannon' ? 15 : 10);
                gameState.energy += energyReward;
                showFloatingText(enemy.position.x, enemy.position.y, `+${energyReward} ⚡`, '#feca57');
            }

            gameState.enemies.splice(index, 1);
        }

        function showFloatingText(x, y, z, text, color) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                color: ${color};
                font-size: 24px;
                font-weight: bold;
                pointer-events: none;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
                animation: floatUp 1s ease-out forwards;
            `;
            div.textContent = text;
            document.getElementById('game-container').appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function pulseHeart() {
            const hearts = document.querySelectorAll('.heart');
            if (hearts.length > 0) {
                hearts[hearts.length - 1].classList.add('pulse');
            }
        }

        function showWaveAnnouncement(waveNum) {
            const overlay = document.createElement('div');
            overlay.id = 'wave-overlay';
            overlay.style.cssText = `
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0,0,0,0.6);
                z-index: 2000;
                animation: fadeInOut 2s ease-in-out forwards;
            `;
            overlay.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 48px; color: #69db7c; font-weight: bold; text-shadow: 0 4px 20px rgba(105,219,124,0.5);">WAVE ${waveNum}</div>
                    <div style="font-size: 18px; color: #fff; margin-top: 10px;">Get Ready!</div>
                </div>
            `;
            document.getElementById('game-container').appendChild(overlay);
            setTimeout(() => overlay.remove(), 2000);
        }

        function createProjectile(towerIndex) {
            const tower = gameState.towers[towerIndex];
            const typeKey = tower.typeKey;
            
            const geo = new THREE.SphereGeometry(2, 8, 8);
            let color;
            let trailColor;
            
            switch(typeKey) {
                case 'BASIC':
                    color = '#ff6b6b';
                    trailColor = 0xff6b6b;
                    break;
                case 'SNIPER':
                    fireSniper(tower);
                    return;
                case 'CANNON':
                    color = '#ffe66d';
                    trailColor = 0xffe66d;
                    geo.scale.set(2.5, 2, 2.5);
                    break;
            }

            const mat = new THREE.MeshLambertMaterial({ color: color });
            const projectileMesh = new THREE.Mesh(geo, mat);
            
            const startPos = tower.mesh.position.clone();
            startPos.y += 12;

            projectileMesh.position.copy(startPos);
            scene.add(projectileMesh);

            const projectile = {
                mesh: projectileMesh,
                position: startPos.clone(),
                target: null,
                damage: TOWER_TYPES[typeKey].damage * tower.damageMult,
                fireRate: typeKey === 'CANNON' ? (TOWER_TYPES[typeKey].fireRate || 30) : 60,
                lastFired: Date.now(),
                gridX: tower.gridX,
                gridZ: tower.gridZ,
                typeKey: typeKey,
                trail: [],
                trailColor: trailColor
            };
            
            for (let i = 0; i < 5; i++) {
                const trailGeo = new THREE.SphereGeometry(1.5 - i * 0.25);
                const trailMat = new THREE.MeshBasicMaterial({ 
                    color: trailColor, 
                    transparent: true, 
                    opacity: 0.5 - i * 0.1 
                });
                const trailMesh = new THREE.Mesh(trailGeo, trailMat);
                trailMesh.position.copy(startPos);
                scene.add(trailMesh);
                projectile.trail.push({ mesh: trailMesh, offset: i * 3 });
            }
            
            gameState.projectiles.push(projectile);
        }

        function updateProjectiles(delta) {
            gameState.projectiles = gameState.projectiles.filter((proj) => {
                if (!proj.mesh.parent && !gameState.gameOver) {
                    proj.trail.forEach(t => { if (t.mesh.parent) scene.remove(t.mesh); });
                    return false;
                }

                const now = Date.now();
                if (now - proj.lastFired < (proj.fireRate || 60)) {
                    return true;
                }
                proj.lastFired = now;

                let targetEnemy = null;
                let closestDist = Infinity;
                
                for (const enemy of gameState.enemies) {
                    if (!enemy.mesh.parent) continue;
                    const dist = proj.position.distanceTo(enemy.position);
                    if (dist < closestDist && dist < 200) {
                        closestDist = dist;
                        targetEnemy = enemy;
                    }
                }

                if (targetEnemy) {
                    const dir = new THREE.Vector3().subVectors(targetEnemy.position, proj.position);
                    const dist = dir.length();
                    
                    if (dist < 12) {
                        targetEnemy.health -= proj.damage;
                        createExplosion(proj.position.x, proj.position.y, proj.position.z, 0.8);
                        proj.trail.forEach(t => { if (t.mesh.parent) scene.remove(t.mesh); });
                        scene.remove(proj.mesh);
                        return false;
                    }
                    
                    dir.normalize();
                    proj.position.add(dir.multiplyScalar(14));
                    proj.mesh.position.copy(proj.position);
                    
                    for (let i = proj.trail.length - 1; i >= 0; i--) {
                        const t = proj.trail[i];
                        if (i > 0) {
                            t.mesh.position.copy(proj.trail[i-1].mesh.position);
                        } else {
                            t.mesh.position.lerp(proj.position, 0.3);
                        }
                    }
                } else {
                    proj.trail.forEach(t => { if (t.mesh.parent) scene.remove(t.mesh); });
                    scene.remove(proj.mesh);
                    return false;
                }

                if (proj.position.length() > CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE * 2) {
                    proj.trail.forEach(t => { if (t.mesh.parent) scene.remove(t.mesh); });
                    scene.remove(proj.mesh);
                    return false;
                }

                return true;
            });
        }

        function fireSniper(tower) {
            const range = TOWER_TYPES.SNIPER.range * CONFIG.TILE_SIZE;
            let hitEnemy = null;
            let closestDist = Infinity;

            for (const enemy of gameState.enemies) {
                if (!enemy.mesh.parent) continue;
                const dist = tower.mesh.position.distanceTo(enemy.position);
                if (dist < range && dist < closestDist) {
                    closestDist = dist;
                    hitEnemy = enemy;
                }
            }

            if (hitEnemy) {
                hitEnemy.health -= TOWER_TYPES.SNIPER.damage * tower.damageMult;
                
                const laserGeo = new THREE.CylinderGeometry(0.5, 0.5, closestDist, 8);
                laserGeo.rotateZ(Math.PI / 2);
                const laserMat = new THREE.MeshBasicMaterial({ 
                    color: 0x4ecdc4, 
                    transparent: true, 
                    opacity: 0.8 
                });
                const laser = new THREE.Mesh(laserGeo, laserMat);
                
                const midPoint = tower.mesh.position.clone().add(hitEnemy.position.clone()).multiplyScalar(0.5);
                midPoint.y += 12;
                laser.position.copy(midPoint);
                laser.lookAt(hitEnemy.position.clone().add(new THREE.Vector3(0, 12, 0)));
                scene.add(laser);
                
                setTimeout(() => {
                    if (laser.parent) scene.remove(laser);
                    laser.geometry.dispose();
                    laser.material.dispose();
                }, 100);

                createExplosion(hitEnemy.position.x, hitEnemy.position.y, hitEnemy.position.z, 0.5);
            } else {
                const geo = new THREE.SphereGeometry(2);
                const mat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.8 });
                const beam = new THREE.Mesh(geo, mat);
                beam.position.copy(tower.mesh.position);
                beam.position.y += 15;
                scene.add(beam);

                let alpha = 0.8;
                const fadeInterval = setInterval(() => {
                    if (!beam.parent || alpha <= 0) {
                        clearInterval(fadeInterval);
                        if (beam.parent) scene.remove(beam);
                        beam.geometry.dispose();
                        beam.material.dispose();
                        return;
                    }
                    alpha -= 0.08;
                    beam.material.opacity = alpha;
                    beam.scale.multiplyScalar(1.1);
                }, 16);
            }
        }

        function createExplosion(x, y, z, intensity = 1) {
            const radius = 20 * intensity;
            const particleCount = 15 * intensity;
            
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 0.5;
                const vx = Math.cos(angle) * speed;
                const vz = Math.sin(angle) * speed;
                
                debrisParticles.push({
                    x: x,
                    y: y - 15, // Ground level
                    z: z,
                    vx: vx,
                    vz: vz,
                    vy: Math.random() * 3 + 2,
                    life: 60 + intensity * 20,
                    color: `hsl(${Math.random() * 40 + 15}, 80%, 60%)`,
                    size: radius / particleCount
                });
            }
        }

        function updateTerrain(delta) {
            const time = Date.now() * 0.001;
            pathSegments.forEach((segment, i) => {
                segment.mesh.position.y += Math.sin(time + i * 0.5) * 0.02;
            });
            
            ambientParticles.forEach((p, i) => {
                p.mesh.position.y += Math.sin(time * 2 + i) * 0.02;
                p.mesh.position.x += Math.cos(time + i * 0.5) * 0.01;
                if (p.mesh.position.y > 100) p.mesh.position.y = 0;
            });
        }
        
        function createAmbientParticles() {
            const particleGeo = new THREE.SphereGeometry(0.5, 4, 4);
            const particleMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.4 
            });
            
            for (let i = 0; i < 50; i++) {
                const particle = new THREE.Mesh(particleGeo, particleMat.clone());
                particle.position.set(
                    Math.random() * CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE,
                    Math.random() * 80 + 10,
                    Math.random() * CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE
                );
                particle.material.opacity = 0.2 + Math.random() * 0.3;
                scene.add(particle);
                ambientParticles.push({ mesh: particle, speed: 0.5 + Math.random() * 0.5 });
            }
        }
        
        let ambientParticles = [];

        function updateUI() {
            const ring = document.getElementById('energy-ring-progress');
            const circumference = 327;
            const offset = circumference - (gameState.energy / CONFIG.BASE_ENERGY) * circumference;
            ring.style.strokeDashoffset = offset;
            
            document.getElementById('energy-val').textContent = Math.floor(gameState.energy);
            
            const livesContainer = document.getElementById('lives-display');
            const hearts = '❤️'.repeat(Math.max(0, Math.min(gameState.lives, CONFIG.BASE_LIVES)));
            livesContainer.innerHTML = hearts.split('').map((h, i) => 
                `<span class="heart" style="animation-delay:${i * 0.1}s">${h}</span>`
            ).join('');

            const waveInfo = document.getElementById('wave-info');
            if (waveInfo) {
                const waveText = gameState.waveActive ? `Wave ${gameState.wave} (Active)` : `Wave ${gameState.wave}`;
                waveInfo.textContent = waveText;
            }

            const timerEl = document.getElementById('wave-timer');
            const timerValEl = document.getElementById('wave-timer-val');
            if (gameState.waveActive && waveStartTime > 0) {
                const elapsed = Math.floor((Date.now() - waveStartTime) / 1000);
                const remaining = Math.max(0, waveDuration - elapsed);
                timerEl.style.display = 'inline-block';
                timerValEl.textContent = remaining;
            } else {
                timerEl.style.display = 'none';
            }

            const progress = Math.min(100, (gameState.wave / CONFIG.TOTAL_WAVES) * 100);
            document.getElementById('wave-progress-fill').style.width = `${progress}%`;

            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.querySelector(`[data-tower="${key}"]`);
                if (!btn) return;
                if (gameState.energy < type.cost) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                }
            });
        }

        function showEnergyPopup(x, y, amount) {
            const div = document.createElement('div');
            div.className = 'energy-popup';
            div.innerHTML = `+${amount}⚡`;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            document.body.appendChild(div);

            // Cleanup after animation
            setTimeout(() => div.remove(), 1000);
        }

        function updateChaosMeter(delta) {
            const baseGain = 0.1 * delta; // ~6 per second normally
            const currentRate = baseGain;
            
            let newChaos = gameState.chaos || 0 + currentRate;
            
            // Update UI
            const fill = document.getElementById('chaos-fill');
            const percent = Math.min(100, (newChaos / 25) * 100);
            fill.style.width = `${percent}%`;
        }

	// ==================== WAVE GENERATION ====================
	function selectPathForWave(waveNum) {
		const paths = Object.keys(pathOptions);
		if (!paths || paths.length === 0) return 'pathA';
		return paths[waveNum % paths.length];
	}

	// Get waypoint at index from a path
	function getWaypointAt(index, pathName) {
		const path = pathOptions[pathName];
		if (!path || !Array.isArray(path[index])) return null;
		return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
		         y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
	}

	// Get total waypoints in a path
	function getPathLength(pathName) {
		const path = pathOptions[pathName];
		return path ? path.length : 0;
	}

	function generateWaveEnemies(waveData, waveNum) {
		if (!waveData || !Array.isArray(waveData)) return [];
		
		return waveData.map((enemyDef, idx) => ({
			...enemyDef,
			id: `wave${waveNum}-e${idx}`
		}));
	}

        function checkWaveCompletion() {
            if (!gameState.waveActive) return;

            const now = Date.now();
            
            // Spawn enemies based on timestamp
            if (waveEnemies.length > 0 && now - lastSpawnTime >= currentWave.spawnDelay) {
                const enemyData = waveEnemies.shift();
                const enemy = spawnEnemy(enemyData.type, enemyData.variant, currentWaveNum);
                if (enemy) {
                    gameState.enemies.push(enemy);
                }
                lastSpawnTime = now;
            }

            const elapsed = (now - waveStartTime) / 1000;
            const timerExpired = elapsed >= waveDuration;
            
            // Wave complete when: timer expired OR all enemies cleared
            if (timerExpired || (waveEnemies.length === 0 && gameState.enemies.length === 0)) {
                // Kill any remaining enemies
                gameState.enemies.forEach(enemy => {
                    if (enemy.mesh && enemy.mesh.parent) {
                        scene.remove(enemy.mesh);
                    }
                });
                gameState.enemies = [];
                waveComplete();
            }
        }

        function waveComplete() {
            if (Math.random() < 0.35) {
                showEventPopup();
            }

            gameState.waveActive = false;
            gameState.wave++;
            
            const startBtn = document.getElementById('start-wave-btn');
            if (gameState.wave <= CONFIG.TOTAL_WAVES) {
                startBtn.textContent = `START WAVE ${gameState.wave}`;
                startBtn.style.background = '#69db7c';
                startBtn.classList.remove('hidden');
            }
            
            updateUI();
            
            if (gameState.wave > CONFIG.TOTAL_WAVES) {
                endGame(true);
            }
        }

        function showEventPopup() {
            const effects = [
                { type: 'energy', amount: 50, text: '+50 Energy' },
                { type: 'lives', amount: 2, text: '+2 Lives' },
                { type: 'buff', amount: 1.5, text: '+50% Damage (60s)' }
            ];

            const effect = effects[Math.floor(Math.random() * effects.length)];
            const popup = document.getElementById('event-popup');
            
            if (effect.type === 'buff') {
                gameState.towers.forEach(t => t.damageMult *= 1.5);
            }

            popup.innerHTML = `<strong>EVENT!</strong><br>${effect.text}`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState.gameOver) return;

            const delta = 16;

            // Tower combat logic - check if towers should fire
            if (gameState.waveActive && gameState.enemies.length > 0) {
                gameState.towers.forEach((tower, index) => {
                    const now = Date.now();
                    const fireRate = tower.fireRate || 1000;
                    if (now - tower.lastFired > fireRate) {
                        createProjectile(index);
                        tower.lastFired = now;
                    }
                });
            }

            checkWaveCompletion();
            updateEnemies(delta);
            updateProjectiles(delta);
            updateTerrain(delta);
            updateEnemyHealthBars();
            updateUI();

            renderer.render(scene, camera);
        }

        function endGame(victory) {
            gameState.gameOver = true;
            const screen = document.getElementById('game-over-screen');
            screen.classList.remove('hidden');
            document.getElementById('end-title').textContent = victory ? 'VICTORY!' : 'GAME OVER';
            document.getElementById('end-reason').textContent = 
                victory ? `You survived all ${CONFIG.TOTAL_WAVES} waves!` : 'Enemies reached the end.';
        }

        // ==================== GAME LOOP VARIABLES ====================
        let waveStartTime = 0;
        let waveDuration = 0;
        let currentWave = null;
        let waveEnemies = [];
        let lastSpawnTime = 0;
        let currentPathIndex = 0;
        let debrisParticles = [];
        let pathSegments = [];
        
        // ==================== VISUAL EFFECTS ====================
        function createProjectileTrail() {
            if (gameState.projectiles.length === 0) return;

            // Create particle trail for each projectile
            gameState.projectiles.forEach((proj, idx) => {
                if (!proj.mesh.parent && !gameState.gameOver) return;

                // Add a small trail sphere behind projectile
                const trailGeo = new THREE.SphereGeometry(1.5);
                const trailMat = new THREE.MeshBasicMaterial({
                    color: TOWER_TYPES[proj.gridX ? 'BASIC' : (proj.typeKey || 'CANNON')].color,
                    transparent: true,
                    opacity: 0.6
                });

                const trailMesh = new THREE.Mesh(trailGeo, trailMat);
                trailMesh.position.copy(proj.position).sub(new THREE.Vector3(5, -5, 5));
                scene.add(trailMesh);

                // Store cleanup info
                proj.trails.push({ mesh: trailMesh });
            });

            // Cleanup old trails (limit to last 20 frames)
            const maxTrails = gameState.projectiles.length * 3;
            let totalTrails = 0;
            
            gameState.projectiles.forEach((proj, idx) => {
                if (!proj.trails) proj.trails = [];
                while (proj.trails.length > maxTrails) {
                    const oldTrail = proj.trails.shift();
                    if (oldTrail && oldTrail.mesh.parent) {
                        scene.remove(oldTrail.mesh);
                        oldTrail.mesh.geometry.dispose();
                        oldTrail.mesh.material.dispose();
                    }
                }
            });
        }

        function removeEnemy(index, reachedEnd = false) {
            const enemy = gameState.enemies[index];
            if (!enemy || !enemy.mesh) return;

            scene.remove(enemy.mesh);
            
            createExplosion(
                enemy.position.x,
                enemy.position.y,
                enemy.position.z,
                enemy.type === 'boss' ? 3 : (reachedEnd ? 2 : 1)
            );

            if (!reachedEnd) {
                const energyReward = enemy.type === 'boss' ? 30 : (enemy.type === 'cannon' ? 15 : (enemy.type === 'sniper' ? 12 : 10));
                gameState.energy += energyReward;
                showFloatingText(enemy.position.x, enemy.position.y + 20, enemy.position.z, `+${energyReward} ⚡`, '#feca57');
            }

            gameState.enemies.splice(index, 1);
        }

        function updateChaosMeter(delta) {
            // Simple chaos accumulation
            const baseGain = 0.1 * delta;
            let newChaos = (gameState.chaos || 0) + baseGain;
            
            const fill = document.getElementById('chaos-fill');
            const percent = Math.min(100, (newChaos / 25) * 100);
            fill.style.width = `${percent}%`;
        }

        function showEventPopup() {
            // Already implemented above
        }

        // Start the game
        init();
    </script>
</body>
