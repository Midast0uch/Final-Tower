                voxel(26, 4, 26, 0, 5, 0, baseMat);
                voxel(22, 4, 22, 0, 9, 0, baseMat);
                voxel(24, 2, 2, 0, 9, 11, runeMat);
                voxel(24, 2, 2, 0, 9, -11, runeMat);
                voxel(2, 2, 24, 11, 9, 0, runeMat);
                voxel(2, 2, 24, -11, 9, 0, runeMat);
                voxel(4, 6, 4, -11, 6, -11, accentMat);
                voxel(4, 6, 4, 11, 6, -11, accentMat);
                voxel(4, 6, 4, -11, 6, 11, accentMat);
                voxel(4, 6, 4, 11, 6, 11, accentMat);
                voxel(18, 4, 18, 0, 13, 0, crystalMat);
                voxel(14, 5, 14, 0, 17.5, 0, crystalMat);
                voxel(10, 6, 10, 0, 22.5, 0, crystalMat);
                voxel(6, 4, 6, 0, 27, 0, crystalMat);
                voxel(3, 3, 3, 0, 30, 0, runeMat);
                voxel(3, 5, 2, -10, 20, 0, accentMat);
                voxel(3, 5, 2, 10, 20, 0, accentMat);
                voxel(2, 5, 3, 0, 20, -10, accentMat);
                voxel(2, 5, 3, 0, 20, 10, accentMat);
                voxel(4, 3, 4, -6, 14, 8, accentMat);
                voxel(4, 3, 4, 6, 14, -8, accentMat);
                voxel(12, 1, 1, 0, 13, 9.5, runeMat);
                voxel(1, 1, 12, 9.5, 13, 0, runeMat);
                voxel(1, 1, 12, -9.5, 13, 0, runeMat);
                head = meshGroup.children[meshGroup.children.length - 1];
            } else if (typeKey === 'TRAP') {
                const plateMat = new THREE.MeshStandardMaterial({ color: 0x5c2a2a, roughness: 0.5, metalness: 0.6 });
                const spikeMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.9, emissive: 0xff3333, emissiveIntensity: 0.3 });
                const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.35 });
                // Flat pressure plate base
                voxel(32, 2, 32, 0, 1, 0, plateMat);
                voxel(24, 1, 24, 0, 2.5, 0, plateMat);
                // Glow ring on surface
                const glowGeo = new THREE.RingGeometry(10, 14, 24);
                const glowRing = new THREE.Mesh(glowGeo, glowMat);
                glowRing.rotation.x = -Math.PI / 2;
                glowRing.position.y = 2.6;
                meshGroup.add(glowRing);
                // Retractable spikes stored for animation
                const spikePositions = [
                    { x: -10, z: -10 }, { x: 10, z: -10 }, { x: -10, z: 10 }, { x: 10, z: 10 },
                    { x: 0, z: -12 }, { x: 0, z: 12 }, { x: -12, z: 0 }, { x: 12, z: 0 },
                    { x: 0, z: 0 }
                ];
                const trapSpikes = [];
                spikePositions.forEach(pos => {
                    const sGeo = new THREE.ConeGeometry(1.2, 8, 6);
                    const spike = new THREE.Mesh(sGeo, spikeMat);
                    spike.position.set(pos.x, 2, pos.z);
                    spike.scale.set(1, 0.01, 1); // hidden by default (retracted)
                    meshGroup.add(spike);
                    trapSpikes.push(spike);
                });
                meshGroup.userData.trapSpikes = trapSpikes;
                meshGroup.userData.glowRing = glowRing;
                head = glowRing;
            }
            const tileCenterX = gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const tileCenterZ = gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            meshGroup.position.set(tileCenterX, 6, tileCenterZ);
            scene.add(meshGroup);
            const range = TOWER_TYPES[typeKey].range * CONFIG.TILE_SIZE;
            const rangeGeo = new THREE.RingGeometry(range - 2, range, 32);
            const rangeMat = new THREE.MeshBasicMaterial({ color: TOWER_TYPES[typeKey].color, transparent: true, opacity: 0, side: THREE.DoubleSide });
            const rangeIndicator = new THREE.Mesh(rangeGeo, rangeMat);
            rangeIndicator.rotation.x = -Math.PI / 2;
            rangeIndicator.position.set(tileCenterX, 0.5, tileCenterZ);
            scene.add(rangeIndicator);
            const healthByType = {
                BASIC: { health: 20 + (gameState.wave * 2) },
                SNIPER: { health: 30 + (gameState.wave * 3) },
                CANNON: { health: 150 + (gameState.wave * 10) },
                SLOW: { health: 40 + (gameState.wave * 4) },
                TRAP: { health: 1 }
            };
            const towerHealth = healthByType[typeKey] || { health: 50 + (gameState.wave * 5) };
            const towerData = {
                mesh: meshGroup, gridX: gridX, gridZ: gridZ, damageMult: 1.0, typeKey: typeKey,
                fireRate: TOWER_TYPES[typeKey].fireRate || 60, lastFired: 0,
                rangeIndicator: rangeIndicator, barrel: barrel, head: head,
                health: towerHealth.health, maxHealth: towerHealth.health
            };
            if (typeKey === 'TRAP') {
                towerData.trapArmed = true;
                towerData.trapCooldown = 0;
                towerData.trapCooldownMax = TOWER_TYPES.TRAP.fireRate;
                // Set initial armed visual
                const spikes = meshGroup.userData.trapSpikes;
                const glow = meshGroup.userData.glowRing;
                if (spikes) spikes.forEach(s => { s.scale.y = 1; s.position.y = 5; });
                if (glow) glow.material.opacity = 0.5;
            }
            const healthBarGeo = new THREE.PlaneGeometry(24, 4);
            const healthBarBgMat = new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBarBg = new THREE.Mesh(healthBarGeo, healthBarBgMat);
            healthBarBg.position.set(0, 28, 0);
            healthBarBg.rotation.x = -Math.PI / 6;
            meshGroup.add(healthBarBg);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x30d158, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(new THREE.PlaneGeometry(24, 4), healthBarMat);
            healthBar.position.set(0, 28, 0.1);
            healthBar.rotation.x = -Math.PI / 6;
            meshGroup.add(healthBar);
            towerData.healthBar = healthBar;
            towerData.healthBarBg = healthBarBg;
            healthBar.visible = false;
            healthBarBg.visible = false;
            gameState.towers.push(towerData);
            gameState.placedTowers = true;
            if (seraph) seraph.onTowerPlaced();
            updateStartButton();
            updateUI();
            return towerData;
        }

        function updateStartButton() {
            const startBtn = document.getElementById('start-wave-btn');
            if (!startBtn) return;
            if (gameState.placedTowers && !gameState.waveActive) {
                startBtn.textContent = `START WAVE ${gameState.wave}`;
                startBtn.style.background = '#69db7c';
            }
        }

        // ========================================================================
        // VOXEL SERAPH — Ophanim Seraph (Malevolent Cloud-Piercing Overseer)
        // ========================================================================
        class VoxelSeraph {
            constructor() {
                this.group = null;
                this.centralEye = null;
                this.rings = [];
                this.satellites = [];
                this.wings = [];
                this.bubbleDiv = null;
                this.bubbleQueue = [];
                this.bubbleVisible = false;
                this.bubbleTimer = 0;
                this.state = 'idle';
                this.stateTimer = 0;
                this.time = 0;
                this.baseY = 95;
                this.fogHeight = 60;
                this.cameraAngleOffset = Math.PI * 0.75; // Position opposite to default camera view
                this.hoverRadius = Math.max(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT) * CONFIG.TILE_SIZE * 0.45;
                this.lightningLight = null;
                this.pupilScale = 1;
                this.targetPupilScale = 1;
                this.lastTauntTime = 0;
                this.tauntCooldown = 8000;
                this.lastScreenshotTime = 0;
                this.screenshotInterval = 20000; // 20s — llama-server on CPU needs ~15-30s per image
                this.preWrittenTaunts = [
                    "{name} stacks stones like a child building walls against the tide...",
                    "I see you, {name}. All of me sees you.",
                    "Geometric perfection mocks your chaos, {name}.",
                    "Your towers are merely pebbles in the infinite, {name}.",
                    "The wheels turn, {name}. You do not.",
                    "Every path you build, I have already foreseen, {name}.",
                    "Your strategy is... quaint, {name}.",
                    "How many eyes must watch before you crumble, {name}?",
                    "The fog remembers, {name}. The fog forgives nothing.",
                    "You organize, {name}. I annihilate."
                ];
                this.fallbackIndex = 0;
                this.isProcessingVision = false;
                this.visionPrompt = ''; // server.js handles the prompt; this is unused
            }

            init(scene) {
                this.scene = scene;
                this.group = new THREE.Group();
                this.group.renderOrder = 20;

                // Materials
                this.matSclera = new THREE.MeshStandardMaterial({ color: 0xe8e6d1, roughness: 0.8, fog: false });
                this.matIris = new THREE.MeshStandardMaterial({ color: 0x4a004a, emissive: 0x2a002a, emissiveIntensity: 0.5, fog: false });
                this.matPupil = new THREE.MeshBasicMaterial({ color: 0xff0040, fog: false });
                this.matRune = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400, emissiveIntensity: 2, fog: false });
                this.matRingBase = new THREE.MeshStandardMaterial({ color: 0xd8d6c1, roughness: 0.7, metalness: 0.4, fog: false });
                this.matSatellite = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5, fog: false });
                this.matWingBone = new THREE.MeshStandardMaterial({ color: 0x4a004a, emissive: 0x2a002a, emissiveIntensity: 0.5, roughness: 0.6, metalness: 0.5, fog: false });
                this.matWingFeather = new THREE.MeshStandardMaterial({ color: 0xe8e6d1, emissive: 0xffffff, emissiveIntensity: 0.1, roughness: 0.9, transparent: true, opacity: 0.75, fog: false });
                this.voxelGeo = new THREE.BoxGeometry(1, 1, 1);

                this._buildCentralEye();
                this._buildRings();
                this._buildSatellites();
                this._buildWings();
                this._buildLightning();

                this._updatePositionFromCamera();
                this.group.position.y = this.baseY;
                scene.add(this.group);

                this._createBubbleDOM();

                // Hook into vision model status changes
                if (window.seraphVision) {
                    window.seraphVision.onStatusChange = (status) => {
                        if (status === 'ready' && seraph) {
                            seraph.showTaunt('I see you now, {name}. Every tower. Every sin.');
                        }
                        if (seraph) seraph._updateVisionStatus();
                    };
                }
            }

            _buildCentralEye() {
                const eyeGroup = new THREE.Group();
                const instances = [];
                const runeInstances = [];

                // Ellipsoid sclera: 16x16x12
                const a = 8, b = 8, c = 6;
                for (let x = -a; x <= a; x++) {
                    for (let y = -b; y <= b; y++) {
                        for (let z = -c; z <= c; z++) {
                            const dist = (x * x) / (a * a) + (y * y) / (b * b) + (z * z) / (c * c);
                            if (dist <= 1.0 && dist >= 0.6) {
                                const isRune = Math.random() < 0.02;
                                if (isRune) {
                                    runeInstances.push({ x, y, z });
                                } else {
                                    instances.push({ x, y, z });
                                }
                            }
                        }
                    }
                }

                // Iris ring behind front surface
                for (let x = -5; x <= 5; x++) {
                    for (let y = -5; y <= 5; y++) {
                        const r2 = x * x + y * y;
                        if (r2 >= 4 && r2 <= 20) {
                            runeInstances.push({ x, y, z: 5 });
                        }
                    }
                }

                // Pupil
                const pupilGroup = new THREE.Group();
                for (let x = -1; x <= 0; x++) {
                    for (let y = -2; y <= 1; y++) {
                        const mesh = new THREE.Mesh(this.voxelGeo, this.matPupil);
                        mesh.position.set(x + 0.5, y + 0.5, 6);
                        mesh.scale.set(1, 1, 0.5);
                        pupilGroup.add(mesh);
                    }
                }
                this.pupilGroup = pupilGroup;
                eyeGroup.add(pupilGroup);

                if (instances.length > 0) {
                    const mesh = new THREE.InstancedMesh(this.voxelGeo, this.matSclera, instances.length);
                    const dummy = new THREE.Object3D();
                    instances.forEach((pos, i) => {
                        dummy.position.set(pos.x, pos.y, pos.z);
                        dummy.updateMatrix();
                        mesh.setMatrixAt(i, dummy.matrix);
                    });
                    mesh.instanceMatrix.needsUpdate = true;
                    eyeGroup.add(mesh);
                }
                if (runeInstances.length > 0) {
                    const mesh = new THREE.InstancedMesh(this.voxelGeo, this.matIris, runeInstances.length);
                    const dummy = new THREE.Object3D();
                    runeInstances.forEach((pos, i) => {
                        dummy.position.set(pos.x, pos.y, pos.z);
                        dummy.updateMatrix();
                        mesh.setMatrixAt(i, dummy.matrix);
                    });
                    mesh.instanceMatrix.needsUpdate = true;
                    eyeGroup.add(mesh);
                }

                this.centralEye = eyeGroup;
                this.group.add(eyeGroup);
            }

            _buildRings() {
                const ringConfigs = [
                    { majorR: 18, minorR: 2, count: 120, speed: 0.3, rotX: Math.PI / 4, rotY: 0, rotZ: Math.PI / 8 },
                    { majorR: 24, minorR: 2.5, count: 160, speed: -0.2, rotX: -Math.PI / 6, rotY: Math.PI / 3, rotZ: 0 },
                    { majorR: 30, minorR: 3, count: 200, speed: 0.15, rotX: 0, rotY: -Math.PI / 4, rotZ: Math.PI / 6 }
                ];

                ringConfigs.forEach((cfg, idx) => {
                    const ringGroup = new THREE.Group();
                    const instances = [];
                    const runeIndices = [];

                    for (let i = 0; i < cfg.count; i++) {
                        const t = (i / cfg.count) * Math.PI * 2;
                        const x = Math.cos(t) * cfg.majorR;
                        const y = Math.sin(t) * cfg.majorR;
                        const z = 0;
                        instances.push({ x, y, z });
                        if (i % Math.floor(cfg.count / 8) === 0) {
                            runeIndices.push(i);
                        }
                    }

                    const baseMesh = new THREE.InstancedMesh(this.voxelGeo, this.matRingBase, instances.length);
                    const dummy = new THREE.Object3D();
                    instances.forEach((pos, i) => {
                        dummy.position.set(pos.x, pos.y, pos.z);
                        dummy.scale.set(1.2, 1.2, 1.2);
                        dummy.updateMatrix();
                        baseMesh.setMatrixAt(i, dummy.matrix);
                    });
                    baseMesh.instanceMatrix.needsUpdate = true;
                    ringGroup.add(baseMesh);

                    // Rune meshes (separate for individual glow animation)
                    const runeMesh = new THREE.InstancedMesh(this.voxelGeo, this.matRune, runeIndices.length);
                    runeIndices.forEach((ri, i) => {
                        const pos = instances[ri];
                        dummy.position.set(pos.x, pos.y, pos.z);
                        dummy.scale.set(1.8, 1.8, 1.8);
                        dummy.updateMatrix();
                        runeMesh.setMatrixAt(i, dummy.matrix);
                    });
                    runeMesh.instanceMatrix.needsUpdate = true;
                    ringGroup.add(runeMesh);

                    ringGroup.rotation.set(cfg.rotX, cfg.rotY, cfg.rotZ);
                    this.group.add(ringGroup);
                    this.rings.push({
                        group: ringGroup,
                        speed: cfg.speed,
                        baseRotX: cfg.rotX,
                        baseRotY: cfg.rotY,
                        baseRotZ: cfg.rotZ,
                        runeMesh: runeMesh,
                        runeCount: runeIndices.length
                    });
                });
            }

            _buildSatellites() {
                const count = 7;
                for (let i = 0; i < count; i++) {
                    const satGroup = new THREE.Group();
                    const instances = [];
                    const a = 2, b = 2, c = 1.5;
                    for (let x = -a; x <= a; x++) {
                        for (let y = -b; y <= b; y++) {
                            for (let z = -c; z <= c; z++) {
                                const dist = (x * x) / (a * a) + (y * y) / (b * b) + (z * z) / (c * c);
                                if (dist <= 1.0 && dist >= 0.5) {
                                    instances.push({ x, y, z });
                                }
                            }
                        }
                    }
                    // Pupil
                    const pupil = new THREE.Mesh(this.voxelGeo, this.matPupil);
                    pupil.position.set(0, 0, c + 0.2);
                    pupil.scale.set(0.8, 0.8, 0.4);
                    satGroup.add(pupil);

                    if (instances.length > 0) {
                        const mesh = new THREE.InstancedMesh(this.voxelGeo, this.matSatellite, instances.length);
                        const dummy = new THREE.Object3D();
                        instances.forEach((pos, j) => {
                            dummy.position.set(pos.x, pos.y, pos.z);
                            dummy.scale.set(0.6, 0.6, 0.6);
                            dummy.updateMatrix();
                            mesh.setMatrixAt(j, dummy.matrix);
                        });
                        mesh.instanceMatrix.needsUpdate = true;
                        satGroup.add(mesh);
                    }

                    const angleOffset = (i / count) * Math.PI * 2;
                    const orbitRadius = 16 + Math.random() * 8;
                    const orbitSpeed = 0.5 + Math.random() * 1.0;
                    const orbitTilt = (Math.random() - 0.5) * 0.5;

                    this.group.add(satGroup);
                    this.satellites.push({
                        mesh: satGroup,
                        angleOffset: angleOffset,
                        radius: orbitRadius,
                        speed: orbitSpeed,
                        tilt: orbitTilt,
                        yOffset: (Math.random() - 0.5) * 20
                    });
                }
            }

            _buildWings() {
                // Two large voxel angel wings — feathered, multi-layered, arching backward
                const wingSpan = 32;
                const wingDepth = 14;
                const layers = 5;

                [-1, 1].forEach(side => {
                    const wingGroup = new THREE.Group();
                    const boneInstances = [];
                    const featherInstances = [];

                    // Wing bone spine — a curved arch from center to tip
                    for (let t = 0; t <= 1; t += 0.04) {
                        const x = side * t * wingSpan;
                        const y = Math.sin(t * Math.PI * 0.7) * 6 - t * 4;
                        const z = -Math.sin(t * Math.PI * 0.5) * 8;
                        boneInstances.push({ x, y, z, sx: 1.6, sy: 1.6, sz: 1.6 });
                        // Secondary bone support
                        if (t > 0.1 && t < 0.9) {
                            boneInstances.push({ x: x + side * 1.5, y: y - 1, z: z + 1, sx: 1.2, sy: 1.2, sz: 1.2 });
                        }
                    }

                    // Feather layers hanging from the bone spine
                    for (let layer = 0; layer < layers; layer++) {
                        const layerT = layer / (layers - 1);
                        const layerLength = (1 - layerT * 0.6) * wingDepth;
                        const featherCount = Math.floor(12 * (1 - layerT * 0.3));
                        for (let f = 0; f < featherCount; f++) {
                            const ft = f / (featherCount - 1 || 1);
                            const boneX = side * ft * wingSpan;
                            const boneY = Math.sin(ft * Math.PI * 0.7) * 6 - ft * 4;
                            const boneZ = -Math.sin(ft * Math.PI * 0.5) * 8;
                            // Feather droops downward and backward from bone
                            const drop = layer * 1.8 + Math.random() * 0.5;
                            const back = layer * 1.2 + Math.random() * 0.3;
                            const fx = boneX + side * (Math.random() - 0.5) * 1.5;
                            const fy = boneY - drop;
                            const fz = boneZ - back;
                            const len = layerLength * (0.5 + 0.5 * (1 - ft));
                            featherInstances.push({ x: fx, y: fy, z: fz, sx: 1.0, sy: len * 0.6, sz: 0.35 });
                        }
                    }

                    // Extra primary feathers at the wing tip
                    for (let p = 0; p < 6; p++) {
                        const pt = 0.85 + p / 6 * 0.15;
                        const bx = side * pt * wingSpan;
                        const by = Math.sin(pt * Math.PI * 0.7) * 6 - pt * 4;
                        const bz = -Math.sin(pt * Math.PI * 0.5) * 8;
                        featherInstances.push({
                            x: bx + side * p * 0.8,
                            y: by - p * 0.6,
                            z: bz - p * 0.5,
                            sx: 0.7, sy: 3.5 - p * 0.3, sz: 0.3
                        });
                    }

                    const dummy = new THREE.Object3D();
                    if (boneInstances.length > 0) {
                        const boneMesh = new THREE.InstancedMesh(this.voxelGeo, this.matWingBone, boneInstances.length);
                        boneInstances.forEach((b, i) => {
                            dummy.position.set(b.x, b.y, b.z);
                            dummy.scale.set(b.sx, b.sy, b.sz);
                            dummy.updateMatrix();
                            boneMesh.setMatrixAt(i, dummy.matrix);
                        });
                        boneMesh.instanceMatrix.needsUpdate = true;
                        wingGroup.add(boneMesh);
                    }
                    if (featherInstances.length > 0) {
                        const featherMesh = new THREE.InstancedMesh(this.voxelGeo, this.matWingFeather, featherInstances.length);
                        featherInstances.forEach((f, i) => {
                            dummy.position.set(f.x, f.y, f.z);
                            dummy.scale.set(f.sx, f.sy, f.sz);
                            dummy.updateMatrix();
                            featherMesh.setMatrixAt(i, dummy.matrix);
                        });
                        featherMesh.instanceMatrix.needsUpdate = true;
                        wingGroup.add(featherMesh);
                    }

                    wingGroup.position.set(0, 2, -6);
                    this.group.add(wingGroup);
                    this.wings.push({ group: wingGroup, side: side, baseRotZ: side * 0.25 });
                });
            }

            _buildLightning() {
                this.lightningLight = new THREE.PointLight(0xff0040, 0, 120);
                this.lightningLight.position.set(0, 20, 0);
                this.group.add(this.lightningLight);
            }

            _updatePositionFromCamera() {
                const centerX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2;
                const centerZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2;
                const angle = typeof cameraAngle !== 'undefined' ? cameraAngle : this.cameraAngleOffset;
                // Position Seraph opposite to camera direction, hovering at map edge
                const offsetAngle = angle + Math.PI * 0.85;
                this.group.position.x = centerX + Math.cos(offsetAngle) * this.hoverRadius;
                this.group.position.z = centerZ + Math.sin(offsetAngle) * this.hoverRadius;
                // Look toward center of map
                this.group.lookAt(centerX, this.baseY * 0.3, centerZ);
            }

            _createBubbleDOM() {
                this.bubbleDiv = document.createElement('div');
                this.bubbleDiv.className = 'seraph-bubble';
                this.bubbleDiv.style.display = 'none';
                document.body.appendChild(this.bubbleDiv);

                this.statusDiv = document.getElementById('seraph-status') || document.createElement('div');
                if (!this.statusDiv.id) {
                    this.statusDiv.id = 'seraph-status';
                    this.statusDiv.textContent = 'SERAPH: OFFLINE';
                    this.statusDiv.className = 'offline';
                    document.body.appendChild(this.statusDiv);
                }
            }

            _updateVisionStatus() {
                if (!this.statusDiv) return;
                const sv = window.seraphVision;
                let html = '';
                let cls = '';
                if (!sv) {
                    html = 'SERAPH: OFFLINE';
                    cls = 'offline visible';
                } else if (sv.isLoading) {
                    html = 'SERAPH: AWAKENING...<span class="status-detail">Loading 649MB vision model...</span>';
                    cls = 'loading visible';
                } else if (sv.ready) {
                    html = 'SERAPH: ALL-SEEING<span class="status-detail">Real-time board analysis active</span>';
                    cls = 'ready visible';
                    setTimeout(() => { if (this.statusDiv) this.statusDiv.classList.remove('visible'); }, 5000);
                } else if (sv.loadError) {
                    const reason = sv.errorReason || 'Unknown error';
                    const shortReason = reason.length > 50 ? reason.substring(0, 50) + '...' : reason;
                    html = 'SERAPH: DORMANT<span class="status-detail">' + shortReason + '</span><button id="seraph-retry" style="display:inline-block;" onclick="if(window.seraphVision){window.seraphVision.loadError=null;window.seraphVision.init();if(seraph)seraph._updateVisionStatus();}">Retry</button>';
                    cls = 'offline visible';
                } else {
                    cls = '';
                }
                this.statusDiv.innerHTML = html;
                this.statusDiv.className = cls;
            }

            showTaunt(text) {
                const now = Date.now();
                const name = localStorage.getItem('finalTowerUsername') || 'Architect';
                text = text.replace(/\{name\}/g, name);
                if (now - this.lastTauntTime < this.tauntCooldown) {
                    this.bubbleQueue.push(text);
                    return;
                }
                this.lastTauntTime = now;
                this._showBubble(text, false);
                this.setState('mocking', 4000);
            }

            showFallbackTaunt() {
                const name = localStorage.getItem('finalTowerUsername') || 'Architect';
                let text = this.preWrittenTaunts[this.fallbackIndex % this.preWrittenTaunts.length];
                text = text.replace(/\{name\}/g, name);
                this.fallbackIndex++;
                this._showBubble(text, true);
                this.setState('mocking', 3000);
                this.lastTauntTime = Date.now();
            }

            _showBubble(text, isFallback) {
                if (!this.bubbleDiv) return;
                this.bubbleDiv.style.display = 'block';
                this.bubbleDiv.classList.remove('visible');
                this.bubbleIsFallback = !!isFallback;
                const fallbackBadge = isFallback ? '<span class="seraph-bubble-badge">FALLBACK</span>' : '';
                this.bubbleDiv.innerHTML = fallbackBadge + '<span class="seraph-bubble-typing"></span><span class="seraph-bubble-dismiss" onclick="seraph._dismissBubble()">x</span>';
                this.bubbleText = text;
                this.bubbleCharIndex = 0;
                this.bubbleVisible = true;
                this.bubbleTimer = 6000;
                this.bubbleStartTime = Date.now();
                // Trigger reflow
                void this.bubbleDiv.offsetWidth;
                this.bubbleDiv.classList.add('visible');
            }

            _dismissBubble() {
                if (!this.bubbleDiv) return;
                this.bubbleDiv.classList.remove('visible');
                this.bubbleVisible = false;
                setTimeout(() => {
                    if (this.bubbleDiv) this.bubbleDiv.style.display = 'none';
                }, 400);
                if (this.bubbleQueue.length > 0) {
                    const next = this.bubbleQueue.shift();
                    setTimeout(() => this.showTaunt(next), 500);
                }
            }

            setState(newState, duration) {
                if (this.state === newState) return;
                this.state = newState;
                this.stateTimer = duration || 3000;
                if (newState === 'mocking') {
                    this.targetPupilScale = 0.6;
                    this._flashLightning();
                } else if (newState === 'enraged') {
                    this.targetPupilScale = 1.6;
                } else if (newState === 'watching') {
                    this.targetPupilScale = 0.8;
                } else {
                    this.targetPupilScale = 1.0;
                }
            }

            _flashLightning() {
                if (!this.lightningLight) return;
                this.lightningLight.intensity = 3;
                setTimeout(() => { if (this.lightningLight) this.lightningLight.intensity = 0; }, 120);
                setTimeout(() => { if (this.lightningLight) this.lightningLight.intensity = 2; }, 200);
                setTimeout(() => { if (this.lightningLight) this.lightningLight.intensity = 0; }, 320);
            }

            onTowerPlaced() {
                this.setState('watching', 2500);
            }

            onWaveStart(wave) {
                if (wave === 1) {
                    this.showTaunt("You dare organize chaos, {name}? I am the geometry above your fog.");
                } else if (wave % 10 === 0) {
                    this.showTaunt(`Wave ${wave}. Still breathing, {name}? How... tedious.`);
                } else if (wave % 5 === 0) {
                    this.showFallbackTaunt();
                }
            }

            onEnemyReachedEnd() {
                if (Math.random() < 0.3) this.showFallbackTaunt();
            }

            onPlayerWinning() {
                if (this.state !== 'enraged' && Math.random() < 0.5) {
                    this.setState('enraged', 5000);
                    this.showTaunt("You think you control this board, {name}? I SEE EVERY SQUARE.");
                }
            }

            update(time, delta, camera) {
                this.time = time;
                const dt = delta / 1000;

                // State timer countdown
                if (this.stateTimer > 0) {
                    this.stateTimer -= delta;
                    if (this.stateTimer <= 0) {
                        this.setState('idle');
                    }
                }

                // Bobbing
                const bobAmp = this.state === 'mocking' ? 4 : this.state === 'enraged' ? 6 : 2;
                const bobFreq = this.state === 'enraged' ? 2 : 1;
                const targetY = this.baseY + Math.sin(time * bobFreq * 0.001) * bobAmp;
                this.group.position.y += (targetY - this.group.position.y) * 0.05;

                // State-based height adjustments (peek-through)
                if (this.state === 'mocking') {
                    const emergeY = this.fogHeight + 5;
                    this.group.position.y += (emergeY - this.group.position.y) * 0.02;
                }

                // Pupil scale lerp
                this.pupilScale += (this.targetPupilScale - this.pupilScale) * 0.1;
                if (this.pupilGroup) {
                    this.pupilGroup.scale.setScalar(this.pupilScale);
                }

                // Central eye subtle lookAt camera
                if (this.centralEye) {
                    const camDir = new THREE.Vector3();
                    camera.getWorldPosition(camDir);
                    camDir.sub(this.group.position);
                    camDir.y = 0;
                    const targetRotY = Math.atan2(camDir.x, camDir.z);
                    this.centralEye.rotation.y += (targetRotY - this.centralEye.rotation.y) * 0.03;
                }

                // Ring rotation + rune pulse
                this.rings.forEach((ring, i) => {
                    const speedMult = this.state === 'watching' ? 3 : this.state === 'mocking' ? 1.5 : this.state === 'enraged' ? 4 : 1;
                    const twitch = this.state === 'enraged' ? (Math.random() - 0.5) * 0.02 : 0;
                    ring.group.rotation.x = ring.baseRotX + Math.sin(time * 0.0003 * (i + 1)) * 0.1 + twitch;
                    ring.group.rotation.y += ring.speed * speedMult * dt;
                    ring.group.rotation.z = ring.baseRotZ + Math.cos(time * 0.0002 * (i + 1)) * 0.05;

                    // Rune pulse
                    if (ring.runeMesh) {
                        const pulse = 1.5 + Math.sin(time * 0.005 + i * 2) * 0.8;
                        ring.runeMesh.material.emissiveIntensity = pulse * (this.state === 'enraged' ? 2 : 1);
                    }
                });

                // Satellite orbit
                this.satellites.forEach((sat, i) => {
                    const speedMult = this.state === 'enraged' ? 2.5 : this.state === 'watching' ? 1.5 : 1;
                    const angle = sat.angleOffset + time * 0.001 * sat.speed * speedMult;
                    const r = sat.radius;
                    sat.mesh.position.x = Math.cos(angle) * r;
                    sat.mesh.position.z = Math.sin(angle) * r;
                    sat.mesh.position.y = sat.yOffset + Math.sin(time * 0.002 + i) * 5;
                    sat.mesh.rotation.y = -angle;
                    // Look at most recently placed tower if watching
                    if (this.state === 'watching' && gameState.towers.length > 0) {
                        const lastTower = gameState.towers[gameState.towers.length - 1];
                        if (lastTower && lastTower.mesh) {
                            const twPos = lastTower.mesh.position.clone();
                            twPos.sub(this.group.position);
                            twPos.sub(sat.mesh.position);
                            const lookTarget = new THREE.Vector3().copy(sat.mesh.position).add(twPos.normalize().multiplyScalar(10));
                            sat.mesh.lookAt(lookTarget);
                        }
                    }
                });

                // Camera-relative position (smooth follow)
                this._updatePositionFromCamera();

                // Wing flapping
                this.wings.forEach((wing, i) => {
                    const flapSpeed = this.state === 'enraged' ? 0.004 : this.state === 'mocking' ? 0.002 : 0.001;
                    const flapAmp = this.state === 'enraged' ? 0.35 : this.state === 'mocking' ? 0.2 : 0.12;
                    const flap = Math.sin(time * flapSpeed + i * Math.PI) * flapAmp;
                    wing.group.rotation.z = wing.baseRotZ + flap;
                    wing.group.rotation.x = Math.sin(time * 0.0008 + i) * 0.05;
                });

                // Bubble positioning and typing
                if (this.bubbleVisible && this.bubbleDiv) {
                    const worldPos = new THREE.Vector3(0, 12, 0);
                    worldPos.applyMatrix4(this.group.matrixWorld);
                    worldPos.project(camera);
                    const x = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;
                    this.bubbleDiv.style.left = x + 'px';
                    this.bubbleDiv.style.top = y + 'px';

                    // Typewriter effect
                    const elapsed = Date.now() - this.bubbleStartTime;
                    const charsToShow = Math.floor(elapsed / 40);
                    if (charsToShow > this.bubbleCharIndex && this.bubbleCharIndex < this.bubbleText.length) {
                        this.bubbleCharIndex = Math.min(charsToShow, this.bubbleText.length);
                        const textSpan = this.bubbleDiv.querySelector('.seraph-bubble-typing');
                        if (textSpan) {
                            textSpan.textContent = this.bubbleText.substring(0, this.bubbleCharIndex);
                            if (this.bubbleCharIndex >= this.bubbleText.length) {
                                textSpan.classList.remove('seraph-bubble-typing');
                            }
                        }
                    }

                    // Auto dismiss
                    this.bubbleTimer -= delta;
                    if (this.bubbleTimer <= 0) {
                        this._dismissBubble();
                    }
                }

                // Lightning decay
                if (this.lightningLight && this.lightningLight.intensity > 0) {
                    this.lightningLight.intensity *= 0.9;
                    if (this.lightningLight.intensity < 0.01) this.lightningLight.intensity = 0;
                }

                // Vision status update (throttled)
                if (Math.floor(time / 2000) !== this._lastStatusUpdate) {
                    this._lastStatusUpdate = Math.floor(time / 2000);
                    this._updateVisionStatus();
                }

                // Periodic fallback taunts during active waves
                if (gameState.waveActive && Date.now() - this.lastTauntTime > this.tauntCooldown * 2) {
                    if (Math.random() < 0.005) this.showFallbackTaunt();
                }

                // Vision model: periodic screenshot capture during active waves
                if (gameState.waveActive && !this.isProcessingVision) {
                    const now = Date.now();
                    if (now - this.lastScreenshotTime > this.screenshotInterval) {
                        this.lastScreenshotTime = now;
                        this._captureAndQuery();
                    }
                }
            }

            _captureAndQuery() {
                if (this.isProcessingVision) return;
                this.isProcessingVision = true;
                const imageBase64 = this._captureScreenshot();
                if (!imageBase64) { this.isProcessingVision = false; return; }
                if (!window.seraphVision || !window.seraphVision.ready) {
                    this.isProcessingVision = false;
                    return;
                }
                // Show processing indicator
                if (this.statusDiv) {
                    this.statusDiv.innerHTML = 'SERAPH: DIVINING<span class="status-detail">Analyzing the board...</span>';
                    this.statusDiv.className = 'loading visible';
                }
                window.seraphVision.generate(imageBase64, '')
                    .then(result => {
                        if (result && result.taunt) {
                            // If a fallback bubble is currently showing, dismiss it first
                            if (this.bubbleVisible && this.bubbleIsFallback) {
                                this._dismissBubble();
                                setTimeout(() => this._showVisionResult(result), 300);
                            } else {
                                this._showVisionResult(result);
                            }
                        } else {
                            this.showFallbackTaunt();
                        }
                    })
                    .catch(e => {
                        console.warn('Seraph vision error:', e.message);
                        this.showFallbackTaunt();
                    })
                    .finally(() => {
                        this.isProcessingVision = false;
                        this._updateVisionStatus();
                    });
            }

            _showVisionResult(result) {
                this.showTaunt(result.taunt);
                if (result.emotion) {
                    const stateMap = { idle: 'idle', mocking: 'mocking', enraged: 'enraged', impressed: 'watching' };
                    this.setState(stateMap[result.emotion] || 'mocking', 4000);
                }
                if (result.action && result.action !== 'none') {
                    this._triggerGameAction(result.action);
                }
            }

            _captureScreenshot() {
                if (!renderer || !renderer.domElement) return null;
                // Skip screenshot capture when opened locally (file://) — no vision server available
                if (window.location.protocol === 'file:') return null;
                const canvas = renderer.domElement;
                const size = 512;
                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const ctx = offscreen.getContext('2d');
                if (!ctx) return null;
                const srcW = canvas.width;
                const srcH = canvas.height;
                const minDim = Math.min(srcW, srcH);
                const sx = (srcW - minDim) / 2;
                const sy = (srcH - minDim) / 2;
                ctx.drawImage(canvas, sx, sy, minDim, minDim, 0, 0, size, size);
                return offscreen.toDataURL('image/png');
            }

            _triggerGameAction(action) {
                if (!action || action === 'none') return;
                console.log('Seraph action:', action);
                if (action === 'spawn_extra') {
                    if (gameState.waveActive && currentWave) {
                        const extra = { type: 'basic', variant: 'fast', hpMult: 1.2 };
                        if (gameState.activePaths && gameState.activePaths.length > 0) {
                            gameState.activePaths.forEach(path => {
                                const enemy = spawnEnemy(extra.type, extra.variant, gameState.wave, extra, path);
                                if (enemy) gameState.enemies.push(enemy);
                            });
                        }
                    }
                } else if (action === 'speed_up') {
                    gameState.enemies.forEach(e => { if (e.speed) e.speed *= 1.3; });
                } else if (action === 'buff_enemies') {
                    gameState.enemies.forEach(e => { if (e.hp) e.hp = Math.floor(e.hp * 1.2); });
                }
            }

            dispose() {
                if (this.group) {
                    this.scene.remove(this.group);
                    this.group.traverse(child => {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) {
                            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                            else child.material.dispose();
                        }
                    });
                }
                if (this.bubbleDiv && this.bubbleDiv.parentNode) {
                    this.bubbleDiv.parentNode.removeChild(this.bubbleDiv);
                }
            }
        }

        function init() {
            console.log('Initializing game...');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0xa8d8ea, 0.001);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            gameState.cameraAngle = Math.PI / 4;
            gameState.cameraZoom = 0.8;
            gameState.cameraTilt = 0.3;
            updateCameraPosition();

            // Try WebGL with antialias first, then fallback without
            try {
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
            } catch (e) {
                console.warn('WebGL with antialias failed, trying without...');
                try {
                    renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, preserveDrawingBuffer: true });
                } catch (e2) {
                    console.error('WebGL is not available. The game requires a browser with WebGL support.');
                    const container = document.getElementById('game-container');
                    if (container) {
                        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;text-align:center;padding:20px;"><div><h1>WebGL Not Available</h1><p>This game requires WebGL to run. Please enable hardware acceleration in your browser settings, or try a different browser.</p></div></div>';
                    }
                    throw e2;
                }
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.35;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xfff4e0, 0.9);
            dirLight.position.set(80, 120, 60);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -150;
            dirLight.shadow.camera.right = 150;
            dirLight.shadow.camera.top = 150;
            dirLight.shadow.camera.bottom = -150;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 400;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xa8d8ea, 0.2);
            fillLight.position.set(-60, 40, -40);
            scene.add(fillLight);

            document.getElementById('game-container').appendChild(renderer.domElement);
            buildMap();
            createAmbientParticles();
            currentPath = PathGenerator.generateSerpentinePath(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, 1);
            pathOptions.mainPath = currentPath;
            pathOptions.path0 = currentPath;
            drawAllPaths();
            scatterDecoyTiles();
            createUI();
            setupEventListeners();
            setupLoginScreen();
            seraph = new VoxelSeraph();
            seraph.init(scene);
            animate();
        }

        let voxelTextSprites = [];

        function createVoxelText3D(text, options) {
            const { x, y, z, color = '#FFD700', size = 1, glowColor = '#FFA500', glowSize = 2 } = options || {};
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 64;
            canvas.width = text.length * fontSize * 0.7;
            canvas.height = fontSize * 1.5;
            ctx.imageSmoothingEnabled = false;
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = glowColor;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            ctx.fillStyle = color;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y, z);
            sprite.scale.set(canvas.width * size * 0.02, canvas.height * size * 0.02, 1);
            scene.add(sprite);
            voxelTextSprites.push(sprite);
            return sprite;
        }

        function clearVoxelText3D() {
            voxelTextSprites.forEach(s => {
                scene.remove(s);
                if (s.material.map) s.material.map.dispose();
                s.material.dispose();
            });
            voxelTextSprites = [];
        }

        function setupLoginScreen() {
            const loginScreen = document.getElementById('login-screen');
            const mainMenu = document.getElementById('main-menu');
            const usernameInput = document.getElementById('username-input');
            const loginBtn = document.getElementById('login-btn');
            const playBtn = document.getElementById('play-btn');
            const leaderboardBtn = document.getElementById('leaderboard-btn');
            const achievementsBtn = document.getElementById('achievements-btn');
            const welcomeText = document.getElementById('welcome-text');

            if (!usernameInput || !loginBtn || !playBtn || !welcomeText) {
                console.warn('Login screen elements not found, skipping setup');
                return;
            }

            const savedUsername = localStorage.getItem('finalTowerUsername');
            if (savedUsername && usernameInput) { usernameInput.value = savedUsername; }
            loginBtn.addEventListener('click', () => {
                const username = usernameInput.value.trim() || 'Player';
                localStorage.setItem('finalTowerUsername', username);
                welcomeText.textContent = 'Welcome, ' + username + '!';
                loginScreen.classList.add('hidden');
                mainMenu.classList.remove('hidden');
            });
            usernameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { loginBtn.click(); }
            });
            playBtn.addEventListener('click', () => {
                mainMenu.classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                document.getElementById('wave-controls').style.display = 'block';
                gameState.gameStarted = true;
                gameState.gamePhase = 'PREPARATION';
                gameState.preparationTimer = CONFIG.PREPARATION_TIME;
                preparationStartTime = Date.now();
                generateNewPath();
                clearPathTiles();
                drawAllPaths();
                scatterDecoyTiles();
                createAmbientParticles();
                updateUI();
                const startBtn = document.getElementById('start-wave-btn');
                startBtn.textContent = 'Start Wave';
                const hint = document.createElement('div');
                hint.className = 'camera-hint';
                hint.textContent = 'Drag to rotate • Scroll to zoom • Drag up/down to tilt';
                document.getElementById('game-container').appendChild(hint);
                setTimeout(() => hint.remove(), 4500);
            });
            if (leaderboardBtn) leaderboardBtn.addEventListener('click', () => { alert('Leaderboard coming soon!'); });
            if (achievementsBtn) achievementsBtn.addEventListener('click', () => { alert('Achievements coming soon!'); });
        }

        function buildMap() {
            const blockSize = CONFIG.TILE_SIZE;
            const dirtColors = [0x8B4513, 0xA0522D, 0x6B4423, 0x5D3A1A, 0x704214];
            const stoneColors = [0x696969, 0x787878, 0x505050, 0x5a5a5a, 0x4a4a4a];
            const grassColors = [0x556B2F, 0x6B8E23, 0x3d5a27, 0x4a6b32, 0x2f4f2f, 0x4f6b3f, 0x3a5a2a, 0x5a7a42, 0x3f5a38, 0x4a6832];
            const grassHighlightColors = [0x8FBC8F, 0x9ACD32, 0x6B8E23];
            const grassShadowColors = [0x2d4a1a, 0x1d3a10, 0x2a4a20];
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.12 });
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                for (let z = 0; z < CONFIG.MAP_HEIGHT; z++) {
                    const worldX = x * blockSize + blockSize / 2;
                    const worldZ = z * blockSize + blockSize / 2;
                    const heightVar = Math.random() > 0.85 ? 1 : 0;
                    const grassHeight = 4 + Math.random() * 2;
                    const grassGeo = new THREE.BoxGeometry(blockSize - 2, grassHeight, blockSize - 2);
                    const grassColor = grassColors[Math.floor(Math.random() * grassColors.length)];
                    const grassMat = new THREE.MeshStandardMaterial({ color: grassColor, roughness: 0.92, metalness: 0.0 });
                    const grassBlock = new THREE.Mesh(grassGeo, grassMat);
                    grassBlock.position.set(worldX, 2 + heightVar, worldZ);
                    grassBlock.receiveShadow = true;
                    grassBlock.castShadow = true;
                    scene.add(grassBlock);
                    const grassEdges = new THREE.LineSegments(new THREE.EdgesGeometry(grassGeo), edgeMat);
                    grassEdges.position.copy(grassBlock.position);
                    scene.add(grassEdges);
                    if (Math.random() > 0.7) {
                        const highlightGeo = new THREE.BoxGeometry(blockSize * 0.3, 0.5, blockSize * 0.3);
                        const highlightColor = grassHighlightColors[Math.floor(Math.random() * grassHighlightColors.length)];
                        const highlightMat = new THREE.MeshStandardMaterial({ color: highlightColor, roughness: 0.85, metalness: 0.0 });
                        const highlight = new THREE.Mesh(highlightGeo, highlightMat);
                        highlight.position.set(worldX + (Math.random() - 0.5) * 10, 4.5 + heightVar, worldZ + (Math.random() - 0.5) * 10);
                        scene.add(highlight);
                    }
                    const dirtHeight = 6 + Math.random() * 4;
                    const dirtGeo = new THREE.BoxGeometry(blockSize - 2, dirtHeight, blockSize - 2);
                    const dirtColor = dirtColors[Math.floor(Math.random() * dirtColors.length)];
                    const dirtMat = new THREE.MeshStandardMaterial({ color: dirtColor, roughness: 1.0, metalness: 0.0 });
                    const dirtBlock = new THREE.Mesh(dirtGeo, dirtMat);
                    dirtBlock.position.set(worldX, -2 - dirtHeight/2 + 4, worldZ);
                    dirtBlock.receiveShadow = true;
                    scene.add(dirtBlock);
                    const dirtEdges = new THREE.LineSegments(new THREE.EdgesGeometry(dirtGeo), edgeMat);
                    dirtEdges.position.copy(dirtBlock.position);
                    scene.add(dirtEdges);
                    const stoneGeo = new THREE.BoxGeometry(blockSize - 2, 6, blockSize - 2);
                    const stoneColor = stoneColors[Math.floor(Math.random() * stoneColors.length)];
                    const stoneMat = new THREE.MeshStandardMaterial({ color: stoneColor, roughness: 0.75, metalness: 0.08 });
                    const stoneBlock = new THREE.Mesh(stoneGeo, stoneMat);
                    stoneBlock.position.set(worldX, -8 - 3, worldZ);
                    stoneBlock.receiveShadow = true;
                    scene.add(stoneBlock);
                    const stoneEdges = new THREE.LineSegments(new THREE.EdgesGeometry(stoneGeo), edgeMat);
                    stoneEdges.position.copy(stoneBlock.position);
                    scene.add(stoneEdges);
                    if (VISUAL_ENHANCEMENTS_ENABLED) {
                        if (Math.random() > 0.5) {
                            const bladeMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(grassColor).lerp(new THREE.Color(0x90EE90), 0.3).getHex(), roughness: 0.95, metalness: 0.0 });
                            for (let b = 0; b < 4; b++) {
                                const bladeH = 2 + Math.random() * 3;
                                const bladeGeo = new THREE.BoxGeometry(1, bladeH, 1);
                                const blade = new THREE.Mesh(bladeGeo, bladeMat);
                                blade.position.set(worldX + (Math.random() - 0.5) * 20, 4 + heightVar + bladeH / 2, worldZ + (Math.random() - 0.5) * 20);
                                blade.rotation.z = (Math.random() - 0.5) * 0.3;
                                scene.add(blade);
                            }
                        }
                        if (Math.random() > 0.6) {
                            const pebbleGeo = new THREE.BoxGeometry(2 + Math.random() * 2, 1, 2 + Math.random() * 2);
                            const pebbleMat = new THREE.MeshStandardMaterial({ color: stoneColors[Math.floor(Math.random() * stoneColors.length)], roughness: 0.8, metalness: 0.05 });
                            const pebble = new THREE.Mesh(pebbleGeo, pebbleMat);
                            pebble.position.set(worldX + (Math.random() - 0.5) * 15, 4.5 + heightVar, worldZ + (Math.random() - 0.5) * 15);
                            pebble.rotation.y = Math.random() * Math.PI;
                            scene.add(pebble);
                        }
                        if (Math.random() > 0.75) {
                            const soilGeo = new THREE.BoxGeometry(8 + Math.random() * 6, 0.5, 8 + Math.random() * 6);
                            const soilMat = new THREE.MeshStandardMaterial({ color: dirtColors[Math.floor(Math.random() * dirtColors.length)], roughness: 1.0, metalness: 0.0 });
                            const soil = new THREE.Mesh(soilGeo, soilMat);
                            soil.position.set(worldX + (Math.random() - 0.5) * 10, 4.3 + heightVar, worldZ + (Math.random() - 0.5) * 10);
                            scene.add(soil);
                        }
                    }
                }
            }
            const waterColors = [0x4FC3F7, 0x29B6F6, 0x03A9F4, 0x0288D1];
            for (let i = 0; i < 8; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const waterGeo = new THREE.BoxGeometry(blockSize * 0.8, 0.3, blockSize * 0.6);
                const waterColor = waterColors[Math.floor(Math.random() * waterColors.length)];
                const waterMat = new THREE.MeshStandardMaterial({ color: waterColor, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.7 });
                const water = new THREE.Mesh(waterGeo, waterMat);
                water.position.set(x * blockSize + blockSize / 2, 0.5, z * blockSize + blockSize / 2);
                water.userData = { isWater: true, baseOpacity: 0.7, phase: Math.random() * Math.PI * 2 };
                scene.add(water);
            }
            if (VISUAL_ENHANCEMENTS_ENABLED) {
                const rippleMat = new THREE.MeshStandardMaterial({ color: 0x81D4FA, roughness: 0.05, metalness: 0.5, transparent: true, opacity: 0.3 });
                for (let i = 0; i < 8; i++) {
                    const rippleGeo = new THREE.BoxGeometry(8 + Math.random() * 6, 0.2, 8 + Math.random() * 6);
                    const ripple = new THREE.Mesh(rippleGeo, rippleMat);
                    ripple.position.set(Math.random() * CONFIG.MAP_WIDTH * blockSize, 0.7, Math.random() * CONFIG.MAP_HEIGHT * blockSize);
                    ripple.userData = { isRipple: true, phase: Math.random() * Math.PI * 2 };
                    scene.add(ripple);
                }
                const lilyMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8, metalness: 0.0 });
                for (let i = 0; i < 5; i++) {
                    const lilyGeo = new THREE.BoxGeometry(4, 0.3, 4);
                    const lily = new THREE.Mesh(lilyGeo, lilyMat);
                    const lx = Math.random() * CONFIG.MAP_WIDTH * blockSize;
                    const lz = Math.random() * CONFIG.MAP_HEIGHT * blockSize;
                    lily.position.set(lx, 0.8, lz);
                    lily.rotation.y = Math.random() * Math.PI;
                    scene.add(lily);
                }
            }
            const flowerColors = [0xff6b9d, 0xffeb3b, 0xffffff, 0xe91e63, 0x9c27b0, 0xff5722, 0x00bcd4];
            const flowerStemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9, metalness: 0.0 });

                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);

                const fz = z * blockSize + blockSize / 2;

                const centerGeo = new THREE.BoxGeometry(3, 3, 3);
                const center = new THREE.Mesh(centerGeo, pollenMat);
                center.position.set(fx, 5 + stemH, fz);
                scene.add(center);
                for (let p = 0; p < 4; p++) {
                    const petalGeo = new THREE.BoxGeometry(2.5, 2.5, 1.5);

                    const angle = (p / 4) * Math.PI * 2;

            }
            const mushCapGeo = new THREE.BoxGeometry(6, 3, 6);
            const mushStemGeo = new THREE.BoxGeometry(2.5, 5, 2.5);
            const mushColors = [0xff4444, 0xff8800, 0xffcc00, 0xcc44ff];
            const spotMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, metalness: 0.0 });
            const gillMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, roughness: 0.8, metalness: 0.0 });
            const sporeMat = new THREE.MeshStandardMaterial({ color: 0xaaffaa, roughness: 0.2, metalness: 0.3, emissive: 0xaaffaa, emissiveIntensity: 0.2 });
            for (let i = 0; i < 25; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const mx = x * blockSize + blockSize / 2;
                const mz = z * blockSize + blockSize / 2;
                const mushColor = mushColors[Math.floor(Math.random() * mushColors.length)];
                const mushCapMat = new THREE.MeshStandardMaterial({ color: mushColor, roughness: 0.6, metalness: 0.0 });
                const capScale = 0.8 + Math.random() * 0.5;
                const cap = new THREE.Mesh(mushCapGeo, mushCapMat);
                cap.position.set(mx, 7, mz);
                cap.scale.setScalar(capScale);
                scene.add(cap);
                for (let s = 0; s < 3; s++) {
                    const spotGeo = new THREE.BoxGeometry(1.5, 0.5, 1.5);
                    const spot = new THREE.Mesh(spotGeo, spotMat);
                    spot.position.set(mx + (Math.random() - 0.5) * 4, 8.5, mz + (Math.random() - 0.5) * 4);
                    scene.add(spot);
                }
                for (let g = 0; g < 3; g++) {
                    const gillGeo = new THREE.BoxGeometry(5, 0.3, 0.5);
                    const gill = new THREE.Mesh(gillGeo, gillMat);
                    gill.position.set(mx, 5.5, mz + (g - 1) * 1.5);
                    scene.add(gill);
                }
                const stemMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, roughness: 0.85, metalness: 0.0 });
                const stem = new THREE.Mesh(mushStemGeo, stemMat);
                stem.position.set(mx, 3.5, mz);
                scene.add(stem);
                const sporeGeo = new THREE.BoxGeometry(1, 1, 1);
                const spore = new THREE.Mesh(sporeGeo, sporeMat);
                spore.position.set(mx, 9, mz);
                spore.userData = { isSpore: true, phase: Math.random() * Math.PI * 2 };
                scene.add(spore);
                if (Math.random() > 0.5) {
                    for (let c = 0; c < 2; c++) {
                        const smallCapGeo = new THREE.BoxGeometry(3, 2, 3);
                        const smallCap = new THREE.Mesh(smallCapGeo, mushCapMat);
                        smallCap.position.set(mx + (c === 0 ? -5 : 5), 4, mz + (Math.random() - 0.5) * 4);
                        scene.add(smallCap);
                        const smallStemGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
                        const smallStem = new THREE.Mesh(smallStemGeo, stemMat);
                        smallStem.position.set(mx + (c === 0 ? -5 : 5), 2, mz + (Math.random() - 0.5) * 4);
                        scene.add(smallStem);
                    }
                }
            }
            // Voxel pine trees
            for (let i = 0; i < 8; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const treeX = x * blockSize + blockSize / 2;
                const treeZ = z * blockSize + blockSize / 2;
                createVoxelPineTree(treeX, treeZ);
            }
            // Voxel oak trees
            for (let i = 0; i < 6; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const treeX = x * blockSize + blockSize / 2;
                const treeZ = z * blockSize + blockSize / 2;
                createVoxelOakTree(treeX, treeZ);
            }
            // Voxel bushes
            const berryColors = [0xE53935, 0x8E24AA, 0x1E88E5];
            for (let i = 0; i < 15; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const bx = x * blockSize + blockSize / 2 + (Math.random() - 0.5) * 18;
                const bz = z * blockSize + blockSize / 2 + (Math.random() - 0.5) * 18;
                createVoxelBush(bx, bz, berryColors);
            }
            const rockColors = [0x505050, 0x404040, 0x606060, 0x3a3a3a, 0x707070];
            const mossMat = new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.95, metalness: 0.0 });
            const crystalInlayMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.2, metalness: 0.6, emissive: 0x88ccff, emissiveIntensity: 0.15 });
            for (let i = 0; i < 30; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const rx = x * blockSize + blockSize / 2;
                const rz = z * blockSize + blockSize / 2;
                const rockColor = rockColors[Math.floor(Math.random() * rockColors.length)];
                const rockW = 4 + Math.random() * 5;
                const rockH = 3 + Math.random() * 4;
                const rockD = 4 + Math.random() * 5;
                const rockGeo = new THREE.BoxGeometry(rockW, rockH, rockD);
                const rockMat = new THREE.MeshStandardMaterial({ color: rockColor, roughness: 0.85, metalness: 0.05 });
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(rx, rockH / 2, rz);
                rock.rotation.y = Math.random() * Math.PI;
                rock.castShadow = true;
                scene.add(rock);
                const rockEdges = new THREE.LineSegments(new THREE.EdgesGeometry(rockGeo), edgeMat);
                rockEdges.position.copy(rock.position);
                rockEdges.rotation.copy(rock.rotation);
                scene.add(rockEdges);
                if (Math.random() > 0.5) {
                    const mossGeo = new THREE.BoxGeometry(rockW * 0.6, 0.5, rockD * 0.6);
                    const moss = new THREE.Mesh(mossGeo, mossMat);
                    moss.position.set(rx, rockH + 0.25, rz);
                    moss.rotation.y = rock.rotation.y;
                    scene.add(moss);
                }
                if (Math.random() > 0.7) {
                    const crystalGeo = new THREE.BoxGeometry(2, 2, 1);
                    const crystal = new THREE.Mesh(crystalGeo, crystalInlayMat);
                    crystal.position.set(rx + (Math.random() - 0.5) * rockW * 0.5, rockH * 0.6, rz + rockD / 2 + 0.5);
                    crystal.rotation.y = rock.rotation.y;
                    scene.add(crystal);
                }
                if (Math.random() > 0.6) {
                    const crackMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, metalness: 0.0 });
                    const crackGeo = new THREE.BoxGeometry(rockW * 0.8, 0.3, 0.5);
                    const crack = new THREE.Mesh(crackGeo, crackMat);
                    crack.position.set(rx, rockH * 0.5, rz + rockD / 2 + 0.25);
                    crack.rotation.y = rock.rotation.y;
                    scene.add(crack);
                }
            }
            const grassTuftColors = [0x3d6b2d, 0x4a8c3a, 0x2f5c28, 0x5a8c3a];
            for (let i = 0; i < 60; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const tx = x * blockSize + blockSize / 2;
                const tz = z * blockSize + blockSize / 2;
                const tuftColor = grassTuftColors[Math.floor(Math.random() * grassTuftColors.length)];
                const tuftMat = new THREE.MeshStandardMaterial({ color: tuftColor, roughness: 0.95, metalness: 0.0 });
                for (let b = 0; b < 3; b++) {
                    const tuftH = 5 + Math.random() * 4;
                    const tuftGeo = new THREE.BoxGeometry(1.5, tuftH, 1.5);
                    const tuft = new THREE.Mesh(tuftGeo, tuftMat);
                    tuft.position.set(tx + (b - 1) * 3, tuftH / 2, tz);
                    tuft.rotation.z = (Math.random() - 0.5) * 0.4;
                    tuft.rotation.x = (Math.random() - 0.5) * 0.2;
                    scene.add(tuft);
                }
                if (Math.random() > 0.7) {
                    const fColor = [0xff6b9d, 0xffeb3b, 0xffffff, 0xe91e63][Math.floor(Math.random() * 4)];
                    const fMat = new THREE.MeshStandardMaterial({ color: fColor, roughness: 0.7, metalness: 0.0 });
                    const fGeo = new THREE.BoxGeometry(2, 2, 2);
                    const flower = new THREE.Mesh(fGeo, fMat);
                    flower.position.set(tx, 8, tz);
                    scene.add(flower);
                }
            }
            const darkGrassGeo = new THREE.BoxGeometry(blockSize - 3, 4.5, blockSize - 3);
            const darkGrassMat = new THREE.MeshStandardMaterial({ color: 0x1a3d15, roughness: 0.95, metalness: 0.0 });
            for (let i = 0; i < 15; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const darkPatch = new THREE.Mesh(darkGrassGeo, darkGrassMat);
                darkPatch.position.set(x * blockSize + blockSize / 2, 2.5, z * blockSize + blockSize / 2);
                scene.add(darkPatch);
            }
            createAmbientParticles();
            updateBorderWalls();
        }

        let borderMeshes = [];

        function updateBorderWalls() {
            borderMeshes.forEach(m => {
                scene.remove(m);
                m.geometry.dispose();
                m.material.dispose();
            });
            borderMeshes = [];
            const borderMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9, metalness: 0.0 });
            const borderH = 8;
            const borderW = 4;
            const mapW = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
            const mapH = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
            const northGeo = new THREE.BoxGeometry(mapW + borderW * 2, borderH, borderW);
            const north = new THREE.Mesh(northGeo, borderMat);
            north.position.set(mapW / 2, borderH / 2, -borderW / 2);
            north.receiveShadow = true;
            scene.add(north);
            borderMeshes.push(north);
            const south = new THREE.Mesh(northGeo, borderMat);
            south.position.set(mapW / 2, borderH / 2, mapH + borderW / 2);
            south.receiveShadow = true;
            scene.add(south);
            borderMeshes.push(south);
            const westGeo = new THREE.BoxGeometry(borderW, borderH, mapH);
            const west = new THREE.Mesh(westGeo, borderMat);
            west.position.set(-borderW / 2, borderH / 2, mapH / 2);
            west.receiveShadow = true;
            scene.add(west);
            borderMeshes.push(west);
            const east = new THREE.Mesh(westGeo, borderMat);
            east.position.set(mapW + borderW / 2, borderH / 2, mapH / 2);
            east.receiveShadow = true;
            scene.add(east);
            borderMeshes.push(east);
        }

        function createVoxelPineTree(x, z) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.95, metalness: 0.0 });
            const greenShades = [0x228b22, 0x2d8f2d, 0x1a7a1a, 0x32a032, 0x2b8c2b];
            const group = new THREE.Group();
            const trunkSize = 2.5;
            for (let i = 0; i < 3; i++) {
                const geo = new THREE.BoxGeometry(trunkSize, 3, trunkSize);
                const mesh = new THREE.Mesh(geo, trunkMat);
                mesh.position.y = 1.5 + i * 3;
                mesh.castShadow = true;
                group.add(mesh);
            }
            const leafLayers = [
                { size: 10, y: 10 },
                { size: 8, y: 14 },
                { size: 6, y: 17 },
                { size: 4, y: 20 },
                { size: 2, y: 22 },
            ];
            leafLayers.forEach(layer => {
                const leafColor = greenShades[Math.floor(Math.random() * greenShades.length)];
                const leafMat = new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.9, metalness: 0.0 });
                const geo = new THREE.BoxGeometry(layer.size, 3, layer.size);
                const mesh = new THREE.Mesh(geo, leafMat);
                mesh.position.y = layer.y;
                mesh.rotation.y = Math.random() * 0.2;
                mesh.castShadow = true;
                group.add(mesh);
            });
            if (VISUAL_ENHANCEMENTS_ENABLED) {
                const rootMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.95, metalness: 0.0 });
                const branchMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.95, metalness: 0.0 });
                const pineConeMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8, metalness: 0.0 });
                const barkMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 1.0, metalness: 0.0 });
                const rGeo = new THREE.BoxGeometry(4, 2, 2);
                const r1 = new THREE.Mesh(rGeo, rootMat); r1.position.set(-3, 1, 3); group.add(r1);
                const r2 = new THREE.Mesh(rGeo, rootMat); r2.position.set(3, 1, 3); group.add(r2);
                const r3 = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 4), rootMat); r3.position.set(3, 1, -3); group.add(r3);
                const r4 = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 4), rootMat); r4.position.set(-3, 1, -3); group.add(r4);
                const bGeo = new THREE.BoxGeometry(4, 2, 2);
                const b1 = new THREE.Mesh(bGeo, branchMat); b1.position.set(6, 12, 0); group.add(b1);
                const b2 = new THREE.Mesh(bGeo, branchMat); b2.position.set(-6, 14, 0); group.add(b2);
                const b3 = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 4), branchMat); b3.position.set(0, 16, 6); group.add(b3);
                const pcGeo = new THREE.BoxGeometry(2, 3, 2);
                const pc1 = new THREE.Mesh(pcGeo, pineConeMat); pc1.position.set(4, 11, 2); group.add(pc1);
                const pc2 = new THREE.Mesh(pcGeo, pineConeMat); pc2.position.set(-3, 15, -2); group.add(pc2);
                const barkGeo = new THREE.BoxGeometry(1, 2, 1);
                const bk1 = new THREE.Mesh(barkGeo, barkMat); bk1.position.set(1.5, 3, 1.5); group.add(bk1);
                const bk2 = new THREE.Mesh(barkGeo, barkMat); bk2.position.set(-1.5, 5, -1.5); group.add(bk2);
                const bk3 = new THREE.Mesh(barkGeo, barkMat); bk3.position.set(1.5, 7, 0); group.add(bk3);
            }
            group.position.set(x, 0, z);
            group.scale.setScalar(0.85 + Math.random() * 0.3);
            scene.add(group);
        }

        function createVoxelOakTree(x, z) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.95, metalness: 0.0 });
            const canopyColors = [0x4CAF50, 0x66BB6A, 0x388E3C, 0x2E7D32];
            const berryColors = [0xE53935, 0x8E24AA, 0x1E88E5];

                const geo = new THREE.BoxGeometry(trunkSize, 3, trunkSize);
                const mesh = new THREE.Mesh(geo, trunkMat);

                mesh.castShadow = true;
                group.add(mesh);

            const canopyVoxels = [
                { ox: 0, oy: 14, oz: 0, s: 8 },

                const b1 = new THREE.Mesh(bGeo, branchMat); b1.position.set(7, 14, 0); group.add(b1);
                const b2 = new THREE.Mesh(bGeo, branchMat); b2.position.set(-7, 15, 0); group.add(b2);
                const b3 = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 6), branchMat); b3.position.set(0, 16, 7); group.add(b3);
                const b4 = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 6), branchMat); b4.position.set(0, 13, -7); group.add(b4);
                const aGeo = new THREE.BoxGeometry(1.5, 2, 1.5);

                        group.add(egg);
                    }
                }
            }
            group.position.set(x, 0, z);
            group.scale.setScalar(0.85 + Math.random() * 0.3);
            scene.add(group);
