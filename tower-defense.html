    <script>
        if (typeof THREE === 'undefined') {
            console.error('Three.js failed to load from jsdelivr, trying cdnjs...');
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            s.onerror = function() { console.error('ALL Three.js CDNs failed!'); };
            document.head.appendChild(s);
        } else {
            console.log('Three.js loaded successfully, version:', THREE.REVISION);
        }
    </script>
    <script src="hf-config.js"></script>
    <script>
        // Seraph Vision — local llama.cpp server client
        window.seraphVision = {
            ready: false,
            isLoading: true,
            loadError: null,
            errorReason: null,
            onStatusChange: null,
            serverUrl: '',

            async init() {
                this.serverUrl = window.location.origin;
                // Skip server check when opened locally (file://) — no server available
                if (window.location.protocol === 'file:') {
                    this.isLoading = false;
                    this.loadError = new Error('file:// protocol');
                    this.errorReason = 'Run via server: node server.js';
                    if (this.onStatusChange) this.onStatusChange('error');
                    return;
                }
                console.log('[Seraph Vision] Checking local server...');
                try {
                    const res = await fetch(this.serverUrl + '/api/health', { method: 'GET' });
                    if (!res.ok) {
                        throw new Error('Server returned ' + res.status);
                    }
                    const data = await res.json();
                    if (data.llamaReady) {
                        this.ready = true;
                        this.isLoading = false;
                        console.log('[Seraph Vision] Server ready — ALL-SEEING');
                        if (this.onStatusChange) this.onStatusChange('ready');
                    } else {
                        this.isLoading = true;
                        console.log('[Seraph Vision] Server found, model loading...');
                        if (this.onStatusChange) this.onStatusChange('loading');
                        this._pollHealth();
                    }
                } catch (e) {
                    this.isLoading = false;
                    this.loadError = e;
                    this.errorReason = 'Local server not running. Start with: node server.js';
                    console.warn('[Seraph Vision] Server not found:', e.message);
                    if (this.onStatusChange) this.onStatusChange('error');
                }
            },

            async _pollHealth() {
                let attempts = 0;
                const maxAttempts = 120;
                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 2000));
                    try {
                        const res = await fetch(this.serverUrl + '/api/health');
                        const data = await res.json();
                        if (data.llamaReady) {
                            this.ready = true;
                            this.isLoading = false;
                            console.log('[Seraph Vision] Model loaded — ALL-SEEING');
                            if (this.onStatusChange) this.onStatusChange('ready');
                            return;
                        }
                    } catch (e) {}
                    attempts++;
                }
                this.isLoading = false;
                this.loadError = new Error('Timeout');
                this.errorReason = 'Vision model failed to load within 4 minutes.';
                console.warn('[Seraph Vision] Model load timeout');
                if (this.onStatusChange) this.onStatusChange('error');
            },

            async generate(imageBase64, prompt) {
                if (!this.ready) return null;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 45000);
                const playerName = (localStorage.getItem('finalTowerUsername') || 'Architect');
                try {
                    const res = await fetch(this.serverUrl + '/api/vision', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageBase64, prompt: prompt, playerName: playerName }),
                        signal: controller.signal,
                    });
                    clearTimeout(timeoutId);
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || 'Server error');
                    }
                    return await res.json();
                } catch (e) {
                    clearTimeout(timeoutId);
                    if (e.name === 'AbortError') {
                        console.warn('[Seraph Vision] Request timed out (45s)');
                    } else {
                        console.warn('[Seraph Vision] Generation failed:', e.message);
                    }
                    return null;
                }
            },
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => window.seraphVision.init());
        } else {
            window.seraphVision.init();
        }
    </script>

        #seraph-retry {

    </style>
</head>
<body>

    </div>
    <script>
        const VISUAL_ENHANCEMENTS_ENABLED = true;

        const MATERIAL_CACHE = {};
        function getMaterial(key, props) {
            if (!MATERIAL_CACHE[key]) {
                MATERIAL_CACHE[key] = new THREE.MeshStandardMaterial(props);
            }
            return MATERIAL_CACHE[key];
        }

        function disposeMesh(mesh) {
            if (!mesh) return;
            if (mesh.parent) mesh.parent.remove(mesh);
            mesh.traverse(child => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
            });
        }

        const TRAIL_GEOMETRY = new THREE.BoxGeometry(1, 1, 1);
        const TRAIL_MATERIAL_CACHE = {};
        function getTrailMaterial(typeKey) {
            const key = typeKey || 'BASIC';
            if (!TRAIL_MATERIAL_CACHE[key]) {
                TRAIL_MATERIAL_CACHE[key] = new THREE.MeshBasicMaterial({
                    color: TOWER_TYPES[key] ? TOWER_TYPES[key].color : '#ffffff',
                    transparent: true, opacity: 0.5
                });
            }
            return TRAIL_MATERIAL_CACHE[key].clone();
        }

        const CONFIG = {
            MAP_WIDTH: 8,
            MAP_HEIGHT: 8,
            TILE_SIZE: 40,
            PATH_COLOR: '#8B4513',
            TERRAIN_COLOR: '#654321',
            BASE_ENERGY: 80,
            BASE_LIVES: 15,
            ENERGY_REGEN: 1,
            MAX_ENERGY: 80,
            PREPARATION_TIME: 45
        };

        function calculateWaveDifficulty(waveNumber) {
            const baseDifficulty = 10;
            const waveFactor = Math.pow(1.15, waveNumber);
            const bossFactor = waveNumber % 5 === 0 ? 2.5 : 1;
            return Math.floor(baseDifficulty * waveFactor * bossFactor);
        }

        function calculateEnemyCount(waveNumber) {
            return Math.min(40, 10 + Math.floor(waveNumber * 1.5));
        }

        function calculatePathLength(wave) {
            return Math.min(30, 10 + Math.floor(wave * 1.2));
        }

        const TOWER_TYPES = {
            BASIC: { name: 'Basic Tower', cost: 20, damage: 5, range: 7, color: '#ff6b6b', iconType: 'basic', fireRate: 800 },
            SNIPER: { name: 'Sniper', cost: 40, damage: 15, range: 18, color: '#4ecdc4', iconType: 'sniper', fireRate: 2000 },
            CANNON: { name: 'Cannon', cost: 60, damage: 8, range: 6, area: 4, color: '#ffe66d', iconType: 'cannon', fireRate: 1500 },
            TRAP: { name: 'Trap', cost: 35, damage: 40, range: 2, area: 3, color: '#ff8787', iconType: 'trap', fireRate: 2500 },
            SLOW: { name: 'Slow', cost: 45, damage: 2, range: 8, slowFactor: 0.5, color: '#74c0fc', iconType: 'slow', fireRate: 500 }
        };

        function updateCameraPosition() {
            const centerX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            const centerZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2;
            const baseDist = 500;
            const baseHeight = 350;
            const dist = baseDist * gameState.cameraZoom;
            const height = baseHeight * gameState.cameraZoom;
            const angle = gameState.cameraAngle;
            const tilt = gameState.cameraTilt || 0;
            const tiltFactor = Math.cos(tilt);
            const heightFactor = Math.sin(tilt);
            camera.position.set(
                centerX + Math.sin(angle) * dist * tiltFactor,
                height + heightFactor * 200,
                centerZ + Math.cos(angle) * dist * tiltFactor
            );
            camera.lookAt(centerX, 0, centerZ);
        }

        let gameState = {
            energy: CONFIG.BASE_ENERGY,
            lives: CONFIG.BASE_LIVES,
            wave: 1,
            gamePhase: 'PREPARATION',
            preparationTimer: CONFIG.PREPARATION_TIME,
            towers: [],
            enemies: [],
            projectiles: [],
            particles: [],
            branchTiles: [],
            gameOver: false,
            gameStarted: false,
            selectedTower: null,
            waveActive: false,
            pathGrid: [],
            maxWaveReached: 0,
            totalKills: 0,
            pathChanges: 0,
            bossesDefeated: 0,
            cameraAngle: 0,
            cameraZoom: 1,
            cameraTilt: 0,
        };

        let camera, scene, renderer;
        let ambientParticles = [];
        let pathSegments = [];
        let decoyTiles = [];
        let debrisParticles = [];
        let deathParticles = [];
        let impactEffects = [];
        let buildAnimations = [];
        let waveMarkers = [];
        let seraph;

        const ENEMY_KILL_REWARDS = {
            basic: 5, fast: 8, tank: 12, sniper: 10, burrowing: 8, spawner: 15, boss: 50,
            stealth: 18, shielded: 22, swarm: 4, splitting: 14,
            elemental_fire: 16, elemental_ice: 16, elemental_poison: 16,
            siege: 25, healer: 20, elite_basic: 18
        };

        function playDeathExplosion(position, type) {
            const count = type === 'boss' ? 40 : type === 'siege' ? 30 : 20;
            const color = type === 'elemental_fire' ? 0xff5500 : type === 'boss' ? 0xff0000 : 0xffaa00;
            for (let i = 0; i < count; i++) {
                const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(position);
                mesh.position.x += (Math.random() - 0.5) * 10;
                mesh.position.y += (Math.random() - 0.5) * 10;
                mesh.position.z += (Math.random() - 0.5) * 10;
                scene.add(mesh);
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                deathParticles.push({
                    mesh: mesh,
                    vx: Math.cos(angle) * speed,
                    vy: 2 + Math.random() * 5,
                    vz: Math.sin(angle) * speed,
                    life: 40 + Math.random() * 30,
                    maxLife: 70,
                    gravity: 0.15
                });
            }
        }

        function playDeathDissolve(enemy) {
            if (!enemy.mesh) return;
            enemy.mesh.traverse(child => {
                if (child.material) {
                    child.material.transparent = true;
                }
            });
            enemy.userData = enemy.userData || {};
            enemy.userData.isDissolving = true;
            enemy.userData.dissolveLife = 60;
        }

        function playDeathCollapse(enemy) {
            if (!enemy.mesh) return;
            enemy.userData = enemy.userData || {};
            enemy.userData.isCollapsing = true;
            enemy.userData.collapseLife = 40;
            enemy.userData.collapseBaseRot = enemy.mesh.rotation.x;
        }

        function applyDamageVisuals(mesh, damagePercent) {
            if (!mesh || !VISUAL_ENHANCEMENTS_ENABLED) return;
            mesh.traverse(child => {
                if (!child.isMesh || child.userData.isCrack || child.userData.isSmoke || child.userData.isGlow) return;
                const w = child.geometry && child.geometry.parameters ? child.geometry.parameters.width || 2 : 2;
                const h = child.geometry && child.geometry.parameters ? child.geometry.parameters.height || 2 : 2;
                const d = child.geometry && child.geometry.parameters ? child.geometry.parameters.depth || 2 : 2;
                if (damagePercent >= 0.25 && damagePercent < 0.5 && !child.userData.hasCrack) {
                    child.userData.hasCrack = true;
                    const crackGeo = new THREE.BoxGeometry(0.4, 0.4, 0.1);
                    const crackMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
                    const crack = new THREE.Mesh(crackGeo, crackMat);
                    crack.userData.isCrack = true;
                    crack.position.set((Math.random() - 0.5) * w, (Math.random() - 0.5) * h, d / 2 + 0.1);
                    child.add(crack);
                }
                if (damagePercent >= 0.5 && damagePercent < 0.75 && !child.userData.hasSmoke) {
                    child.userData.hasSmoke = true;
                    const smokeGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                    const smokeMat = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.4 });
                    const smoke = new THREE.Mesh(smokeGeo, smokeMat);
                    smoke.userData.isSmoke = true;
                    smoke.position.set((Math.random() - 0.5) * w * 1.2, h / 2 + 0.5, (Math.random() - 0.5) * d * 1.2);
                    child.add(smoke);
                }
                if (damagePercent >= 0.75 && !child.userData.hasGlow) {
                    child.userData.hasGlow = true;
                    const glowGeo = new THREE.BoxGeometry(w * 0.7, h * 0.7, d * 0.7);
                    const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.25 });
                    const glow = new THREE.Mesh(glowGeo, glowMat);
                    glow.userData.isGlow = true;
                    glow.position.set(0, 0, 0);
                    child.add(glow);
                }
            });
        }

        function applyStatusVisuals(enemy) {
            if (!enemy || !enemy.mesh || !enemy.status || !VISUAL_ENHANCEMENTS_ENABLED) return;
            const mesh = enemy.mesh;
            if (enemy.status === 'SLOWED' && !mesh.userData.slowRing) {
                const ringGeo = new THREE.RingGeometry(6, 7, 16);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 1;
                mesh.add(ring);
                mesh.userData.slowRing = ring;
            }
            if (enemy.status === 'BURNING' && !mesh.userData.burnFlames) {
                const flames = [];
                for (let i = 0; i < 3; i++) {
                    const fGeo = new THREE.BoxGeometry(1, 2, 1);
                    const fMat = new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.7 });
                    const f = new THREE.Mesh(fGeo, fMat);
                    f.position.set((Math.random() - 0.5) * 6, Math.random() * 4 + 2, (Math.random() - 0.5) * 6);
                    mesh.add(f);
                    flames.push(f);
                }
                mesh.userData.burnFlames = flames;
            }
            if (enemy.status === 'FROZEN' && !mesh.userData.iceShell) {
                const iceGeo = new THREE.BoxGeometry(10, 12, 10);
                const iceMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.35, roughness: 0.1, metalness: 0.2 });
                const ice = new THREE.Mesh(iceGeo, iceMat);
                ice.position.y = 6;
                mesh.add(ice);
                mesh.userData.iceShell = ice;
            }
            if (enemy.status === 'POISONED' && !mesh.userData.poisonBubbles) {
                const bubbles = [];
                for (let i = 0; i < 4; i++) {
                    const bGeo = new THREE.SphereGeometry(0.6, 6, 6);
                    const bMat = new THREE.MeshBasicMaterial({ color: 0x55ff00, transparent: true, opacity: 0.6 });
                    const b = new THREE.Mesh(bGeo, bMat);
                    b.position.set((Math.random() - 0.5) * 8, Math.random() * 6 + 2, (Math.random() - 0.5) * 8);
                    mesh.add(b);
                    bubbles.push(b);
                }
                mesh.userData.poisonBubbles = bubbles;
            }
        }

        function removeStatusVisuals(enemy) {
            if (!enemy || !enemy.mesh) return;
            const mesh = enemy.mesh;
            if (mesh.userData.slowRing) {
                disposeMesh(mesh.userData.slowRing);
                mesh.userData.slowRing = null;
            }
            if (mesh.userData.burnFlames) {
                mesh.userData.burnFlames.forEach(f => disposeMesh(f));
                mesh.userData.burnFlames = null;
            }
            if (mesh.userData.iceShell) {
                disposeMesh(mesh.userData.iceShell);
                mesh.userData.iceShell = null;
            }
            if (mesh.userData.poisonBubbles) {
                mesh.userData.poisonBubbles.forEach(b => disposeMesh(b));
                mesh.userData.poisonBubbles = null;
            }
        }

        function createImpactEffect(position, type) {
            const typeKey = type || 'BASIC';
            if (typeKey === 'CANNON') {
                for (let i = 0; i < 12; i++) {
                    const geo = new THREE.BoxGeometry(2, 2, 2);
                    const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.9 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    mesh.position.x += (Math.random() - 0.5) * 6;
                    mesh.position.y += (Math.random() - 0.5) * 6;
                    mesh.position.z += (Math.random() - 0.5) * 6;
                    scene.add(mesh);
                    impactEffects.push({ mesh: mesh, life: 30, vy: 1 + Math.random() * 2, vx: (Math.random() - 0.5) * 2, vz: (Math.random() - 0.5) * 2 });
                }
                const smokeGeo = new THREE.BoxGeometry(4, 4, 4);
                const smokeMat = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.5 });
                const smoke = new THREE.Mesh(smokeGeo, smokeMat);
                smoke.position.copy(position);
                scene.add(smoke);
                impactEffects.push({ mesh: smoke, life: 50, vy: 0.5, vx: 0, vz: 0, grow: true });
            } else if (typeKey === 'SNIPER') {
                for (let i = 0; i < 8; i++) {
                    const geo = new THREE.BoxGeometry(1, 1, 1);
                    const mat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.9 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    scene.add(mesh);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 3;
                    impactEffects.push({ mesh: mesh, life: 25, vy: 1 + Math.random(), vx: Math.cos(angle) * speed, vz: Math.sin(angle) * speed });
                }
            } else if (typeKey === 'SLOW') {
                for (let i = 0; i < 6; i++) {
                    const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
                    const mat = new THREE.MeshBasicMaterial({ color: 0x74c0fc, transparent: true, opacity: 0.8 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    scene.add(mesh);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 1.5;
                    impactEffects.push({ mesh: mesh, life: 20, vy: 0.5 + Math.random(), vx: Math.cos(angle) * speed, vz: Math.sin(angle) * speed });
                }
            } else if (typeKey === 'TRAP') {
                for (let i = 0; i < 16; i++) {
                    const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                    const mat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.9 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    mesh.position.x += (Math.random() - 0.5) * 8;
                    mesh.position.y += Math.random() * 6;
                    mesh.position.z += (Math.random() - 0.5) * 8;
                    scene.add(mesh);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    impactEffects.push({ mesh: mesh, life: 25, vy: 3 + Math.random() * 4, vx: Math.cos(angle) * speed, vz: Math.sin(angle) * speed });
                }
                const smokeGeo = new THREE.BoxGeometry(5, 5, 5);
                const smokeMat = new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.6 });
                const smoke = new THREE.Mesh(smokeGeo, smokeMat);
                smoke.position.copy(position);
                scene.add(smoke);
                impactEffects.push({ mesh: smoke, life: 40, vy: 1, vx: 0, vz: 0, grow: true });
            } else {
                for (let i = 0; i < 5; i++) {
                    const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                    const mat = new THREE.MeshBasicMaterial({ color: 0xffffaa, transparent: true, opacity: 0.9 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(position);
                    scene.add(mesh);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 2;
                    impactEffects.push({ mesh: mesh, life: 20, vy: 1 + Math.random(), vx: Math.cos(angle) * speed, vz: Math.sin(angle) * speed });
                }
            }
        }

        function playBuildAnimation(mesh) {
            if (!mesh) return;
            // Quick pop-in: start visible, bounce to full size in ~3 frames
            mesh.scale.setScalar(0.6);
            buildAnimations.push({ mesh: mesh, progress: 0.6, speed: 0.35 });
        }

        function showRangeIndicator(tower) {
            if (!tower || !tower.rangeIndicator) return;
            tower.rangeIndicator.material.opacity = 0.25;
        }

        function hideRangeIndicator(tower) {
            if (!tower || !tower.rangeIndicator) return;
            tower.rangeIndicator.material.opacity = 0;
        }

        function showWaveIncoming(waveNum) {
            const paths = gameState.activePaths || [currentPath];
            paths.forEach(path => {
                if (!path || path.length === 0) return;
                const start = path[0];
                const x = start.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const z = start.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const beaconGeo = new THREE.CylinderGeometry(3, 3, 40, 8);
                const beaconMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.6 });
                const beacon = new THREE.Mesh(beaconGeo, beaconMat);
                beacon.position.set(x, 20, z);
                scene.add(beacon);
                const ringGeo = new THREE.RingGeometry(15, 18, 32);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.set(x, 1, z);
                scene.add(ring);
                waveMarkers.push({ beacon: beacon, ring: ring, life: 120 });
            });
        }

        class PathGenerator {
            static createPath(waveNumber) {
                const mapW = CONFIG.MAP_WIDTH;
                const mapH = CONFIG.MAP_HEIGHT;
                
                // More varied path types as waves increase
                const availableTypes = ['SERPENTINE', 'SPIRAL', 'ZIGZAG', 'RIVER', 'SWITCHBACK'];
                if (waveNumber >= 3) availableTypes.push('MAZE');
                if (waveNumber >= 6) availableTypes.push('TENDRIL');
                if (waveNumber >= 10) availableTypes.push('CHAOS');
                
                const pathType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                
                switch(pathType) {
                    case 'SERPENTINE': return this.generateSerpentinePath(mapW, mapH, waveNumber);
                    case 'SPIRAL': return this.generateSpiralPath(mapW, mapH, waveNumber);
                    case 'ZIGZAG': return this.generateZigzagPath(mapW, mapH, waveNumber);
                    case 'RIVER': return this.generateRiverPath(mapW, mapH, waveNumber);
                    case 'SWITCHBACK': return this.generateSwitchbackPath(mapW, mapH, waveNumber);
                    case 'MAZE': return this.generateMazePath(mapW, mapH, waveNumber);
                    case 'TENDRIL': return this.generateTendrilPath(mapW, mapH, waveNumber);
                    case 'CHAOS': return this.generateChaosPath(mapW, mapH, waveNumber);
                    default: return this.generateSerpentinePath(mapW, mapH, waveNumber);
                }
            }
            
            static generateSerpentinePath(mapW, mapH, wave) {
                // Snake path that covers most of the map, going back and forth
                const path = [];
                // Add randomness so same wave type doesn't produce identical paths
                const direction = (wave + Math.floor(Math.random() * 2)) % 2 === 0 ? 1 : -1;
                const startRow = Math.floor(Math.random() * Math.max(1, Math.floor(mapH * 0.3)));
                let y = direction === 1 ? startRow : mapH - 1 - startRow;
                const rowOrder = [];
                for (let r = 0; r < mapH; r++) rowOrder.push(r);
                // Slightly shuffle adjacent rows for variety
                for (let i = 0; i < rowOrder.length - 1; i += 2) {
                    if (Math.random() < 0.15) {
                        const tmp = rowOrder[i];
                        rowOrder[i] = rowOrder[i + 1];
                        rowOrder[i + 1] = tmp;
                    }
                }

                for (let idx = 0; idx < rowOrder.length; idx++) {
                    const row = direction === 1 ? rowOrder[idx] : rowOrder[rowOrder.length - 1 - idx];
                    const currentY = row;
                    const isEven = idx % 2 === 0;
                    if (isEven) {
                        for (let x = 0; x < mapW; x++) {
                            path.push({ x, y: currentY });
                        }
                    } else {
                        for (let x = mapW - 1; x >= 0; x--) {
                            path.push({ x, y: currentY });
                        }
                    }
                    if (idx < rowOrder.length - 1) {
                        const nextRow = direction === 1 ? rowOrder[idx + 1] : rowOrder[rowOrder.length - 1 - idx - 1];
                        const lastX = path[path.length - 1].x;
                        path.push({ x: lastX, y: nextRow });
                    }
                }
                return path;
            }
            
            static generateSpiralPath(mapW, mapH, wave) {
                // Spiral from edge toward center then out the other side
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(Math.random() * mapH);
                let dx = 1, dy = 0;
                let steps = 0;
                const maxSteps = mapW * mapH;
                // Randomize turn priority for variety
                const baseTurns = [{ dx: 0, dy: 1 }, { dx: 0, dy: -1 }, { dx: 1, dy: 0 }, { dx: -1, dy: 0 }];
                const turns = baseTurns.sort(() => Math.random() - 0.5);

                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (x < 0 || x >= mapW || y < 0 || y >= mapH || visited.has(key)) {
                        // Try to turn
                        let turned = false;
                        for (const t of turns) {
                            const nx = x + t.dx;
                            const ny = y + t.dy;
                            const nkey = `${nx},${ny}`;
                            if (nx >= 0 && nx < mapW && ny >= 0 && ny < mapH && !visited.has(nkey)) {
                                dx = t.dx; dy = t.dy;
                                turned = true;
                                break;
                            }
                        }
                        if (!turned) break;
                        continue;
                    }
                    visited.add(key);
                    path.push({ x, y });
                    x += dx;
                    y += dy;
                    steps++;
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static generateZigzagPath(mapW, mapH, wave) {
                // Sharp zigzag that changes direction frequently
                const path = [];
                let x = 0;
                let y = Math.floor(Math.random() * mapH);
                let dir = Math.random() > 0.5 ? 1 : -1;
                let zigCount = 0;
                const maxZigs = 3 + Math.floor(Math.random() * 4);
                
                while (x < mapW) {
                    path.push({ x, y });
                    if (Math.random() < 0.4 && zigCount < maxZigs) {
                        // Change vertical direction
                        dir *= -1;
                        zigCount++;
                    }
                    const newY = y + dir;
                    if (newY >= 0 && newY < mapH) {
                        y = newY;
                    } else {
                        dir *= -1;
                    }
                    if (Math.random() < 0.7) {
                        x++;
                    }
                }
                // Ensure we reach the right edge
                while (x < mapW) {
                    path.push({ x, y: Math.max(0, Math.min(mapH - 1, y)) });
                    x++;
                }
                return path;
            }
            
            static generateRiverPath(mapW, mapH, wave) {
                // Winding river-like path with gentle curves
                const path = [];
                let x = 0;
                let y = Math.floor(mapH * (0.2 + Math.random() * 0.6));
                let curve = (Math.random() - 0.5) * 2;
                
                while (x < mapW) {
                    path.push({ x, y });
                    // Gradually change curve direction
                    if (Math.random() < 0.15) {
                        curve = (Math.random() - 0.5) * 3;
                    }
                    y += Math.round(curve);
                    y = Math.max(0, Math.min(mapH - 1, y));
                    x++;
                    // Sometimes add extra vertical tiles for width
                    if (Math.random() < 0.2 && y + 1 < mapH) {
                        path.push({ x: x - 1, y: y + 1 });
                    }
                }
                return path;
            }
            
            static generateSwitchbackPath(mapW, mapH, wave) {
                // Goes up one side, across the top/bottom, down the other
                const path = [];
                const side = Math.random() > 0.5 ? 'left' : 'right';
                
                if (side === 'left') {
                    // Go up left edge, across top, down right edge
                    for (let y = mapH - 1; y >= 0; y--) {
                        path.push({ x: 0, y });
                    }
                    for (let x = 1; x < mapW; x++) {
                        path.push({ x, y: 0 });
                    }
                    for (let y = 1; y < mapH; y++) {
                        path.push({ x: mapW - 1, y });
                    }
                } else {
                    // Go up right edge, across bottom, down left edge
                    for (let y = mapH - 1; y >= 0; y--) {
                        path.push({ x: mapW - 1, y });
                    }
                    for (let x = mapW - 2; x >= 0; x--) {
                        path.push({ x, y: mapH - 1 });
                    }
                    for (let y = mapH - 2; y >= 0; y--) {
                        path.push({ x: 0, y });
                    }
                }
                return path;
            }
            
            static generateMazePath(mapW, mapH, wave) {
                // Maze-like path with dead-end feel
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(mapH / 2);
                let steps = 0;
                const maxSteps = mapW * mapH * 0.6;
                
                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (visited.has(key)) break;
                    visited.add(key);
                    path.push({ x, y });
                    
                    const dirs = [];
                    if (x + 1 < mapW && !visited.has(`${x+1},${y}`)) dirs.push({ dx: 1, dy: 0 });
                    if (x - 1 >= 0 && !visited.has(`${x-1},${y}`)) dirs.push({ dx: -1, dy: 0 });
                    if (y + 1 < mapH && !visited.has(`${x},${y+1}`)) dirs.push({ dx: 0, dy: 1 });
                    if (y - 1 >= 0 && !visited.has(`${x},${y-1}`)) dirs.push({ dx: 0, dy: -1 });
                    
                    if (dirs.length === 0) break;
                    
                    // Prefer moving right (toward exit)
                    const rightDir = dirs.find(d => d.dx === 1);
                    if (rightDir && Math.random() < 0.4) {
                        x += rightDir.dx;
                        y += rightDir.dy;
                    } else {
                        const chosen = dirs[Math.floor(Math.random() * dirs.length)];
                        x += chosen.dx;
                        y += chosen.dy;
                    }
                    steps++;
                }
                
                // Ensure path reaches right edge
                if (path.length > 0 && path[path.length - 1].x < mapW - 1) {
                    let lastX = path[path.length - 1].x;
                    let lastY = path[path.length - 1].y;
                    for (let xi = lastX + 1; xi < mapW; xi++) {
                        path.push({ x: xi, y: lastY });
                    }
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static generateTendrilPath(mapW, mapH, wave) {
                // Multiple tendrils reaching toward edges - enemies try to escape
                const path = [];
                let x = 0;
                let y = Math.floor(mapH / 2);
                const edgeBias = Math.random(); // Which edge to favor
                
                while (x < mapW) {
                    path.push({ x, y });
                    
                    const rand = Math.random();
                    if (rand < 0.3) {
                        // Push toward top edge
                        if (y > 0) y--;
                    } else if (rand < 0.6) {
                        // Push toward bottom edge
                        if (y < mapH - 1) y++;
                    } else {
                        // Move forward
                        x++;
                    }
                }
                // Ensure right edge reached
                while (path[path.length - 1].x < mapW - 1) {
                    const last = path[path.length - 1];
                    path.push({ x: last.x + 1, y: last.y });
                }
                return path;
            }
            
            static generateChaosPath(mapW, mapH, wave) {
                // Unpredictable chaotic path - for late game
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(Math.random() * mapH);
                let steps = 0;
                const maxSteps = mapW * mapH * 0.7;
                
                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (visited.has(key)) {
                        // Force movement
                        if (x < mapW - 1) x++;
                        else break;
                        continue;
                    }
                    visited.add(key);
                    path.push({ x, y });
                    
                    // Weighted random: 30% right, 25% up, 25% down, 20% left
                    const rand = Math.random();
                    if (rand < 0.3 && x < mapW - 1) x++;
                    else if (rand < 0.55 && y > 0) y--;
                    else if (rand < 0.8 && y < mapH - 1) y++;
                    else if (rand < 1.0 && x > 0) x--;
                    
                    steps++;
                }
                
                // Ensure exit
                if (path.length > 0) {
                    let last = path[path.length - 1];
                    for (let xi = last.x + 1; xi < mapW; xi++) {
                        path.push({ x: xi, y: last.y });
                    }
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static validatePath(path) {
                if (!path || path.length < 3) return false;
                if (path[0].x !== 0) return false;
                if (path[path.length - 1].x < CONFIG.MAP_WIDTH - 1) return false;
                for (let i = 1; i < path.length; i++) {
                    const dx = Math.abs(path[i].x - path[i-1].x);
                    const dy = Math.abs(path[i].y - path[i-1].y);
                    if (dx + dy > 1) return false;
                    if (path[i].x < 0 || path[i].x >= CONFIG.MAP_WIDTH) return false;
                    if (path[i].y < 0 || path[i].y >= CONFIG.MAP_HEIGHT) return false;
                }
                return true;
            }
            
            static createPathFromEdge(mapW, mapH, wave, entryEdge) {
                const path = [];
                const windingFactor = Math.min(0.5, 0.15 + (wave - 15) * 0.02);
                const extraLength = Math.min(mapW * 0.5, (wave - 15) * 0.5);
                
                if (entryEdge === 'left') {
                    let y = Math.floor(mapH / 2);
                    const useHybrid = wave >= 15 && Math.random() < 0.4;
                    const targetLength = mapW + extraLength;
                    
                    for (let x = 0; x < mapW || path.length < targetLength; x++) {
                        if (x >= mapW) break;
                        path.push({ x, y });
                        
                        if (useHybrid) {
                            if (Math.random() < 0.3 + windingFactor) {
                                const turnDir = Math.random() > 0.5 ? 1 : -1;
                                if (y + turnDir >= 0 && y + turnDir < mapH) y += turnDir;
                            }
                            if (Math.random() < windingFactor * 0.5 && path.length < targetLength) {
                                const extraY = y + (Math.random() > 0.5 ? 1 : -1);
                                if (extraY >= 0 && extraY < mapH) path.push({ x, y: extraY });
                            }
                        } else {
                            if (Math.random() < 0.2 && y > 0) y--;
                            else if (Math.random() < 0.2 && y < mapH - 1) y++;
                        }
                    }
                } else if (entryEdge === 'top') {
                    let x = 0, y = 0;
                    const useHybrid = wave >= 15 && Math.random() < 0.4;
                    const targetLength = mapW + extraLength;
                    path.push({ x, y });
                    
                    while ((x < mapW - 1 || path.length < targetLength) && x < mapW) {
                        const rand = Math.random();
                        if (useHybrid) {
                            if (rand < 0.3 + windingFactor * 0.3) x++;
                            else if (rand < 0.5 + windingFactor * 0.2 && y < mapH - 1) y++;
                            else if (rand < 0.7 + windingFactor * 0.2 && y > 0) y--;
                            else x++;
                            if (Math.random() < windingFactor && y + 1 < mapH && path.length < targetLength) {
                                path.push({ x, y: y + 1 });
                            }
                        } else {
                            if (rand < 0.4) x++;
                            else if (rand < 0.7 && y < mapH - 1) y++;
                            else if (y > 0) y--;
                        }
                        path.push({ x, y });
                    }
                    const last = path[path.length - 1];
                    for (let xi = last.x + 1; xi < mapW; xi++) path.push({ x: xi, y: last.y });
                } else if (entryEdge === 'bottom') {
                    let x = 0, y = mapH - 1;
                    const useHybrid = wave >= 15 && Math.random() < 0.4;
                    const targetLength = mapW + extraLength;
                    path.push({ x, y });
                    
                    while ((x < mapW - 1 || path.length < targetLength) && x < mapW) {
                        const rand = Math.random();
                        if (useHybrid) {
                            if (rand < 0.3 + windingFactor * 0.3) x++;
                            else if (rand < 0.5 + windingFactor * 0.1 && y > 0) y--;
                            else if (rand < 0.7 + windingFactor * 0.1 && y < mapH - 1) y++;
                            else x++;
                            if (Math.random() < 0.1 + windingFactor * 0.2 && path.length < targetLength) {
                                const spurY = y + (Math.random() > 0.5 ? 1 : -1);
                                if (spurY >= 0 && spurY < mapH) path.push({ x, y: spurY });
                            }
                        } else {
                            if (rand < 0.4) x++;
                            else if (rand < 0.7 && y > 0) y--;
                            else if (y < mapH - 1) y++;
                        }
                        path.push({ x, y });
                    }
                    const last = path[path.length - 1];
                    for (let xi = last.x + 1; xi < mapW; xi++) path.push({ x: xi, y: last.y });
                }
                return path;
            }
            
            static createMultiplePaths(waveNumber) {
                const mapW = CONFIG.MAP_WIDTH;
                const mapH = CONFIG.MAP_HEIGHT;
                
                // Determine number of paths based on wave
                let pathCount = 1;
                if (waveNumber >= 35) pathCount = 4;
                else if (waveNumber >= 25) pathCount = 3;
                else if (waveNumber >= 15) pathCount = 2;
                
                const paths = [];
                const usedEdges = new Set();
                
                // Edge selection strategy to avoid overlaps
                const edges = ['left', 'top', 'bottom'];
                
                for (let i = 0; i < pathCount; i++) {
                    // Pick an unused edge when possible
                    let availableEdges = edges.filter(e => !usedEdges.has(e) || edges.length === pathCount);
                    if (availableEdges.length === 0) availableEdges = edges;
                    
                    const entryEdge = availableEdges[Math.floor(Math.random() * availableEdges.length)];
                    usedEdges.add(entryEdge);
                    
                    let path = this.createPathFromEdge(mapW, mapH, waveNumber, entryEdge);
                    
                    // Ensure path validity
                    if (!this.validatePath(path)) {
                        path = this.generateSerpentinePath(mapW, mapH, waveNumber);
                    }
                    
                    // Avoid overlaps with existing paths
                    let attempts = 0;
                    while (attempts < 10 && paths.some(p => this.pathsOverlap(p, path))) {
                        path = this.createPathFromEdge(mapW, mapH, waveNumber + attempts, entryEdge);
                        if (!this.validatePath(path)) {
                            path = this.generateSerpentinePath(mapW, mapH, waveNumber + attempts);
                        }
                        attempts++;
                    }
                    
                    // Add branching for wave 20+
                    if (waveNumber >= 20 && pathCount === 1) {
                        path = this.addPathBranching(path, mapW, mapH);
                    }
                    
                    paths.push(path);
                }
                
                return paths;
            }
            
            static addPathBranching(path, mapW, mapH) {
                if (path.length < 10) return path;
                
                // Find a midpoint to split
                const splitIndex = Math.floor(path.length * 0.4 + Math.random() * path.length * 0.2);
                const splitPoint = path[splitIndex];
                
                // Create a branch that diverges and rejoins
                const branch = [];
                let bx = splitPoint.x;
                let by = splitPoint.y;
                const targetX = splitPoint.x + Math.floor(mapW * 0.3);
                const targetY = by + (Math.random() > 0.5 ? 1 : -1) * Math.floor(mapH * 0.3);
                
                while (bx < targetX && branch.length < mapW * 0.4) {
                    branch.push({ x: bx, y: by });
                    bx++;
                    if (Math.random() < 0.3) {
                        const ny = by + (Math.random() > 0.5 ? 1 : -1);
                        if (ny >= 0 && ny < mapH) by = ny;
                    }
                    branch.push({ x: bx, y: by });
                }
                
                // Rejoin to original path
                const rejoinedIndex = Math.min(splitIndex + Math.floor(path.length * 0.3), path.length - 1);
                for (let i = rejoinedIndex; i >= splitIndex; i--) {
                    if (!branch.some(p => p.x === path[i].x && p.y === path[i].y)) {
                        branch.push(path[i]);
                    }
                }
                
                // Insert branch between split and rejoin
                const newPath = path.slice(0, splitIndex + 1).concat(branch).concat(path.slice(rejoinedIndex + 1));
                return newPath;
            }
            
            static pathsOverlap(path1, path2) {
                const tiles1 = new Set(path1.map(p => `${p.x},${p.y}`));
                return path2.some(p => tiles1.has(`${p.x},${p.y}`));
            }
            
            static generateHybridSerpSpiral(mapW, mapH, wave) {
                const path = [];
                const midpoint = Math.floor(mapW / 2);
                let y = Math.floor(mapH / 2);
                
                for (let x = 0; x < midpoint; x++) {
                    path.push({ x, y });
                    if (Math.random() < 0.2 && y > 0) y--;
                    else if (Math.random() < 0.2 && y < mapH - 1) y++;
                }
                
                const direction = Math.random() > 0.5 ? 1 : -1;
                for (let i = 0; i < 3; i++) {
                    y += direction;
                    if (y < 0 || y >= mapH) break;
                    path.push({ x: midpoint, y });
                }
                
                const visited = new Set();
                let sx = midpoint, dx = 1, dy = 0;
                let steps = 0;
                const maxSteps = mapW * mapH;
                
                while (steps < maxSteps && path.length < mapW * mapH * 0.6) {
                    const key = `${sx},${y}`;
                    if (sx < midpoint || sx >= mapW || y < 0 || y >= mapH || visited.has(key)) {
                        const turns = [{ dx: 0, dy: 1 }, { dx: 0, dy: -1 }, { dx: 1, dy: 0 }];
                        let turned = false;
                        for (const t of turns) {
                            const nx = sx + t.dx;
                            const ny = y + t.dy;
                            const nkey = `${nx},${ny}`;
                            if (nx >= 0 && nx < mapW && ny >= 0 && ny < mapH && !visited.has(nkey)) {
                                dx = t.dx; dy = t.dy;
                                turned = true;
                                break;
                            }
                        }
                        if (!turned) break;
                        continue;
                    }
                    visited.add(key);
                    path.push({ x: sx, y });
                    sx += dx; y += dy;
                    steps++;
                }
                
                if (path.length > 0 && path[path.length - 1].x < mapW - 1) {
                    const last = path[path.length - 1];
                    for (let xi = last.x + 1; xi < mapW; xi++) path.push({ x: xi, y: last.y });
                }
                return path;
            }
        }

        function generateWaveEnemies(waveNum) {
            const enemyCount = calculateEnemyCount(waveNum);
            const enemies = [];
            const isBossWave = waveNum % 5 === 0;
            
            const difficultyTier = Math.floor(waveNum / 3);
            
            const basicChance = Math.max(0.2, 0.7 - waveNum * 0.02);
            const fastChance = Math.min(0.3, 0.1 + waveNum * 0.01);
            const tankChance = Math.min(0.25, 0.05 + waveNum * 0.015);
            const sniperChance = Math.min(0.15, 0.03 + waveNum * 0.01);
            const burrowChance = Math.min(0.12, waveNum * 0.008);
            const spawnerChance = Math.min(0.08, waveNum >= 8 ? 0.05 : 0);
            const swarmChance = Math.min(0.14, waveNum >= 4 ? 0.1 : 0);
            const stealthChance = Math.min(0.12, waveNum >= 5 ? 0.08 : 0);
            const eliteBasicChance = Math.min(0.15, waveNum >= 6 ? 0.1 : 0);
            const shieldedChance = Math.min(0.10, waveNum >= 7 ? 0.06 : 0);
            const healerChance = Math.min(0.08, waveNum >= 8 ? 0.05 : 0);
            const splittingChance = Math.min(0.06, waveNum >= 9 ? 0.04 : 0);
            const fireChance = Math.min(0.07, waveNum >= 10 ? 0.05 : 0);
            const iceChance = Math.min(0.07, waveNum >= 11 ? 0.05 : 0);
            const poisonChance = Math.min(0.07, waveNum >= 12 ? 0.05 : 0);
            const siegeChance = Math.min(0.04, waveNum >= 14 ? 0.03 : 0);
            
            for (let i = 0; i < enemyCount; i++) {
                const roll = Math.random();
                let type = 'basic';
                
                if (isBossWave && i === Math.floor(enemyCount / 2)) {
                    type = 'boss';
                } else if (roll < spawnerChance && waveNum >= 8) {
                    type = 'spawner';
                } else if (roll < spawnerChance + burrowChance && waveNum >= 6) {
                    type = 'burrowing';
                } else if (roll < spawnerChance + burrowChance + sniperChance && waveNum >= 4) {
                    type = 'sniper';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance) {
                    type = 'tank';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance) {
                    type = 'fast';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance && waveNum >= 4) {
                    type = 'swarm';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance && waveNum >= 5) {
                    type = 'stealth';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance && waveNum >= 6) {
                    type = 'elite_basic';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance && waveNum >= 7) {
                    type = 'shielded';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance && waveNum >= 8) {
                    type = 'healer';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance + splittingChance && waveNum >= 9) {
                    type = 'splitting';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance + splittingChance + fireChance && waveNum >= 10) {
                    type = 'elemental_fire';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance + splittingChance + fireChance + iceChance && waveNum >= 11) {
                    type = 'elemental_ice';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance + splittingChance + fireChance + iceChance + poisonChance && waveNum >= 12) {
                    type = 'elemental_poison';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance + swarmChance + stealthChance + eliteBasicChance + shieldedChance + healerChance + splittingChance + fireChance + iceChance + poisonChance + siegeChance && waveNum >= 14) {
                    type = 'siege';
                }
                
                const healthMult = 1 + (waveNum * 0.06);
                const speedMult = 1 + (waveNum * 0.01);
                
                enemies.push({
                    type: type,
                    variant: Math.floor(Math.random() * 3),
                    healthMult: healthMult,
                    speedMult: speedMult,
                    waveNum: waveNum
                });
            }
            
            if (isBossWave && !enemies.some(e => e.type === 'boss')) {
                enemies.push({
                    type: 'boss',
                    variant: 0,
                    healthMult: 1 + (waveNum * 0.15),
                    speedMult: 1,
                    waveNum: waveNum
                });
            }
            
            return {
                enemies: enemies,
                spawnDelay: Math.max(400, 1200 - waveNum * 20),
                waveNumber: waveNum
            };
        }

        let currentPath = [];
        const pathOptions = { mainPath: currentPath };

        function selectPathForWave(waveNum) {
            // Clear old path entries to prevent stale multi-path data
            Object.keys(pathOptions).forEach(key => {
                if (key !== 'mainPath') delete pathOptions[key];
            });

            // For wave 15+, generate multiple paths
            if (waveNum >= 15) {
                const paths = PathGenerator.createMultiplePaths(waveNum);
                // Store each path with a unique key
                pathOptions.mainPath = paths[0] || [];
                for (let i = 0; i < paths.length; i++) {
                    pathOptions[`path${i}`] = paths[i];
                }
                currentPath = paths[0] || [];
                return paths;
            }
            
            // For waves < 15, use single path (original behavior)
            let attempts = 0;
            while (attempts < 10) {
                const path = PathGenerator.createPath(waveNum + attempts);
                if (PathGenerator.validatePath(path)) {
                    currentPath = path;
                    pathOptions.mainPath = path;
                    pathOptions.path0 = path;
                    return [path];
                }
                attempts++;
            }
            currentPath = PathGenerator.generateSerpentinePath(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, waveNum);
            pathOptions.mainPath = currentPath;
            pathOptions.path0 = currentPath;
            return [currentPath];
        }

        function getWaypointAt(index, pathName) {
            const path = pathOptions[pathName];
            if (!path || !path[index]) return null;
            return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                     y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
        }

        function getPathLength(pathName) {
            const path = pathOptions[pathName];
            return path ? path.length : 0;
        }

        function getTowerIconCanvas(typeKey, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            canvas.style.width = '36px';
            canvas.style.height = '36px';
            canvas.style.imageRendering = 'pixelated';
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            const px = (x, y, w, h, c) => {
                ctx.fillStyle = c;
                ctx.fillRect(x, y, w, h);
            };
            switch(typeKey) {
                case 'BASIC':
                    px(12, 14, 8, 12, color);
                    px(14, 6, 4, 10, color);
                    px(14, 4, 4, 4, '#fff');
                    px(15, 5, 2, 2, color);
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    px(15, 2, 2, 2, '#ffd60a');
                    break;
                case 'SNIPER':
                    px(14, 2, 4, 22, color);
                    px(10, 4, 12, 6, color);
                    px(12, 5, 8, 4, '#1a1a2e');
                    px(14, 6, 4, 2, '#4ecdc4');
                    px(15, 5, 2, 4, '#fff');
                    px(13, 6, 6, 2, '#fff');
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    break;
                case 'CANNON':
                    px(8, 14, 16, 12, color);
                    px(10, 10, 12, 6, color);
                    px(12, 16, 8, 6, '#1a1a2e');
                    px(14, 17, 4, 4, '#ffd60a');
                    px(14, 6, 4, 4, '#ff6b6b');
                    px(15, 5, 2, 2, '#ffd60a');
                    px(6, 24, 20, 3, color);
                    px(8, 26, 16, 2, color);
                    break;
                case 'TRAP':
                    px(14, 4, 4, 4, '#ff453a');
                    px(14, 8, 4, 4, color);
                    px(10, 12, 12, 4, color);
                    px(12, 16, 8, 4, color);
                    px(8, 20, 16, 4, color);
                    px(6, 24, 20, 3, color);
                    px(14, 13, 4, 4, '#ffd60a');
                    px(15, 14, 2, 2, '#ff453a');
                    break;
                case 'SLOW':
                    px(14, 4, 4, 4, color);
                    px(12, 8, 8, 4, color);
                    px(10, 12, 12, 4, color);
                    px(8, 16, 16, 4, color);
                    px(10, 20, 12, 4, color);
                    px(12, 24, 8, 3, color);
                    px(14, 14, 4, 4, '#fff');
                    px(15, 15, 2, 2, color);
                    px(8, 8, 2, 2, '#fff');
                    px(22, 10, 2, 2, '#fff');
                    px(10, 22, 2, 2, '#fff');
                    break;
            }
            return canvas;
        }

        function createUI() {
            const container = document.getElementById('tower-buttons');
            if (!container) { console.error('tower-buttons element not found'); return; }
            container.innerHTML = '';
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.createElement('div');
                btn.className = 'tower-btn';
                const iconCanvas = getTowerIconCanvas(key, '#' + new THREE.Color(type.color).getHexString());
                btn.appendChild(iconCanvas);
                const costDiv = document.createElement('div');
                costDiv.className = 'tower-cost';
                costDiv.textContent = `⚡${type.cost}`;
                btn.appendChild(costDiv);
                if (gameState.energy < type.cost) btn.classList.add('disabled');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (gameState.selectedTower === key) {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        gameState.selectedTower = null;
                        renderer.domElement.style.cursor = 'grab';
                    } else {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        gameState.selectedTower = key;
                        renderer.domElement.style.cursor = 'crosshair';
                    }
                });
                btn.setAttribute('data-tower', key);
                container.appendChild(btn);
            });
            const startBtn = document.getElementById('start-wave-btn');
            if (!startBtn) { console.error('start-wave-btn element not found'); return; }
            startBtn.textContent = 'Start Wave';
            startBtn.addEventListener('click', () => {
                if (gameState.gamePhase === 'GAME_OVER') { location.reload(); return; }
                if (!gameState.gameStarted) { startGame(); startBtn.textContent = 'Start Wave'; }
                else if (gameState.gamePhase === 'PREPARATION') { startWaveActive(); }
                else if (gameState.gamePhase === 'WAVE_ACTIVE' && !gameState.waveActive) { startPreparationPhase(); }
            });
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            window.addEventListener('keydown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                const rotationSpeed = 0.15;
                const zoomSpeed = 0.1;
                if (e.key === 'q' || e.key === 'Q' || e.key === 'ArrowLeft') { gameState.cameraAngle -= rotationSpeed; }
                else if (e.key === 'e' || e.key === 'E' || e.key === 'ArrowRight') { gameState.cameraAngle += rotationSpeed; }
                else if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') { gameState.cameraZoom = Math.min(2, gameState.cameraZoom + zoomSpeed); }
                else if (e.key === 'r' || e.key === 'R') { gameState.cameraTilt = Math.max(-0.5, (gameState.cameraTilt || 0) - 0.1); }
                else if (e.key === 'f' || e.key === 'F') { gameState.cameraTilt = Math.min(0.8, (gameState.cameraTilt || 0) + 0.1); }
                updateCameraPosition();
            });
            renderer.domElement.addEventListener('wheel', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                e.preventDefault();
                const zoomSpeed = 0.08;
                if (e.deltaY > 0) { gameState.cameraZoom = Math.min(2.5, gameState.cameraZoom + zoomSpeed); }
                else { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                updateCameraPosition();
            }, { passive: false });
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0, dragStartAngle = 0, dragStartTilt = 0;
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                if (!gameState.selectedTower) {
                    isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragStartAngle = gameState.cameraAngle;
                    dragStartTilt = gameState.cameraTilt || 0;
                    renderer.domElement.style.cursor = 'grabbing';
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                gameState.cameraAngle = dragStartAngle + dx * 0.005;
                gameState.cameraTilt = Math.max(-0.5, Math.min(0.8, dragStartTilt + dy * 0.003));
                updateCameraPosition();
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    renderer.domElement.style.cursor = 'grab';
                }
            });
            let previewTile = null;
            let rangeCircle = null;
            document.getElementById('game-container').addEventListener('mousemove', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const isOccupied = gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ);
                const towerType = gameState.selectedTower;
                const canPlaceOnPath = towerType === 'CANNON' || towerType === 'TRAP';
                const canPlace = (!isPath || canPlaceOnPath) && !isOccupied && gameState.energy >= TOWER_TYPES[gameState.selectedTower].cost;
                if (!previewTile) {
                    const previewGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 12, CONFIG.TILE_SIZE - 2);
                    const previewMat = new THREE.MeshLambertMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.7 });
                    previewTile = new THREE.Mesh(previewGeo, previewMat);
                    scene.add(previewTile);
                } else {
                    previewTile.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                previewTile.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 6, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                const range = towerDef.range * CONFIG.TILE_SIZE;
                if (!rangeCircle) {
                    const ringGeo = new THREE.RingGeometry(range - 1, range, 64);
                    ringGeo.rotateX(-Math.PI / 2);
                    const ringMat = new THREE.MeshBasicMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
                    rangeCircle = new THREE.Mesh(ringGeo, ringMat);
                    scene.add(rangeCircle);
                } else {
                    rangeCircle.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                rangeCircle.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 1, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
            });
            document.getElementById('game-container').addEventListener('mouseleave', () => {
                if (previewTile) { scene.remove(previewTile); previewTile = null; }
                if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
            });
            document.getElementById('game-container').addEventListener('click', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) return;
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) return;
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) return;
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const canPlaceOnPath = gameState.selectedTower === 'CANNON' || gameState.selectedTower === 'TRAP';
                if (isPath && !canPlaceOnPath) return;
                if (gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ)) return;
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                if (gameState.energy < towerDef.cost) { showEnergyPopup(e.clientX, e.clientY, -50); return; }
                gameState.energy -= towerDef.cost;
                const tower = createTower(gridX, gridZ, gameState.selectedTower);
                if (tower && tower.mesh) playBuildAnimation(tower.mesh);
                updateUI();
            });
        }

        function createTower(gridX, gridZ, typeKey) {
            const meshGroup = new THREE.Group();
            let barrel = null;
            let head = null;
            const voxel = (sx, sy, sz, px, py, pz, mat) => {
                const geo = new THREE.BoxGeometry(sx, sy, sz);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(px, py, pz);
                mesh.castShadow = true;
                meshGroup.add(mesh);
                return mesh;
            };
            if (typeKey === 'BASIC') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.6, metalness: 0.15 });
                const topMat = new THREE.MeshStandardMaterial({ color: 0x718096, roughness: 0.5, metalness: 0.2 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.4, metalness: 0.3 });
                const accentMat = new THREE.MeshStandardMaterial({ color: 0x5a6578, roughness: 0.5, metalness: 0.25 });
                voxel(30, 3, 30, 0, 1.5, 0, baseMat);
                voxel(28, 4, 28, 0, 5, 0, baseMat);
                voxel(24, 4, 24, 0, 9, 0, baseMat);
                voxel(20, 4, 20, 0, 13, 0, topMat);
                voxel(3, 6, 3, -10, 10, -10, accentMat);
                voxel(3, 6, 3, 10, 10, -10, accentMat);
                voxel(3, 6, 3, -10, 10, 10, accentMat);
                voxel(3, 6, 3, 10, 10, 10, accentMat);
                barrel = voxel(4, 4, 18, 12, 13, 0, barrelMat);
                barrel.userData.isBarrel = true;
                voxel(5, 5, 3, 12, 13, 10, accentMat);
                voxel(2, 2, 1, 12, 13, 11.5, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.0 }));
                voxel(3, 1, 6, 12, 11, 4, accentMat);
                const sensorMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.2, metalness: 0.5, emissive: 0x00ff00, emissiveIntensity: 0.4 });
                voxel(2, 2, 1, 0, 15.5, 8, sensorMat);
                voxel(16, 2, 2, 0, 9, 10, accentMat);
                head = barrel;
            } else if (typeKey === 'SNIPER') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x553c9a, roughness: 0.5, metalness: 0.2 });
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x6b46c1, roughness: 0.45, metalness: 0.25 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.3, metalness: 0.4 });
                const scopeMat = new THREE.MeshStandardMaterial({ color: 0xe53e3e, roughness: 0.2, metalness: 0.5, emissive: 0xe53e3e, emissiveIntensity: 0.3 });
                const accentMat = new THREE.MeshStandardMaterial({ color: 0x7c5cbf, roughness: 0.4, metalness: 0.3 });
                voxel(32, 3, 32, 0, 1.5, 0, baseMat);
                voxel(30, 4, 30, 0, 5, 0, baseMat);
                voxel(4, 6, 4, -12, 5, -12, accentMat);
                voxel(4, 6, 4, 12, 5, -12, accentMat);
                voxel(4, 6, 4, 0, 5, 14, accentMat);
                voxel(26, 4, 26, 0, 9, 0, baseMat);
                voxel(20, 5, 20, 0, 13.5, 0, bodyMat);
                voxel(18, 5, 18, 0, 18.5, 0, bodyMat);
                voxel(16, 4, 16, 0, 22.5, 0, bodyMat);
                barrel = voxel(3, 3, 32, 20, 20, 0, barrelMat);
                barrel.userData.isBarrel = true;
                voxel(5, 5, 4, 14, 20, 0, accentMat);
                voxel(2, 6, 2, 18, 16, 16, accentMat);
                voxel(2, 6, 2, 22, 16, 16, accentMat);
                voxel(4, 4, 3, 20, 20, 17.5, accentMat);
                voxel(4, 3, 4, 28, 21, 0, accentMat);
                voxel(5, 5, 8, 28, 23, 0, scopeMat);
                const lensMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.1, metalness: 0.8, emissive: 0xff0000, emissiveIntensity: 0.5 });
                voxel(3, 3, 1, 28, 23, 4.5, lensMat);
                const windSensorMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.2, metalness: 0.5, emissive: 0x00ffff, emissiveIntensity: 0.3 });
                voxel(2, 2, 2, -10, 24, 0, windSensorMat);
                voxel(3, 2, 3, 0, 24.5, 8, accentMat);
                head = barrel;
            } else if (typeKey === 'CANNON') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0xc53030, roughness: 0.6, metalness: 0.15 });
                const topMat = new THREE.MeshStandardMaterial({ color: 0x9b2c2c, roughness: 0.55, metalness: 0.2 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.35, metalness: 0.35 });
                const accentMat = new THREE.MeshStandardMaterial({ color: 0xd44040, roughness: 0.5, metalness: 0.25 });
                voxel(36, 3, 36, 0, 1.5, 0, baseMat);
                voxel(34, 4, 34, 0, 5, 0, baseMat);
                voxel(30, 4, 30, 0, 9, 0, baseMat);
                voxel(2, 2, 2, -15, 5, -15, accentMat);
                voxel(2, 2, 2, 15, 5, -15, accentMat);
                voxel(2, 2, 2, -15, 5, 15, accentMat);
                voxel(2, 2, 2, 15, 5, 15, accentMat);
                voxel(26, 4, 26, 0, 13, 0, topMat);
                voxel(22, 4, 22, 0, 17, 0, topMat);
                voxel(8, 8, 8, 14, 14, 0, accentMat);
                voxel(8, 8, 8, 14, 14, 8, accentMat);
                barrel = voxel(6, 6, 24, 14, 14, 0, barrelMat);
                barrel.userData.isBarrel = true;
                voxel(6, 6, 24, 14, 14, 8, barrelMat);
                voxel(8, 8, 3, 14, 14, 13.5, accentMat);
                voxel(8, 8, 3, 14, 14, 21.5, accentMat);
                voxel(4, 3, 4, 8, 12, 0, accentMat);
                voxel(4, 3, 4, 8, 12, 8, accentMat);
                voxel(6, 5, 6, -10, 10, -10, accentMat);
                voxel(6, 5, 6, -10, 10, 10, accentMat);
                voxel(12, 8, 2, -8, 16, -12, accentMat);
                head = barrel;
            } else if (typeKey === 'SLOW') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x2b6cb0, roughness: 0.5, metalness: 0.1 });
                const crystalMat = new THREE.MeshStandardMaterial({ color: 0x63b3ed, roughness: 0.2, metalness: 0.3, emissive: 0x63b3ed, emissiveIntensity: 0.4 });
                const accentMat = new THREE.MeshStandardMaterial({ color: 0x4299e1, roughness: 0.3, metalness: 0.2 });
                const runeMat = new THREE.MeshStandardMaterial({ color: 0xbee3f8, roughness: 0.1, metalness: 0.5, emissive: 0xbee3f8, emissiveIntensity: 0.6 });
                voxel(28, 3, 28, 0, 1.5, 0, baseMat);
