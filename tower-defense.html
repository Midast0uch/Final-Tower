        function spawnEnemy(type, variant, waveNum, enemyData, assignedPath) {
            const baseStats = {
                basic:     { speed: 0.8, health: 20, damage: 1 },
                fast:      { speed: 1.6, health: 12, damage: 1 },
                tank:      { speed: 0.4, health: 80, damage: 4 },
                sniper:    { speed: 0.5, health: 18, damage: 6 },
                burrowing: { speed: 0.7, health: 30, damage: 2 },
                spawner:   { speed: 0.35, health: 50, damage: 1 },
                boss:      { speed: 0.3, health: 120, damage: 10 },
                stealth:   { speed: 1.4, health: 25, damage: 2 },
                shielded:  { speed: 0.5, health: 120, damage: 3 },
                swarm:     { speed: 1.2, health: 5, damage: 1 },
                splitting: { speed: 0.6, health: 60, damage: 3 },
                elemental_fire:  { speed: 0.7, health: 45, damage: 4 },
                elemental_ice:   { speed: 0.5, health: 50, damage: 3 },
                elemental_poison:{ speed: 0.6, health: 40, damage: 2 },
                siege:     { speed: 0.2, health: 200, damage: 15 },
                healer:    { speed: 0.4, health: 35, damage: 1 },
                elite_basic:{ speed: 0.9, health: 50, damage: 3 },
            };
            const stats = baseStats[type] || baseStats.basic;
            const waveHealthMult = 1 + (waveNum * 0.04);
            const waveSpeedMult = 1 + (waveNum * 0.005);
            const postBossHM = 1 + ((gameState.bossesDefeated || 0) * 0.05);
            const postBossSM = 1 + ((gameState.bossesDefeated || 0) * 0.02);
            let speed = stats.speed * waveSpeedMult * postBossSM;
            let health = Math.floor(stats.health * waveHealthMult * postBossHM);
            let damage = stats.damage + Math.floor(waveNum * 0.3);
            const colors = {
                basic: 0x6B8E23, fast: 0xDAA520, tank: 0x4682B4,
                sniper: 0x9370DB, burrowing: 0x8B4513, spawner: 0xDA70D6, boss: 0x8B0000,
                stealth: 0x2C3E50, shielded: 0x708090, swarm: 0x9ACD32,
                splitting: 0xFF69B4, elemental_fire: 0xFF4500, elemental_ice: 0x00CED1,
                elemental_poison: 0x32CD32, siege: 0x36454F, healer: 0xFFF8DC, elite_basic: 0xB8860B
            };
            const color = colors[type] || colors.basic;
            const sizes = { basic: 1.0, fast: 0.85, tank: 1.2, sniper: 1.0, burrowing: 1.0, spawner: 1.1, boss: 1.5,
                stealth: 0.9, shielded: 1.15, swarm: 0.6, splitting: 1.1,
                elemental_fire: 1.05, elemental_ice: 1.05, elemental_poison: 1.0,
                siege: 1.4, healer: 1.0, elite_basic: 1.1
            };
            const size = sizes[type] || 1.0;
            const path = assignedPath || currentPath || [];
            if (path.length === 0 || !path[0] || path[0].x === undefined) { console.error('No valid path defined!', currentPath); return null; }
            const startPos = path[0];
            const firstWaypoint = path[1] || path[path.length - 1];
            const startX = startPos.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const startZ = startPos.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetX = firstWaypoint.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetZ = firstWaypoint.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const voxelMesh = createVoxelEnemyMesh(type, color);
            const enemy = {
                mesh: voxelMesh, position: new THREE.Vector3(startX, 8, startZ),
                target: new THREE.Vector3(targetX, 8, targetZ), path: path, pathIndex: 0,
                speed: speed, health: health, maxHealth: health, damage: damage,
                variant: variant, id: Math.random(), type: type,
                dodgeChance: type === 'fast' ? 0.15 : (type === 'stealth' ? 0.3 : 0),
                armorReduction: type === 'tank' ? 0.2 : (type === 'shielded' ? 0.4 : (type === 'siege' ? 0.2 : (type === 'elite_basic' ? 0.15 : 0))),
                towerDamageMult: type === 'sniper' ? 2 : (type === 'siege' ? 3 : 1),
                invisible: type === 'stealth' ? true : false,
                invisTimer: type === 'burrowing' ? 0 : 0,
                summonTimer: type === 'boss' ? 0 : 0,
                spawnOnDeath: type === 'spawner' ? 2 : (type === 'splitting' ? 2 : 0),
                splitCount: type === 'splitting' ? 2 : 0,
                healTimer: type === 'healer' ? 0 : 0,
                burnDamage: type === 'elemental_fire' ? 2 : 0,
                freezeSlow: type === 'elemental_ice' ? 0.5 : 0,
                poisonDamage: type === 'elemental_poison' ? 1 : 0,
                hitFlash: 0,
            };
            const hMult = enemyData?.healthMult || 1;
            const sMult = enemyData?.speedMult || 1;
            enemy.health = Math.floor(enemy.health * hMult);
            enemy.maxHealth = enemy.health;
            enemy.speed = enemy.speed * sMult;
            enemy.mesh.position.copy(enemy.position);
            enemy.mesh.scale.setScalar(size);
            scene.add(enemy.mesh);
            enemy.mesh.scale.set(0, 0, 0);
            animateSpawn(enemy.mesh);
            const glowGeo = new THREE.SphereGeometry(12 * size, 8, 8);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15 + Math.random() * 0.1 });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.position.copy(enemy.position);
            glowMesh.userData = { isEnemyGlow: true, phase: Math.random() * Math.PI * 2, baseOpacity: 0.15 };
            scene.add(glowMesh);
            enemy.glowMesh = glowMesh;
            const healthBarGeo = new THREE.PlaneGeometry(16, 3);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(healthBarGeo, healthBarMat);
            healthBar.position.set(0, 22, 0);
            enemy.mesh.add(healthBar);
            enemy.healthBar = healthBar;
            return enemy;
        }

        function animateSpawn(mesh) {
            let scale = 0;
            const spawnInterval = setInterval(() => {
                scale += 0.1;
                mesh.scale.set(scale, scale, scale);
                if (scale >= 1) { mesh.scale.set(1, 1, 1); clearInterval(spawnInterval); }
            }, 30);
        }

        function updateTowerHealthBars() {
            gameState.towers.forEach(tower => {
                if (!tower.healthBar || !tower.healthBarBg) return;
                if (tower.health >= tower.maxHealth) {
                    tower.healthBar.visible = false;
                    tower.healthBarBg.visible = false;
                    return;
                }
                tower.healthBar.visible = true;
                tower.healthBarBg.visible = true;
                const healthPercent = Math.max(0, tower.health / tower.maxHealth);
                tower.healthBar.scale.x = healthPercent;
                tower.healthBar.position.x = -(12 * (1 - healthPercent));
                if (healthPercent > 0.5) tower.healthBar.material.color.setHex(0x30d158);
                else if (healthPercent > 0.25) tower.healthBar.material.color.setHex(0xffd43b);
                else tower.healthBar.material.color.setHex(0xff6b6b);
            });
        }

        function createAOEIndicator(x, z, radiusTiles, color) {
            const worldRadius = radiusTiles * CONFIG.TILE_SIZE * 0.45;
            const ringGeo = new THREE.RingGeometry(worldRadius - 1, worldRadius, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.8, z);
            scene.add(ring);
            const glowGeo = new THREE.RingGeometry(0, worldRadius, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.rotation.x = -Math.PI / 2;
            glow.position.set(x, 0.6, z);
            scene.add(glow);
            let elapsed = 0;
            const duration = 500;
            const startTime = Date.now();
            const fadeInterval = setInterval(() => {
                elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                ring.material.opacity = 0.7 * (1 - t);
                glow.material.opacity = 0.15 * (1 - t);
                ring.scale.setScalar(1 + t * 0.15);
                glow.scale.setScalar(1 + t * 0.15);
                if (t >= 1) {
                    clearInterval(fadeInterval);
                    if (ring.parent) scene.remove(ring);
                    if (glow.parent) scene.remove(glow);
                    ringGeo.dispose(); ringMat.dispose();
                    glowGeo.dispose(); glowMat.dispose();
                }
            }, 16);
        }

        function updateTerrain(delta) {
            const time = Date.now() * 0.001;
            scene.traverse(obj => {
                if (obj.userData && obj.userData.isWater) {
                    const d = obj.userData;
                    obj.material.opacity = d.baseOpacity + Math.sin(time * 2 + (d.phase || 0)) * 0.15;
                }
                if (obj.userData && obj.userData.isRipple) {
                    const t = Date.now() * 0.002 + obj.userData.phase;
                    obj.material.opacity = 0.2 + Math.sin(t) * 0.15;
                    obj.scale.setScalar(1 + Math.sin(t) * 0.1);
                }
                if (obj.userData && obj.userData.isSpore) {
                    const t = Date.now() * 0.004 + obj.userData.phase;
                    obj.material.opacity = 0.3 + Math.sin(t) * 0.3;
                    obj.position.y += Math.sin(t) * 0.02;
                }
                if (obj.userData && obj.userData.isPuddle) {
                    const t = Date.now() * 0.003 + obj.userData.phase;
                    obj.material.opacity = 0.5 + Math.sin(t) * 0.15;
                }
            });
            // Animate enemy glows
            gameState.enemies.forEach(enemy => {
                if (enemy.glowMesh && enemy.glowMesh.userData.isEnemyGlow) {
                    const t = Date.now() * 0.003 + enemy.glowMesh.userData.phase;
                    enemy.glowMesh.material.opacity = enemy.glowMesh.userData.baseOpacity + Math.sin(t) * 0.08;
                    const pulseScale = 1 + Math.sin(t) * 0.1;
                    enemy.glowMesh.scale.setScalar(pulseScale);
                }
            });
            pathSegments.forEach((segment, i) => {
                if (segment.mesh) { segment.mesh.position.y += Math.sin(time + i * 0.5) * 0.02; }
            });
            
            debrisParticles = debrisParticles.filter(p => {
                if (!p.mesh || !p.mesh.parent) return false;
                if (p.velocity && p.life !== undefined) {
                    p.mesh.position.add(p.velocity.clone().multiplyScalar(0.016));
                    p.velocity.y -= 0.1;
                    p.life--;
                    p.mesh.material.opacity = Math.max(0, p.life / 50);
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        disposeMesh(p.mesh);
                        return false;
                    }
                    return true;
                }
                if (p.x !== undefined) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.z += p.vz;
                    p.vy -= 0.15;
                    p.life--;
                    if (p.mesh) {
                        p.mesh.position.set(p.x, p.y, p.z);
                        p.mesh.material.opacity = Math.max(0, p.life / 80);
                    }
                    if (p.life <= 0) {
                        if (p.mesh && p.mesh.parent) scene.remove(p.mesh);
                        disposeMesh(p.mesh);
                        return false;
                    }
                    return true;
                }
                return false;
            });
            
            ambientParticles.forEach((p, i) => {
                if (p.mesh && p.mesh.parent) {
                    const phase = p.phase || 0;
                    p.mesh.position.y += Math.sin(time * 2 + phase) * 0.15;
                    p.mesh.position.x += Math.cos(time * 0.5 + phase) * 0.08;
                    p.mesh.position.z += Math.sin(time * 0.3 + phase) * 0.05;
                    p.mesh.material.opacity = 0.3 + Math.sin(time * 3 + phase) * 0.3;
                    const maxX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
                    const maxZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
                    if (p.mesh.position.y > 40) p.mesh.position.y = 5;
                    if (p.mesh.position.x > maxX) p.mesh.position.x = 0;
                    if (p.mesh.position.z > maxZ) p.mesh.position.z = 0;
                    if (p.mesh.position.x < 0) p.mesh.position.x = maxX;
                    if (p.mesh.position.z < 0) p.mesh.position.z = maxZ;
                }
            });
        }

        function createAmbientParticles() {
            const particleGeo = new THREE.SphereGeometry(1, 6, 6);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0xffff44, transparent: true, opacity: 0.6 });
            for (let i = 0; i < 40; i++) {
                const particle = new THREE.Mesh(particleGeo, particleMat.clone());
                particle.position.set(Math.random() * CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE, Math.random() * 30 + 8, Math.random() * CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE);
                particle.material.opacity = 0.3 + Math.random() * 0.4;
                particle.material.color.setHex(Math.random() > 0.5 ? 0xffff44 : 0x88ff88);
                scene.add(particle);
                ambientParticles.push({ mesh: particle, speed: 0.3 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2 });
            }
        }

        function updateUI() {
            // Battery cells
            const batteryVisual = document.getElementById('battery-visual');
            if (batteryVisual) {
                const totalCells = 10;
                const filledCells = Math.round((gameState.energy / CONFIG.MAX_ENERGY) * totalCells);
                let cellsHTML = '';
                for (let i = 0; i < totalCells; i++) {
                    let cellClass = 'battery-cell';
                    if (i < filledCells) {
                        if (filledCells <= 2) cellClass += ' low';
                        else if (filledCells <= 4) cellClass += ' medium';
                        else cellClass += ' filled';
                    }
                    cellsHTML += `<div class="${cellClass}"></div>`;
                }
                cellsHTML += '<div class="battery-cap"></div>';
                batteryVisual.innerHTML = cellsHTML;
            }
            const energyVal = document.getElementById('energy-val');
            if (energyVal) energyVal.textContent = Math.floor(gameState.energy);
            const livesContainer = document.getElementById('lives-display');
            if (livesContainer) {
                const lives = Math.max(0, Math.min(gameState.lives, CONFIG.BASE_LIVES));
                let heartsHTML = '';
                for (let i = 0; i < lives; i++) {
                    heartsHTML += '<span class="heart">❤</span>';
                }
                livesContainer.innerHTML = heartsHTML;
            }
            const waveInfo = document.getElementById('wave-info');
            if (waveInfo) {
                waveInfo.textContent = gameState.wave;
            }
            
            // Boss progress dots
            const bossDots = document.getElementById('boss-dots');
            if (bossDots) {
                const cycle = ((gameState.wave - 1) % 5) + 1;
                let dotsHTML = '';
                for (let i = 1; i <= 5; i++) {
                    let cls = 'boss-dot';
                    if (i < cycle) cls += ' done';
                    else if (i === cycle && gameState.wave % 5 === 0) cls += ' active';
                    dotsHTML += `<div class="${cls}"></div>`;
                }
                bossDots.innerHTML = dotsHTML;
            }
            
            // Kill counter
            const killCount = document.getElementById('kill-count');
            if (killCount) killCount.textContent = gameState.totalKills || 0;
            
            // Wave enemy count during active wave
            const waveEnemyCount = document.getElementById('wave-enemy-count');
            if (waveEnemyCount) {
                if (gameState.waveActive) {
                    const remaining = gameState.enemies.length;
                    waveEnemyCount.textContent = `· ${remaining}`;
                } else {
                    waveEnemyCount.textContent = '';
                }
            }
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.querySelector(`[data-tower="${key}"]`);
                if (!btn) return;
                if (gameState.energy < type.cost) { btn.classList.add('disabled'); }
                else { btn.classList.remove('disabled'); }
            });
        }

        function showEnergyPopup(x, y, amount) {
            const div = document.createElement('div');
            div.className = 'energy-popup';
            div.innerHTML = `+${amount}⚡`;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function createExplosion(x, y, z, scale) {
            const count = 8 + Math.floor(Math.random() * 6);
            for (let i = 0; i < count; i++) {
                const size = 2 + Math.random() * 3 * scale;
                const geo = new THREE.BoxGeometry(size, size, size);
                const colors = [0xff6b6b, 0xffd43b, 0xff8c42, 0xff453a, 0xffa500];
                const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)], transparent: true, opacity: 1 });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.set(x, y, z);
                scene.add(particle);
                debrisParticles.push({
                    mesh: particle,
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 4, 3 + Math.random() * 5, (Math.random() - 0.5) * 4),
                    life: 20 + Math.random() * 15
                });
            }
        }

        function updateEnemies(delta) {
            const time = Date.now() * 0.001;
            const tileSize = CONFIG.TILE_SIZE;
            gameState.enemies = gameState.enemies.filter(enemy => {
                if (!enemy || !enemy.mesh || !enemy.mesh.parent) return false;
                if (enemy.health <= 0 && !enemy.deathProcessed) {
                    enemy.deathProcessed = true;
                    const reward = ENEMY_KILL_REWARDS[enemy.type] || 5;
                    gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + reward);
                    const explosionTypes = ['boss', 'siege', 'elemental_fire'];
                    const dissolveTypes = ['stealth', 'splitting'];
                    const collapseTypes = ['tank', 'elite_basic', 'shielded'];
                    if (explosionTypes.includes(enemy.type)) {
                        playDeathExplosion(enemy.position, enemy.type);
                    } else if (dissolveTypes.includes(enemy.type)) {
                        playDeathDissolve(enemy);
                    } else if (collapseTypes.includes(enemy.type)) {
                        playDeathCollapse(enemy);
                    } else {
                        createExplosion(enemy.position.x, enemy.position.y, enemy.position.z, 1.0);
                    }
                    if (enemy.glowMesh && enemy.glowMesh.parent) { scene.remove(enemy.glowMesh); disposeMesh(enemy.glowMesh); }
                    if (!enemy.userData || (!enemy.userData.isDissolving && !enemy.userData.isCollapsing)) {
                        scene.remove(enemy.mesh);
                        disposeMesh(enemy.mesh);
                    }
                    gameState.totalKills = (gameState.totalKills || 0) + 1;
                    if (enemy.spawnOnDeath > 0) {
                        for (let s = 0; s < enemy.spawnOnDeath; s++) {
                            const child = spawnEnemy('basic', 0, gameState.wave, { healthMult: 0.5, speedMult: 1.2 });
                            if (child) {
                                child.position.set(enemy.position.x + (Math.random() - 0.5) * 20, 8, enemy.position.z + (Math.random() - 0.5) * 20);
                                child.mesh.position.copy(child.position);
                            }
                        }
                    }
                    if (!enemy.userData || (!enemy.userData.isDissolving && !enemy.userData.isCollapsing)) {
                        return false;
                    }
                }
                if (enemy.deathProcessed && (!enemy.userData || (!enemy.userData.isDissolving && !enemy.userData.isCollapsing))) {
                    return false;
                }
                // Burrowing / stealth invisibility toggle
                if (enemy.type === 'burrowing' || enemy.type === 'stealth') {
                    enemy.invisTimer += delta * 0.06;
                    if (enemy.invisTimer > 3) {
                        enemy.invisible = !enemy.invisible;
                        enemy.invisTimer = 0;
                        enemy.mesh.visible = !enemy.invisible;
                        if (enemy.glowMesh) enemy.glowMesh.visible = !enemy.invisible;
                    }
                }
                // Healer behavior
                if (enemy.type === 'healer') {
                    enemy.healTimer += delta * 0.06;
                    if (enemy.healTimer > 4) {
                        enemy.healTimer = 0;
                        gameState.enemies.forEach(other => {
                            if (other !== enemy && other.mesh && other.mesh.parent) {
                                const d = enemy.position.distanceTo(other.position);
                                if (d < 40) {
                                    other.health = Math.min(other.maxHealth, other.health + other.maxHealth * 0.08);
                                }
                            }
                        });
                    }
                }
                // Boss summon timer
                if (enemy.summonTimer !== undefined && enemy.type === 'boss') {
                    enemy.summonTimer += delta * 0.06;
                    if (enemy.summonTimer > 5) {
                        enemy.summonTimer = 0;
                        const minion = spawnEnemy('fast', 0, gameState.wave, { healthMult: 0.4, speedMult: 1.0 });
                        if (minion) {
                            minion.position.set(enemy.position.x + (Math.random() - 0.5) * 15, 8, enemy.position.z + (Math.random() - 0.5) * 15);
                            minion.mesh.position.copy(minion.position);
                        }
                    }
                }
                // Hit flash decay
                if (enemy.hitFlash > 0) {
                    enemy.hitFlash -= delta * 0.06;
                    if (enemy.hitFlash <= 0) {
                        enemy.hitFlash = 0;
                        enemy.mesh.traverse(child => {
                            if (child.material && child.material._origEmissive !== undefined) {
                                child.material.emissiveIntensity = child.material._origEmissive;
                                child.material.emissive.setHex(child.material._origEmissiveColor || 0x000000);
                            }
                        });
                    }
                }
                // Dissolve animation update
                if (enemy.userData && enemy.userData.isDissolving) {
                    enemy.userData.dissolveLife -= delta * 0.06;
                    enemy.mesh.traverse(child => {
                        if (child.material && child.material.transparent) {
                            child.material.opacity = Math.max(0, enemy.userData.dissolveLife / 60);
                        }
                    });
                    enemy.mesh.scale.addScalar(0.008);
                    if (enemy.userData.dissolveLife <= 0) {
                        scene.remove(enemy.mesh);
                        disposeMesh(enemy.mesh);
                        return false;
                    }
                }
                // Collapse animation update
                if (enemy.userData && enemy.userData.isCollapsing) {
                    enemy.userData.collapseLife -= delta * 0.06;
                    const t = 1 - (enemy.userData.collapseLife / 40);
                    enemy.mesh.rotation.x = enemy.userData.collapseBaseRot + t * Math.PI / 2;
                    enemy.mesh.scale.y = Math.max(0.1, 1 - t * 0.8);
                    enemy.mesh.scale.x = 1 + t * 0.3;
                    enemy.mesh.scale.z = 1 + t * 0.3;
                    if (enemy.userData.collapseLife <= 0) {
                        scene.remove(enemy.mesh);
                        disposeMesh(enemy.mesh);
                        return false;
                    }
                }
                // Status duration countdown
                if (enemy.statusDuration > 0) {
                    enemy.statusDuration -= delta;
                    if (enemy.statusDuration <= 0) {
                        enemy.status = null;
                        enemy.speedMultiplier = 1;
                        removeStatusVisuals(enemy);
                    }
                }
                // Apply status visuals
                if (enemy.status) {
                    applyStatusVisuals(enemy);
                }
                // Check for tower collision on current tile
                const enemyGridX = Math.floor(enemy.position.x / tileSize);
                const enemyGridZ = Math.floor(enemy.position.z / tileSize);
                for (let t = gameState.towers.length - 1; t >= 0; t--) {
                    const tower = gameState.towers[t];
                    // Trap trigger: enemy steps on armed trap
                    if (tower.typeKey === 'TRAP' && tower.trapArmed && tower.gridX === enemyGridX && tower.gridZ === enemyGridZ) {
                        tower.trapArmed = false;
                        tower.trapCooldown = tower.trapCooldownMax;
                        // Retract spikes
                        const spikes = tower.mesh.userData.trapSpikes;
                        const glow = tower.mesh.userData.glowRing;
                        if (spikes) spikes.forEach(s => { s.scale.y = 0.01; s.position.y = 2; });
                        if (glow) glow.material.opacity = 0.1;
                        // AOE damage to all enemies in radius
                        const trapRange = TOWER_TYPES.TRAP.range * CONFIG.TILE_SIZE;
                        const aoeDmg = TOWER_TYPES.TRAP.damage * (tower.damageMult || 1);
                        const tx = tower.mesh.position.x;
                        const tz = tower.mesh.position.z;
                        gameState.enemies.forEach(e => {
                            if (!e.mesh || !e.mesh.parent) return;
                            const d = Math.sqrt((e.position.x - tx) ** 2 + (e.position.z - tz) ** 2);
                            if (d < trapRange) {
                                e.health -= aoeDmg;
                                e.hitFlash = 1;
                                createImpactEffect(e.position, 'TRAP');
                                const damagePercent = 1 - (e.health / e.maxHealth);
                                applyDamageVisuals(e.mesh, damagePercent);
                            }
                        });
                        // Visual explosion at trap center
                        createExplosion(tx, 4, tz, 1.2);
                        playDeathExplosion(new THREE.Vector3(tx, 4, tz), 'basic');
                        continue; // trap takes no damage from enemy on trigger
                    }
                    if (tower.gridX === enemyGridX && tower.gridZ === enemyGridZ) {
                        const towerDmg = enemy.damage * enemy.towerDamageMult * delta * 0.5;
                        tower.health -= towerDmg;
                        if (tower.health <= 0) {
                            createExplosion(tower.mesh.position.x, tower.mesh.position.y, tower.mesh.position.z, 2);
                            scene.remove(tower.mesh);
                            disposeMesh(tower.mesh);
                            if (tower.rangeIndicator) { scene.remove(tower.rangeIndicator); disposeMesh(tower.rangeIndicator); }
                            gameState.towers.splice(t, 1);
                            gameState.placedTowers = gameState.towers.length > 0;
                            updateStartButton();
                            updateUI();
                        }
                    }
                }
                if (enemy.pathIndex < enemy.path.length) {
                    const target = enemy.path[enemy.pathIndex];
                    const tx = target.x * tileSize + tileSize / 2;
                    const tz = target.y * tileSize + tileSize / 2;
                    const dx = tx - enemy.position.x;
                    const dz = tz - enemy.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 2) {
                        enemy.pathIndex++;
                        if (enemy.pathIndex < enemy.path.length) {
                            const next = enemy.path[enemy.pathIndex];
                            enemy.target.set(next.x * tileSize + tileSize / 2, 8, next.y * tileSize + tileSize / 2);
                        }
                    } else {
                        const moveSpeed = enemy.speed * (enemy.speedMultiplier || 1) * delta * 0.06;
                        enemy.position.x += (dx / dist) * moveSpeed;
                        enemy.position.z += (dz / dist) * moveSpeed;
                        enemy.mesh.position.copy(enemy.position);
                        enemy.mesh.position.y = enemy.position.y + Math.sin(time * 3 + enemy.id * 10) * 0.3;
                        const angle = Math.atan2(dx, dz);
                        enemy.mesh.rotation.y = angle;
                    }
                } else {
                    gameState.lives -= enemy.damage;
                    if (seraph) seraph.onEnemyReachedEnd();
                    if (enemy.glowMesh && enemy.glowMesh.parent) { scene.remove(enemy.glowMesh); disposeMesh(enemy.glowMesh); }
                    scene.remove(enemy.mesh);
                    disposeMesh(enemy.mesh);
                    if (gameState.lives <= 0) { endGame(false); }
                    return false;
                }
                if (enemy.glowMesh && enemy.glowMesh.parent) {
                    enemy.glowMesh.position.copy(enemy.mesh.position);
                }
                return true;
            });
        }

        function updateProjectiles(delta) {
            gameState.projectiles = gameState.projectiles.filter(proj => {
                if (!proj || !proj.mesh || !proj.mesh.parent) return false;
                proj.life = (proj.life || 0) - 1;
                if (proj.life <= 0) {
                    disposeMesh(proj.mesh);
                    if (proj.trails) {
                        proj.trails.forEach(t => { if (t.mesh && t.mesh.parent) { scene.remove(t.mesh); if (t.mesh.material) t.mesh.material.dispose(); } });
                        proj.trails = [];
                    }
                    return false;
                }
                if (proj.target && proj.target.mesh && proj.target.mesh.parent) {
                    const dx = proj.target.position.x - proj.mesh.position.x;
                    const dy = proj.target.position.y - proj.mesh.position.y;
                    const dz = proj.target.position.z - proj.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    if (dist < 3) {
                        if (proj.target.invisible) {
                            disposeMesh(proj.mesh);
                            if (proj.trails) {
                                proj.trails.forEach(t => { if (t.mesh && t.mesh.parent) { scene.remove(t.mesh); if (t.mesh.material) t.mesh.material.dispose(); } });
                                proj.trails = [];
                            }
                            return false;
                        }
                        if (proj.target.dodgeChance > 0 && Math.random() < proj.target.dodgeChance) {
                            proj.target = null;
                            proj.life = 30;
                            return true;
                        }
                        let dmg = proj.damage;
                        if (proj.target.armorReduction > 0) {
                            dmg *= (1 - proj.target.armorReduction);
                        }
                        proj.target.health -= dmg;
                        proj.target.hitFlash = 1;
                        proj.target.mesh.traverse(child => {
                            if (child.material) {
                                if (child.material._origEmissive === undefined) {
                                    child.material._origEmissive = child.material.emissiveIntensity || 0;
                                    child.material._origEmissiveColor = child.material.emissive ? child.material.emissive.getHex() : 0;
                                }
                                child.material.emissiveIntensity = 1;
                                child.material.emissive = child.material.emissive || new THREE.Color();
                                child.material.emissive.setHex(0xffffff);
                            }
                        });
                        createImpactEffect(proj.mesh.position, proj.typeKey);
                        createExplosion(proj.mesh.position.x, proj.mesh.position.y, proj.mesh.position.z, 0.8);
                        const damagePercent = 1 - (proj.target.health / proj.target.maxHealth);
                        applyDamageVisuals(proj.target.mesh, damagePercent);
                        if (proj.typeKey === 'SLOW') {
                            proj.target.status = 'SLOWED';
                            proj.target.statusDuration = 3000;
                            proj.target.speedMultiplier = TOWER_TYPES.SLOW.slowFactor || 0.5;
                        }
                        disposeMesh(proj.mesh);
                        if (proj.trails) {
                            proj.trails.forEach(t => { if (t.mesh && t.mesh.parent) { scene.remove(t.mesh); if (t.mesh.material) t.mesh.material.dispose(); } });
                            proj.trails = [];
                        }
                        return false;
                    }
                    const speed = Math.min(proj.speed || 8, dist);
                    proj.mesh.position.x += (dx / dist) * speed;
                    proj.mesh.position.y += (dy / dist) * speed;
                    proj.mesh.position.z += (dz / dist) * speed;
                } else {
                    disposeMesh(proj.mesh);
                    if (proj.trails) {
                        proj.trails.forEach(t => { if (t.mesh && t.mesh.parent) { scene.remove(t.mesh); if (t.mesh.material) t.mesh.material.dispose(); } });
                        proj.trails = [];
                    }
                    return false;
                }
                return true;
            });
        }

        function updateEnemyHealthBars() {
            gameState.enemies.forEach(enemy => {
                if (!enemy.healthBar) return;
                const pct = Math.max(0, enemy.health / enemy.maxHealth);
                enemy.healthBar.scale.x = pct;
                enemy.healthBar.position.x = -(8 * (1 - pct));
                if (pct > 0.5) enemy.healthBar.material.color.setHex(0x00ff00);
                else if (pct > 0.25) enemy.healthBar.material.color.setHex(0xffd43b);
                else enemy.healthBar.material.color.setHex(0xff6b6b);
            });
        }

        function updateTowerRangeIndicators() {
            gameState.towers.forEach(tower => {
                if (tower.rangeIndicator) {
                    tower.rangeIndicator.visible = tower.showRange || false;
                }
            });
        }

        function showFloatingText(x, y, z, text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = color || '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y || window.innerHeight / 2, z || 0);
            sprite.scale.set(200, 50, 1);
            scene.add(sprite);
            let life = 60;
            const fade = setInterval(() => {
                life--;
                sprite.material.opacity = life / 60;
                sprite.position.y += 0.5;
                if (life <= 0) {
                    clearInterval(fade);
                    scene.remove(sprite);
                    mat.map.dispose();
                    mat.dispose();
                }
            }, 30);
        }

        function showWaveAnnouncement(waveNum) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.font = 'bold 56px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeText(`Wave ${waveNum}`, 256, 64);
            ctx.fillText(`Wave ${waveNum}`, 256, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2, 60, CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2);
            sprite.scale.set(400, 100, 1);
            scene.add(sprite);
            let life = 90;
            const fade = setInterval(() => {
                life--;
                sprite.material.opacity = life / 90;
                if (life <= 0) {
                    clearInterval(fade);
                    scene.remove(sprite);
                    mat.map.dispose();
                    mat.dispose();
                }
            }, 30);
        }

        function updateChaosMeter(delta) {
            const fill = document.getElementById('chaos-fill');
            if (!fill) return;
            const baseGain = 0.1 * delta;
            const currentRate = baseGain;
            let newChaos = (gameState.chaos || 0) + currentRate;
            const percent = Math.min(100, (newChaos / 25) * 100);
            fill.style.width = `${percent}%`;
        }

        function checkWaveCompletion() {
            if (!gameState.waveActive) return;
            if (!currentWave) return;
            const now = Date.now();

            // Multi-path simultaneous spawning
            if (gameState.activePaths && gameState.activePaths.length > 1 && gameState.waveEnemiesByPath) {
                gameState.activePaths.forEach((path, pathIndex) => {
                    const queue = gameState.waveEnemiesByPath[pathIndex];
                    if (!queue || queue.length === 0) return;
                    const lastTime = gameState.pathSpawnTimers[pathIndex];
                    if (now - lastTime >= currentWave.spawnDelay) {
                        const enemyData = queue.shift();
                        const enemy = spawnEnemy(enemyData.type, enemyData.variant, currentWaveNum, enemyData, path);
                        if (enemy) gameState.enemies.push(enemy);
                        gameState.pathSpawnTimers[pathIndex] = now;
                    }
                });
            } else if (waveEnemies && waveEnemies.length > 0 && now - lastSpawnTime >= currentWave.spawnDelay) {
                const enemyData = waveEnemies.shift();
                const enemy = spawnEnemy(enemyData.type, enemyData.variant, currentWaveNum, enemyData);
                if (enemy) { gameState.enemies.push(enemy); }
                lastSpawnTime = now;
            }

            const elapsed = (now - waveStartTime) / 1000;
            const timerExpired = elapsed >= waveDuration;
            const allQueuesEmpty = !gameState.waveEnemiesByPath || gameState.waveEnemiesByPath.every(q => !q || q.length === 0);
            const globalQueueEmpty = !waveEnemies || waveEnemies.length === 0;
            if (timerExpired || ((allQueuesEmpty && globalQueueEmpty) && gameState.enemies.length === 0)) {
                gameState.enemies.forEach(enemy => {
                    if (enemy.glowMesh && enemy.glowMesh.parent) { scene.remove(enemy.glowMesh); disposeMesh(enemy.glowMesh); }
                    if (enemy.mesh && enemy.mesh.parent) { scene.remove(enemy.mesh); }
                    disposeMesh(enemy.mesh);
                });
                gameState.enemies = [];
                waveComplete();
            }
        }

        function waveComplete() {
            gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + 20);
            if (Math.random() < 0.35) { showEventPopup(); }
            gameState.maxWaveReached = Math.max(gameState.maxWaveReached, gameState.wave);
            if (seraph && gameState.lives >= CONFIG.BASE_LIVES * 0.7) {
                seraph.onPlayerWinning();
            }
            if (gameState.wave % 5 === 0) {
                gameState.bossesDefeated = (gameState.bossesDefeated || 0) + 1;
            }
            startPreparationPhase();
            updateUI();
        }

        function showEventPopup() {
            const effects = [
                { type: 'energy', amount: 50, text: '+50 Energy' },
                { type: 'lives', amount: 2, text: '+2 Lives' },
                { type: 'buff', amount: 1.5, text: '+50% Damage (60s)' }
            ];
            const effect = effects[Math.floor(Math.random() * effects.length)];
            const popup = document.getElementById('event-popup');
            if (effect.type === 'buff') { gameState.towers.forEach(t => t.damageMult *= 1.5); }
            popup.innerHTML = `<strong>EVENT!</strong><br>${effect.text}`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        function updatePathTiles() {
            const time = Date.now() * 0.001;
            pathSegments.forEach(seg => {
                if (!seg.animPhase || !seg.mesh || !seg.mesh.material) return;
                const t = (Math.sin(time * 0.8 + seg.animPhase) + 1) / 2;
                const baseR = ((seg.baseColor >> 16) & 0xff) / 255;
                const baseG = ((seg.baseColor >> 8) & 0xff) / 255;
                const baseB = (seg.baseColor & 0xff) / 255;
                const warmR = 0xe0 / 255;
                const warmG = 0xc0 / 255;
                const warmB = 0x90 / 255;
                const r = baseR * (1 - t) + warmR * t;
                const g = baseG * (1 - t) + warmG * t;
                const b = baseB * (1 - t) + warmB * t;
                seg.mesh.material.color.setRGB(r, g, b);
                seg.mesh.material.emissive.setRGB(0, 0, 0);
                seg.mesh.material.emissiveIntensity = 0;
            });
        }

        function scatterDecoyTiles() {
            const decoyColors = [0x3d2b1f, 0x2e1f0f, 0x4a3728, 0x3b2a1a, 0x2c1a0a];
            const tileSize = CONFIG.TILE_SIZE;
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                for (let z = 0; z < CONFIG.MAP_HEIGHT; z++) {
                    if (gameState.pathGrid && gameState.pathGrid[x] && gameState.pathGrid[x][z]) continue;
                    if (gameState.towers.some(t => t.gridX === x && t.gridZ === z)) continue;
                    if (Math.random() > 0.1) continue;
                    const wx = x * tileSize + tileSize / 2;
                    const wz = z * tileSize + tileSize / 2;
                    const color = decoyColors[Math.floor(Math.random() * decoyColors.length)];
                    const geo = new THREE.BoxGeometry(tileSize * 0.5, 1, tileSize * 0.5);
                    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.95, metalness: 0.0 });
                    const tile = new THREE.Mesh(geo, mat);
                    tile.position.set(wx, 7, wz);
                    tile.receiveShadow = true;
                    scene.add(tile);
                    decoyTiles.push(tile);
                }
            }
        }

        let lastEnergyRegen = Date.now();

        function animate() {
            requestAnimationFrame(animate);
            if (gameState.gameOver) return;
            const delta = 16;
            const now = Date.now();
            updatePathTiles();
            if (now - lastEnergyRegen >= 1000) {
                gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + CONFIG.ENERGY_REGEN);
                lastEnergyRegen = now;
                updateUI();
            }
            if (gameState.gamePhase === 'PREPARATION') {
                const elapsed = Math.floor((now - preparationStartTime) / 1000);
                gameState.preparationTimer = Math.max(0, CONFIG.PREPARATION_TIME - elapsed);
                const startBtn = document.getElementById('start-wave-btn');
                startBtn.textContent = gameState.preparationTimer > 0 ? `WAVE ${gameState.wave} - ${gameState.preparationTimer}s` : 'Start Wave';
                if (gameState.preparationTimer <= 0) { startWaveActive(); }
            }
            if (gameState.waveActive && gameState.enemies.length > 0) {
                gameState.towers.forEach((tower, index) => {
                    if (tower.typeKey === 'TRAP') return; // traps don't shoot projectiles
                    let closestEnemy = null;
                    let closestDist = Infinity;
                    const towerPos = tower.mesh.position;
                    const range = TOWER_TYPES[tower.typeKey].range * CONFIG.TILE_SIZE;
                    for (const enemy of gameState.enemies) {
                        if (!enemy.mesh.parent || enemy.invisible) continue;
                        const dist = towerPos.distanceTo(enemy.position);
                        if (dist < range && dist < closestDist) { closestDist = dist; closestEnemy = enemy; }
                    }
                    if (closestEnemy) {
                        const dx = closestEnemy.position.x - towerPos.x;
                        const dz = closestEnemy.position.z - towerPos.z;
                        const targetAngle = Math.atan2(dx, dz);
                        let currentAngle = tower.mesh.rotation.y;
                        let diff = targetAngle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        tower.mesh.rotation.y += diff * 0.15;
                    }
                    const fireRate = tower.fireRate || 1000;
                    if (now - tower.lastFired > fireRate) { createProjectile(index); tower.lastFired = now; }
                });
            }
            // Trap cooldown / rearm
            gameState.towers.forEach(tower => {
                if (tower.typeKey !== 'TRAP' || tower.trapArmed) return;
                tower.trapCooldown -= delta;
                if (tower.trapCooldown <= 0) {
                    tower.trapArmed = true;
                    const spikes = tower.mesh.userData.trapSpikes;
                    const glow = tower.mesh.userData.glowRing;
                    if (spikes) spikes.forEach(s => { s.scale.y = 1; s.position.y = 5; });
                    if (glow) glow.material.opacity = 0.5;
                }
            });
            updateTowerRangeIndicators();
            checkWaveCompletion();
            updateEnemies(delta);
            updateProjectiles(delta);
            createProjectileTrail();
            updateTowerHealthBars();
            updateTerrain(delta);
            // Update death particles
            deathParticles = deathParticles.filter(p => {
                if (!p.mesh || !p.mesh.parent) return false;
                p.mesh.position.x += p.vx * 0.3;
                p.mesh.position.y += p.vy * 0.3;
                p.mesh.position.z += p.vz * 0.3;
                p.vy -= p.gravity || 0.15;
                p.life--;
                p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
                p.mesh.rotation.x += 0.1;
                p.mesh.rotation.y += 0.1;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    disposeMesh(p.mesh);
                    return false;
                }
                return true;
            });
            // Update impact effects
            impactEffects = impactEffects.filter(p => {
                if (!p.mesh || !p.mesh.parent) return false;
                p.mesh.position.x += (p.vx || 0) * 0.3;
                p.mesh.position.y += (p.vy || 0) * 0.3;
                p.mesh.position.z += (p.vz || 0) * 0.3;
                p.life--;
                if (p.grow) {
                    p.mesh.scale.addScalar(0.03);
                }
                p.mesh.material.opacity = Math.max(0, p.life / 50);
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    disposeMesh(p.mesh);
                    return false;
                }
                return true;
            });
            // Update wave markers
            waveMarkers = waveMarkers.filter(m => {
                if (!m.beacon || !m.beacon.parent) return false;
                m.life--;
                const t = m.life / 120;
                m.beacon.material.opacity = 0.6 * t;
                m.ring.material.opacity = 0.4 * t;
                m.ring.scale.setScalar(1 + (1 - t) * 0.5);
                if (m.life <= 0) {
                    scene.remove(m.beacon);
                    scene.remove(m.ring);
                    disposeMesh(m.beacon);
                    disposeMesh(m.ring);
                    return false;
                }
                return true;
            });
            // Update build animations
            buildAnimations = buildAnimations.filter(b => {
                if (!b.mesh || !b.mesh.parent) return false;
                b.progress += b.speed;
                const scale = Math.min(1, b.progress);
                const bounce = scale < 1 ? scale + Math.sin(scale * Math.PI) * 0.15 : 1;
                b.mesh.scale.setScalar(bounce);
                if (b.progress >= 1) {
                    b.mesh.scale.setScalar(1);
                    return false;
                }
                return true;
            });
            updateEnemyHealthBars();
            updateUI();
            if (seraph) seraph.update(now, delta, camera);
            renderer.render(scene, camera);
        }

        let preparationStartTime = Date.now();

        function endGame(victory) {
            gameState.gameOver = true;
            gameState.gamePhase = 'GAME_OVER';
            saveScore(gameState.maxWaveReached);
            updateAchievements();
            saveGameState();
            const screen = document.getElementById('game-over-screen');
            screen.classList.remove('hidden');
            document.getElementById('end-title').textContent = victory ? 'VICTORY!' : 'Game Over';
            document.getElementById('end-reason').textContent = victory ? `You reached wave ${gameState.maxWaveReached}!` : `You reached wave ${gameState.wave}. Better luck next time!`;
            showGameStats();
        }

        const LEADERBOARD_KEY = 'finalTower_leaderboard';
        const MAX_SCORES = 10;

        function getLeaderboard() {
            try { const data = localStorage.getItem(LEADERBOARD_KEY); return data ? JSON.parse(data) : []; }
            catch (e) { return []; }
        }

        function saveScore(wave) {
            if (wave < 1) return;
            const leaderboard = getLeaderboard();
            leaderboard.push({ wave: wave, date: new Date().toISOString(), score: wave * 100 });
            leaderboard.sort((a, b) => b.wave - a.wave);
            const topScores = leaderboard.slice(0, MAX_SCORES);
            try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(topScores)); }
            catch (e) { console.log('Could not save leaderboard'); }
        }

        function showGameStats() {
            const leaderboard = getLeaderboard();
            const statsDiv = document.getElementById('game-stats') || createStatsDiv();
            let statsHTML = '<div id="game-stats" style="text-align:center; margin-top:20px;">';
            statsHTML += '<h3>Your Stats</h3>';
            statsHTML += `<p>Highest Wave: ${gameState.maxWaveReached}</p>`;
            statsHTML += `<p>Total Kills: ${gameState.totalKills || 0}</p>`;
            if (leaderboard.length > 0) {
                statsHTML += '<h3>Leaderboard</h3>';
                leaderboard.slice(0, 5).forEach((entry, i) => {
                    statsHTML += `<p>${i + 1}. Wave ${entry.wave} - ${entry.date.substring(0, 10)}</p>`;
                });
            }
            statsHTML += '</div>';
            const endReason = document.getElementById('end-reason');
            endReason.innerHTML += statsHTML;
        }

        function createStatsDiv() {
            const div = document.createElement('div');
            div.id = 'game-stats';
            return div;
        }

        const ACHIEVEMENTS_KEY = 'finalTower_achievements';
        const ACHIEVEMENTS = {
            MOLE_MASHER: { id: 'mole_masher', name: 'Mole Masher', desc: 'Kill 100 enemies', target: 100, reward: 50 },
            SURVIVALIST: { id: 'survivalist', name: 'Survivalist', desc: 'Reach wave 20', target: 20, reward: 100 },
            PATHMASTER: { id: 'pathmaster', name: 'Pathmaster', desc: 'Survive 5 path changes', target: 5, reward: 75 },
            BOSS_BASHER: { id: 'boss_basher', name: 'Boss Basher', desc: 'Defeat 10 bosses', target: 10, reward: 100 },
            ENDLESS_DEFENDER: { id: 'endless_defender', name: 'Endless Defender', desc: 'Reach wave 50', target: 50, reward: 200 }
        };

        function getAchievements() {
            try { const data = localStorage.getItem(ACHIEVEMENTS_KEY); return data ? JSON.parse(data) : {}; }
            catch (e) { return {}; }
        }

        function saveAchievements(achievements) {
            try { localStorage.setItem(ACHIEVEMENTS_KEY, JSON.stringify(achievements)); }
            catch (e) { console.log('Could not save achievements'); }
        }

        function unlockAchievement(id) {
            const achievements = getAchievements();
            if (!achievements[id]) {
                achievements[id] = { unlocked: true, date: new Date().toISOString() };
                saveAchievements(achievements);
                const achievement = ACHIEVEMENTS[id];
                if (achievement) {
                    gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + achievement.reward);
                    showFloatingText(window.innerWidth / 2, window.innerHeight / 2, 0, `🏆 ${achievement.name}! +${achievement.reward}⚡`, '#ffd700');
                }
            }
        }

        function updateAchievements() {
            const kills = gameState.totalKills || 0;
            const wave = gameState.maxWaveReached;
            const pathChanges = gameState.pathChanges || 0;
            const bossesDefeated = gameState.bossesDefeated || 0;
            if (kills >= 100) unlockAchievement('MOLE_MASHER');
            if (wave >= 20) unlockAchievement('SURVIVALIST');
            if (pathChanges >= 5) unlockAchievement('PATHMASTER');
            if (bossesDefeated >= 10) unlockAchievement('BOSS_BASHER');
            if (wave >= 50) unlockAchievement('ENDLESS_DEFENDER');
        }

        const SAVE_KEY = 'finalTower_save';

        function saveGameState() {
            const saveData = {
                wave: gameState.wave, maxWaveReached: gameState.maxWaveReached,
                energy: gameState.energy, lives: gameState.lives,
                towers: gameState.towers.map(t => ({ typeKey: t.typeKey, gridX: t.gridX, gridY: t.gridY, damageMult: t.damageMult })),
                totalKills: gameState.totalKills || 0, pathChanges: gameState.pathChanges || 0,
                bossesDefeated: gameState.bossesDefeated || 0, savedAt: new Date().toISOString()
            };
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); }
            catch (e) { console.log('Could not save game'); }
        }

        function loadGameState() {
            try {
                const data = localStorage.getItem(SAVE_KEY);
                if (data) {
                    const saveData = JSON.parse(data);
                    gameState.wave = saveData.wave || 1;
                    gameState.maxWaveReached = saveData.maxWaveReached || 0;
                    gameState.energy = saveData.energy || CONFIG.BASE_ENERGY;
                    gameState.lives = saveData.lives || CONFIG.BASE_LIVES;
                    gameState.totalKills = saveData.totalKills || 0;
                    gameState.pathChanges = saveData.pathChanges || 0;
                    gameState.bossesDefeated = saveData.bossesDefeated || 0;
                    return true;
                }
            } catch (e) { console.log('Could not load game'); }
            return false;
        }

        function hasSavedGame() {
            try { return localStorage.getItem(SAVE_KEY) !== null; }
            catch (e) { return false; }
        }

        let waveStartTime = 0;
        let waveDuration = 0;
        let currentWave = null;
        let waveEnemies = [];
        let lastSpawnTime = 0;
        let currentPathIndex = 0;

        function createProjectile(towerIndex) {
            const tower = gameState.towers[towerIndex];
            if (!tower || !tower.mesh) return;
            let closestEnemy = null;
            let closestDist = Infinity;
            const towerPos = tower.mesh.position;
            const range = TOWER_TYPES[tower.typeKey].range * CONFIG.TILE_SIZE;
            for (const enemy of gameState.enemies) {
                if (!enemy.mesh || !enemy.mesh.parent || enemy.invisible) continue;
                const dist = towerPos.distanceTo(enemy.position);
                if (dist < range && dist < closestDist) { closestDist = dist; closestEnemy = enemy; }
            }
            if (!closestEnemy) return;
            const projColor = TOWER_TYPES[tower.typeKey].color;
            const projSize = tower.typeKey === 'CANNON' ? 8 : tower.typeKey === 'SNIPER' ? 5 : 6;
            const geo = new THREE.BoxGeometry(projSize, projSize, projSize * 2);
            const mat = new THREE.MeshBasicMaterial({ color: projColor });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(towerPos);
            mesh.position.y += 12;
            scene.add(mesh);
            const proj = {
                mesh: mesh,
                target: closestEnemy,
                damage: TOWER_TYPES[tower.typeKey].damage * (tower.damageMult || 1),
                speed: tower.typeKey === 'SNIPER' ? 12 : tower.typeKey === 'CANNON' ? 6 : 8,
                life: 120,
                typeKey: tower.typeKey,
                trails: []
            };
            if (tower.typeKey === 'CANNON') {
                proj.aoe = TOWER_TYPES.CANNON.area || 3;
            }
            gameState.projectiles.push(proj);
        }

        function createProjectileTrail() {
            if (gameState.projectiles.length === 0) return;
            gameState.projectiles.forEach(proj => {
                if (!proj.mesh || !proj.mesh.parent) return;
                if (!proj.trails) proj.trails = [];
                const trailSize = proj.typeKey === 'CANNON' ? 3 : 2;
                const trailMesh = new THREE.Mesh(TRAIL_GEOMETRY, getTrailMaterial(proj.typeKey));
                trailMesh.scale.setScalar(trailSize);
                trailMesh.position.copy(proj.mesh.position);
                scene.add(trailMesh);
                proj.trails.push({ mesh: trailMesh, life: 8 });
            });
            gameState.projectiles.forEach(proj => {
                if (!proj.trails) return;
                proj.trails = proj.trails.filter(t => {
                    if (!t.mesh || !t.mesh.parent) return false;
                    t.life--;
                    t.mesh.material.opacity = Math.max(0, t.life / 8 * 0.5);
                    t.mesh.scale.multiplyScalar(0.92);
                    if (t.life <= 0) {
                        scene.remove(t.mesh);
                        if (t.mesh.material) t.mesh.material.dispose();
                        return false;
                    }
                    return true;
                });
            });
        }

        // Error trapping
        window.addEventListener('error', (e) => {
            console.error('CAUGHT ERROR:', e.message, 'at', e.filename + ':' + e.lineno);
            if (e.error && e.error.stack) console.error('Stack:', e.error.stack);
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('UNHANDLED PROMISE:', e.reason);
        });

        try {
            init();
            console.log('Starting fresh - wave 1');
        } catch (e) {
            console.error('INIT FAILED:', e.message, 'at line', e.lineNumber);
            console.error(e.stack);
        }
    </script>
</body>
