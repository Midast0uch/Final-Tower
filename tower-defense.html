<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL TOWER</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
        if (typeof THREE === 'undefined') {
            console.error('Three.js failed to load from jsdelivr, trying cdnjs...');
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            s.onerror = function() { console.error('ALL Three.js CDNs failed!'); };
            document.head.appendChild(s);
        } else {
            console.log('Three.js loaded successfully, version:', THREE.REVISION);
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #000;
            overflow: hidden;
            color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 14px;
            padding: 10px 14px;
            pointer-events: auto;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        /* === Minimalist HUD Bar === */
        .hud-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0;
            z-index: 100;
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 12px;
            padding: 5px 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            min-width: 400px;
            max-width: 90vw;
        }
        .hud-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            white-space: nowrap;
        }
        .hud-stat:first-child { padding-left: 4px; }
        .hud-stat:last-child { padding-right: 4px; }
        .hud-icon {
            font-size: 14px;
            line-height: 1;
        }
        .hud-value {
            font-size: 14px;
            font-weight: 600;
            color: #f5f5f7;
            font-variant-numeric: tabular-nums;
        }
        .hud-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .boss-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .boss-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transition: background 0.3s ease;
        }
        .boss-dot.active {
            background: #ff453a;
            box-shadow: 0 0 4px rgba(255, 69, 58, 0.5);
        }
        .boss-dot.done {
            background: #30d158;
        }
        .hud-timer {
            color: #ffd60a;
            font-size: 11px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .kill-counter {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .kill-counter .hud-icon { font-size: 12px; }
        .kill-counter .hud-value { font-size: 12px; color: rgba(245,245,247,0.7); }
        
        /* Event Ticker */
        .event-ticker {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .ticker-item {
            background: rgba(20, 20, 20, 0.55);
            backdrop-filter: saturate(180%) blur(10px);
            -webkit-backdrop-filter: saturate(180%) blur(10px);
            color: rgba(245, 245, 247, 0.8);
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 6px;
            animation: tickerFade 2.5s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes tickerFade {
            0% { opacity: 0; transform: translateY(8px); }
            10% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-4px); }
        }
        .tower-icon-svg, .tower-btn canvas {
            width: 36px;
            height: 36px;
            margin-bottom: 1px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .battery-visual {
            display: flex;
            align-items: center;
            gap: 2px;
            position: relative;
        }
        .battery-cell {
            width: 5px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .battery-cell.filled {
            background: #30d158;
            box-shadow: 0 0 4px rgba(48, 209, 88, 0.4);
        }
        .battery-cell.medium {
            background: #ffd60a;
            box-shadow: 0 0 4px rgba(255, 214, 10, 0.4);
        }
        .battery-cell.low {
            background: #ff453a;
            box-shadow: 0 0 4px rgba(255, 69, 58, 0.4);
            animation: cellPulse 0.8s ease-in-out infinite;
        }
        @keyframes cellPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .battery-cap {
            width: 3px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0 1px 1px 0;
            margin-left: 1px;
        }
        .battery-label {
            font-size: 13px;
            font-weight: 600;
            color: #f5f5f7;
            min-width: 24px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .battery-icon {
            font-size: 14px;
            opacity: 0.8;
        }
        .lives-container {
            display: flex;
            gap: 1px;
            flex-wrap: nowrap;
            align-items: center;
        }
        .heart {
            font-size: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            filter: none;
            color: #ff453a;
        }
        .heart.pulse {
            animation: heartPulse 0.5s ease-out;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .wave-progress {
            margin-top: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            height: 3px;
            overflow: hidden;
        }
        .wave-progress-fill {
            height: 100%;
            background: #30d158;
            transition: width 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            border-radius: 2px;
        }
        .tower-dock {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
            z-index: 100;
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 16px;
            padding: 8px 12px;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s ease;
        }
        .tower-btn {
            width: 56px; height: 62px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .tower-btn:hover { 
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .tower-btn.selected { 
            background: rgba(48, 209, 88, 0.2);
            border-color: rgba(48, 209, 88, 0.5);
            box-shadow: 0 0 20px rgba(48, 209, 88, 0.3);
        }
        .tower-btn.disabled { 
            opacity: 0.3; 
            cursor: not-allowed;
        }
        .tower-btn.disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .tower-btn .tower-icon { 
            font-size: 18px; 
            margin-bottom: 1px;
        }
        .tower-btn .tower-cost { 
            font-size: 8px; 
            font-weight: 600; 
            color: #ffd60a;
        }
        .tower-btn .tower-name,
        .tower-btn .tower-stats { display: none; }
        .wave-action-btn {
            padding: 8px 18px;
            font-size: 12px;
            font-weight: 600;
            background: #30d158;
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .wave-action-btn:hover {
            background: #34d65e;
            transform: scale(1.04);
        }
        .wave-action-btn:active {
            transform: scale(0.97);
        }
        .event-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            color: #f5f5f7;
            padding: 20px 36px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            display: none;
            z-index: 200;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }
        .event-popup.show { 
            display: block;
            animation: popupPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popupPop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .screen-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #login-screen { 
            background: linear-gradient(180deg, #000 0%, #1a1a2e 100%); 
            z-index: 1000; 
        }
        #main-menu { 
            background: rgba(0, 0, 0, 0.88); 
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 1100; 
        }
        .overlay-title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #f5f5f7;
            margin-bottom: 8px;
        }
        .overlay-subtitle {
            font-size: 17px;
            font-weight: 400;
            color: rgba(245, 245, 247, 0.6);
            margin-bottom: 32px;
        }
        .overlay-input {
            padding: 14px 20px;
            font-size: 17px;
            font-family: inherit;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            width: 280px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .overlay-input:focus {
            border-color: #0a84ff;
            background: rgba(255, 255, 255, 0.12);
        }
        .overlay-input::placeholder {
            color: rgba(245, 245, 247, 0.4);
        }
        .btn-primary {
            padding: 14px 40px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .btn-primary:hover { background: #409cff; transform: scale(1.03); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-success {
            padding: 16px 48px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #30d158;
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .btn-success:hover { background: #34d65e; transform: scale(1.03); }
        .btn-success:active { transform: scale(0.97); }
        .btn-secondary {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.14); }
        .game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
        }
        .game-over.hidden { display: none !important; }
        .hidden { display: none !important; }
        .energy-popup {
            position: absolute;
            color: #ffd60a;
            font-size: 15px;
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-40px); }
        }
        .camera-hint {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            color: rgba(245, 245, 247, 0.7);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            z-index: 90;
            pointer-events: none;
            animation: hintFade 4s ease-in-out forwards;
        }
        @keyframes hintFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes wavePopIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-restart {
            padding: 14px 36px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #ff453a;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .btn-restart:hover { background: #ff6961; transform: scale(1.03); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="login-screen" class="screen-overlay">
            <div class="overlay-title">FINAL TOWER</div>
            <div class="overlay-subtitle">Endless strategy. Defend your tower.</div>
            <input type="text" id="username-input" class="overlay-input" placeholder="Enter your name">
            <button id="login-btn" class="btn-primary">Continue</button>
        </div>
        <div id="main-menu" class="screen-overlay hidden">
            <div class="overlay-title">FINAL TOWER</div>
            <p id="welcome-text" class="overlay-subtitle"></p>
            <button id="play-btn" class="btn-success">Play</button>
            <div style="display:flex; gap:10px; margin-top:12px;">
                <button id="leaderboard-btn" class="btn-secondary">Leaderboard</button>
                <button id="achievements-btn" class="btn-secondary">Achievements</button>
            </div>
        </div>
        <div id="game-ui" class="hidden">
            <!-- Minimalist HUD Bar -->
            <div class="hud-bar">
                <!-- Energy -->
                <div class="hud-stat">
                    <span class="hud-icon">⚡</span>
                    <div class="battery-visual" id="battery-visual"></div>
                    <span id="energy-val" class="hud-value">80</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Lives -->
                <div class="hud-stat">
                    <span class="hud-icon">❤️</span>
                    <div class="lives-container" id="lives-display"></div>
                </div>
                <div class="hud-divider"></div>
                <!-- Wave -->
                <div class="hud-stat">
                    <span class="hud-icon">🌊</span>
                    <span id="wave-info" class="hud-value" style="font-size:15px; font-weight:700;">1</span>
                    <span id="wave-enemy-count" class="hud-sub"></span>
                </div>
                <div class="hud-divider"></div>
                <!-- Seals -->
                <div class="hud-stat">
                    <span class="hud-icon">🔮</span>
                    <span id="seals-val" class="hud-value">0</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Kill Counter -->
                <div class="hud-stat kill-counter">
                    <span class="hud-icon">💀</span>
                    <span id="kill-count" class="hud-value">0</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Boss Dots -->
                <div class="hud-stat" id="boss-dots-container">
                    <span class="hud-icon">👹</span>
                    <span id="boss-dots" class="boss-dots"></span>
                </div>
            </div>
            <!-- Event Ticker -->
            <div class="event-ticker" id="event-ticker"></div>
            
            <!-- Event Popup -->
            <div id="event-popup" class="event-popup"></div>
            
            <!-- Wave Action Button -->
            <div id="wave-controls" style="position:absolute; top:56px; left:50%; transform:translateX(-50%); z-index:100; pointer-events:auto;">
                <button id="start-wave-btn" class="wave-action-btn">Start Wave</button>
            </div>
            
            <!-- Bottom — Tower Dock -->
            <div class="tower-dock" id="tower-buttons"></div>
        </div>
        
        <!-- Game Over -->
        <div class="game-over hidden" id="game-over-screen" style="z-index: 1500;">
            <div class="overlay-title" id="end-title" style="color:#ff453a;">Game Over</div>
            <p id="end-reason" class="overlay-subtitle" style="margin-bottom:16px;"></p>
            <button class="btn-restart" onclick="location.reload()">Play Again</button>
        </div>
    </div>
    <script>
        const CONFIG = {
            MAP_WIDTH: 8,
            MAP_HEIGHT: 8,
            TILE_SIZE: 40,
            PATH_COLOR: '#8B4513',
            TERRAIN_COLOR: '#654321',
            BASE_ENERGY: 80,
            BASE_LIVES: 15,
            ENERGY_REGEN: 1,
            MAX_ENERGY: 80,
            PREPARATION_TIME: 45
        };

        function calculateWaveDifficulty(waveNumber) {
            const baseDifficulty = 10;
            const waveFactor = Math.pow(1.15, waveNumber);
            const bossFactor = waveNumber % 5 === 0 ? 2.5 : 1;
            return Math.floor(baseDifficulty * waveFactor * bossFactor);
        }

        function calculateEnemyCount(waveNumber) {
            return Math.min(40, 10 + Math.floor(waveNumber * 1.5));
        }

        function calculatePathLength(wave) {
            return Math.min(30, 10 + Math.floor(wave * 1.2));
        }

        const TOWER_TYPES = {
            BASIC: { name: 'Basic Tower', cost: 20, damage: 5, range: 7, color: '#ff6b6b', iconType: 'basic', fireRate: 800 },
            SNIPER: { name: 'Sniper', cost: 40, damage: 15, range: 18, color: '#4ecdc4', iconType: 'sniper', fireRate: 2000 },
            CANNON: { name: 'Cannon', cost: 60, damage: 8, range: 6, area: 4, color: '#ffe66d', iconType: 'cannon', fireRate: 1500 },
            TRAP: { name: 'Trap', cost: 35, damage: 30, range: 3, oneTime: true, color: '#ff8787', iconType: 'trap', fireRate: 999999 },
            SLOW: { name: 'Slow', cost: 45, damage: 2, range: 8, slowFactor: 0.5, color: '#74c0fc', iconType: 'slow', fireRate: 500 }
        };

        function updateCameraPosition() {
            const centerX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            const centerZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2;
            const baseDist = 500;
            const baseHeight = 350;
            const dist = baseDist * gameState.cameraZoom;
            const height = baseHeight * gameState.cameraZoom;
            const angle = gameState.cameraAngle;
            const tilt = gameState.cameraTilt || 0;
            const tiltFactor = Math.cos(tilt);
            const heightFactor = Math.sin(tilt);
            camera.position.set(
                centerX + Math.sin(angle) * dist * tiltFactor,
                height + heightFactor * 200,
                centerZ + Math.cos(angle) * dist * tiltFactor
            );
            camera.lookAt(centerX, 0, centerZ);
        }

        let gameState = {
            energy: CONFIG.BASE_ENERGY,
            lives: CONFIG.BASE_LIVES,
            wave: 1,
            gamePhase: 'PREPARATION',
            preparationTimer: CONFIG.PREPARATION_TIME,
            towers: [],
            enemies: [],
            projectiles: [],
            particles: [],
            branchTiles: [],
            gameOver: false,
            gameStarted: false,
            selectedTower: null,
            waveActive: false,
            pathGrid: [],
            maxWaveReached: 0,
            totalKills: 0,
            pathChanges: 0,
            bossesDefeated: 0,
            cameraAngle: 0,
            cameraZoom: 1,
            cameraTilt: 0,
        };

        let camera, scene, renderer;
        let clouds = [];
        let ambientParticles = [];
        let pathSegments = [];
        let decoyTiles = [];
        let debrisParticles = [];

        class PathGenerator {
            static createPath(waveNumber) {
                const mapW = CONFIG.MAP_WIDTH;
                const mapH = CONFIG.MAP_HEIGHT;
                
                // More varied path types as waves increase
                const availableTypes = ['SERPENTINE', 'SPIRAL', 'ZIGZAG', 'RIVER', 'SWITCHBACK'];
                if (waveNumber >= 3) availableTypes.push('MAZE');
                if (waveNumber >= 6) availableTypes.push('TENDRIL');
                if (waveNumber >= 10) availableTypes.push('CHAOS');
                
                const pathType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                
                switch(pathType) {
                    case 'SERPENTINE': return this.generateSerpentinePath(mapW, mapH, waveNumber);
                    case 'SPIRAL': return this.generateSpiralPath(mapW, mapH, waveNumber);
                    case 'ZIGZAG': return this.generateZigzagPath(mapW, mapH, waveNumber);
                    case 'RIVER': return this.generateRiverPath(mapW, mapH, waveNumber);
                    case 'SWITCHBACK': return this.generateSwitchbackPath(mapW, mapH, waveNumber);
                    case 'MAZE': return this.generateMazePath(mapW, mapH, waveNumber);
                    case 'TENDRIL': return this.generateTendrilPath(mapW, mapH, waveNumber);
                    case 'CHAOS': return this.generateChaosPath(mapW, mapH, waveNumber);
                    default: return this.generateSerpentinePath(mapW, mapH, waveNumber);
                }
            }
            
            static generateSerpentinePath(mapW, mapH, wave) {
                // Snake path that covers most of the map, going back and forth
                const path = [];
                const direction = wave % 2 === 0 ? 1 : -1;
                let y = direction === 1 ? 0 : mapH - 1;
                
                for (let row = 0; row < mapH; row++) {
                    const currentY = direction === 1 ? row : mapH - 1 - row;
                    if (row % 2 === 0) {
                        for (let x = 0; x < mapW; x++) {
                            path.push({ x, y: currentY });
                        }
                    } else {
                        for (let x = mapW - 1; x >= 0; x--) {
                            path.push({ x, y: currentY });
                        }
                    }
                    if (row < mapH - 1) {
                        const nextY = direction === 1 ? row + 1 : mapH - 2 - row;
                        const lastX = path[path.length - 1].x;
                        path.push({ x: lastX, y: nextY });
                    }
                }
                return path;
            }
            
            static generateSpiralPath(mapW, mapH, wave) {
                // Spiral from edge toward center then out the other side
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(mapH / 2);
                let dx = 1, dy = 0;
                let steps = 0;
                const maxSteps = mapW * mapH;
                
                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (x < 0 || x >= mapW || y < 0 || y >= mapH || visited.has(key)) {
                        // Try to turn
                        const turns = [{ dx: 0, dy: 1 }, { dx: 0, dy: -1 }, { dx: 1, dy: 0 }, { dx: -1, dy: 0 }];
                        let turned = false;
                        for (const t of turns) {
                            const nx = x + t.dx;
                            const ny = y + t.dy;
                            const nkey = `${nx},${ny}`;
                            if (nx >= 0 && nx < mapW && ny >= 0 && ny < mapH && !visited.has(nkey)) {
                                dx = t.dx; dy = t.dy;
                                turned = true;
                                break;
                            }
                        }
                        if (!turned) break;
                        continue;
                    }
                    visited.add(key);
                    path.push({ x, y });
                    x += dx;
                    y += dy;
                    steps++;
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static generateZigzagPath(mapW, mapH, wave) {
                // Sharp zigzag that changes direction frequently
                const path = [];
                let x = 0;
                let y = Math.floor(Math.random() * mapH);
                let dir = Math.random() > 0.5 ? 1 : -1;
                let zigCount = 0;
                const maxZigs = 3 + Math.floor(Math.random() * 4);
                
                while (x < mapW) {
                    path.push({ x, y });
                    if (Math.random() < 0.4 && zigCount < maxZigs) {
                        // Change vertical direction
                        dir *= -1;
                        zigCount++;
                    }
                    const newY = y + dir;
                    if (newY >= 0 && newY < mapH) {
                        y = newY;
                    } else {
                        dir *= -1;
                    }
                    if (Math.random() < 0.7) {
                        x++;
                    }
                }
                // Ensure we reach the right edge
                while (x < mapW) {
                    path.push({ x, y: Math.max(0, Math.min(mapH - 1, y)) });
                    x++;
                }
                return path;
            }
            
            static generateRiverPath(mapW, mapH, wave) {
                // Winding river-like path with gentle curves
                const path = [];
                let x = 0;
                let y = Math.floor(mapH * (0.2 + Math.random() * 0.6));
                let curve = (Math.random() - 0.5) * 2;
                
                while (x < mapW) {
                    path.push({ x, y });
                    // Gradually change curve direction
                    if (Math.random() < 0.15) {
                        curve = (Math.random() - 0.5) * 3;
                    }
                    y += Math.round(curve);
                    y = Math.max(0, Math.min(mapH - 1, y));
                    x++;
                    // Sometimes add extra vertical tiles for width
                    if (Math.random() < 0.2 && y + 1 < mapH) {
                        path.push({ x: x - 1, y: y + 1 });
                    }
                }
                return path;
            }
            
            static generateSwitchbackPath(mapW, mapH, wave) {
                // Goes up one side, across the top/bottom, down the other
                const path = [];
                const side = Math.random() > 0.5 ? 'left' : 'right';
                
                if (side === 'left') {
                    // Go up left edge, across top, down right edge
                    for (let y = mapH - 1; y >= 0; y--) {
                        path.push({ x: 0, y });
                    }
                    for (let x = 1; x < mapW; x++) {
                        path.push({ x, y: 0 });
                    }
                    for (let y = 1; y < mapH; y++) {
                        path.push({ x: mapW - 1, y });
                    }
                } else {
                    // Go up right edge, across bottom, down left edge
                    for (let y = mapH - 1; y >= 0; y--) {
                        path.push({ x: mapW - 1, y });
                    }
                    for (let x = mapW - 2; x >= 0; x--) {
                        path.push({ x, y: mapH - 1 });
                    }
                    for (let y = mapH - 2; y >= 0; y--) {
                        path.push({ x: 0, y });
                    }
                }
                return path;
            }
            
            static generateMazePath(mapW, mapH, wave) {
                // Maze-like path with dead-end feel
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(mapH / 2);
                let steps = 0;
                const maxSteps = mapW * mapH * 0.6;
                
                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (visited.has(key)) break;
                    visited.add(key);
                    path.push({ x, y });
                    
                    const dirs = [];
                    if (x + 1 < mapW && !visited.has(`${x+1},${y}`)) dirs.push({ dx: 1, dy: 0 });
                    if (x - 1 >= 0 && !visited.has(`${x-1},${y}`)) dirs.push({ dx: -1, dy: 0 });
                    if (y + 1 < mapH && !visited.has(`${x},${y+1}`)) dirs.push({ dx: 0, dy: 1 });
                    if (y - 1 >= 0 && !visited.has(`${x},${y-1}`)) dirs.push({ dx: 0, dy: -1 });
                    
                    if (dirs.length === 0) break;
                    
                    // Prefer moving right (toward exit)
                    const rightDir = dirs.find(d => d.dx === 1);
                    if (rightDir && Math.random() < 0.4) {
                        x += rightDir.dx;
                        y += rightDir.dy;
                    } else {
                        const chosen = dirs[Math.floor(Math.random() * dirs.length)];
                        x += chosen.dx;
                        y += chosen.dy;
                    }
                    steps++;
                }
                
                // Ensure path reaches right edge
                if (path.length > 0 && path[path.length - 1].x < mapW - 1) {
                    let lastX = path[path.length - 1].x;
                    let lastY = path[path.length - 1].y;
                    for (let xi = lastX + 1; xi < mapW; xi++) {
                        path.push({ x: xi, y: lastY });
                    }
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static generateTendrilPath(mapW, mapH, wave) {
                // Multiple tendrils reaching toward edges - enemies try to escape
                const path = [];
                let x = 0;
                let y = Math.floor(mapH / 2);
                const edgeBias = Math.random(); // Which edge to favor
                
                while (x < mapW) {
                    path.push({ x, y });
                    
                    const rand = Math.random();
                    if (rand < 0.3) {
                        // Push toward top edge
                        if (y > 0) y--;
                    } else if (rand < 0.6) {
                        // Push toward bottom edge
                        if (y < mapH - 1) y++;
                    } else {
                        // Move forward
                        x++;
                    }
                }
                // Ensure right edge reached
                while (path[path.length - 1].x < mapW - 1) {
                    const last = path[path.length - 1];
                    path.push({ x: last.x + 1, y: last.y });
                }
                return path;
            }
            
            static generateChaosPath(mapW, mapH, wave) {
                // Unpredictable chaotic path - for late game
                const path = [];
                const visited = new Set();
                let x = 0;
                let y = Math.floor(Math.random() * mapH);
                let steps = 0;
                const maxSteps = mapW * mapH * 0.7;
                
                while (steps < maxSteps) {
                    const key = `${x},${y}`;
                    if (visited.has(key)) {
                        // Force movement
                        if (x < mapW - 1) x++;
                        else break;
                        continue;
                    }
                    visited.add(key);
                    path.push({ x, y });
                    
                    // Weighted random: 30% right, 25% up, 25% down, 20% left
                    const rand = Math.random();
                    if (rand < 0.3 && x < mapW - 1) x++;
                    else if (rand < 0.55 && y > 0) y--;
                    else if (rand < 0.8 && y < mapH - 1) y++;
                    else if (rand < 1.0 && x > 0) x--;
                    
                    steps++;
                }
                
                // Ensure exit
                if (path.length > 0) {
                    let last = path[path.length - 1];
                    for (let xi = last.x + 1; xi < mapW; xi++) {
                        path.push({ x: xi, y: last.y });
                    }
                }
                return path.length >= 3 ? path : this.generateSerpentinePath(mapW, mapH, wave);
            }
            
            static validatePath(path) {
                if (!path || path.length < 3) return false;
                if (path[0].x !== 0) return false;
                if (path[path.length - 1].x < CONFIG.MAP_WIDTH - 1) return false;
                for (let i = 1; i < path.length; i++) {
                    const dx = Math.abs(path[i].x - path[i-1].x);
                    const dy = Math.abs(path[i].y - path[i-1].y);
                    if (dx + dy > 1) return false;
                    if (path[i].x < 0 || path[i].x >= CONFIG.MAP_WIDTH) return false;
                    if (path[i].y < 0 || path[i].y >= CONFIG.MAP_HEIGHT) return false;
                }
                return true;
            }
        }

        function generateWaveEnemies(waveNum) {
            const enemyCount = calculateEnemyCount(waveNum);
            const enemies = [];
            const isBossWave = waveNum % 5 === 0;
            
            const difficultyTier = Math.floor(waveNum / 3);
            
            const basicChance = Math.max(0.2, 0.7 - waveNum * 0.02);
            const fastChance = Math.min(0.3, 0.1 + waveNum * 0.01);
            const tankChance = Math.min(0.25, 0.05 + waveNum * 0.015);
            const sniperChance = Math.min(0.15, 0.03 + waveNum * 0.01);
            const burrowChance = Math.min(0.12, waveNum * 0.008);
            const spawnerChance = Math.min(0.08, waveNum >= 8 ? 0.05 : 0);
            
            for (let i = 0; i < enemyCount; i++) {
                const roll = Math.random();
                let type = 'basic';
                
                if (isBossWave && i === Math.floor(enemyCount / 2)) {
                    type = 'boss';
                } else if (roll < spawnerChance && waveNum >= 8) {
                    type = 'spawner';
                } else if (roll < spawnerChance + burrowChance && waveNum >= 6) {
                    type = 'burrowing';
                } else if (roll < spawnerChance + burrowChance + sniperChance && waveNum >= 4) {
                    type = 'sniper';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance) {
                    type = 'tank';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance) {
                    type = 'fast';
                }
                
                const healthMult = 1 + (waveNum * 0.06);
                const speedMult = 1 + (waveNum * 0.01);
                
                enemies.push({
                    type: type,
                    variant: Math.floor(Math.random() * 3),
                    healthMult: healthMult,
                    speedMult: speedMult,
                    waveNum: waveNum
                });
            }
            
            if (isBossWave && !enemies.some(e => e.type === 'boss')) {
                enemies.push({
                    type: 'boss',
                    variant: 0,
                    healthMult: 1 + (waveNum * 0.15),
                    speedMult: 1,
                    waveNum: waveNum
                });
            }
            
            return {
                enemies: enemies,
                spawnDelay: Math.max(400, 1200 - waveNum * 20),
                waveNumber: waveNum
            };
        }

        let currentPath = [];
        const pathOptions = { mainPath: currentPath };

        function selectPathForWave(waveNum) {
            let attempts = 0;
            while (attempts < 10) {
                const path = PathGenerator.createPath(waveNum + attempts);
                if (PathGenerator.validatePath(path)) {
                    currentPath = path;
                    pathOptions.mainPath = path;
                    return path;
                }
                attempts++;
            }
            currentPath = PathGenerator.generateSerpentinePath(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, 1);
            pathOptions.mainPath = currentPath;
            return currentPath;
        }

        function getWaypointAt(index, pathName) {
            const path = pathOptions[pathName];
            if (!path || !path[index]) return null;
            return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                     y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
        }

        function getPathLength(pathName) {
            const path = pathOptions[pathName];
            return path ? path.length : 0;
        }

        function getTowerIconCanvas(typeKey, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            canvas.style.width = '36px';
            canvas.style.height = '36px';
            canvas.style.imageRendering = 'pixelated';
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            const px = (x, y, w, h, c) => {
                ctx.fillStyle = c;
                ctx.fillRect(x, y, w, h);
            };
            switch(typeKey) {
                case 'BASIC':
                    px(12, 14, 8, 12, color);
                    px(14, 6, 4, 10, color);
                    px(14, 4, 4, 4, '#fff');
                    px(15, 5, 2, 2, color);
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    px(15, 2, 2, 2, '#ffd60a');
                    break;
                case 'SNIPER':
                    px(14, 2, 4, 22, color);
                    px(10, 4, 12, 6, color);
                    px(12, 5, 8, 4, '#1a1a2e');
                    px(14, 6, 4, 2, '#4ecdc4');
                    px(15, 5, 2, 4, '#fff');
                    px(13, 6, 6, 2, '#fff');
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    break;
                case 'CANNON':
                    px(8, 14, 16, 12, color);
                    px(10, 10, 12, 6, color);
                    px(12, 16, 8, 6, '#1a1a2e');
                    px(14, 17, 4, 4, '#ffd60a');
                    px(14, 6, 4, 4, '#ff6b6b');
                    px(15, 5, 2, 2, '#ffd60a');
                    px(6, 24, 20, 3, color);
                    px(8, 26, 16, 2, color);
                    break;
                case 'TRAP':
                    px(14, 4, 4, 4, '#ff453a');
                    px(14, 8, 4, 4, color);
                    px(10, 12, 12, 4, color);
                    px(12, 16, 8, 4, color);
                    px(8, 20, 16, 4, color);
                    px(6, 24, 20, 3, color);
                    px(14, 13, 4, 4, '#ffd60a');
                    px(15, 14, 2, 2, '#ff453a');
                    break;
                case 'SLOW':
                    px(14, 4, 4, 4, color);
                    px(12, 8, 8, 4, color);
                    px(10, 12, 12, 4, color);
                    px(8, 16, 16, 4, color);
                    px(10, 20, 12, 4, color);
                    px(12, 24, 8, 3, color);
                    px(14, 14, 4, 4, '#fff');
                    px(15, 15, 2, 2, color);
                    px(8, 8, 2, 2, '#fff');
                    px(22, 10, 2, 2, '#fff');
                    px(10, 22, 2, 2, '#fff');
                    break;
            }
            return canvas;
        }

        function createUI() {
            const container = document.getElementById('tower-buttons');
            if (!container) { console.error('tower-buttons element not found'); return; }
            container.innerHTML = '';
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.createElement('div');
                btn.className = 'tower-btn';
                const iconCanvas = getTowerIconCanvas(key, '#' + new THREE.Color(type.color).getHexString());
                btn.appendChild(iconCanvas);
                const costDiv = document.createElement('div');
                costDiv.className = 'tower-cost';
                costDiv.textContent = `⚡${type.cost}`;
                btn.appendChild(costDiv);
                if (gameState.energy < type.cost) btn.classList.add('disabled');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (gameState.selectedTower === key) {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        gameState.selectedTower = null;
                        renderer.domElement.style.cursor = 'grab';
                    } else {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        gameState.selectedTower = key;
                        renderer.domElement.style.cursor = 'crosshair';
                    }
                });
                btn.setAttribute('data-tower', key);
                container.appendChild(btn);
            });
            const startBtn = document.getElementById('start-wave-btn');
            if (!startBtn) { console.error('start-wave-btn element not found'); return; }
            startBtn.textContent = 'Start Wave';
            startBtn.addEventListener('click', () => {
                if (gameState.gamePhase === 'GAME_OVER') { location.reload(); return; }
                if (!gameState.gameStarted) { startGame(); startBtn.textContent = 'Start Wave'; }
                else if (gameState.gamePhase === 'PREPARATION') { startWaveActive(); }
                else if (gameState.gamePhase === 'WAVE_ACTIVE' && !gameState.waveActive) { startPreparationPhase(); }
            });
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            window.addEventListener('keydown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                const rotationSpeed = 0.15;
                const zoomSpeed = 0.1;
                if (e.key === 'q' || e.key === 'Q' || e.key === 'ArrowLeft') { gameState.cameraAngle -= rotationSpeed; }
                else if (e.key === 'e' || e.key === 'E' || e.key === 'ArrowRight') { gameState.cameraAngle += rotationSpeed; }
                else if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') { gameState.cameraZoom = Math.min(2, gameState.cameraZoom + zoomSpeed); }
                else if (e.key === 'r' || e.key === 'R') { gameState.cameraTilt = Math.max(-0.5, (gameState.cameraTilt || 0) - 0.1); }
                else if (e.key === 'f' || e.key === 'F') { gameState.cameraTilt = Math.min(0.8, (gameState.cameraTilt || 0) + 0.1); }
                updateCameraPosition();
            });
            renderer.domElement.addEventListener('wheel', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                e.preventDefault();
                const zoomSpeed = 0.08;
                if (e.deltaY > 0) { gameState.cameraZoom = Math.min(2.5, gameState.cameraZoom + zoomSpeed); }
                else { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                updateCameraPosition();
            }, { passive: false });
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0, dragStartAngle = 0, dragStartTilt = 0;
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                if (!gameState.selectedTower) {
                    isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragStartAngle = gameState.cameraAngle;
                    dragStartTilt = gameState.cameraTilt || 0;
                    renderer.domElement.style.cursor = 'grabbing';
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                gameState.cameraAngle = dragStartAngle + dx * 0.005;
                gameState.cameraTilt = Math.max(-0.5, Math.min(0.8, dragStartTilt + dy * 0.003));
                updateCameraPosition();
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    renderer.domElement.style.cursor = 'grab';
                }
            });
            let previewTile = null;
            let rangeCircle = null;
            document.getElementById('game-container').addEventListener('mousemove', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const isOccupied = gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ);
                const towerType = gameState.selectedTower;
                const canPlaceOnPath = towerType === 'CANNON' || towerType === 'TRAP';
                const canPlace = (!isPath || canPlaceOnPath) && !isOccupied && gameState.energy >= TOWER_TYPES[gameState.selectedTower].cost;
                if (!previewTile) {
                    const previewGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 12, CONFIG.TILE_SIZE - 2);
                    const previewMat = new THREE.MeshLambertMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.7 });
                    previewTile = new THREE.Mesh(previewGeo, previewMat);
                    scene.add(previewTile);
                } else {
                    previewTile.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                previewTile.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 6, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                const range = towerDef.range * CONFIG.TILE_SIZE;
                if (!rangeCircle) {
                    const ringGeo = new THREE.RingGeometry(range - 1, range, 64);
                    ringGeo.rotateX(-Math.PI / 2);
                    const ringMat = new THREE.MeshBasicMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
                    rangeCircle = new THREE.Mesh(ringGeo, ringMat);
                    scene.add(rangeCircle);
                } else {
                    rangeCircle.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                rangeCircle.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 1, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
            });
            document.getElementById('game-container').addEventListener('mouseleave', () => {
                if (previewTile) { scene.remove(previewTile); previewTile = null; }
                if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
            });
            document.getElementById('game-container').addEventListener('click', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) return;
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) return;
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) return;
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const canPlaceOnPath = gameState.selectedTower === 'CANNON' || gameState.selectedTower === 'TRAP';
                if (isPath && !canPlaceOnPath) return;
                if (gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ)) return;
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                if (gameState.energy < towerDef.cost) { showEnergyPopup(e.clientX, e.clientY, -50); return; }
                gameState.energy -= towerDef.cost;
                createTower(gridX, gridZ, gameState.selectedTower);
                updateUI();
            });
        }

        function createTower(gridX, gridZ, typeKey) {
            const meshGroup = new THREE.Group();
            let barrel = null;
            let head = null;
            const voxel = (sx, sy, sz, px, py, pz, mat) => {
                const geo = new THREE.BoxGeometry(sx, sy, sz);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(px, py, pz);
                mesh.castShadow = true;
                meshGroup.add(mesh);
                return mesh;
            };
            if (typeKey === 'BASIC') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.6, metalness: 0.15 });
                const topMat = new THREE.MeshStandardMaterial({ color: 0x718096, roughness: 0.5, metalness: 0.2 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.4, metalness: 0.3 });
                voxel(28, 4, 28, 0, 2, 0, baseMat);
                voxel(24, 4, 24, 0, 6, 0, baseMat);
                voxel(20, 4, 20, 0, 10, 0, topMat);
                voxel(16, 3, 16, 0, 13.5, 0, topMat);
                barrel = voxel(4, 4, 16, 12, 13, 0, barrelMat);
                head = meshGroup.children[meshGroup.children.length - 2];
            } else if (typeKey === 'SNIPER') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x553c9a, roughness: 0.5, metalness: 0.2 });
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x6b46c1, roughness: 0.45, metalness: 0.25 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.3, metalness: 0.4 });
                const scopeMat = new THREE.MeshStandardMaterial({ color: 0xe53e3e, roughness: 0.2, metalness: 0.5, emissive: 0xe53e3e, emissiveIntensity: 0.3 });
                voxel(30, 4, 30, 0, 2, 0, baseMat);
                voxel(26, 4, 26, 0, 6, 0, baseMat);
                voxel(20, 5, 20, 0, 10.5, 0, bodyMat);
                voxel(18, 5, 18, 0, 15.5, 0, bodyMat);
                voxel(16, 4, 16, 0, 19.5, 0, bodyMat);
                barrel = voxel(3, 3, 28, 18, 18, 0, barrelMat);
                voxel(5, 5, 5, 28, 18, 0, scopeMat);
                head = meshGroup.children[meshGroup.children.length - 3];
            } else if (typeKey === 'CANNON') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0xc53030, roughness: 0.6, metalness: 0.15 });
                const topMat = new THREE.MeshStandardMaterial({ color: 0x9b2c2c, roughness: 0.55, metalness: 0.2 });
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.35, metalness: 0.35 });
                voxel(34, 4, 34, 0, 2, 0, baseMat);
                voxel(30, 4, 30, 0, 6, 0, baseMat);
                voxel(26, 4, 26, 0, 10, 0, topMat);
                voxel(22, 4, 22, 0, 14, 0, topMat);
                barrel = voxel(6, 6, 20, 14, 12, 0, barrelMat);
                voxel(6, 6, 20, 14, 12, 8, barrelMat);
                head = meshGroup.children[meshGroup.children.length - 3];
            } else if (typeKey === 'SLOW') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x2b6cb0, roughness: 0.5, metalness: 0.1 });
                const crystalMat = new THREE.MeshStandardMaterial({ color: 0x63b3ed, roughness: 0.2, metalness: 0.3, emissive: 0x63b3ed, emissiveIntensity: 0.4 });
                voxel(26, 4, 26, 0, 2, 0, baseMat);
                voxel(22, 4, 22, 0, 6, 0, baseMat);
                voxel(18, 4, 18, 0, 10, 0, baseMat);
                voxel(14, 5, 14, 0, 14.5, 0, crystalMat);
                voxel(10, 6, 10, 0, 19.5, 0, crystalMat);
                voxel(6, 4, 6, 0, 24, 0, crystalMat);
                head = meshGroup.children[meshGroup.children.length - 1];
            } else if (typeKey === 'TRAP') {
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x9b2c2c, roughness: 0.7, metalness: 0.1 });
                const spikeMat = new THREE.MeshStandardMaterial({ color: 0xe53e3e, roughness: 0.4, metalness: 0.3 });
                voxel(28, 3, 28, 0, 1.5, 0, baseMat);
                voxel(4, 10, 4, -8, 8, -8, spikeMat);
                voxel(4, 10, 4, 8, 8, -8, spikeMat);
                voxel(4, 10, 4, -8, 8, 8, spikeMat);
                voxel(4, 10, 4, 8, 8, 8, spikeMat);
                voxel(4, 8, 4, 0, 7, 0, spikeMat);
                head = meshGroup.children[meshGroup.children.length - 1];
            }
            const tileCenterX = gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const tileCenterZ = gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            meshGroup.position.set(tileCenterX, 6, tileCenterZ);
            scene.add(meshGroup);
            const range = TOWER_TYPES[typeKey].range * CONFIG.TILE_SIZE;
            const rangeGeo = new THREE.RingGeometry(range - 2, range, 32);
            const rangeMat = new THREE.MeshBasicMaterial({ color: TOWER_TYPES[typeKey].color, transparent: true, opacity: 0, side: THREE.DoubleSide });
            const rangeIndicator = new THREE.Mesh(rangeGeo, rangeMat);
            rangeIndicator.rotation.x = -Math.PI / 2;
            rangeIndicator.position.set(tileCenterX, 0.5, tileCenterZ);
            scene.add(rangeIndicator);
            const healthByType = {
                BASIC: { health: 20 + (gameState.wave * 2) },
                SNIPER: { health: 30 + (gameState.wave * 3) },
                CANNON: { health: 150 + (gameState.wave * 10) },
                SLOW: { health: 40 + (gameState.wave * 4) },
                TRAP: { health: 1 }
            };
            const towerHealth = healthByType[typeKey] || { health: 50 + (gameState.wave * 5) };
            const towerData = {
                mesh: meshGroup, gridX: gridX, gridZ: gridZ, damageMult: 1.0, typeKey: typeKey,
                fireRate: TOWER_TYPES[typeKey].fireRate || 60, lastFired: 0,
                rangeIndicator: rangeIndicator, barrel: barrel, head: head,
                health: towerHealth.health, maxHealth: towerHealth.health
            };
            const healthBarGeo = new THREE.PlaneGeometry(24, 4);
            const healthBarBgMat = new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBarBg = new THREE.Mesh(healthBarGeo, healthBarBgMat);
            healthBarBg.position.set(0, 28, 0);
            healthBarBg.rotation.x = -Math.PI / 6;
            meshGroup.add(healthBarBg);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x30d158, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(new THREE.PlaneGeometry(24, 4), healthBarMat);
            healthBar.position.set(0, 28, 0.1);
            healthBar.rotation.x = -Math.PI / 6;
            meshGroup.add(healthBar);
            towerData.healthBar = healthBar;
            towerData.healthBarBg = healthBarBg;
            healthBar.visible = false;
            healthBarBg.visible = false;
            gameState.towers.push(towerData);
            gameState.placedTowers = true;
            updateStartButton();
            updateUI();
        }

                startBtn.textContent = `START WAVE ${gameState.wave}`;

        let voxelTextSprites = [];

        function createVoxelText3D(text, options) {
            const { x, y, z, color = '#FFD700', size = 1, glowColor = '#FFA500', glowSize = 2 } = options || {};
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 64;
            canvas.width = text.length * fontSize * 0.7;
            canvas.height = fontSize * 1.5;
            ctx.imageSmoothingEnabled = false;
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = glowColor;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            ctx.fillStyle = color;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y, z);
            sprite.scale.set(canvas.width * size * 0.02, canvas.height * size * 0.02, 1);
            scene.add(sprite);
            voxelTextSprites.push(sprite);
            return sprite;
        }

        function clearVoxelText3D() {
            voxelTextSprites.forEach(s => {
                scene.remove(s);
                if (s.material.map) s.material.map.dispose();
                s.material.dispose();
            });
            voxelTextSprites = [];
        }

        function setupLoginScreen() {
            const loginScreen = document.getElementById('login-screen');
            const mainMenu = document.getElementById('main-menu');
            const usernameInput = document.getElementById('username-input');
            const loginBtn = document.getElementById('login-btn');
            const playBtn = document.getElementById('play-btn');
            const leaderboardBtn = document.getElementById('leaderboard-btn');
            const achievementsBtn = document.getElementById('achievements-btn');
            const welcomeText = document.getElementById('welcome-text');

            if (!usernameInput || !loginBtn || !playBtn || !welcomeText) {
                console.warn('Login screen elements not found, skipping setup');
                return;
            }

            const savedUsername = localStorage.getItem('finalTowerUsername');
            if (savedUsername && usernameInput) { usernameInput.value = savedUsername; }
            loginBtn.addEventListener('click', () => {
                const username = usernameInput.value.trim() || 'Player';
                localStorage.setItem('finalTowerUsername', username);
                welcomeText.textContent = 'Welcome, ' + username + '!';
                loginScreen.classList.add('hidden');
                mainMenu.classList.remove('hidden');
            });
            usernameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { loginBtn.click(); }
            });
            playBtn.addEventListener('click', () => {
                mainMenu.classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                document.getElementById('wave-controls').style.display = 'block';
                gameState.gameStarted = true;
                gameState.gamePhase = 'PREPARATION';
                gameState.preparationTimer = CONFIG.PREPARATION_TIME;
                preparationStartTime = Date.now();
                generateNewPath();
                clearPathTiles();
                drawPath(currentPath);
                scatterDecoyTiles();
                createAmbientParticles();
                updateUI();
                const startBtn = document.getElementById('start-wave-btn');
                startBtn.textContent = 'Start Wave';
                const hint = document.createElement('div');
                hint.className = 'camera-hint';
                hint.textContent = 'Drag to rotate • Scroll to zoom • Drag up/down to tilt';
                document.getElementById('game-container').appendChild(hint);
                setTimeout(() => hint.remove(), 4500);
            });
            if (leaderboardBtn) leaderboardBtn.addEventListener('click', () => { alert('Leaderboard coming soon!'); });
            if (achievementsBtn) achievementsBtn.addEventListener('click', () => { alert('Achievements coming soon!'); });
        }

        function buildMap() {
            const blockSize = CONFIG.TILE_SIZE;
            const dirtColors = [0x8B4513, 0xA0522D, 0x6B4423, 0x5D3A1A, 0x704214];
            const stoneColors = [0x696969, 0x787878, 0x505050, 0x5a5a5a, 0x4a4a4a];
            const grassColors = [0x556B2F, 0x6B8E23, 0x3d5a27, 0x4a6b32, 0x2f4f2f, 0x4f6b3f, 0x3a5a2a, 0x5a7a42, 0x3f5a38, 0x4a6832];
            const grassHighlightColors = [0x8FBC8F, 0x9ACD32, 0x6B8E23];
            const grassShadowColors = [0x2d4a1a, 0x1d3a10, 0x2a4a20];
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.12 });
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                for (let z = 0; z < CONFIG.MAP_HEIGHT; z++) {
                    const worldX = x * blockSize + blockSize / 2;
                    const worldZ = z * blockSize + blockSize / 2;
                    const heightVar = Math.random() > 0.85 ? 1 : 0;
                    const grassHeight = 4 + Math.random() * 2;
                    const grassGeo = new THREE.BoxGeometry(blockSize - 2, grassHeight, blockSize - 2);
                    const grassColor = grassColors[Math.floor(Math.random() * grassColors.length)];
                    const grassMat = new THREE.MeshStandardMaterial({ color: grassColor, roughness: 0.92, metalness: 0.0 });
                    const grassBlock = new THREE.Mesh(grassGeo, grassMat);
                    grassBlock.position.set(worldX, 2 + heightVar, worldZ);
                    grassBlock.receiveShadow = true;
                    grassBlock.castShadow = true;
                    scene.add(grassBlock);
                    const grassEdges = new THREE.LineSegments(new THREE.EdgesGeometry(grassGeo), edgeMat);
                    grassEdges.position.copy(grassBlock.position);
                    scene.add(grassEdges);
                    if (Math.random() > 0.7) {
                        const highlightGeo = new THREE.BoxGeometry(blockSize * 0.3, 0.5, blockSize * 0.3);
                        const highlightColor = grassHighlightColors[Math.floor(Math.random() * grassHighlightColors.length)];
                        const highlightMat = new THREE.MeshStandardMaterial({ color: highlightColor, roughness: 0.85, metalness: 0.0 });
                        const highlight = new THREE.Mesh(highlightGeo, highlightMat);
                        highlight.position.set(worldX + (Math.random() - 0.5) * 10, 4.5 + heightVar, worldZ + (Math.random() - 0.5) * 10);
                        scene.add(highlight);
                    }
                    const dirtHeight = 6 + Math.random() * 4;
                    const dirtGeo = new THREE.BoxGeometry(blockSize - 2, dirtHeight, blockSize - 2);
                    const dirtColor = dirtColors[Math.floor(Math.random() * dirtColors.length)];
                    const dirtMat = new THREE.MeshStandardMaterial({ color: dirtColor, roughness: 1.0, metalness: 0.0 });
                    const dirtBlock = new THREE.Mesh(dirtGeo, dirtMat);
                    dirtBlock.position.set(worldX, -2 - dirtHeight/2 + 4, worldZ);
                    dirtBlock.receiveShadow = true;
                    scene.add(dirtBlock);
                    const dirtEdges = new THREE.LineSegments(new THREE.EdgesGeometry(dirtGeo), edgeMat);
                    dirtEdges.position.copy(dirtBlock.position);
                    scene.add(dirtEdges);
                    const stoneGeo = new THREE.BoxGeometry(blockSize - 2, 6, blockSize - 2);
                    const stoneColor = stoneColors[Math.floor(Math.random() * stoneColors.length)];
                    const stoneMat = new THREE.MeshStandardMaterial({ color: stoneColor, roughness: 0.75, metalness: 0.08 });
                    const stoneBlock = new THREE.Mesh(stoneGeo, stoneMat);
                    stoneBlock.position.set(worldX, -8 - 3, worldZ);
                    stoneBlock.receiveShadow = true;
                    scene.add(stoneBlock);
                    const stoneEdges = new THREE.LineSegments(new THREE.EdgesGeometry(stoneGeo), edgeMat);
                    stoneEdges.position.copy(stoneBlock.position);
                    scene.add(stoneEdges);
                }
            }
            const waterColors = [0x4FC3F7, 0x29B6F6, 0x03A9F4, 0x0288D1];
            for (let i = 0; i < 8; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const waterGeo = new THREE.BoxGeometry(blockSize * 0.8, 0.3, blockSize * 0.6);
                const waterColor = waterColors[Math.floor(Math.random() * waterColors.length)];
                const waterMat = new THREE.MeshStandardMaterial({ color: waterColor, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.7 });
                const water = new THREE.Mesh(waterGeo, waterMat);
                water.position.set(x * blockSize + blockSize / 2, 0.5, z * blockSize + blockSize / 2);
                water.userData = { isWater: true, baseOpacity: 0.7, phase: Math.random() * Math.PI * 2 };
                scene.add(water);
            }
            const flowerColors = [0xff6b9d, 0xffeb3b, 0xffffff, 0xe91e63, 0x9c27b0, 0xff5722, 0x00bcd4];
            const flowerStemGeo = new THREE.BoxGeometry(1, 4, 1);
            const flowerStemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9, metalness: 0.0 });
            for (let i = 0; i < 40; i++) {

                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);

                const fz = z * blockSize + blockSize / 2;

                stem.position.set(fx, 6, fz);

                const flower = new THREE.Mesh(flowerGeo, flowerMat);
                flower.position.set(fx, 9, fz);
                scene.add(flower);
            }
            const mushCapGeo = new THREE.BoxGeometry(5, 3, 5);
            const mushStemGeo = new THREE.BoxGeometry(2, 4, 2);
            const mushColors = [0xff4444, 0xff8800, 0xffcc00, 0xcc44ff];
            for (let i = 0; i < 25; i++) {

            // Voxel pine trees
            for (let i = 0; i < 8; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);

            const rockColors = [0x505050, 0x404040, 0x606060, 0x3a3a3a, 0x707070];
            for (let i = 0; i < 30; i++) {
