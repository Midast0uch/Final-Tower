<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #000;
            overflow: hidden;
            color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 14px;
            padding: 10px 14px;
            pointer-events: auto;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        /* === Minimalist HUD Bar === */
        .hud-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0;
            z-index: 100;
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 12px;
            padding: 5px 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            min-width: 400px;
            max-width: 90vw;
        }
        .hud-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            white-space: nowrap;
        }
        .hud-stat:first-child { padding-left: 4px; }
        .hud-stat:last-child { padding-right: 4px; }
        .hud-icon {
            font-size: 14px;
            line-height: 1;
        }
        .hud-value {
            font-size: 14px;
            font-weight: 600;
            color: #f5f5f7;
            font-variant-numeric: tabular-nums;
        }
        .hud-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
        .boss-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .boss-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transition: background 0.3s ease;
        }
        .boss-dot.active {
            background: #ff453a;
            box-shadow: 0 0 4px rgba(255, 69, 58, 0.5);
        }
        .boss-dot.done {
            background: #30d158;
        }
        .hud-timer {
            color: #ffd60a;
            font-size: 11px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .kill-counter {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .kill-counter .hud-icon { font-size: 12px; }
        .kill-counter .hud-value { font-size: 12px; color: rgba(245,245,247,0.7); }
        
        /* Event Ticker */
        .event-ticker {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .ticker-item {
            background: rgba(20, 20, 20, 0.55);
            backdrop-filter: saturate(180%) blur(10px);
            -webkit-backdrop-filter: saturate(180%) blur(10px);
            color: rgba(245, 245, 247, 0.8);
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 6px;
            animation: tickerFade 2.5s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes tickerFade {
            0% { opacity: 0; transform: translateY(8px); }
            10% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-4px); }
        }
        .tower-icon-svg, .tower-btn canvas {
            width: 36px;
            height: 36px;
            margin-bottom: 1px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .battery-visual {
            display: flex;
            align-items: center;
            gap: 2px;
            position: relative;
        }
        .battery-cell {
            width: 5px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .battery-cell.filled {
            background: #30d158;
            box-shadow: 0 0 4px rgba(48, 209, 88, 0.4);
        }
        .battery-cell.medium {
            background: #ffd60a;
            box-shadow: 0 0 4px rgba(255, 214, 10, 0.4);
        }
        .battery-cell.low {
            background: #ff453a;
            box-shadow: 0 0 4px rgba(255, 69, 58, 0.4);
            animation: cellPulse 0.8s ease-in-out infinite;
        }
        @keyframes cellPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .battery-cap {
            width: 3px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0 1px 1px 0;
            margin-left: 1px;
        }
        .battery-label {
            font-size: 13px;
            font-weight: 600;
            color: #f5f5f7;
            min-width: 24px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .battery-icon {
            font-size: 14px;
            opacity: 0.8;
        }
        .lives-container {
            display: flex;
            gap: 1px;
            flex-wrap: nowrap;
            align-items: center;
        }
        .heart {
            font-size: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            filter: none;
            color: #ff453a;
        }
        .heart.pulse {
            animation: heartPulse 0.5s ease-out;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .wave-progress {
            margin-top: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            height: 3px;
            overflow: hidden;
        }
        .wave-progress-fill {
            height: 100%;
            background: #30d158;
            transition: width 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            border-radius: 2px;
        }
        .tower-dock {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
            z-index: 100;
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 16px;
            padding: 8px 12px;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s ease;
        }
        .tower-btn {
            width: 56px; height: 62px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .tower-btn:hover { 
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .tower-btn.selected { 
            background: rgba(48, 209, 88, 0.2);
            border-color: rgba(48, 209, 88, 0.5);
            box-shadow: 0 0 20px rgba(48, 209, 88, 0.3);
        }
        .tower-btn.disabled { 
            opacity: 0.3; 
            cursor: not-allowed;
        }
        .tower-btn.disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .tower-btn .tower-icon { 
            font-size: 18px; 
            margin-bottom: 1px;
        }
        .tower-btn .tower-cost { 
            font-size: 8px; 
            font-weight: 600; 
            color: #ffd60a;
        }
        .tower-btn .tower-name,
        .tower-btn .tower-stats { display: none; }
        .wave-action-btn {
            padding: 8px 18px;
            font-size: 12px;
            font-weight: 600;
            background: #30d158;
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .wave-action-btn:hover {
            background: #34d65e;
            transform: scale(1.04);
        }
        .wave-action-btn:active {
            transform: scale(0.97);
        }
        .event-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            color: #f5f5f7;
            padding: 20px 36px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            display: none;
            z-index: 200;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }
        .event-popup.show { 
            display: block;
            animation: popupPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popupPop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .screen-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #login-screen { 
            background: linear-gradient(180deg, #000 0%, #1a1a2e 100%); 
            z-index: 1000; 
        }
        #main-menu { 
            background: rgba(0, 0, 0, 0.88); 
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 1100; 
        }
        .overlay-title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #f5f5f7;
            margin-bottom: 8px;
        }
        .overlay-subtitle {
            font-size: 17px;
            font-weight: 400;
            color: rgba(245, 245, 247, 0.6);
            margin-bottom: 32px;
        }
        .overlay-input {
            padding: 14px 20px;
            font-size: 17px;
            font-family: inherit;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            width: 280px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .overlay-input:focus {
            border-color: #0a84ff;
            background: rgba(255, 255, 255, 0.12);
        }
        .overlay-input::placeholder {
            color: rgba(245, 245, 247, 0.4);
        }
        .btn-primary {
            padding: 14px 40px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .btn-primary:hover { background: #409cff; transform: scale(1.03); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-success {
            padding: 16px 48px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #30d158;
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }
        .btn-success:hover { background: #34d65e; transform: scale(1.03); }
        .btn-success:active { transform: scale(0.97); }
        .btn-secondary {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.14); }
        .game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
        }
        .game-over.hidden { display: none !important; }
        .hidden { display: none !important; }
        .energy-popup {
            position: absolute;
            color: #ffd60a;
            font-size: 15px;
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-40px); }
        }
        .camera-hint {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            color: rgba(245, 245, 247, 0.7);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            z-index: 90;
            pointer-events: none;
            animation: hintFade 4s ease-in-out forwards;
        }
        @keyframes hintFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes wavePopIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-restart {
            padding: 14px 36px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            background: #ff453a;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .btn-restart:hover { background: #ff6961; transform: scale(1.03); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="login-screen" class="screen-overlay">
            <div class="overlay-title">Tower Defense</div>
            <div class="overlay-subtitle">Endless strategy. Defend your tower.</div>
            <input type="text" id="username-input" class="overlay-input" placeholder="Enter your name">
            <button id="login-btn" class="btn-primary">Continue</button>
        </div>
        <div id="main-menu" class="screen-overlay hidden">
            <div class="overlay-title">Tower Defense</div>
            <p id="welcome-text" class="overlay-subtitle"></p>
            <button id="play-btn" class="btn-success">Play</button>
            <div style="display:flex; gap:10px; margin-top:12px;">
                <button id="leaderboard-btn" class="btn-secondary">Leaderboard</button>
                <button id="achievements-btn" class="btn-secondary">Achievements</button>
            </div>
        </div>
        <div id="game-ui" class="hidden">
            <!-- Minimalist HUD Bar -->
            <div class="hud-bar">
                <!-- Energy -->
                <div class="hud-stat">
                    <span class="hud-icon">⚡</span>
                    <div class="battery-visual" id="battery-visual"></div>
                    <span id="energy-val" class="hud-value">80</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Lives -->
                <div class="hud-stat">
                    <span class="hud-icon">❤️</span>
                    <div class="lives-container" id="lives-display"></div>
                </div>
                <div class="hud-divider"></div>
                <!-- Wave -->
                <div class="hud-stat">
                    <span class="hud-icon">🌊</span>
                    <span id="wave-info" class="hud-value" style="font-size:15px; font-weight:700;">1</span>
                    <span id="wave-enemy-count" class="hud-sub"></span>
                </div>
                <div class="hud-divider"></div>
                <!-- Seals -->
                <div class="hud-stat">
                    <span class="hud-icon">🔮</span>
                    <span id="seals-val" class="hud-value">0</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Kill Counter -->
                <div class="hud-stat kill-counter">
                    <span class="hud-icon">💀</span>
                    <span id="kill-count" class="hud-value">0</span>
                </div>
                <div class="hud-divider"></div>
                <!-- Boss Dots -->
                <div class="hud-stat" id="boss-dots-container">
                    <span class="hud-icon">👹</span>
                    <span id="boss-dots" class="boss-dots"></span>
                </div>
            </div>
            <!-- Event Ticker -->
            <div class="event-ticker" id="event-ticker"></div>
            
            <!-- Event Popup -->
            <div id="event-popup" class="event-popup"></div>
            
            <!-- Wave Action Button -->
            <div id="wave-controls" style="position:absolute; top:56px; left:50%; transform:translateX(-50%); z-index:100; pointer-events:auto;">
                <button id="start-wave-btn" class="wave-action-btn">Start Wave</button>
            </div>
            
            <!-- Bottom — Tower Dock -->
            <div class="tower-dock" id="tower-buttons"></div>
        </div>
        
        <!-- Game Over -->
        <div class="game-over hidden" id="game-over-screen" style="z-index: 1500;">
            <div class="overlay-title" id="end-title" style="color:#ff453a;">Game Over</div>
            <p id="end-reason" class="overlay-subtitle" style="margin-bottom:16px;"></p>
            <button class="btn-restart" onclick="location.reload()">Play Again</button>
        </div>
    </div>
    <script>
        const CONFIG = {
            MAP_WIDTH: 8,
            MAP_HEIGHT: 8,
            TILE_SIZE: 40,
            PATH_COLOR: '#8B4513',
            TERRAIN_COLOR: '#654321',
            BASE_ENERGY: 80,
            BASE_LIVES: 15,
            ENERGY_REGEN: 1,
            MAX_ENERGY: 80,
            PREPARATION_TIME: 45
        };

        function calculateWaveDifficulty(waveNumber) {
            const baseDifficulty = 10;
            const waveFactor = Math.pow(1.15, waveNumber);
            const bossFactor = waveNumber % 5 === 0 ? 2.5 : 1;
            return Math.floor(baseDifficulty * waveFactor * bossFactor);
        }

        function calculateEnemyCount(waveNumber) {
            return Math.min(40, 10 + Math.floor(waveNumber * 1.5));
        }

        function calculatePathLength(wave) {
            return Math.min(30, 10 + Math.floor(wave * 1.2));
        }

        const TOWER_TYPES = {
            BASIC: { name: 'Basic Tower', cost: 20, damage: 5, range: 7, color: '#ff6b6b', iconType: 'basic', fireRate: 800 },
            SNIPER: { name: 'Sniper', cost: 40, damage: 15, range: 18, color: '#4ecdc4', iconType: 'sniper', fireRate: 2000 },
            CANNON: { name: 'Cannon', cost: 60, damage: 8, range: 6, area: 4, color: '#ffe66d', iconType: 'cannon', fireRate: 1500 },
            TRAP: { name: 'Trap', cost: 35, damage: 30, range: 3, oneTime: true, color: '#ff8787', iconType: 'trap', fireRate: 999999 },
            SLOW: { name: 'Slow', cost: 45, damage: 2, range: 8, slowFactor: 0.5, color: '#74c0fc', iconType: 'slow', fireRate: 500 }
        };

        function updateCameraPosition() {
            const centerX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            const centerZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2;
            const baseDist = 500;
            const baseHeight = 350;
            const dist = baseDist * gameState.cameraZoom;
            const height = baseHeight * gameState.cameraZoom;
            const angle = gameState.cameraAngle;
            const tilt = gameState.cameraTilt || 0;
            const tiltFactor = Math.cos(tilt);
            const heightFactor = Math.sin(tilt);
            camera.position.set(
                centerX + Math.sin(angle) * dist * tiltFactor,
                height + heightFactor * 200,
                centerZ + Math.cos(angle) * dist * tiltFactor
            );
            camera.lookAt(centerX, 0, centerZ);
        }

        let gameState = {
            energy: CONFIG.BASE_ENERGY,
            lives: CONFIG.BASE_LIVES,
            wave: 1,
            gamePhase: 'PREPARATION',
            preparationTimer: CONFIG.PREPARATION_TIME,
            towers: [],
            enemies: [],
            projectiles: [],
            particles: [],
            gameOver: false,
            gameStarted: false,
            selectedTower: null,
            waveActive: false,
            pathGrid: [],
            maxWaveReached: 0,
            totalKills: 0,
            pathChanges: 0,
            bossesDefeated: 0,
            cameraAngle: 0,
            cameraZoom: 1,
            cameraTilt: 0
        };

        let camera, scene, renderer;
        let clouds = [];
        let ambientParticles = [];
        let pathSegments = [];
        let debrisParticles = [];

        class PathGenerator {
            static createPath(waveNumber) {
                const pathTypes = ['STRAIGHT', 'WINDING', 'BRANCHING', 'MAZE'];
                const pathType = pathTypes[waveNumber % 4];
                const pathLength = calculatePathLength(waveNumber);
                const mapW = CONFIG.MAP_WIDTH;
                const mapH = CONFIG.MAP_HEIGHT;
                switch(pathType) {
                    case 'STRAIGHT': return this.generateStraightPath(pathLength, mapW, mapH);
                    case 'WINDING': return this.generateWindingPath(pathLength, mapW, mapH);
                    case 'BRANCHING': return this.generateBranchingPath(pathLength, mapW, mapH);
                    case 'MAZE': return this.generateMazePath(pathLength, mapW, mapH);
                    default: return this.generateWindingPath(pathLength, mapW, mapH);
                }
            }
            static generateStraightPath(length, mapW, mapH) {
                const path = [];
                const y = Math.floor(mapH / 2) + Math.floor(Math.random() * 3) - 1;
                for (let x = 0; x < mapW; x++) {
                    path.push({ x: x, y: Math.max(0, Math.min(mapH - 1, y)) });
                }
                return path;
            }
            static generateWindingPath(length, mapW, mapH) {
                const path = [];
                let x = 0;
                let y = Math.floor(mapH / 2) + Math.floor(Math.random() * 4) - 2;
                y = Math.max(1, Math.min(mapH - 2, y));
                const direction = Math.random() > 0.5 ? 1 : -1;
                while (x < mapW) {
                    path.push({ x: x, y: y });
                    x++;
                    if (x < mapW && Math.random() < 0.35) {
                        const newY = y + direction;
                        if (newY >= 1 && newY <= mapH - 2) {
                            y = newY;
                            path.push({ x: x, y: y });
                        } else {
                            direction *= -1;
                        }
                    }
                }
                return path;
            }
            static generateBranchingPath(length, mapW, mapH) {
                const path = [];
                let x = 0;
                let y = Math.floor(mapH / 2);
                while (x < mapW) {
                    path.push({ x: x, y: y });
                    x++;
                    if (x < mapW && Math.random() < 0.25) {
                        y = Math.max(1, Math.min(mapH - 2, y + (Math.random() > 0.5 ? 1 : -1)));
                    }
                }
                return path;
            }
            static generateMazePath(length, mapW, mapH) {
                const path = [];
                let x = 0;
                let y = Math.floor(mapH / 2);
                while (x < mapW) {
                    path.push({ x: x, y: y });
                    const rand = Math.random();
                    if (rand < 0.35) { x++; }
                    else if (rand < 0.5 && y > 1) { y--; }
                    else if (rand < 0.65 && y < mapH - 2) { y++; }
                    else { x++; }
                }
                return path;
            }
            static validatePath(path) {
                if (!path || path.length < 3) return false;
                if (path[0].x !== 0) return false;
                if (path[path.length - 1].x < CONFIG.MAP_WIDTH - 1) return false;
                for (let i = 1; i < path.length; i++) {
                    const dx = Math.abs(path[i].x - path[i-1].x);
                    const dy = Math.abs(path[i].y - path[i-1].y);
                    if (dx + dy > 1) return false;
                    if (path[i].x < 0 || path[i].x >= CONFIG.MAP_WIDTH) return false;
                    if (path[i].y < 0 || path[i].y >= CONFIG.MAP_HEIGHT) return false;
                }
                return true;
            }
        }

        function generateWaveEnemies(waveNum) {
            const enemyCount = calculateEnemyCount(waveNum);
            const enemies = [];
            const isBossWave = waveNum % 5 === 0;
            
            const difficultyTier = Math.floor(waveNum / 3);
            
            const basicChance = Math.max(0.2, 0.7 - waveNum * 0.02);
            const fastChance = Math.min(0.3, 0.1 + waveNum * 0.01);
            const tankChance = Math.min(0.25, 0.05 + waveNum * 0.015);
            const sniperChance = Math.min(0.15, 0.03 + waveNum * 0.01);
            const burrowChance = Math.min(0.12, waveNum * 0.008);
            const spawnerChance = Math.min(0.08, waveNum >= 8 ? 0.05 : 0);
            
            for (let i = 0; i < enemyCount; i++) {
                const roll = Math.random();
                let type = 'basic';
                
                if (isBossWave && i === Math.floor(enemyCount / 2)) {
                    type = 'boss';
                } else if (roll < spawnerChance && waveNum >= 8) {
                    type = 'spawner';
                } else if (roll < spawnerChance + burrowChance && waveNum >= 6) {
                    type = 'burrowing';
                } else if (roll < spawnerChance + burrowChance + sniperChance && waveNum >= 4) {
                    type = 'sniper';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance) {
                    type = 'tank';
                } else if (roll < spawnerChance + burrowChance + sniperChance + tankChance + fastChance) {
                    type = 'fast';
                }
                
                const healthMult = 1 + (waveNum * 0.12);
                const speedMult = 1 + (waveNum * 0.015);
                
                enemies.push({
                    type: type,
                    variant: Math.floor(Math.random() * 3),
                    healthMult: healthMult,
                    speedMult: speedMult,
                    waveNum: waveNum
                });
            }
            
            if (isBossWave && !enemies.some(e => e.type === 'boss')) {
                enemies.push({
                    type: 'boss',
                    variant: 0,
                    healthMult: 1 + (waveNum * 0.15),
                    speedMult: 1,
                    waveNum: waveNum
                });
            }
            
            return {
                enemies: enemies,
                spawnDelay: Math.max(400, 1200 - waveNum * 20),
                waveNumber: waveNum
            };
        }

        let currentPath = [];
        const pathOptions = { mainPath: currentPath };

        function selectPathForWave(waveNum) {
            let attempts = 0;
            while (attempts < 10) {
                const path = PathGenerator.createPath(waveNum + attempts);
                if (PathGenerator.validatePath(path)) {
                    currentPath = path;
                    pathOptions.mainPath = path;
                    return path;
                }
                attempts++;
            }
            currentPath = PathGenerator.generateWindingPath(15);
            pathOptions.mainPath = currentPath;
            return currentPath;
        }

        function getWaypointAt(index, pathName) {
            const path = pathOptions[pathName];
            if (!path || !path[index]) return null;
            return { x: path[index].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                     y: path[index].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
        }

        function getPathLength(pathName) {
            const path = pathOptions[pathName];
            return path ? path.length : 0;
        }

                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }

        function extendTerrain(oldWidth, oldHeight) {
            const newWidth = CONFIG.MAP_WIDTH;
            const newHeight = CONFIG.MAP_HEIGHT;
            
            for (let x = 0; x < newWidth; x++) {
                for (let y = 0; y < newHeight; y++) {
                    if (x < oldWidth && y < oldHeight) continue;
                    
                    const tileX = x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    const tileZ = y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    
                    const tileGroup = new THREE.Group();
                    
                    const baseGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 1, 8, CONFIG.TILE_SIZE - 1);
                    const baseMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
                    const base = new THREE.Mesh(baseGeo, baseMat);
                    base.position.y = -4;
                    base.receiveShadow = true;
                    tileGroup.add(base);
                    
                    const grassGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 1, 3, CONFIG.TILE_SIZE - 1);
                    const grassMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
                    const grass = new THREE.Mesh(grassGeo, grassMat);
                    grass.position.y = 1.5;
                    grass.castShadow = true;
                    grass.receiveShadow = true;
                    tileGroup.add(grass);
                    
                    if (Math.random() < 0.3) {
                        const stoneGeo = new THREE.BoxGeometry(4 + Math.random() * 6, 3, 4 + Math.random() * 6);
                        const stoneMat = new THREE.MeshLambertMaterial({ color: 0x696969 });
                        const stone = new THREE.Mesh(stoneGeo, stoneMat);
                        stone.position.set((Math.random() - 0.5) * 15, 3, (Math.random() - 0.5) * 15);
                        stone.castShadow = true;
                        tileGroup.add(stone);
                    }
                    
                    tileGroup.position.set(tileX, 0, tileZ);
                    scene.add(tileGroup);
                }
            }
        }

        function drawPath(path) {
            if (!path || !Array.isArray(path)) return;
            const pathColors = [0x3d2817, 0x4a3520, 0x2d1f12];
            
            path.forEach((p, i) => {
                setTimeout(() => {
                    if (!p || p.x === undefined) return;
                    const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    const z = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    
                    for (let j = 0; j < 3; j++) {
                        const pGeo = new THREE.BoxGeometry(3, 3, 3);
                        const pMat = new THREE.MeshBasicMaterial({ color: 0xffd43b, transparent: true, opacity: 0.8 });
                        const particle = new THREE.Mesh(pGeo, pMat);
                        particle.position.set(x + (Math.random() - 0.5) * 20, -5, z + (Math.random() - 0.5) * 20);
                        scene.add(particle);
                        debrisParticles.push({
                            mesh: particle,
                            velocity: new THREE.Vector3((Math.random() - 0.5) * 2, 2 + Math.random() * 3, (Math.random() - 0.5) * 2),
                            life: 30 + Math.random() * 20
                        });
                    }
                }, i * 40);
            });
            
            for (let i = 0; i < path.length; i++) {
                const p = path[i];
                if (!p || p.x === undefined) continue;
                const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const z = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const holeGeo = new THREE.CylinderGeometry(12, 14, 3, 16);
                const holeMat = new THREE.MeshLambertMaterial({ color: 0x1a1008, emissive: 0xff6b6b, emissiveIntensity: 0.4 });
                const hole = new THREE.Mesh(holeGeo, holeMat);
                hole.position.set(x, 1.5, z);
                scene.add(hole);
                pathSegments.push({ mesh: hole });
                const ringGeo = new THREE.TorusGeometry(14, 2, 8, 24);
                const ringMat = new THREE.MeshLambertMaterial({ color: 0xffd43b, emissive: 0xffd43b, emissiveIntensity: 0.5 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.position.set(x, 3, z);
                scene.add(ring);
                pathSegments.push({ mesh: ring });
                const tunnelGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 10, CONFIG.TILE_SIZE - 2);
                const tunnelMat = new THREE.MeshLambertMaterial({ color: 0x2d1f12, transparent: true, opacity: 0.4, emissive: 0x1a1008, emissiveIntensity: 0.2 });
                const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
                tunnel.position.set(x, -2, z);
                scene.add(tunnel);
                pathSegments.push({ mesh: tunnel });
                const floorGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 3, 1, CONFIG.TILE_SIZE - 3);
                const floorMat = new THREE.MeshLambertMaterial({ color: 0x1a1008, emissive: 0x3d2817, emissiveIntensity: 0.3 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.position.set(x, -6, z);
                scene.add(floor);
                pathSegments.push({ mesh: floor });
                const wallGeo = new THREE.BoxGeometry(2, 10, CONFIG.TILE_SIZE);
                const wallMat = new THREE.MeshLambertMaterial({ color: 0x3d2817 });
                const wallL = new THREE.Mesh(wallGeo, wallMat);
                wallL.position.set(x - CONFIG.TILE_SIZE/2 + 1, -2, z);
                scene.add(wallL);
                const wallR = new THREE.Mesh(wallGeo, wallMat);
                wallR.position.set(x + CONFIG.TILE_SIZE/2 - 1, -2, z);
                scene.add(wallR);
                if (i % 3 === 0 && i < path.length - 1) {
                    const nextP = path[i + 1];
                    const markerGeo = new THREE.ConeGeometry(2, 5, 4);
                    markerGeo.rotateX(Math.PI / 2);
                    const markerMat = new THREE.MeshLambertMaterial({ color: 0xffd43b, emissive: 0xffd43b, emissiveIntensity: 0.6, transparent: true, opacity: 0.7 });
                    const marker = new THREE.Mesh(markerGeo, markerMat);
                    marker.position.set(x, 3, z);
                    marker.lookAt(nextP.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 3, nextP.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                    scene.add(marker);
                }
            }
        }

        function generatePathOptions() {}

        function startGame() {
            gameState.gameStarted = true;
            gameState.gamePhase = 'PREPARATION';
            gameState.preparationTimer = CONFIG.PREPARATION_TIME;
            preparationStartTime = Date.now();
            generateNewPath();
            clearPathTiles();
            drawPath(currentPath);
            updateUI();
        }

        function generateNewPath() {
            const path = selectPathForWave(gameState.wave);
            currentPath = path;
            gameState.pathGrid = [];
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                gameState.pathGrid[x] = [];
                for (let y = 0; y < CONFIG.MAP_HEIGHT; y++) {
                    gameState.pathGrid[x][y] = false;
                }
            }
            path.forEach(p => {
                if (p.x >= 0 && p.x < CONFIG.MAP_WIDTH && p.y >= 0 && p.y < CONFIG.MAP_HEIGHT) {
                    gameState.pathGrid[p.x][p.y] = true;
                }
            });
            destroyOverlappingTurrets();
        }

        function destroyOverlappingTurrets() {
            const turretsToDestroy = [];
            gameState.towers.forEach((tower, index) => {
                if (tower.gridX >= 0 && tower.gridX < CONFIG.MAP_WIDTH && tower.gridY >= 0 && tower.gridY < CONFIG.MAP_HEIGHT) {
                    if (gameState.pathGrid[tower.gridX] && gameState.pathGrid[tower.gridX][tower.gridY]) {
                        turretsToDestroy.push(index);
                    }
                }
            });
            turretsToDestroy.sort((a, b) => b - a).forEach(index => {
                const tower = gameState.towers[index];
                const towerType = tower.typeKey;
                const refund = Math.floor(TOWER_TYPES[towerType].cost * 0.8);
                gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + refund);
                createExplosion(tower.mesh.position.x, tower.mesh.position.y, tower.mesh.position.z, 1.5);
                scene.remove(tower.mesh);
                gameState.towers.splice(index, 1);
            });
            if (turretsToDestroy.length > 0) {
                showFloatingText(window.innerWidth / 2, window.innerHeight / 2, 0, `+${turretsToDestroy.length} turrets destroyed!`, '#ff6b6b');
            }
        }

        function clearPathTiles() {
            pathSegments.forEach(seg => {
                if (seg.mesh && seg.mesh.parent) { scene.remove(seg.mesh); }
            });
            pathSegments = [];
        }

        function startWave() {
            if (gameState.gamePhase === 'GAME_OVER') return;
            if (gameState.gamePhase === 'PREPARATION') { startWaveActive(); return; }
            if (!gameState.gameStarted) { startGame(); return; }
        }

        function startWaveActive() {
            gameState.gamePhase = 'WAVE_ACTIVE';
            gameState.waveActive = true;
            const waveData = generateWaveEnemies(gameState.wave);
            currentWaveNum = gameState.wave;
            currentWave = waveData;
            waveEnemies = [...waveData.enemies];
            lastSpawnTime = Date.now();
            const path = currentPath || [];
            const pathLength = path.length * CONFIG.TILE_SIZE;
            const baseSpeed = 2 + (gameState.wave * 0.2);
            const travelTime = (pathLength / baseSpeed);
            const spawnTime = (waveEnemies.length * waveData.spawnDelay) / 1000;
            waveDuration = Math.ceil(spawnTime + travelTime + 15);
            waveStartTime = Date.now();
            document.getElementById('start-wave-btn').style.display = 'none';
            showWaveAnnouncement(gameState.wave);
            updateUI();
            console.log('Wave started:', gameState.wave, 'enemies:', waveEnemies.length);
        }

        function startPreparationPhase() {
            gameState.gamePhase = 'PREPARATION';
            gameState.preparationTimer = CONFIG.PREPARATION_TIME;
            gameState.waveActive = false;
            preparationStartTime = Date.now();
            const startBtn = document.getElementById('start-wave-btn');
            startBtn.style.display = 'block';
            startBtn.textContent = 'Start Wave';
            gameState.pathChanges = (gameState.pathChanges || 0) + 1;
            const wave = gameState.wave;
            if (wave > 1 && wave % 5 === 0) {
                const oldWidth = CONFIG.MAP_WIDTH;
                const oldHeight = CONFIG.MAP_HEIGHT;
                CONFIG.MAP_WIDTH = oldWidth + 2;
                CONFIG.MAP_HEIGHT = oldHeight + 2;
                console.log(`Map growing: ${oldWidth}x${oldHeight} -> ${CONFIG.MAP_WIDTH}x${CONFIG.MAP_HEIGHT}`);
                extendTerrain(oldWidth, oldHeight);
            }
            gameState.wave++;
            generateNewPath();
            clearPathTiles();
            drawPath(currentPath);
            updateUI();
        }

        function getTowerIconCanvas(typeKey, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            canvas.style.width = '36px';
            canvas.style.height = '36px';
            canvas.style.imageRendering = 'pixelated';
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            const px = (x, y, w, h, c) => {
                ctx.fillStyle = c;
                ctx.fillRect(x, y, w, h);
            };
            
            switch(typeKey) {
                case 'BASIC':
                    px(12, 14, 8, 12, color);
                    px(14, 6, 4, 10, color);
                    px(14, 4, 4, 4, '#fff');
                    px(15, 5, 2, 2, color);
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    px(15, 2, 2, 2, '#ffd60a');
                    break;
                case 'SNIPER':
                    px(14, 2, 4, 22, color);
                    px(10, 4, 12, 6, color);
                    px(12, 5, 8, 4, '#1a1a2e');
                    px(14, 6, 4, 2, '#4ecdc4');
                    px(15, 5, 2, 4, '#fff');
                    px(13, 6, 6, 2, '#fff');
                    px(10, 24, 12, 3, color);
                    px(11, 26, 10, 2, color);
                    break;
                case 'CANNON':
                    px(8, 14, 16, 12, color);
                    px(10, 10, 12, 6, color);
                    px(12, 16, 8, 6, '#1a1a2e');
                    px(14, 17, 4, 4, '#ffd60a');
                    px(14, 6, 4, 4, '#ff6b6b');
                    px(15, 5, 2, 2, '#ffd60a');
                    px(6, 24, 20, 3, color);
                    px(8, 26, 16, 2, color);
                    break;
                case 'TRAP':
                    px(14, 4, 4, 4, '#ff453a');
                    px(14, 8, 4, 4, color);
                    px(10, 12, 12, 4, color);
                    px(12, 16, 8, 4, color);
                    px(8, 20, 16, 4, color);
                    px(6, 24, 20, 3, color);
                    px(14, 13, 4, 4, '#ffd60a');
                    px(15, 14, 2, 2, '#ff453a');
                    break;
                case 'SLOW':
                    px(14, 4, 4, 4, color);
                    px(12, 8, 8, 4, color);
                    px(10, 12, 12, 4, color);
                    px(8, 16, 16, 4, color);
                    px(10, 20, 12, 4, color);
                    px(12, 24, 8, 3, color);
                    px(14, 14, 4, 4, '#fff');
                    px(15, 15, 2, 2, color);
                    px(8, 8, 2, 2, '#fff');
                    px(22, 10, 2, 2, '#fff');
                    px(10, 22, 2, 2, '#fff');
                    break;
            }
            
            return canvas;
        }

        function showTicker(text, color) {
            const ticker = document.getElementById('event-ticker');
            if (!ticker) return;
            const item = document.createElement('div');
            item.className = 'ticker-item';
            if (color) item.style.color = color;
            item.textContent = text;
            ticker.appendChild(item);
            setTimeout(() => { if (item.parentNode) item.remove(); }, 2600);
        }

        function createUI() {
            const container = document.getElementById('tower-buttons');
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.createElement('div');
                btn.className = 'tower-btn';
                const iconCanvas = getTowerIconCanvas(key, type.color);
                btn.innerHTML = '';
                btn.appendChild(iconCanvas);
                const costDiv = document.createElement('div');
                costDiv.className = 'tower-cost';
                costDiv.textContent = `⚡${type.cost}`;
                btn.appendChild(costDiv);
                if (gameState.energy < type.cost) btn.classList.add('disabled');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (gameState.selectedTower === key) {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        gameState.selectedTower = null;
                        renderer.domElement.style.cursor = 'grab';
                    } else {
                        document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        gameState.selectedTower = key;
                        renderer.domElement.style.cursor = 'crosshair';
                    }
                });
                btn.setAttribute('data-tower', key);
                container.appendChild(btn);
            });
            const startBtn = document.getElementById('start-wave-btn');
            startBtn.textContent = 'Start Wave';
            startBtn.addEventListener('click', () => {
                if (gameState.gamePhase === 'GAME_OVER') { location.reload(); return; }
                if (!gameState.gameStarted) { startGame(); startBtn.textContent = 'Start Wave'; }
                else if (gameState.gamePhase === 'PREPARATION') { startWaveActive(); }
                else if (gameState.gamePhase === 'WAVE_ACTIVE' && !gameState.waveActive) { startPreparationPhase(); }
            });
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener('keydown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                const rotationSpeed = 0.15;
                const zoomSpeed = 0.1;
                if (e.key === 'q' || e.key === 'Q' || e.key === 'ArrowLeft') { gameState.cameraAngle -= rotationSpeed; }
                else if (e.key === 'e' || e.key === 'E' || e.key === 'ArrowRight') { gameState.cameraAngle += rotationSpeed; }
                else if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') { gameState.cameraZoom = Math.min(2, gameState.cameraZoom + zoomSpeed); }
                else if (e.key === 'r' || e.key === 'R') { gameState.cameraTilt = Math.max(-0.5, (gameState.cameraTilt || 0) - 0.1); }
                else if (e.key === 'f' || e.key === 'F') { gameState.cameraTilt = Math.min(0.8, (gameState.cameraTilt || 0) + 0.1); }
                updateCameraPosition();
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                e.preventDefault();
                const zoomSpeed = 0.08;
                if (e.deltaY > 0) { gameState.cameraZoom = Math.min(2.5, gameState.cameraZoom + zoomSpeed); }
                else { gameState.cameraZoom = Math.max(0.3, gameState.cameraZoom - zoomSpeed); }
                updateCameraPosition();
            }, { passive: false });

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragStartAngle = 0;
            let dragStartTilt = 0;

            renderer.domElement.addEventListener('mousedown', (e) => {
                if (gameState.gameOver || !gameState.gameStarted) return;
                if (!gameState.selectedTower) {
                    isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragStartAngle = gameState.cameraAngle;
                    dragStartTilt = gameState.cameraTilt || 0;
                    renderer.domElement.style.cursor = 'grabbing';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                gameState.cameraAngle = dragStartAngle + dx * 0.005;
                gameState.cameraTilt = Math.max(-0.5, Math.min(0.8, dragStartTilt + dy * 0.003));
                updateCameraPosition();
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    renderer.domElement.style.cursor = 'grab';
                }
            });

            let previewTile = null;
            let rangeCircle = null;

            document.getElementById('game-container').addEventListener('mousemove', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) {
                    if (previewTile) { scene.remove(previewTile); previewTile = null; }
                    if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
                    return;
                }
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const isOccupied = gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ);
                const towerType = gameState.selectedTower;
                const canPlaceOnPath = towerType === 'CANNON' || towerType === 'TRAP';
                const canPlace = (!isPath || canPlaceOnPath) && !isOccupied && gameState.energy >= TOWER_TYPES[gameState.selectedTower].cost;
                if (!previewTile) {
                    const previewGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 2, 12, CONFIG.TILE_SIZE - 2);
                    const previewMat = new THREE.MeshLambertMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.7 });
                    previewTile = new THREE.Mesh(previewGeo, previewMat);
                    scene.add(previewTile);
                } else {
                    previewTile.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                previewTile.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 6, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                const range = towerDef.range * CONFIG.TILE_SIZE;
                if (!rangeCircle) {
                    const ringGeo = new THREE.RingGeometry(range - 1, range, 64);
                    ringGeo.rotateX(-Math.PI / 2);
                    const ringMat = new THREE.MeshBasicMaterial({ color: canPlace ? 0x69db7c : 0xff6b6b, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
                    rangeCircle = new THREE.Mesh(ringGeo, ringMat);
                    scene.add(rangeCircle);
                } else {
                    rangeCircle.material.color.setHex(canPlace ? 0x69db7c : 0xff6b6b);
                }
                rangeCircle.position.set(gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, 1, gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
            });

            document.getElementById('game-container').addEventListener('mouseleave', () => {
                if (previewTile) { scene.remove(previewTile); previewTile = null; }
                if (rangeCircle) { scene.remove(rangeCircle); rangeCircle = null; }
            });

            document.getElementById('game-container').addEventListener('click', (e) => {
                if (!gameState.selectedTower || gameState.gameOver) return;
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -4);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(groundPlane, intersection);
                if (!intersection) return;
                const gridX = Math.floor(intersection.x / CONFIG.TILE_SIZE);
                const gridZ = Math.floor(intersection.z / CONFIG.TILE_SIZE);
                if (gridX < 0 || gridX >= CONFIG.MAP_WIDTH || gridZ < 0 || gridZ >= CONFIG.MAP_HEIGHT) return;
                const isPath = gameState.pathGrid[gridX] && gameState.pathGrid[gridX] && gameState.pathGrid[gridX][gridZ];
                const canPlaceOnPath = gameState.selectedTower === 'CANNON' || gameState.selectedTower === 'TRAP';
                if (isPath && !canPlaceOnPath) return;
                if (gameState.towers.some(t => t.gridX === gridX && t.gridZ === gridZ)) return;
                const towerDef = TOWER_TYPES[gameState.selectedTower];
                if (gameState.energy < towerDef.cost) { showEnergyPopup(e.clientX, e.clientY, -50); return; }
                gameState.energy -= towerDef.cost;
                createTower(gridX, gridZ, gameState.selectedTower);
                updateUI();
            });
        }

        function createTower(gridX, gridZ, typeKey) {
            const towerDef = TOWER_TYPES[typeKey];
            const meshGroup = new THREE.Group();
            let barrel = null;
            let head = null;
            if (typeKey === 'BASIC') {
                const baseGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE * 0.7, 8, CONFIG.TILE_SIZE * 0.7);
                const baseMat = new THREE.MeshLambertMaterial({ color: 0x4a5568 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 4;
                base.castShadow = true;
                meshGroup.add(base);
                const headGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE * 0.5, 6, CONFIG.TILE_SIZE * 0.5);
                const headMat = new THREE.MeshLambertMaterial({ color: 0x718096 });
                head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 11;
                head.castShadow = true;
                meshGroup.add(head);
                const barrelGeo = new THREE.CylinderGeometry(2, 2, 10);
                barrelGeo.rotateZ(Math.PI / 2);
                const barrelMat = new THREE.MeshLambertMaterial({ color: 0x2d3748 });
                barrel = new THREE.Mesh(barrelGeo, barrelMat);
                barrel.position.set(8, 11, 0);
                barrel.castShadow = true;
                meshGroup.add(barrel);
            } else if (typeKey === 'SNIPER') {
                const baseGeo = new THREE.CylinderGeometry(8, 10, 6, 8);
                const baseMat = new THREE.MeshLambertMaterial({ color: 0x553c9a });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 3;
                base.castShadow = true;
                meshGroup.add(base);
                const bodyGeo = new THREE.CylinderGeometry(5, 6, 12, 6);
                const bodyMat = new THREE.MeshLambertMaterial({ color: 0x6b46c1 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 12;
                body.castShadow = true;
                meshGroup.add(body);
                head = body;
                const barrelGeo = new THREE.CylinderGeometry(1.5, 2, 20);
                barrelGeo.rotateZ(Math.PI / 2);
                const barrelMat = new THREE.MeshLambertMaterial({ color: 0x1a202c });
                barrel = new THREE.Mesh(barrelGeo, barrelMat);
                barrel.position.set(15, 14, 0);
                barrel.castShadow = true;
                meshGroup.add(barrel);
                const scopeGeo = new THREE.SphereGeometry(3, 8, 8);
                const scopeMat = new THREE.MeshLambertMaterial({ color: 0xe53e3e });
                const scope = new THREE.Mesh(scopeGeo, scopeMat);
                scope.position.set(22, 14, 0);
                meshGroup.add(scope);
            } else if (typeKey === 'CANNON') {
                const baseGeo = new THREE.CylinderGeometry(12, 14, 6, 12);
                const baseMat = new THREE.MeshLambertMaterial({ color: 0xc53030 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 3;
                base.castShadow = true;
                meshGroup.add(base);
                const domeGeo = new THREE.SphereGeometry(10, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
                const domeMat = new THREE.MeshLambertMaterial({ color: 0x9b2c2c });
                const dome = new THREE.Mesh(domeGeo, domeMat);
                dome.position.y = 6;
                dome.castShadow = true;
                meshGroup.add(dome);
                const barrelGeo = new THREE.CylinderGeometry(4, 5, 14);
                barrelGeo.rotateZ(Math.PI / 2);
                const barrelMat = new THREE.MeshLambertMaterial({ color: 0x1a202c });
                const barrel = new THREE.Mesh(barrelGeo, barrelMat);
                barrel.position.set(10, 8, 0);
                barrel.castShadow = true;
                meshGroup.add(barrel);
                const barrel2Geo = new THREE.CylinderGeometry(4, 5, 14);
                barrel2Geo.rotateZ(Math.PI / 2);
                const barrel2 = new THREE.Mesh(barrel2Geo, barrelMat);
                barrel2.position.set(10, 8, 6);
                barrel2.castShadow = true;
                meshGroup.add(barrel2);
            }
            const tileCenterX = gridX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const tileCenterZ = gridZ * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            meshGroup.position.set(tileCenterX, 6, tileCenterZ);
            scene.add(meshGroup);
            const range = TOWER_TYPES[typeKey].range * CONFIG.TILE_SIZE;
            const rangeGeo = new THREE.RingGeometry(range - 2, range, 32);
            const rangeMat = new THREE.MeshBasicMaterial({ color: TOWER_TYPES[typeKey].color, transparent: true, opacity: 0, side: THREE.DoubleSide });
            const rangeIndicator = new THREE.Mesh(rangeGeo, rangeMat);
            rangeIndicator.rotation.x = -Math.PI / 2;
            rangeIndicator.position.set(tileCenterX, 0.5, tileCenterZ);
            scene.add(rangeIndicator);
            gameState.towers.push({
                mesh: meshGroup, gridX: gridX, gridZ: gridZ, damageMult: 1.0, typeKey: typeKey,
                fireRate: TOWER_TYPES[typeKey].fireRate || 60, lastFired: 0,
                rangeIndicator: rangeIndicator, barrel: barrel, head: head,
                health: 50 + (gameState.wave * 5), maxHealth: 50 + (gameState.wave * 5)
            });
            gameState.placedTowers = true;
            updateStartButton();
            updateUI();
        }

        function updateStartButton() {
            const startBtn = document.getElementById('start-wave-btn');
            if (gameState.placedTowers && !gameState.waveActive) {
                startBtn.textContent = `START WAVE ${gameState.wave}`;
                startBtn.style.background = '#69db7c';
            }
        }

        function createEnemyFace(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            canvas.style.width = '16px';
            canvas.style.height = '16px';
            canvas.style.imageRendering = 'pixelated';
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            const px = (x, y, w, h, c) => {
                ctx.fillStyle = c;
                ctx.fillRect(x, y, w, h);
            };
            
            switch(type) {
                case 'basic':
                    px(10, 12, 3, 3, '#fff');
                    px(19, 12, 3, 3, '#fff');
                    px(11, 13, 2, 2, '#1a1a2e');
                    px(20, 13, 2, 2, '#1a1a2e');
                    px(13, 20, 6, 2, '#1a1a2e');
                    break;
                case 'fast':
                    px(8, 11, 4, 4, '#fff');
                    px(20, 11, 4, 4, '#fff');
                    px(9, 12, 2, 2, '#1a1a2e');
                    px(21, 12, 2, 2, '#1a1a2e');
                    px(12, 20, 8, 4, '#1a1a2e');
                    px(14, 21, 4, 2, '#ff6b6b');
                    break;
                case 'tank':
                    px(10, 13, 4, 2, '#fff');
                    px(18, 13, 4, 2, '#fff');
                    px(11, 13, 2, 2, '#1a1a2e');
                    px(19, 13, 2, 2, '#1a1a2e');
                    px(8, 11, 6, 1, '#1a1a2e');
                    px(18, 11, 6, 1, '#1a1a2e');
                    px(12, 20, 8, 1, '#1a1a2e');
                    break;
                case 'sniper':
                    px(10, 13, 3, 3, '#fff');
                    px(19, 14, 3, 2, '#fff');
                    px(11, 14, 2, 2, '#1a1a2e');
                    px(20, 14, 2, 1, '#1a1a2e');
                    px(14, 20, 4, 1, '#1a1a2e');
                    break;
                case 'burrowing':
                    px(10, 14, 3, 2, '#fff');
                    px(19, 14, 3, 2, '#fff');
                    px(11, 14, 2, 2, '#1a1a2e');
                    px(20, 14, 2, 2, '#1a1a2e');
                    px(8, 12, 6, 1, '#1a1a2e');
                    px(18, 12, 6, 1, '#1a1a2e');
                    px(13, 20, 6, 2, '#1a1a2e');
                    break;
                case 'spawner':
                    px(10, 12, 3, 3, '#fff');
                    px(19, 12, 3, 3, '#fff');
                    px(11, 13, 2, 2, '#1a1a2e');
                    px(20, 13, 2, 2, '#1a1a2e');
                    px(12, 20, 8, 2, '#1a1a2e');
                    px(18, 19, 3, 2, '#1a1a2e');
                    break;
                case 'boss':
                    px(9, 11, 4, 4, '#fff');
                    px(19, 11, 4, 4, '#fff');
                    px(10, 12, 2, 2, '#ff453a');
                    px(20, 12, 2, 2, '#ff453a');
                    px(7, 9, 6, 2, '#1a1a2e');
                    px(19, 9, 6, 2, '#1a1a2e');
                    px(12, 22, 8, 2, '#1a1a2e');
                    px(10, 20, 3, 2, '#1a1a2e');
                    px(19, 20, 3, 2, '#1a1a2e');
                    break;
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            const offsets = {
                basic:    { scale: 10, pos: [0, 0, 10] },
                fast:     { scale: 8,  pos: [0, 0, 8] },
                tank:     { scale: 12, pos: [0, 0, 9] },
                sniper:   { scale: 10, pos: [0, 0, 11] },
                burrowing:{ scale: 10, pos: [0, 0, 10] },
                spawner:  { scale: 14, pos: [0, 0, 14] },
                boss:     { scale: 18, pos: [0, 0, 22] }
            };
            const cfg = offsets[type] || offsets.basic;
            sprite.scale.set(cfg.scale, cfg.scale, 1);
            sprite.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
            return sprite;
        }

        function spawnEnemy(type, variant, waveNum, enemyData) {
            let speed = 0.6 + (waveNum * 0.04);
            let health; let damage; let geo; let color;
            switch(type) {
                case 'basic': health = 15 + (waveNum * 2); damage = 1; geo = new THREE.SphereGeometry(8, 16, 16); color = '#6B8E23'; break;
                case 'fast': health = 15 + (waveNum * 2); damage = 1 + Math.floor(waveNum / 5); speed *= 1.8; geo = new THREE.SphereGeometry(6, 12, 12); color = '#DAA520'; break;
                case 'tank': health = 50 + (waveNum * 6); damage = 3 + Math.floor(waveNum / 4); speed *= 0.5; geo = new THREE.BoxGeometry(14, 14, 14); color = '#4682B4'; break;
                case 'sniper': health = 15 + waveNum; damage = 4 + Math.floor(waveNum / 3); speed *= 0.6; geo = new THREE.OctahedronGeometry(9); color = '#9370DB'; break;
                case 'burrowing': health = 20 + (waveNum * 3); damage = 2 + Math.floor(waveNum / 4); speed *= 0.8; geo = new THREE.CylinderGeometry(8, 8, 12, 8); color = '#8B4513'; break;
                case 'spawner': health = 35 + (waveNum * 5); damage = 1; speed *= 0.4; geo = new THREE.IcosahedronGeometry(12); color = '#DA70D6'; break;
                case 'boss': health = (waveNum % 5 === 0) ? (80 + waveNum * 15) : 60; damage = (waveNum % 5 === 0) ? (15 + Math.floor(waveNum / 4)) : 5; speed *= 0.4; geo = new THREE.IcosahedronGeometry(20); color = '#8B0000'; break;
                default: health = 25 + (waveNum * 4); damage = 1 + Math.floor(waveNum / 5); geo = new THREE.SphereGeometry(8, 16, 16); color = '#6B8E23';
            }
            const mat = new THREE.MeshLambertMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 });
            // Calculate glow radius based on geometry type
            let glowRadius = 12; // default
            if (geo.parameters.radius !== undefined && !isNaN(geo.parameters.radius)) {
                glowRadius = Number(geo.parameters.radius) * 1.4;
            } else if (geo.parameters.width !== undefined) {
                glowRadius = Math.max(geo.parameters.width, geo.parameters.height || 1, geo.parameters.depth || 1) * 0.7;
            }
            const glowGeo = new THREE.SphereGeometry(glowRadius, 8, 8);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.25 });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            const path = currentPath || [];
            if (path.length === 0) { console.error('No path defined!'); return null; }
            const startPos = path[0];
            const firstWaypoint = path[1] || path[path.length - 1];
            const startX = startPos.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const startZ = startPos.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetX = firstWaypoint.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetZ = firstWaypoint.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const enemy = {
                mesh: new THREE.Mesh(geo, mat), position: new THREE.Vector3(startX, 8, startZ),
                target: new THREE.Vector3(targetX, 8, targetZ), path: path, pathIndex: 0,
                speed: speed, health: health, maxHealth: health, damage: damage,
                variant: variant, id: Math.random(), type: type
            };
            const hMult = enemyData?.healthMult || 1;
            const sMult = enemyData?.speedMult || 1;
            enemy.health = Math.floor(enemy.health * hMult);
            enemy.maxHealth = enemy.health;
            enemy.speed = enemy.speed * sMult;
            enemy.mesh.position.copy(enemy.position);
            enemy.mesh.castShadow = true;
            scene.add(enemy.mesh);
            enemy.mesh.scale.set(0, 0, 0);
            animateSpawn(enemy.mesh);
            glowMesh.position.copy(enemy.position);
            scene.add(glowMesh);
            enemy.glowMesh = glowMesh;
            const face = createEnemyFace(type);
            enemy.mesh.add(face);
            enemy.face = face;
            const healthBarGeo = new THREE.PlaneGeometry(16, 3);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(healthBarGeo, healthBarMat);
            healthBar.position.set(0, 20, 0);
            enemy.mesh.add(healthBar);
            enemy.healthBar = healthBar;
            return enemy;
        }

        function animateSpawn(mesh) {
            let scale = 0;
            const spawnInterval = setInterval(() => {
                scale += 0.1;
                mesh.scale.set(scale, scale, scale);
                if (scale >= 1) { mesh.scale.set(1, 1, 1); clearInterval(spawnInterval); }
            }, 30);
        }

        function showWaveAnnouncement(waveNum) {
            const overlay = document.createElement('div');
            overlay.id = 'wave-overlay';
            overlay.style.cssText = `
                position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                display: flex; align-items: center; justify-content: center;
                background: rgba(0,0,0,0.5); z-index: 500;
                animation: fadeInOut 2s ease-in-out forwards;
                font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            `;
            const difficulty = calculateWaveDifficulty(waveNum);

            overlay.innerHTML = `
                <div style="text-align: center; animation: wavePopIn 0.5s ease-out;">
                    <div style="font-size: 56px; color: #30d158; font-weight: 700; letter-spacing: -0.03em;">Wave ${waveNum}</div>
                    <div style="font-size: 17px; color: rgba(255,255,255,0.7); margin-top: 8px; font-weight: 400;">Get Ready</div>
                    <div style="font-size: 13px; color: #ffd60a; margin-top: 6px;">
                        ${enemyCount} enemies • Difficulty: ${difficulty}
                        ${bossWave ? '<br><span style="color:#ff453a; font-size:15px; font-weight:600;">⚠ Boss Wave</span>' : ''}
