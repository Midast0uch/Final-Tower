        function updateChaosMeter(delta) {
            const fill = document.getElementById('chaos-fill');
            if (!fill) return;
            const baseGain = 0.1 * delta;
            const currentRate = baseGain;
            let newChaos = (gameState.chaos || 0) + currentRate;
            const percent = Math.min(100, (newChaos / 25) * 100);
            fill.style.width = `${percent}%`;
        }

        function checkWaveCompletion() {
            if (!gameState.waveActive) return;
            if (!waveEnemies || !currentWave) return;
            const now = Date.now();
            if (waveEnemies.length > 0 && now - lastSpawnTime >= currentWave.spawnDelay) {
                const enemyData = waveEnemies.shift();
                const enemy = spawnEnemy(enemyData.type, enemyData.variant, currentWaveNum, enemyData);
                if (enemy) { gameState.enemies.push(enemy); }
                lastSpawnTime = now;
            }
            const elapsed = (now - waveStartTime) / 1000;
            const timerExpired = elapsed >= waveDuration;
            if (timerExpired || (waveEnemies.length === 0 && gameState.enemies.length === 0)) {
                gameState.enemies.forEach(enemy => {
                    if (enemy.mesh && enemy.mesh.parent) {
                        scene.remove(enemy.mesh);
                        if (enemy.glowMesh && enemy.glowMesh.parent) { scene.remove(enemy.glowMesh); }
                        if (enemy.healthBar && enemy.healthBar.parent) { enemy.mesh.remove(enemy.healthBar); }
                    }
                });
                gameState.enemies = [];
                waveComplete();
            }
        }

        function waveComplete() {
            gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + 20);
            if (Math.random() < 0.35) { showEventPopup(); }
            gameState.maxWaveReached = Math.max(gameState.maxWaveReached, gameState.wave);
            if (gameState.wave % 5 === 0) {
                gameState.bossesDefeated = (gameState.bossesDefeated || 0) + 1;
            }
            startPreparationPhase();
            updateUI();
        }

        function showEventPopup() {
            const effects = [
                { type: 'energy', amount: 50, text: '+50 Energy' },
                { type: 'lives', amount: 2, text: '+2 Lives' },
                { type: 'buff', amount: 1.5, text: '+50% Damage (60s)' }
            ];
            const effect = effects[Math.floor(Math.random() * effects.length)];
            const popup = document.getElementById('event-popup');
            if (effect.type === 'buff') { gameState.towers.forEach(t => t.damageMult *= 1.5); }
            popup.innerHTML = `<strong>EVENT!</strong><br>${effect.text}`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 3000);
        }

        function updatePathTiles() {
            const time = Date.now() * 0.001;
            pathSegments.forEach(seg => {
                if (!seg.animPhase || !seg.mesh || !seg.mesh.material) return;
                const t = (Math.sin(time * 0.8 + seg.animPhase) + 1) / 2;
                const baseR = ((seg.baseColor >> 16) & 0xff) / 255;
                const baseG = ((seg.baseColor >> 8) & 0xff) / 255;
                const baseB = (seg.baseColor & 0xff) / 255;
                const greenR = 0x1a / 255;
                const greenG = 0x8a / 255;
                const greenB = 0x0a / 255;
                const r = baseR * (1 - t) + greenR * t;
                const g = baseG * (1 - t) + greenG * t;
                const b = baseB * (1 - t) + greenB * t;
                seg.mesh.material.color.setRGB(r, g, b);
                seg.mesh.material.emissive.setRGB(r * 0.8, g * 0.8, b * 0.8);
                seg.mesh.material.emissiveIntensity = 1.0 + t * 1.0;
            });
        }

        function scatterDecoyTiles() {
            const decoyColors = [0x3d2b1f, 0x2e1f0f, 0x4a3728, 0x3b2a1a, 0x2c1a0a];
            const tileSize = CONFIG.TILE_SIZE;
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                for (let z = 0; z < CONFIG.MAP_HEIGHT; z++) {
                    if (gameState.pathGrid && gameState.pathGrid[x] && gameState.pathGrid[x][z]) continue;
                    if (gameState.towers.some(t => t.gridX === x && t.gridZ === z)) continue;
                    if (Math.random() > 0.1) continue;
                    const wx = x * tileSize + tileSize / 2;
                    const wz = z * tileSize + tileSize / 2;
                    const color = decoyColors[Math.floor(Math.random() * decoyColors.length)];
                    const geo = new THREE.BoxGeometry(tileSize * 0.5, 1, tileSize * 0.5);
                    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.95, metalness: 0.0 });
                    const tile = new THREE.Mesh(geo, mat);
                    tile.position.set(wx, 7, wz);
                    tile.receiveShadow = true;
                    scene.add(tile);
                    decoyTiles.push(tile);
                }
            }
        }

        let lastEnergyRegen = Date.now();

        function animate() {
            requestAnimationFrame(animate);
            if (gameState.gameOver) return;
            const delta = 16;
            const now = Date.now();
            updatePathTiles();
            if (now - lastEnergyRegen >= 1000) {
                gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + CONFIG.ENERGY_REGEN);
                lastEnergyRegen = now;
                updateUI();
            }
            if (gameState.gamePhase === 'PREPARATION') {
                const elapsed = Math.floor((now - preparationStartTime) / 1000);
                gameState.preparationTimer = Math.max(0, CONFIG.PREPARATION_TIME - elapsed);
                const startBtn = document.getElementById('start-wave-btn');
                startBtn.textContent = gameState.preparationTimer > 0 ? `WAVE ${gameState.wave} - ${gameState.preparationTimer}s` : 'Start Wave';
                if (gameState.preparationTimer <= 0) { startWaveActive(); }
            }
            if (gameState.waveActive && gameState.enemies.length > 0) {
                gameState.towers.forEach((tower, index) => {
                    let closestEnemy = null;
                    let closestDist = Infinity;
                    const towerPos = tower.mesh.position;
                    const range = TOWER_TYPES[tower.typeKey].range * CONFIG.TILE_SIZE;
                    for (const enemy of gameState.enemies) {
                        if (!enemy.mesh.parent) continue;
                        const dist = towerPos.distanceTo(enemy.position);
                        if (dist < range && dist < closestDist) { closestDist = dist; closestEnemy = enemy; }
                    }
                    if (closestEnemy) {
                        const dx = closestEnemy.position.x - towerPos.x;
                        const dz = closestEnemy.position.z - towerPos.z;
                        const targetAngle = Math.atan2(dx, dz);
                        let currentAngle = tower.mesh.rotation.y;
                        let diff = targetAngle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        tower.mesh.rotation.y += diff * 0.15;
                    }
                    const fireRate = tower.fireRate || 1000;
                    if (now - tower.lastFired > fireRate) { createProjectile(index); tower.lastFired = now; }
                });
            }
            updateTowerRangeIndicators();
            checkWaveCompletion();
            updateEnemies(delta);
            updateProjectiles(delta);
            updateTowerHealthBars();
            updateTerrain(delta);
            updateEnemyHealthBars();
            updateUI();
            renderer.render(scene, camera);
        }

        let preparationStartTime = Date.now();

        function endGame(victory) {
            gameState.gameOver = true;
            gameState.gamePhase = 'GAME_OVER';
            saveScore(gameState.maxWaveReached);
            updateAchievements();
            saveGameState();
            const screen = document.getElementById('game-over-screen');
            screen.classList.remove('hidden');
            document.getElementById('end-title').textContent = victory ? 'VICTORY!' : 'Game Over';
            document.getElementById('end-reason').textContent = victory ? `You reached wave ${gameState.maxWaveReached}!` : `You reached wave ${gameState.wave}. Better luck next time!`;
            showGameStats();
        }

        const LEADERBOARD_KEY = 'finalTower_leaderboard';
        const MAX_SCORES = 10;

        function getLeaderboard() {
            try { const data = localStorage.getItem(LEADERBOARD_KEY); return data ? JSON.parse(data) : []; }
            catch (e) { return []; }
        }

        function saveScore(wave) {
            if (wave < 1) return;
            const leaderboard = getLeaderboard();
            leaderboard.push({ wave: wave, date: new Date().toISOString(), score: wave * 100 });
            leaderboard.sort((a, b) => b.wave - a.wave);
            const topScores = leaderboard.slice(0, MAX_SCORES);
            try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(topScores)); }
            catch (e) { console.log('Could not save leaderboard'); }
        }

        function showGameStats() {
            const leaderboard = getLeaderboard();
            const statsDiv = document.getElementById('game-stats') || createStatsDiv();
            let statsHTML = '<div id="game-stats" style="text-align:center; margin-top:20px;">';
            statsHTML += '<h3>Your Stats</h3>';
            statsHTML += `<p>Highest Wave: ${gameState.maxWaveReached}</p>`;
            statsHTML += `<p>Total Kills: ${gameState.totalKills || 0}</p>`;
            if (leaderboard.length > 0) {
                statsHTML += '<h3>Leaderboard</h3>';
                leaderboard.slice(0, 5).forEach((entry, i) => {
                    statsHTML += `<p>${i + 1}. Wave ${entry.wave} - ${entry.date.substring(0, 10)}</p>`;
                });
            }
            statsHTML += '</div>';
            const endReason = document.getElementById('end-reason');
            endReason.innerHTML += statsHTML;
        }

        function createStatsDiv() {
            const div = document.createElement('div');
            div.id = 'game-stats';
            return div;
        }

        const ACHIEVEMENTS_KEY = 'finalTower_achievements';
        const ACHIEVEMENTS = {
            MOLE_MASHER: { id: 'mole_masher', name: 'Mole Masher', desc: 'Kill 100 enemies', target: 100, reward: 50 },
            SURVIVALIST: { id: 'survivalist', name: 'Survivalist', desc: 'Reach wave 20', target: 20, reward: 100 },
            PATHMASTER: { id: 'pathmaster', name: 'Pathmaster', desc: 'Survive 5 path changes', target: 5, reward: 75 },
            BOSS_BASHER: { id: 'boss_basher', name: 'Boss Basher', desc: 'Defeat 10 bosses', target: 10, reward: 100 },
            ENDLESS_DEFENDER: { id: 'endless_defender', name: 'Endless Defender', desc: 'Reach wave 50', target: 50, reward: 200 }
        };

        function getAchievements() {
            try { const data = localStorage.getItem(ACHIEVEMENTS_KEY); return data ? JSON.parse(data) : {}; }
            catch (e) { return {}; }
        }

        function saveAchievements(achievements) {
            try { localStorage.setItem(ACHIEVEMENTS_KEY, JSON.stringify(achievements)); }
            catch (e) { console.log('Could not save achievements'); }
        }

        function unlockAchievement(id) {
            const achievements = getAchievements();
            if (!achievements[id]) {
                achievements[id] = { unlocked: true, date: new Date().toISOString() };
                saveAchievements(achievements);
                const achievement = ACHIEVEMENTS[id];
                if (achievement) {
                    gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + achievement.reward);
                    showFloatingText(window.innerWidth / 2, window.innerHeight / 2, 0, `🏆 ${achievement.name}! +${achievement.reward}⚡`, '#ffd700');
                }
            }
        }

        function updateAchievements() {
            const kills = gameState.totalKills || 0;
            const wave = gameState.maxWaveReached;
            const pathChanges = gameState.pathChanges || 0;
            const bossesDefeated = gameState.bossesDefeated || 0;
            if (kills >= 100) unlockAchievement('MOLE_MASHER');
            if (wave >= 20) unlockAchievement('SURVIVALIST');
            if (pathChanges >= 5) unlockAchievement('PATHMASTER');
            if (bossesDefeated >= 10) unlockAchievement('BOSS_BASHER');
            if (wave >= 50) unlockAchievement('ENDLESS_DEFENDER');
        }

        const SAVE_KEY = 'finalTower_save';

        function saveGameState() {
            const saveData = {
                wave: gameState.wave, maxWaveReached: gameState.maxWaveReached,
                energy: gameState.energy, lives: gameState.lives,
                towers: gameState.towers.map(t => ({ typeKey: t.typeKey, gridX: t.gridX, gridY: t.gridY, damageMult: t.damageMult })),
                totalKills: gameState.totalKills || 0, pathChanges: gameState.pathChanges || 0,
                bossesDefeated: gameState.bossesDefeated || 0, savedAt: new Date().toISOString()
            };
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); }
            catch (e) { console.log('Could not save game'); }
        }

        function loadGameState() {
            try {
                const data = localStorage.getItem(SAVE_KEY);
                if (data) {
                    const saveData = JSON.parse(data);
                    gameState.wave = saveData.wave || 1;
                    gameState.maxWaveReached = saveData.maxWaveReached || 0;
                    gameState.energy = saveData.energy || CONFIG.BASE_ENERGY;
                    gameState.lives = saveData.lives || CONFIG.BASE_LIVES;
                    gameState.totalKills = saveData.totalKills || 0;
                    gameState.pathChanges = saveData.pathChanges || 0;
                    gameState.bossesDefeated = saveData.bossesDefeated || 0;
                    return true;
                }
            } catch (e) { console.log('Could not load game'); }
            return false;
        }

        function hasSavedGame() {
            try { return localStorage.getItem(SAVE_KEY) !== null; }
            catch (e) { return false; }
        }

        let waveStartTime = 0;
        let waveDuration = 0;
        let currentWave = null;
        let waveEnemies = [];
        let lastSpawnTime = 0;
        let currentPathIndex = 0;

        function createProjectile(towerIndex) {
            const tower = gameState.towers[towerIndex];
            if (!tower || !tower.mesh) return;
            let closestEnemy = null;
            let closestDist = Infinity;
            const towerPos = tower.mesh.position;
            const range = TOWER_TYPES[tower.typeKey].range * CONFIG.TILE_SIZE;
            for (const enemy of gameState.enemies) {
                if (!enemy.mesh || !enemy.mesh.parent) continue;
                const dist = towerPos.distanceTo(enemy.position);
                if (dist < range && dist < closestDist) { closestDist = dist; closestEnemy = enemy; }
            }
            if (!closestEnemy) return;
            const projColor = TOWER_TYPES[tower.typeKey].color;
            const projSize = tower.typeKey === 'CANNON' ? 5 : 3;
            const geo = new THREE.BoxGeometry(projSize, projSize, projSize);
            const mat = new THREE.MeshStandardMaterial({ color: projColor, roughness: 0.3, metalness: 0.5, emissive: projColor, emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(towerPos);
            mesh.position.y += 12;
            scene.add(mesh);
            const proj = {
                mesh: mesh,
                target: closestEnemy,
                damage: TOWER_TYPES[tower.typeKey].damage * (tower.damageMult || 1),
                speed: tower.typeKey === 'SNIPER' ? 12 : tower.typeKey === 'CANNON' ? 6 : 8,
                life: 120,
                typeKey: tower.typeKey,
                trails: []
            };
            if (tower.typeKey === 'CANNON') {
                proj.aoe = TOWER_TYPES.CANNON.area || 3;
            }
            gameState.projectiles.push(proj);
        }

        function createProjectileTrail() {
            if (gameState.projectiles.length === 0) return;
            gameState.projectiles.forEach((proj, idx) => {
                if (!proj.mesh.parent && !gameState.gameOver) return;
                const trailGeo = new THREE.SphereGeometry(1.5);
                const trailMat = new THREE.MeshBasicMaterial({
                    color: TOWER_TYPES[proj.gridX ? 'BASIC' : (proj.typeKey || 'CANNON')].color,
                    transparent: true, opacity: 0.6
                });
                const trailMesh = new THREE.Mesh(trailGeo, trailMat);
                trailMesh.position.copy(proj.position).sub(new THREE.Vector3(5, -5, 5));
                scene.add(trailMesh);
                proj.trails.push({ mesh: trailMesh });
            });
            const maxTrails = gameState.projectiles.length * 3;
            gameState.projectiles.forEach((proj, idx) => {
                if (!proj.trails) proj.trails = [];
                while (proj.trails.length > maxTrails) {
                    const oldTrail = proj.trails.shift();
                    if (oldTrail && oldTrail.mesh.parent) {
                        scene.remove(oldTrail.mesh);
                        oldTrail.mesh.geometry.dispose();
                        oldTrail.mesh.material.dispose();
                    }
                }
            });
        }

        // Error trapping
        window.addEventListener('error', (e) => {
            console.error('CAUGHT ERROR:', e.message, 'at', e.filename + ':' + e.lineno);
            if (e.error && e.error.stack) console.error('Stack:', e.error.stack);
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('UNHANDLED PROMISE:', e.reason);
        });

        try {
            init();
            console.log('Starting fresh - wave 1');
        } catch (e) {
            console.error('INIT FAILED:', e.message, 'at line', e.lineNumber);
            console.error(e.stack);
        }
    </script>
</body>
</html>
