                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(rx, 3, rz);
                rock.rotation.y = Math.random() * Math.PI;
                rock.castShadow = true;
                const rockEdges = new THREE.LineSegments(new THREE.EdgesGeometry(rockGeo), edgeMat);
                rockEdges.position.copy(rock.position);
                rockEdges.rotation.copy(rock.rotation);
                scene.add(rockEdges);
                scene.add(rock);
            }
            const grassTuftColors = [0x3d6b2d, 0x4a8c3a, 0x2f5c28, 0x5a8c3a];
            for (let i = 0; i < 60; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const tx = x * blockSize + blockSize / 2;
                const tz = z * blockSize + blockSize / 2;
                const tuftColor = grassTuftColors[Math.floor(Math.random() * grassTuftColors.length)];
                const tuftMat = new THREE.MeshStandardMaterial({ color: tuftColor, roughness: 0.95, metalness: 0.0 });
                const tuftGeo = new THREE.BoxGeometry(2, 5 + Math.random() * 4, 2);
                const tuft = new THREE.Mesh(tuftGeo, tuftMat);
                tuft.position.set(tx, 5, tz);
                scene.add(tuft);
            }
            const darkGrassGeo = new THREE.BoxGeometry(blockSize - 3, 4.5, blockSize - 3);
            const darkGrassMat = new THREE.MeshStandardMaterial({ color: 0x1a3d15, roughness: 0.95, metalness: 0.0 });
            for (let i = 0; i < 15; i++) {
                const x = Math.floor(Math.random() * CONFIG.MAP_WIDTH);
                const z = Math.floor(Math.random() * CONFIG.MAP_HEIGHT);
                const darkPatch = new THREE.Mesh(darkGrassGeo, darkGrassMat);
                darkPatch.position.set(x * blockSize + blockSize / 2, 2.5, z * blockSize + blockSize / 2);
                scene.add(darkPatch);
            }
            createAmbientParticles();
            updateBorderWalls();
        }

        let borderMeshes = [];

        function updateBorderWalls() {
            borderMeshes.forEach(m => {
                scene.remove(m);
                m.geometry.dispose();
                m.material.dispose();
            });
            borderMeshes = [];
            const borderMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9, metalness: 0.0 });
            const borderH = 8;
            const borderW = 4;
            const mapW = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
            const mapH = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
            const northGeo = new THREE.BoxGeometry(mapW + borderW * 2, borderH, borderW);
            const north = new THREE.Mesh(northGeo, borderMat);
            north.position.set(mapW / 2, borderH / 2, -borderW / 2);
            north.receiveShadow = true;
            scene.add(north);
            borderMeshes.push(north);
            const south = new THREE.Mesh(northGeo, borderMat);
            south.position.set(mapW / 2, borderH / 2, mapH + borderW / 2);
            south.receiveShadow = true;
            scene.add(south);
            borderMeshes.push(south);
            const westGeo = new THREE.BoxGeometry(borderW, borderH, mapH);
            const west = new THREE.Mesh(westGeo, borderMat);
            west.position.set(-borderW / 2, borderH / 2, mapH / 2);
            west.receiveShadow = true;
            scene.add(west);
            borderMeshes.push(west);
            const east = new THREE.Mesh(westGeo, borderMat);
            east.position.set(mapW + borderW / 2, borderH / 2, mapH / 2);
            east.receiveShadow = true;
            scene.add(east);
            borderMeshes.push(east);
        }

        function createVoxelPineTree(x, z) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.95, metalness: 0.0 });
            const greenShades = [0x228b22, 0x2d8f2d, 0x1a7a1a, 0x32a032, 0x2b8c2b];
            const group = new THREE.Group();
            const trunkSize = 2.5;
            for (let i = 0; i < 3; i++) {
                const geo = new THREE.BoxGeometry(trunkSize, 3, trunkSize);
                const mesh = new THREE.Mesh(geo, trunkMat);
                mesh.position.y = 1.5 + i * 3;
                mesh.castShadow = true;
                group.add(mesh);
            }
            const leafLayers = [
                { size: 10, y: 10 },
                { size: 8, y: 14 },
                { size: 6, y: 17 },
                { size: 4, y: 20 },
                { size: 2, y: 22 },
            ];
            leafLayers.forEach(layer => {
                const leafColor = greenShades[Math.floor(Math.random() * greenShades.length)];
                const leafMat = new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.9, metalness: 0.0 });
                const geo = new THREE.BoxGeometry(layer.size, 3, layer.size);
                const mesh = new THREE.Mesh(geo, leafMat);
                mesh.position.y = layer.y;
                mesh.rotation.y = Math.random() * 0.2;
                mesh.castShadow = true;
                group.add(mesh);
            });
            group.position.set(x, 0, z);
            group.scale.setScalar(0.85 + Math.random() * 0.3);
            scene.add(group);
        }

        function createVoxelOakTree(x, z) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.95, metalness: 0.0 });
            const canopyColors = [0x4CAF50, 0x66BB6A, 0x388E3C, 0x2E7D32];
            const berryColors = [0xE53935, 0x8E24AA, 0x1E88E5];
            const group = new THREE.Group();
            const trunkSize = 3;
            for (let i = 0; i < 4; i++) {
                const geo = new THREE.BoxGeometry(trunkSize, 3, trunkSize);
                const mesh = new THREE.Mesh(geo, trunkMat);
                mesh.position.y = 1.5 + i * 3;
                mesh.castShadow = true;
                group.add(mesh);
            }
            const canopyVoxels = [
                { ox: 0, oy: 14, oz: 0, s: 8 },
                { ox: 0, oy: 16, oz: 0, s: 9 },
                { ox: 0, oy: 18, oz: 0, s: 8 },
                { ox: 0, oy: 20, oz: 0, s: 6 },
                { ox: 3, oy: 16, oz: 0, s: 5 },
                { ox: -3, oy: 16, oz: 0, s: 5 },
                { ox: 0, oy: 16, oz: 3, s: 5 },
                { ox: 0, oy: 16, oz: -3, s: 5 },
                { ox: 2, oy: 18, oz: 2, s: 4 },
                { ox: -2, oy: 18, oz: -2, s: 4 },
            ];
            canopyVoxels.forEach(v => {
                const canopyColor = canopyColors[Math.floor(Math.random() * canopyColors.length)];
                const mat = new THREE.MeshStandardMaterial({ color: canopyColor, roughness: 0.88, metalness: 0.0 });
                const geo = new THREE.BoxGeometry(v.s, 2.5, v.s);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(v.ox, v.oy, v.oz);
                mesh.castShadow = true;
                group.add(mesh);
            });
            const berryGeo = new THREE.BoxGeometry(2, 2, 2);
            for (let b = 0; b < 3; b++) {
                const berryMat = new THREE.MeshStandardMaterial({ color: berryColors[Math.floor(Math.random() * berryColors.length)], roughness: 0.6, metalness: 0.0 });
                const berry = new THREE.Mesh(berryGeo, berryMat);
                berry.position.set((Math.random() - 0.5) * 8, 16 + Math.random() * 4, (Math.random() - 0.5) * 8);
                group.add(berry);
            }
            group.position.set(x, 0, z);
            group.scale.setScalar(0.85 + Math.random() * 0.3);
            scene.add(group);
        }

        function createVoxelBush(x, z, berryColors) {
            const bushMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.9, metalness: 0.0 });
            const lightGreenMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.88, metalness: 0.0 });
            const group = new THREE.Group();
            const bushVoxels = [
                { ox: 0, oy: 3, oz: 0, sx: 8, sy: 3, sz: 6 },
                { ox: 0, oy: 5, oz: 0, sx: 7, sy: 3, sz: 5 },
                { ox: 2, oy: 4, oz: 0, sx: 4, sy: 3, sz: 4 },
                { ox: -2, oy: 4, oz: 0, sx: 4, sy: 3, sz: 4 },
                { ox: 0, oy: 4, oz: 2, sx: 5, sy: 3, sz: 3 },
                { ox: 0, oy: 4, oz: -2, sx: 5, sy: 3, sz: 3 },
            ];
            bushVoxels.forEach((v, i) => {
                const mat = i % 2 === 0 ? bushMat : lightGreenMat;
                const geo = new THREE.BoxGeometry(v.sx, v.sy, v.sz);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(v.ox, v.oy, v.oz);
                mesh.castShadow = true;
                group.add(mesh);
            });
            const berryGeo = new THREE.BoxGeometry(2, 2, 2);
            for (let j = 0; j < 3; j++) {
                const berryMat = new THREE.MeshStandardMaterial({ color: berryColors[Math.floor(Math.random() * berryColors.length)], roughness: 0.5, metalness: 0.0 });
                const berry = new THREE.Mesh(berryGeo, berryMat);
                berry.position.set((Math.random() - 0.5) * 6, 4 + j * 0.5, (Math.random() - 0.5) * 4);
                group.add(berry);
            }
            group.position.set(x, 0, z);
            group.scale.setScalar(0.7 + Math.random() * 0.6);
            scene.add(group);
        }

        function extendTerrain(oldWidth, oldHeight) {
            const newWidth = CONFIG.MAP_WIDTH;
            const newHeight = CONFIG.MAP_HEIGHT;
            const tileSize = CONFIG.TILE_SIZE;
            const blockSize = tileSize;
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.12 });
            
            updateBorderWalls();
            
            for (let x = 0; x < newWidth; x++) {
                for (let y = 0; y < newHeight; y++) {
                    if (x < oldWidth && y < oldHeight) continue;
                    
                    const worldX = x * blockSize + blockSize / 2;
                    const worldZ = y * blockSize + blockSize / 2;
                    
                    const heightVar = Math.random() * 2;
                    const grassColors = [0x228B22, 0x2d8f2d, 0x1a7a1a, 0x32a032, 0x2b8c2b];
                    const grassColor = grassColors[Math.floor(Math.random() * grassColors.length)];
                    const grassGeo = new THREE.BoxGeometry(blockSize - 2, 3 + heightVar, blockSize - 2);
                    const grassMat = new THREE.MeshStandardMaterial({ color: grassColor, roughness: 0.92, metalness: 0.0 });
                    const grassBlock = new THREE.Mesh(grassGeo, grassMat);
                    grassBlock.position.set(worldX, 1.5 + heightVar / 2, worldZ);
                    grassBlock.castShadow = true;
                    grassBlock.receiveShadow = true;
                    scene.add(grassBlock);
                    const grassEdges = new THREE.LineSegments(new THREE.EdgesGeometry(grassGeo), edgeMat);
                    grassEdges.position.copy(grassBlock.position);
                    scene.add(grassEdges);
                    
                    const dirtColors = [0x654321, 0x8B4513, 0x7a3b10, 0x5c3317];
                    const dirtColor = dirtColors[Math.floor(Math.random() * dirtColors.length)];
                    const dirtHeight = 6 + Math.random() * 4;
                    const dirtGeo = new THREE.BoxGeometry(blockSize - 2, dirtHeight, blockSize - 2);
                    const dirtMat = new THREE.MeshStandardMaterial({ color: dirtColor, roughness: 1.0, metalness: 0.0 });
                    const dirtBlock = new THREE.Mesh(dirtGeo, dirtMat);
                    dirtBlock.position.set(worldX, -2 - dirtHeight / 2 + 4, worldZ);
                    dirtBlock.receiveShadow = true;
                    scene.add(dirtBlock);
                    const dirtEdges = new THREE.LineSegments(new THREE.EdgesGeometry(dirtGeo), edgeMat);
                    dirtEdges.position.copy(dirtBlock.position);
                    scene.add(dirtEdges);
                    
                    const stoneColors = [0x696969, 0x7a7a7a, 0x585858, 0x4a4a4a];
                    const stoneColor = stoneColors[Math.floor(Math.random() * stoneColors.length)];
                    const stoneGeo = new THREE.BoxGeometry(blockSize - 2, 6, blockSize - 2);
                    const stoneMat = new THREE.MeshStandardMaterial({ color: stoneColor, roughness: 0.75, metalness: 0.08 });
                    const stoneBlock = new THREE.Mesh(stoneGeo, stoneMat);
                    stoneBlock.position.set(worldX, -8 - 3, worldZ);
                    stoneBlock.receiveShadow = true;
                    scene.add(stoneBlock);
                    const stoneEdges = new THREE.LineSegments(new THREE.EdgesGeometry(stoneGeo), edgeMat);
                    stoneEdges.position.copy(stoneBlock.position);
                    scene.add(stoneEdges);
                    
                    if (Math.random() > 0.7) {
                        const highlightGeo = new THREE.BoxGeometry(blockSize * 0.3, 0.5, blockSize * 0.3);
                        const highlightColors = [0x3ddc3d, 0x45e845, 0x2ebf2e];
                        const highlightMat = new THREE.MeshStandardMaterial({ color: highlightColors[Math.floor(Math.random() * highlightColors.length)], roughness: 0.85, metalness: 0.0 });
                        const highlight = new THREE.Mesh(highlightGeo, highlightMat);
                        highlight.position.set(worldX + (Math.random() - 0.5) * 10, 4.5 + heightVar, worldZ + (Math.random() - 0.5) * 10);
                        scene.add(highlight);
                    }
                }
            }
            
            const berryColors = [0xE53935, 0x8E24AA, 0x1E88E5];
            const rockColors = [0x505050, 0x404040, 0x606060, 0x3a3a3a, 0x707070];
            const flowerColors = [0xff6b9d, 0xffeb3b, 0xffffff, 0xe91e63, 0x9c27b0, 0xff5722, 0x00bcd4];
            const waterColors = [0x4FC3F7, 0x29B6F6, 0x03A9F4, 0x0288D1];
            const mushColors = [0xff4444, 0xff8800, 0xffcc00, 0xcc44ff];
            
            for (let x = 0; x < newWidth; x++) {
                for (let y = 0; y < newHeight; y++) {
                    if (x < oldWidth && y < oldHeight) continue;
                    const pos = { x: x * blockSize + blockSize / 2, z: y * blockSize + blockSize / 2 };
                    const tileRoll = Math.random();
                    
                    if (tileRoll < 0.20) {
                        createVoxelPineTree(pos.x, pos.z);
                    } else if (tileRoll < 0.35) {
                        createVoxelOakTree(pos.x, pos.z);
                    } else if (tileRoll < 0.48) {
                        createVoxelBush(pos.x + (Math.random()-0.5)*10, pos.z + (Math.random()-0.5)*10, berryColors);
                    } else if (tileRoll < 0.58) {
                        const mushColor = mushColors[Math.floor(Math.random() * mushColors.length)];
                        const mushCapMat = new THREE.MeshStandardMaterial({ color: mushColor, roughness: 0.7, metalness: 0.0 });
                        const mushCap = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 5), mushCapMat);
                        mushCap.position.set(pos.x, 6, pos.z);
                        scene.add(mushCap);
                        const stemMat = new THREE.MeshStandardMaterial({ color: 0xffeecc, roughness: 0.9, metalness: 0.0 });
                        const mushStem = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), stemMat);
                        mushStem.position.set(pos.x, 3, pos.z);
                        scene.add(mushStem);
                    } else if (tileRoll < 0.68) {
                        for (let r = 0; r < 2; r++) {
                            const rockColor = rockColors[Math.floor(Math.random() * rockColors.length)];
                            const rockGeo = new THREE.BoxGeometry(4 + Math.random() * 3, 3 + Math.random() * 2, 4 + Math.random() * 3);
                            const rockMat = new THREE.MeshStandardMaterial({ color: rockColor, roughness: 0.85, metalness: 0.05 });
                            const rock = new THREE.Mesh(rockGeo, rockMat);
                            rock.position.set(pos.x + (r - 0.5) * 8, 3, pos.z + (r - 0.5) * 6);
                            rock.rotation.y = Math.random() * Math.PI;
                            rock.castShadow = true;
                            const rockEdges = new THREE.LineSegments(new THREE.EdgesGeometry(rockGeo), edgeMat);
                            rockEdges.position.copy(rock.position);
                            rockEdges.rotation.copy(rock.rotation);
                            scene.add(rockEdges);
                            scene.add(rock);
                        }
                    } else if (tileRoll < 0.78) {
                        const flowerStemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9, metalness: 0.0 });
                        for (let f = 0; f < 3; f++) {
                            const stem = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 1), flowerStemMat);
                            stem.position.set(pos.x + (f - 1) * 5, 6, pos.z);
                            scene.add(stem);
                            const fColor = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                            const fMat = new THREE.MeshStandardMaterial({ color: fColor, roughness: 0.8, metalness: 0.0 });
                            const flower = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), fMat);
                            flower.position.set(pos.x + (f - 1) * 5, 9, pos.z);
                            scene.add(flower);
                        }
                    } else if (tileRoll < 0.85) {
                        const waterColor = waterColors[Math.floor(Math.random() * waterColors.length)];
                        const waterMat = new THREE.MeshStandardMaterial({ color: waterColor, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.7 });
                        const water = new THREE.Mesh(new THREE.BoxGeometry(blockSize * 0.6, 0.5, blockSize * 0.5), waterMat);
                        water.position.set(pos.x, 0.5, pos.z);
                        water.userData = { isWater: true, baseOpacity: 0.7, phase: Math.random() * Math.PI * 2 };
                        scene.add(water);
                    }
                }
            }
            
            const randNewPos = () => {
                let hx, hy, attempts = 0;
                do {
                    hx = oldWidth + Math.floor(Math.random() * (newWidth - oldWidth));
                    hy = Math.floor(Math.random() * newHeight);
                    attempts++;
                    if (attempts > 50) {
                        hx = Math.floor(Math.random() * newWidth);
                        hy = Math.floor(Math.random() * newHeight);
                        break;
                    }
                } while (hx < oldWidth && hy < oldHeight);
                return { x: hx * blockSize + blockSize / 2, z: hy * blockSize + blockSize / 2 };
            };
            
            const barrelMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6, metalness: 0.2 });
            for (let i = 0; i < 3; i++) {
                const pos = randNewPos();
                const barrelGroup = new THREE.Group();
                const barrelBody = [
                    { sx: 5, sy: 2, sz: 5, oy: 1 },
                    { sx: 6, sy: 2, sz: 6, oy: 3 },
                    { sx: 6, sy: 2, sz: 6, oy: 5 },
                    { sx: 5, sy: 2, sz: 5, oy: 7 },
                ];
                barrelBody.forEach(v => {
                    const geo = new THREE.BoxGeometry(v.sx, v.sy, v.sz);
                    const mesh = new THREE.Mesh(geo, barrelMat);
                    mesh.position.y = v.oy;
                    mesh.castShadow = true;
                    barrelGroup.add(mesh);
                });
                const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5, metalness: 0.1 });
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(6.5, 2, 6.5), stripeMat);
                stripe.position.y = 4;
                barrelGroup.add(stripe);
                barrelGroup.position.set(pos.x, 0, pos.z);
                barrelGroup.userData = { type: 'gas_barrel', health: 10, explosionRadius: 8, explosionDamage: 25 };
                scene.add(barrelGroup);
            }
            
            const brickMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9, metalness: 0.0 });
            for (let i = 0; i < 4; i++) {
                const pos = randNewPos();
                const wallGroup = new THREE.Group();
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 4; col++) {
                        const brickGeo = new THREE.BoxGeometry(8, 4, 4);
                        const brick = new THREE.Mesh(brickGeo, brickMat);
                        brick.position.set(col * 9 - 13.5, row * 5 + 2, 0);
                        brick.castShadow = true;
                        wallGroup.add(brick);
                    }
                }
                wallGroup.position.set(pos.x, 0, pos.z);
                wallGroup.rotation.y = Math.floor(Math.random() * 4) * Math.PI / 2;
                wallGroup.userData = { type: 'brick_wall', health: 40, maxHealth: 40 };
                scene.add(wallGroup);
            }
            
            const statueMat = new THREE.MeshStandardMaterial({ color: 0x9E9E9E, roughness: 0.7, metalness: 0.05 });
            for (let i = 0; i < 2; i++) {
                const pos = randNewPos();
                const statueGroup = new THREE.Group();
                const baseGeo = new THREE.BoxGeometry(10, 4, 10);
                const base = new THREE.Mesh(baseGeo, statueMat);
                base.position.y = 2;
                statueGroup.add(base);
                const pillarGeo = new THREE.BoxGeometry(6, 12, 6);
                const pillar = new THREE.Mesh(pillarGeo, statueMat);
                pillar.position.y = 10;
                statueGroup.add(pillar);
                const headGeo = new THREE.BoxGeometry(8, 6, 8);
                const head = new THREE.Mesh(headGeo, statueMat);
                head.position.y = 18;
                statueGroup.add(head);
                statueGroup.position.set(pos.x, 0, pos.z);
                statueGroup.userData = { type: 'statue', health: 9999, isIndestructible: true };
                scene.add(statueGroup);
            }
            
            if (Math.random() > 0.5) {
                const riverLength = 3 + Math.floor(Math.random() * 4);
                const startX = oldWidth + Math.floor(Math.random() * (newWidth - oldWidth - riverLength));
                const startY = Math.floor(Math.random() * (newHeight - 2)) + 1;
                const riverMat = new THREE.MeshStandardMaterial({ color: 0x2196F3, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.8 });
                for (let i = 0; i < riverLength; i++) {
                    const riverGeo = new THREE.BoxGeometry(blockSize - 2, 1, blockSize - 2);
                    const river = new THREE.Mesh(riverGeo, riverMat);
                    river.position.set((startX + i) * blockSize + blockSize / 2, 0.5, startY * blockSize + blockSize / 2);
                    river.userData = { type: 'river', slowsEnemies: true };
                    scene.add(river);
                }
            }
        }

        function drawPath(path) {
            if (!path || !Array.isArray(path)) return;
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
            const pathColors = [0x3d2b1f, 0x2e1f0f, 0x4a3728, 0x3b2a1a, 0x2c1a0a];
            path.forEach((p, i) => {
                setTimeout(() => {
                    if (!p || p.x === undefined) return;
                    const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    const z = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    for (let j = 0; j < 5; j++) {
                        const pGeo = new THREE.BoxGeometry(3, 3, 3);
                        const pMat = new THREE.MeshBasicMaterial({ color: 0xffd43b, transparent: true, opacity: 0.8 });
                        const particle = new THREE.Mesh(pGeo, pMat);
                        particle.position.set(x + (Math.random() - 0.5) * 15, 5, z + (Math.random() - 0.5) * 15);
                        scene.add(particle);
                        debrisParticles.push({
                            mesh: particle,
                            velocity: new THREE.Vector3((Math.random() - 0.5) * 2, 2 + Math.random() * 3, (Math.random() - 0.5) * 2),
                            life: 30 + Math.random() * 20
                        });
                    }
                }, i * 30);
            });
            for (let i = 0; i < path.length; i++) {
                const p = path[i];
                if (!p || p.x === undefined) continue;
                const x = p.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const z = p.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                const pathColor = pathColors[Math.floor(Math.random() * pathColors.length)];
                const pathGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE - 3, 1.5, CONFIG.TILE_SIZE - 3);
                const pathMat = new THREE.MeshStandardMaterial({ color: pathColor, roughness: 0.9, metalness: 0.0, emissive: 0x5a3a1a, emissiveIntensity: 0.5 });
                const pathTile = new THREE.Mesh(pathGeo, pathMat);
                pathTile.position.set(x, 7.5, z);
                pathTile.receiveShadow = true;
                scene.add(pathTile);
                pathSegments.push({ mesh: pathTile, animPhase: i * 0.15, baseColor: pathColor });
                const pathEdges = new THREE.LineSegments(new THREE.EdgesGeometry(pathGeo), edgeMat);
                pathEdges.position.copy(pathTile.position);
                scene.add(pathEdges);
                if (i % 3 === 0 && i < path.length - 1) {
                    const nextP = path[i + 1];
                    const dx = nextP.x - p.x;
                    const dz = nextP.y - p.y;
                    const arrowGroup = new THREE.Group();
                    const arrowMat = new THREE.MeshStandardMaterial({ color: 0xffd43b, roughness: 0.5, metalness: 0.1, emissive: 0xffd43b, emissiveIntensity: 0.5 });
                    const arrowHead = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 5), arrowMat);
                    arrowHead.position.set(0, 0, 0);
                    arrowGroup.add(arrowHead);
                    const arrowTail = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 4), arrowMat);
                    arrowTail.position.set(0, 0, -5);
                    arrowGroup.add(arrowTail);
                    arrowGroup.position.set(x, 6, z);
                    if (dx > 0) arrowGroup.rotation.y = Math.PI / 2;
                    else if (dx < 0) arrowGroup.rotation.y = -Math.PI / 2;
                    else if (dz < 0) arrowGroup.rotation.y = Math.PI;
                    scene.add(arrowGroup);
                }
            }
        }

        function generatePathOptions() {}

        function startGame() {
            gameState.gameStarted = true;
            gameState.gamePhase = 'PREPARATION';
            gameState.preparationTimer = CONFIG.PREPARATION_TIME;
            preparationStartTime = Date.now();
            generateNewPath();
            clearPathTiles();
            drawPath(currentPath);
            updateUI();
        }

        function generateNewPath() {
            const path = selectPathForWave(gameState.wave);
            currentPath = path;
            gameState.pathGrid = [];
            for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
                gameState.pathGrid[x] = [];
                for (let y = 0; y < CONFIG.MAP_HEIGHT; y++) {
                    gameState.pathGrid[x][y] = false;
                }
            }
            path.forEach(p => {
                if (p.x >= 0 && p.x < CONFIG.MAP_WIDTH && p.y >= 0 && p.y < CONFIG.MAP_HEIGHT) {
                    gameState.pathGrid[p.x][p.y] = true;
                }
            });
            destroyOverlappingTurrets();
        }

        function destroyOverlappingTurrets() {
            const turretsToDestroy = [];
            gameState.towers.forEach((tower, index) => {
                if (tower.gridX >= 0 && tower.gridX < CONFIG.MAP_WIDTH && tower.gridY >= 0 && tower.gridY < CONFIG.MAP_HEIGHT) {
                    if (gameState.pathGrid[tower.gridX] && gameState.pathGrid[tower.gridX][tower.gridY]) {
                        turretsToDestroy.push(index);
                    }
                }
            });
            turretsToDestroy.sort((a, b) => b - a).forEach(index => {
                const tower = gameState.towers[index];
                const towerType = tower.typeKey;
                const refund = Math.floor(TOWER_TYPES[towerType].cost * 0.8);
                gameState.energy = Math.min(CONFIG.MAX_ENERGY, gameState.energy + refund);
                createExplosion(tower.mesh.position.x, tower.mesh.position.y, tower.mesh.position.z, 1.5);
                scene.remove(tower.mesh);
                gameState.towers.splice(index, 1);
            });
            if (turretsToDestroy.length > 0) {
                showFloatingText(window.innerWidth / 2, window.innerHeight / 2, 0, `+${turretsToDestroy.length} turrets destroyed!`, '#ff6b6b');
            }
        }

        function clearPathTiles() {
            pathSegments.forEach(seg => {
                if (seg.mesh && seg.mesh.parent) { scene.remove(seg.mesh); }
            });
            pathSegments = [];
            decoyTiles.forEach(tile => {
                if (tile && tile.parent) { scene.remove(tile); }
            });
            decoyTiles = [];
        }

        function startWave() {
            if (gameState.gamePhase === 'GAME_OVER') return;
            if (gameState.gamePhase === 'PREPARATION') { startWaveActive(); return; }
            if (!gameState.gameStarted) { startGame(); return; }
        }

        function startWaveActive() {
            gameState.gamePhase = 'WAVE_ACTIVE';
            gameState.waveActive = true;
            const waveData = generateWaveEnemies(gameState.wave);
            currentWaveNum = gameState.wave;
            currentWave = waveData;
            waveEnemies = [...waveData.enemies];
            lastSpawnTime = Date.now();
            const path = currentPath || [];
            const pathLength = path.length * CONFIG.TILE_SIZE;
            const baseSpeed = 2 + (gameState.wave * 0.2);
            const travelTime = (pathLength / baseSpeed);
            const spawnTime = (waveEnemies.length * waveData.spawnDelay) / 1000;
            waveDuration = Math.ceil(spawnTime + travelTime + 15);
            waveStartTime = Date.now();
            document.getElementById('start-wave-btn').style.display = 'none';
            showWaveAnnouncement(gameState.wave);
            updateUI();
            console.log('Wave started:', gameState.wave, 'enemies:', waveEnemies.length);
        }

        function startPreparationPhase() {
            gameState.gamePhase = 'PREPARATION';
            gameState.preparationTimer = CONFIG.PREPARATION_TIME;
            gameState.waveActive = false;
            preparationStartTime = Date.now();
            const startBtn = document.getElementById('start-wave-btn');
            startBtn.style.display = 'block';
            startBtn.textContent = 'Start Wave';
            gameState.pathChanges = (gameState.pathChanges || 0) + 1;
            const wave = gameState.wave;
            if (wave > 1 && wave % 5 === 0) {
                const oldWidth = CONFIG.MAP_WIDTH;
                const oldHeight = CONFIG.MAP_HEIGHT;
                CONFIG.MAP_WIDTH = oldWidth + 2;
                CONFIG.MAP_HEIGHT = oldHeight + 2;
                console.log(`Map growing: ${oldWidth}x${oldHeight} -> ${CONFIG.MAP_WIDTH}x${CONFIG.MAP_HEIGHT}`);
                extendTerrain(oldWidth, oldHeight);
            }
            gameState.wave++;
            generateNewPath();
            clearPathTiles();
            drawPath(currentPath);
            updateUI();
        }

        function createVoxelEnemyMesh(type, color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.08 });
            const darkMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.55).getHex(), roughness: 0.7, metalness: 0.08 });
            const lightMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).lerp(new THREE.Color(0xffffff), 0.35).getHex(), roughness: 0.5, metalness: 0.08 });
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.0 });
            const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.0 });
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.5, metalness: 0.0 });
            const toothMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.3, metalness: 0.0 });
            const browMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.4).getHex(), roughness: 0.8, metalness: 0.0 });
            const fangMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3, metalness: 0.0 });
            const voxel = (sx, sy, sz, px, py, pz, m) => {
                const geo = new THREE.BoxGeometry(sx, sy, sz);
                const mesh = new THREE.Mesh(geo, m || mat);
                mesh.position.set(px, py, pz);
                mesh.castShadow = true;
                group.add(mesh);
            };
            const eye = (sx, sy, sz, px, py, pz, pupilScale) => {
                voxel(sx, sy, sz, px, py, pz, eyeWhiteMat);
                const ps = pupilScale || 0.6;
                voxel(sx * ps, sy * ps, 1, px, py, pz + sz / 2, eyePupilMat);
            };
            switch(type) {
                case 'basic':
                    voxel(10, 4, 8, 0, 2, 0);
                    voxel(12, 4, 10, 0, 6, 0);
                    voxel(10, 4, 8, 0, 10, 0);
                    voxel(8, 4, 6, 0, 14, 0);
                    voxel(6, 2, 4, 0, 17, 0, lightMat);
                    eye(3, 3, 1, -3, 10, 4);
                    eye(3, 3, 1, 3, 10, 4);
                    voxel(4, 1.5, 1, 0, 7, 4, mouthMat);
                    break;
                case 'fast':
                    voxel(6, 3, 6, 0, 2, 0);
                    voxel(8, 3, 8, 0, 5, 0);
                    voxel(6, 3, 6, 0, 8, 0);
                    voxel(4, 3, 4, 0, 11, 0);
                    voxel(4, 2, 3, 0, 13, 0, lightMat);
                    eye(2.5, 2, 1, -2, 8, 3, 0.5);
                    eye(2.5, 2, 1, 2, 8, 3, 0.5);
                    voxel(3, 2, 1, 0, 6, 3, mouthMat);
                    voxel(1, 1, 1, -1, 6.5, 3.5, toothMat);
                    voxel(1, 1, 1, 1, 6.5, 3.5, toothMat);
                    break;
                case 'tank':
                    voxel(14, 5, 12, 0, 2.5, 0);
                    voxel(16, 5, 14, 0, 7.5, 0);
                    voxel(14, 5, 12, 0, 12.5, 0);
                    voxel(12, 4, 10, 0, 17, 0);
                    voxel(10, 3, 8, 0, 20.5, 0, darkMat);
                    voxel(4, 1.5, 1, -4, 14, 7, browMat);
                    voxel(4, 1.5, 1, 4, 14, 7, browMat);
                    eye(3.5, 3, 1, -4, 12, 6);
                    eye(3.5, 3, 1, 4, 12, 6);
                    voxel(5, 1.5, 1, 0, 9, 6, mouthMat);
                    voxel(1.5, 1, 1, -2, 9.5, 6.5, toothMat);
                    voxel(1.5, 1, 1, 2, 9.5, 6.5, toothMat);
                    voxel(6, 3, 2, 0, 18, 7, lightMat);
                    break;
                case 'sniper':
                    voxel(6, 3, 6, 0, 1.5, 0);
                    voxel(8, 3, 8, 0, 4.5, 0);
                    voxel(6, 4, 6, 0, 8, 0);
                    voxel(6, 4, 6, 0, 12, 0);
                    voxel(6, 4, 6, 0, 16, 0);
                    voxel(4, 3, 4, 0, 19.5, 0);
                    eye(2.5, 2.5, 1, -2, 14, 3, 0.5);
                    eye(1.5, 2.5, 1, 2, 14, 3, 0.4);
                    voxel(2, 1, 1, 0, 11, 3, mouthMat);
                    voxel(2, 2, 8, 0, 19, 0, darkMat);
                    break;
                case 'burrowing':
                    voxel(12, 4, 10, 0, 2, 0);
                    voxel(14, 4, 12, 0, 6, 0);
                    voxel(12, 4, 10, 0, 10, 0);
                    voxel(8, 3, 8, 0, 13.5, 0);
                    eye(2.5, 2, 1, -3, 10, 4, 0.5);
                    eye(2.5, 2, 1, 3, 10, 4, 0.5);
                    voxel(5, 1.5, 1, 0, 7, 4, mouthMat);
                    voxel(1, 1, 1, -1.5, 7.5, 4.5, toothMat);
                    voxel(1, 1, 1, 1.5, 7.5, 4.5, toothMat);
                    voxel(4, 3, 2, -4, 6, 6, darkMat);
                    voxel(4, 3, 2, 4, 6, 6, darkMat);
                    break;
                case 'spawner':
                    voxel(8, 4, 8, 0, 2, 0);
                    voxel(10, 4, 10, 0, 6, 0);
                    voxel(12, 4, 10, 0, 10, 0);
                    voxel(10, 4, 8, 0, 14, 0);
                    voxel(8, 3, 6, 0, 17.5, 0);
                    voxel(6, 2, 4, 0, 20, 0, lightMat);
                    eye(3.5, 3.5, 1, -3, 12, 4, 0.35);
                    eye(3.5, 3.5, 1, 3, 12, 4, 0.35);
                    voxel(5, 2, 1, 0, 9, 4, mouthMat);

                    voxel(4, 4, 1, -5, 22, 4, eyeWhiteMat);

                    voxel(4, 4, 1, 5, 22, 4, eyeWhiteMat);
                    voxel(2.5, 2.5, 1, 5, 22, 4.5, bossPupilMat);
                    voxel(6, 3, 1, 0, 18, 4, mouthMat);
                    voxel(1.5, 1.5, 1, -2, 19, 4.5, fangMat);
                    voxel(1.5, 1.5, 1, 2, 19, 4.5, fangMat);
                    voxel(4, 4, 2, -6, 22, 7, darkMat);
                    voxel(4, 4, 2, 6, 22, 7, darkMat);
                    voxel(3, 2, 1, -4, 18, 7, darkMat);
                    voxel(3, 2, 1, 4, 18, 7, darkMat);
                    voxel(6, 3, 2, 0, 27, 7, lightMat);
                    voxel(3, 3, 3, -5, 28, 0, darkMat);
                    voxel(3, 3, 3, 5, 28, 0, darkMat);
                    break;
                default:
                    voxel(10, 4, 8, 0, 2, 0);
                    voxel(12, 4, 10, 0, 6, 0);
                    voxel(10, 4, 8, 0, 10, 0);
                    voxel(8, 4, 6, 0, 14, 0);
                    eye(3, 3, 1, -3, 10, 4);
                    eye(3, 3, 1, 3, 10, 4);
                    voxel(4, 1.5, 1, 0, 7, 4, mouthMat);
            }
            return group;
        }

        function spawnEnemy(type, variant, waveNum, enemyData) {
            const baseStats = {
                basic:     { speed: 0.8, health: 20, damage: 1 },
                fast:      { speed: 1.6, health: 12, damage: 1 },
                tank:      { speed: 0.4, health: 80, damage: 4 },
                sniper:    { speed: 0.5, health: 18, damage: 6 },
                burrowing: { speed: 0.7, health: 30, damage: 2 },
                spawner:   { speed: 0.35, health: 50, damage: 1 },
                boss:      { speed: 0.3, health: 120, damage: 10 },
            };
            const stats = baseStats[type] || baseStats.basic;
            const waveHealthMult = 1 + (waveNum * 0.04);
            const waveSpeedMult = 1 + (waveNum * 0.005);
            const postBossHM = 1 + ((gameState.bossesDefeated || 0) * 0.05);
            const postBossSM = 1 + ((gameState.bossesDefeated || 0) * 0.02);
            let speed = stats.speed * waveSpeedMult * postBossSM;
            let health = Math.floor(stats.health * waveHealthMult * postBossHM);
            let damage = stats.damage + Math.floor(waveNum * 0.3);
            const colors = {
                basic: 0x6B8E23, fast: 0xDAA520, tank: 0x4682B4,
                sniper: 0x9370DB, burrowing: 0x8B4513, spawner: 0xDA70D6, boss: 0x8B0000
            };
            const color = colors[type] || colors.basic;
            const sizes = { basic: 1.0, fast: 0.85, tank: 1.2, sniper: 1.0, burrowing: 1.0, spawner: 1.1, boss: 1.5 };
            const size = sizes[type] || 1.0;
            const path = currentPath || [];
            if (path.length === 0) { console.error('No path defined!'); return null; }
            const startPos = path[0];
            const firstWaypoint = path[1] || path[path.length - 1];
            const startX = startPos.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const startZ = startPos.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetX = firstWaypoint.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const targetZ = firstWaypoint.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
            const voxelMesh = createVoxelEnemyMesh(type, color);
            const enemy = {
                mesh: voxelMesh, position: new THREE.Vector3(startX, 8, startZ),
                target: new THREE.Vector3(targetX, 8, targetZ), path: path, pathIndex: 0,
                speed: speed, health: health, maxHealth: health, damage: damage,
                variant: variant, id: Math.random(), type: type,
                dodgeChance: type === 'fast' ? 0.15 : 0,
                armorReduction: type === 'tank' ? 0.2 : 0,
                towerDamageMult: type === 'sniper' ? 2 : 1,
                invisible: type === 'burrowing' ? false : false,
                invisTimer: type === 'burrowing' ? 0 : 0,
                summonTimer: type === 'boss' ? 0 : 0,
                spawnOnDeath: type === 'spawner' ? 2 : 0,
                hitFlash: 0,
            };
            const hMult = enemyData?.healthMult || 1;
            const sMult = enemyData?.speedMult || 1;
            enemy.health = Math.floor(enemy.health * hMult);
            enemy.maxHealth = enemy.health;
            enemy.speed = enemy.speed * sMult;
            enemy.mesh.position.copy(enemy.position);
            enemy.mesh.scale.setScalar(size);
            scene.add(enemy.mesh);
            enemy.mesh.scale.set(0, 0, 0);
            animateSpawn(enemy.mesh);
            const glowGeo = new THREE.SphereGeometry(12 * size, 8, 8);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.2 });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.position.copy(enemy.position);
            scene.add(glowMesh);
            enemy.glowMesh = glowMesh;
            const healthBarGeo = new THREE.PlaneGeometry(16, 3);
            const healthBarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const healthBar = new THREE.Mesh(healthBarGeo, healthBarMat);
            healthBar.position.set(0, 22, 0);
            enemy.mesh.add(healthBar);
            enemy.healthBar = healthBar;
            return enemy;
        }

        function animateSpawn(mesh) {
            let scale = 0;
            const spawnInterval = setInterval(() => {
                scale += 0.1;
                mesh.scale.set(scale, scale, scale);
                if (scale >= 1) { mesh.scale.set(1, 1, 1); clearInterval(spawnInterval); }
            }, 30);
        }

        function updateTowerHealthBars() {
            gameState.towers.forEach(tower => {
                if (!tower.healthBar || !tower.healthBarBg) return;
                if (tower.health >= tower.maxHealth) {
                    tower.healthBar.visible = false;
                    tower.healthBarBg.visible = false;
                    return;
                }
                tower.healthBar.visible = true;
                tower.healthBarBg.visible = true;
                const healthPercent = Math.max(0, tower.health / tower.maxHealth);
                tower.healthBar.scale.x = healthPercent;
                tower.healthBar.position.x = -(12 * (1 - healthPercent));
                if (healthPercent > 0.5) tower.healthBar.material.color.setHex(0x30d158);
                else if (healthPercent > 0.25) tower.healthBar.material.color.setHex(0xffd43b);
                else tower.healthBar.material.color.setHex(0xff6b6b);
            });
        }

        function createAOEIndicator(x, z, radiusTiles, color) {
            const worldRadius = radiusTiles * CONFIG.TILE_SIZE * 0.45;
            const ringGeo = new THREE.RingGeometry(worldRadius - 1, worldRadius, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.8, z);
            scene.add(ring);
            const glowGeo = new THREE.RingGeometry(0, worldRadius, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.rotation.x = -Math.PI / 2;
            glow.position.set(x, 0.6, z);
            scene.add(glow);
            let elapsed = 0;
            const duration = 500;
            const startTime = Date.now();
            const fadeInterval = setInterval(() => {
                elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                ring.material.opacity = 0.7 * (1 - t);
                glow.material.opacity = 0.15 * (1 - t);
                ring.scale.setScalar(1 + t * 0.15);
                glow.scale.setScalar(1 + t * 0.15);
                if (t >= 1) {
                    clearInterval(fadeInterval);
                    if (ring.parent) scene.remove(ring);
                    if (glow.parent) scene.remove(glow);
                    ringGeo.dispose(); ringMat.dispose();
                    glowGeo.dispose(); glowMat.dispose();
                }
            }, 16);
        }

        function updateTerrain(delta) {
            const time = Date.now() * 0.001;
            scene.traverse(obj => {
                if (obj.userData && obj.userData.isWater) {
                    const d = obj.userData;
                    obj.material.opacity = d.baseOpacity + Math.sin(time * 2 + (d.phase || 0)) * 0.15;
                }
            });
            pathSegments.forEach((segment, i) => {
                if (segment.mesh) { segment.mesh.position.y += Math.sin(time + i * 0.5) * 0.02; }
            });
            
            debrisParticles = debrisParticles.filter(p => {
                if (!p.mesh || !p.mesh.parent) return false;
                if (p.velocity && p.life !== undefined) {
                    p.mesh.position.add(p.velocity.clone().multiplyScalar(0.016));
                    p.velocity.y -= 0.1;
                    p.life--;
                    p.mesh.material.opacity = Math.max(0, p.life / 50);
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        return false;
                    }
                    return true;
                }
                if (p.x !== undefined) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.z += p.vz;
                    p.vy -= 0.15;
                    p.life--;
                    if (p.mesh) {
                        p.mesh.position.set(p.x, p.y, p.z);
                        p.mesh.material.opacity = Math.max(0, p.life / 80);
                    }
                    if (p.life <= 0) {
                        if (p.mesh && p.mesh.parent) scene.remove(p.mesh);
                        return false;
                    }
                    return true;
                }
                return false;
            });
            
            clouds.forEach((cloud, i) => {
                if (cloud.group && cloud.group.parent) {
                    const phase = cloud.phase || 0;
                    cloud.group.position.x += cloud.speed * 0.5;
                    cloud.group.position.y += Math.sin(time * 0.5 + phase) * 0.1;
                    const maxX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE * 1.5;
                    if (cloud.group.position.x > maxX) { cloud.group.position.x = -100; }
                }
            });
            ambientParticles.forEach((p, i) => {
                if (p.mesh && p.mesh.parent) {
                    const phase = p.phase || 0;
                    p.mesh.position.y += Math.sin(time * 2 + phase) * 0.15;
                    p.mesh.position.x += Math.cos(time * 0.5 + phase) * 0.08;
                    p.mesh.position.z += Math.sin(time * 0.3 + phase) * 0.05;
                    p.mesh.material.opacity = 0.3 + Math.sin(time * 3 + phase) * 0.3;
                    const maxX = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
                    const maxZ = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
                    if (p.mesh.position.y > 40) p.mesh.position.y = 5;
                    if (p.mesh.position.x > maxX) p.mesh.position.x = 0;
                    if (p.mesh.position.z > maxZ) p.mesh.position.z = 0;
                    if (p.mesh.position.x < 0) p.mesh.position.x = maxX;
                    if (p.mesh.position.z < 0) p.mesh.position.z = maxZ;
                }
            });
        }

        function createAmbientParticles() {
            const particleGeo = new THREE.SphereGeometry(1, 6, 6);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0xffff44, transparent: true, opacity: 0.6 });
            for (let i = 0; i < 40; i++) {
                const particle = new THREE.Mesh(particleGeo, particleMat.clone());
                particle.position.set(Math.random() * CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE, Math.random() * 30 + 8, Math.random() * CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE);
                particle.material.opacity = 0.3 + Math.random() * 0.4;
                particle.material.color.setHex(Math.random() > 0.5 ? 0xffff44 : 0x88ff88);
                scene.add(particle);
                ambientParticles.push({ mesh: particle, speed: 0.3 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2 });
            }
        }

        function updateUI() {
            // Battery cells
            const batteryVisual = document.getElementById('battery-visual');
            if (batteryVisual) {
                const totalCells = 10;
                const filledCells = Math.round((gameState.energy / CONFIG.MAX_ENERGY) * totalCells);
                let cellsHTML = '';
                for (let i = 0; i < totalCells; i++) {
                    let cellClass = 'battery-cell';
                    if (i < filledCells) {
                        if (filledCells <= 2) cellClass += ' low';
                        else if (filledCells <= 4) cellClass += ' medium';
                        else cellClass += ' filled';
                    }
                    cellsHTML += `<div class="${cellClass}"></div>`;
                }
                cellsHTML += '<div class="battery-cap"></div>';
                batteryVisual.innerHTML = cellsHTML;
            }
            const energyVal = document.getElementById('energy-val');
            if (energyVal) energyVal.textContent = Math.floor(gameState.energy);
            const livesContainer = document.getElementById('lives-display');
            if (livesContainer) {
                const lives = Math.max(0, Math.min(gameState.lives, CONFIG.BASE_LIVES));
                let heartsHTML = '';
                for (let i = 0; i < lives; i++) {
                    heartsHTML += '<span class="heart">❤</span>';
                }
                livesContainer.innerHTML = heartsHTML;
            }
            const waveInfo = document.getElementById('wave-info');
            if (waveInfo) {
                waveInfo.textContent = gameState.wave;
            }
            
            // Boss progress dots
            const bossDots = document.getElementById('boss-dots');
            if (bossDots) {
                const cycle = ((gameState.wave - 1) % 5) + 1;
                let dotsHTML = '';
                for (let i = 1; i <= 5; i++) {
                    let cls = 'boss-dot';
                    if (i < cycle) cls += ' done';
                    else if (i === cycle && gameState.wave % 5 === 0) cls += ' active';
                    dotsHTML += `<div class="${cls}"></div>`;
                }
                bossDots.innerHTML = dotsHTML;
            }
            
            // Kill counter
            const killCount = document.getElementById('kill-count');
            if (killCount) killCount.textContent = gameState.totalKills || 0;
            
            // Wave enemy count during active wave
            const waveEnemyCount = document.getElementById('wave-enemy-count');
            if (waveEnemyCount) {
                if (gameState.waveActive) {
                    const remaining = gameState.enemies.length;
                    waveEnemyCount.textContent = `· ${remaining}`;
                } else {
                    waveEnemyCount.textContent = '';
                }
            }
            Object.entries(TOWER_TYPES).forEach(([key, type]) => {
                const btn = document.querySelector(`[data-tower="${key}"]`);
                if (!btn) return;
                if (gameState.energy < type.cost) { btn.classList.add('disabled'); }
                else { btn.classList.remove('disabled'); }
            });
        }

        function showEnergyPopup(x, y, amount) {
            const div = document.createElement('div');
            div.className = 'energy-popup';
            div.innerHTML = `+${amount}⚡`;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function createExplosion(x, y, z, scale) {
            const count = 8 + Math.floor(Math.random() * 6);
            for (let i = 0; i < count; i++) {
                const size = 2 + Math.random() * 3 * scale;
                const geo = new THREE.BoxGeometry(size, size, size);
                const colors = [0xff6b6b, 0xffd43b, 0xff8c42, 0xff453a, 0xffa500];
                const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)], transparent: true, opacity: 1 });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.set(x, y, z);
                scene.add(particle);
                debrisParticles.push({
                    mesh: particle,
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 4, 3 + Math.random() * 5, (Math.random() - 0.5) * 4),
                    life: 20 + Math.random() * 15
                });
            }
        }

        function updateEnemies(delta) {
            const time = Date.now() * 0.001;
            const tileSize = CONFIG.TILE_SIZE;
            gameState.enemies = gameState.enemies.filter(enemy => {
                if (!enemy || !enemy.mesh || !enemy.mesh.parent) return false;
                if (enemy.health <= 0) {
                    createExplosion(enemy.position.x, enemy.position.y, enemy.position.z, 1.5);
                    if (enemy.glowMesh && enemy.glowMesh.parent) scene.remove(enemy.glowMesh);
                    scene.remove(enemy.mesh);
                    gameState.totalKills = (gameState.totalKills || 0) + 1;
                    if (enemy.spawnOnDeath > 0) {
                        for (let s = 0; s < enemy.spawnOnDeath; s++) {
                            const child = spawnEnemy('basic', 0, gameState.wave, { healthMult: 0.5, speedMult: 1.2 });
                            if (child) {
                                child.position.set(enemy.position.x + (Math.random() - 0.5) * 20, 8, enemy.position.z + (Math.random() - 0.5) * 20);
                                child.mesh.position.copy(child.position);
                            }
                        }
                    }
                    return false;
                }
                // Burrowing invisibility toggle
                if (enemy.type === 'burrowing') {
                    enemy.invisTimer += delta * 0.06;
                    if (enemy.invisTimer > 3) {
                        enemy.invisible = !enemy.invisible;
                        enemy.invisTimer = 0;
                        enemy.mesh.visible = !enemy.invisible;
                        if (enemy.glowMesh) enemy.glowMesh.visible = !enemy.invisible;
                    }
                }
                // Boss summon timer
                if (enemy.summonTimer !== undefined && enemy.type === 'boss') {
                    enemy.summonTimer += delta * 0.06;
                    if (enemy.summonTimer > 5) {
                        enemy.summonTimer = 0;
                        const minion = spawnEnemy('fast', 0, gameState.wave, { healthMult: 0.4, speedMult: 1.0 });
                        if (minion) {
                            minion.position.set(enemy.position.x + (Math.random() - 0.5) * 15, 8, enemy.position.z + (Math.random() - 0.5) * 15);
                            minion.mesh.position.copy(minion.position);
                        }
                    }
                }
                // Hit flash decay
                if (enemy.hitFlash > 0) {
                    enemy.hitFlash -= delta * 0.06;
                    if (enemy.hitFlash <= 0) {
                        enemy.hitFlash = 0;
                        enemy.mesh.traverse(child => {
                            if (child.material && child.material._origEmissive !== undefined) {
                                child.material.emissiveIntensity = child.material._origEmissive;
                                child.material.emissive.setHex(child.material._origEmissiveColor || 0x000000);
                            }
                        });
                    }
                }
                // Check for tower collision on current tile
                const enemyGridX = Math.floor(enemy.position.x / tileSize);
                const enemyGridZ = Math.floor(enemy.position.z / tileSize);
                for (let t = gameState.towers.length - 1; t >= 0; t--) {
                    const tower = gameState.towers[t];
                    if (tower.gridX === enemyGridX && tower.gridZ === enemyGridZ) {
                        const towerDmg = enemy.damage * enemy.towerDamageMult * delta * 0.5;
                        tower.health -= towerDmg;
                        if (tower.health <= 0) {
                            createExplosion(tower.mesh.position.x, tower.mesh.position.y, tower.mesh.position.z, 2);
                            scene.remove(tower.mesh);
                            if (tower.rangeIndicator) scene.remove(tower.rangeIndicator);
                            gameState.towers.splice(t, 1);
                            gameState.placedTowers = gameState.towers.length > 0;
                            updateStartButton();
                            updateUI();
                        }
                    }
                }
                if (enemy.pathIndex < enemy.path.length) {
                    const target = enemy.path[enemy.pathIndex];
                    const tx = target.x * tileSize + tileSize / 2;
                    const tz = target.y * tileSize + tileSize / 2;
                    const dx = tx - enemy.position.x;
                    const dz = tz - enemy.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 2) {
                        enemy.pathIndex++;
                        if (enemy.pathIndex < enemy.path.length) {
                            const next = enemy.path[enemy.pathIndex];
                            enemy.target.set(next.x * tileSize + tileSize / 2, 8, next.y * tileSize + tileSize / 2);
                        }
                    } else {
                        const moveSpeed = enemy.speed * delta * 0.06;
                        enemy.position.x += (dx / dist) * moveSpeed;
                        enemy.position.z += (dz / dist) * moveSpeed;
                        enemy.mesh.position.copy(enemy.position);
                        enemy.mesh.position.y = enemy.position.y + Math.sin(time * 3 + enemy.id * 10) * 0.3;
                        const angle = Math.atan2(dx, dz);
                        enemy.mesh.rotation.y = angle;
                    }
                } else {
                    gameState.lives -= enemy.damage;
                    if (enemy.glowMesh && enemy.glowMesh.parent) scene.remove(enemy.glowMesh);
                    scene.remove(enemy.mesh);
                    if (gameState.lives <= 0) { endGame(false); }
                    return false;
                }
                if (enemy.glowMesh && enemy.glowMesh.parent) {
                    enemy.glowMesh.position.copy(enemy.mesh.position);
                }
                return true;
            });
        }

        function updateProjectiles(delta) {
            gameState.projectiles = gameState.projectiles.filter(proj => {
                if (!proj || !proj.mesh || !proj.mesh.parent) return false;
                proj.life = (proj.life || 0) - 1;
                if (proj.life <= 0) {
                    scene.remove(proj.mesh);
                    if (proj.trail) { scene.remove(proj.trail); }
                    return false;
                }
                if (proj.target && proj.target.mesh && proj.target.mesh.parent) {
                    const dx = proj.target.position.x - proj.mesh.position.x;
                    const dy = proj.target.position.y - proj.mesh.position.y;
                    const dz = proj.target.position.z - proj.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    if (dist < 3) {
                        if (proj.target.invisible) {
                            scene.remove(proj.mesh);
                            if (proj.trail) { scene.remove(proj.trail); }
                            return false;
                        }
                        if (proj.target.dodgeChance > 0 && Math.random() < proj.target.dodgeChance) {
                            proj.target = null;
                            proj.life = 30;
                            return true;
                        }
                        let dmg = proj.damage;
                        if (proj.target.armorReduction > 0) {
                            dmg *= (1 - proj.target.armorReduction);
                        }
                        proj.target.health -= dmg;
                        proj.target.hitFlash = 1;
                        proj.target.mesh.traverse(child => {
                            if (child.material) {
                                if (child.material._origEmissive === undefined) {
                                    child.material._origEmissive = child.material.emissiveIntensity || 0;
                                    child.material._origEmissiveColor = child.material.emissive ? child.material.emissive.getHex() : 0;
                                }
                                child.material.emissiveIntensity = 1;
                                child.material.emissive = child.material.emissive || new THREE.Color();
                                child.material.emissive.setHex(0xffffff);
                            }
                        });
                        createExplosion(proj.mesh.position.x, proj.mesh.position.y, proj.mesh.position.z, 0.8);
                        scene.remove(proj.mesh);
                        if (proj.trail) { scene.remove(proj.trail); }
                        return false;
                    }
                    const speed = proj.speed || 8;
                    proj.mesh.position.x += (dx / dist) * speed;
                    proj.mesh.position.y += (dy / dist) * speed;
                    proj.mesh.position.z += (dz / dist) * speed;
                    if (proj.trail) {
                        proj.trail.position.copy(proj.mesh.position);
                    }
                } else {
                    scene.remove(proj.mesh);
                    if (proj.trail) { scene.remove(proj.trail); }
                    return false;
                }
                return true;
            });
        }

        function updateEnemyHealthBars() {
            gameState.enemies.forEach(enemy => {
                if (!enemy.healthBar) return;
                const pct = Math.max(0, enemy.health / enemy.maxHealth);
                enemy.healthBar.scale.x = pct;
                enemy.healthBar.position.x = -(8 * (1 - pct));
                if (pct > 0.5) enemy.healthBar.material.color.setHex(0x00ff00);
                else if (pct > 0.25) enemy.healthBar.material.color.setHex(0xffd43b);
                else enemy.healthBar.material.color.setHex(0xff6b6b);
            });
        }

        function updateTowerRangeIndicators() {
            gameState.towers.forEach(tower => {
                if (tower.rangeIndicator) {
                    tower.rangeIndicator.visible = tower.showRange || false;
                }
            });
        }

        function showFloatingText(x, y, z, text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = color || '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y || window.innerHeight / 2, z || 0);
            sprite.scale.set(200, 50, 1);
            scene.add(sprite);
            let life = 60;
            const fade = setInterval(() => {
                life--;
                sprite.material.opacity = life / 60;
                sprite.position.y += 0.5;
                if (life <= 0) {
                    clearInterval(fade);
                    scene.remove(sprite);
                    mat.map.dispose();
                    mat.dispose();
                }
            }, 30);
        }

        function showWaveAnnouncement(waveNum) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.font = 'bold 56px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeText(`Wave ${waveNum}`, 256, 64);
            ctx.fillText(`Wave ${waveNum}`, 256, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE / 2, 60, CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE / 2);
            sprite.scale.set(400, 100, 1);
            scene.add(sprite);
            let life = 90;
            const fade = setInterval(() => {
                life--;
                sprite.material.opacity = life / 90;
                if (life <= 0) {
                    clearInterval(fade);
                    scene.remove(sprite);
                    mat.map.dispose();
                    mat.dispose();
                }
            }, 30);
